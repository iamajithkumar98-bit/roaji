<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roaji Billing Software - Production Kanban Board</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FDFCF7; /* Warm White Default */
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(231, 229, 222, 0.6);
            border-radius: 1.5rem;
        }
        .glow-focus:focus {
            outline: none;
            border-color: #D97706; /* Warm Amber */
            box-shadow: 0 0 10px rgba(217, 119, 6, 0.15);
        }
        .kanban-column {
            min-height: 500px;
        }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden p-4 md:p-8 flex flex-col items-center justify-start">

    <!-- BACKGROUND BLOB DECORATIONS -->
    <div class="absolute top-[-10%] left-[-10%] w-[45vw] h-[45vw] rounded-full bg-amber-100/40 blur-[80px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-orange-100/30 blur-[90px] pointer-events-none"></div>

    <!-- TOAST NOTIFICATION CONTAINER -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full"></div>

    <!-- MAIN INTERFACE WRAPPER -->
    <div class="w-full max-w-6xl z-10 space-y-6">

        <!-- HEADER AREA -->
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pb-4 border-b border-stone-200/50">
            <div class="space-y-1">
                <div class="flex items-center gap-2">
                    <a href="index.html" data-key="back_dashboard" class="text-xs font-bold text-amber-700 hover:text-amber-800 transition">← முகப்புப்பக்கத்திற்குச் செல்</a>
                </div>
                <h1 id="app-title" data-key="app_title" class="text-xl font-bold text-stone-850">தயாரிப்பு மேலாண்மைப் பலகை</h1>
                <p class="text-xs text-stone-500">SaaS Live Production Flow & Staff Assignment Cockpit</p>
            </div>

            <!-- GLOBAL LANGUAGE TOGGLE -->
            <div class="glass-panel p-1 rounded-2xl flex items-center shadow-sm self-end sm:self-auto">
                <button onclick="changeLanguage('ta')" id="lang-btn-ta" class="px-3.5 py-1.5 text-xs font-bold rounded-xl transition duration-300">தமிழ்</button>
                <button onclick="changeLanguage('en')" id="lang-btn-en" class="px-3.5 py-1.5 text-xs font-bold rounded-xl transition duration-300">EN</button>
            </div>
        </header>

        <!-- KANBAN BOARD GRID -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <!-- Column 1: Pending/Queue -->
            <div class="flex flex-col space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 data-key="col_pending" class="text-xs font-bold text-stone-700 uppercase tracking-wider">காத்திருப்பவை</h3>
                    <span id="badge-pending" class="w-6 h-6 rounded-full bg-stone-200 text-stone-700 text-xs font-bold flex items-center justify-center">0</span>
                </div>
                <div id="col-pending" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'Pending')" class="kanban-column p-4 bg-stone-100/50 border border-stone-200/60 rounded-3xl space-y-4 transition duration-200">
                    <!-- Cards will load here dynamically -->
                </div>
            </div>

            <!-- Column 2: In Progress -->
            <div class="flex flex-col space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 data-key="col_progress" class="text-xs font-bold text-amber-800 uppercase tracking-wider font-semibold">வேலை நடப்பவை</h3>
                    <span id="badge-progress" class="w-6 h-6 rounded-full bg-amber-100 text-amber-800 text-xs font-bold flex items-center justify-center">0</span>
                </div>
                <div id="col-progress" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'In Progress')" class="kanban-column p-4 bg-stone-100/50 border border-stone-200/60 rounded-3xl space-y-4 transition duration-200">
                    <!-- Cards will load here dynamically -->
                </div>
            </div>

            <!-- Column 3: Printing/Framing -->
            <div class="flex flex-col space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 data-key="col_printing" class="text-xs font-bold text-indigo-800 uppercase tracking-wider font-semibold">பிரிண்டிங்/ஃபிரேமிங்</h3>
                    <span id="badge-printing" class="w-6 h-6 rounded-full bg-indigo-100 text-indigo-800 text-xs font-bold flex items-center justify-center">0</span>
                </div>
                <div id="col-printing" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'Printing/Framing')" class="kanban-column p-4 bg-stone-100/50 border border-stone-200/60 rounded-3xl space-y-4 transition duration-200">
                    <!-- Cards will load here dynamically -->
                </div>
            </div>

            <!-- Column 4: Completed -->
            <div class="flex flex-col space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 data-key="col_completed" class="text-xs font-bold text-emerald-800 uppercase tracking-wider font-semibold">முடிவடைந்தவை</h3>
                    <span id="badge-completed" class="w-6 h-6 rounded-full bg-emerald-100 text-emerald-800 text-xs font-bold flex items-center justify-center">0</span>
                </div>
                <div id="col-completed" ondragover="allowDrop(event)" ondrop="handleDrop(event, 'Completed')" class="kanban-column p-4 bg-stone-100/50 border border-stone-200/60 rounded-3xl space-y-4 transition duration-200">
                    <!-- Cards will load here dynamically -->
                </div>
            </div>

        </div>

    </div>

    <!-- VANILLA JS ENGINE -->
    <script>
        // BILINGUAL DICTIONARY FOR i18n
        const langData = {
            ta: {
                app_title: "தயாரிப்பு மேலாண்மைப் பலகை",
                back_dashboard: "← முகப்புப்பக்கத்திற்குச் செல்",
                col_pending: "காத்திருப்பவை / Queue",
                col_progress: "வேலை நடப்பவை / Editing",
                col_printing: "பிரிண்டிங் & ஃபிரேமிங்",
                col_completed: "முடிவடைந்தவை / Done",
                lbl_work_type: "வேலை வகை",
                lbl_assigned_staff: "பொறுப்பு",
                lbl_notes: "பிரத்யேக குறிப்பு",
                lbl_deadline: "கெடு நாள்",
                priority_urgent: "அவசரம்!",
                priority_normal: "சாதாரண",
                toast_moved: "வேலையின் நிலை வெற்றிகரமாக மாற்றப்பட்டது!",
                toast_staff_changed: "பொறுப்பு ஊழியர் வெற்றிகரமாக மாற்றப்பட்டார்!"
            },
            en: {
                app_title: "Production Management Board",
                back_dashboard: "← Back to Dashboard",
                col_pending: "Pending / Queue",
                col_progress: "In Progress / Editing",
                col_printing: "Printing & Framing",
                col_completed: "Completed",
                lbl_work_type: "Job Type",
                lbl_assigned_staff: "Assigned Staff",
                lbl_notes: "Customer Notes",
                lbl_deadline: "Deadline",
                priority_urgent: "Urgent!",
                priority_normal: "Normal",
                toast_moved: "Production status transitioned successfully!",
                toast_staff_changed: "Assigned technician modified successfully!"
            }
        };

        const staffs = ["Arun Kumar", "Karthick Raja", "Suresh Balaji"];
        let ordersDB = [];
        let currentLang = 'ta';

        // ON RUNTIME INITS
        window.addEventListener('DOMContentLoaded', () => {
            ordersDB = JSON.parse(localStorage.getItem('roaji_orders')) || [];
            
            const savedGlobalLang = localStorage.getItem('roaji_language');
            if (savedGlobalLang === 'ta' || savedGlobalLang === 'en') {
                currentLang = savedGlobalLang;
            }
            applyLanguage();
            renderKanbanBoard();
        });

        // LANGUAGE TOGGLE UTILS
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('roaji_language', lang);
            applyLanguage();
            renderKanbanBoard();
        }

        function applyLanguage() {
            const btnTa = document.getElementById('lang-btn-ta');
            const btnEn = document.getElementById('lang-btn-en');

            if (currentLang === 'ta') {
                btnTa.className = "px-3.5 py-1.5 text-xs font-bold rounded-xl transition bg-amber-600 text-white";
                btnEn.className = "px-3.5 py-1.5 text-xs font-bold rounded-xl transition text-stone-600";
            } else {
                btnEn.className = "px-3.5 py-1.5 text-xs font-bold rounded-xl transition bg-amber-600 text-white";
                btnTa.className = "px-3.5 py-1.5 text-xs font-bold rounded-xl transition text-stone-600";
            }

            const elements = document.querySelectorAll('[data-key]');
            elements.forEach(element => {
                const key = element.getAttribute('data-key');
                if (langData[currentLang][key]) {
                    element.innerText = langData[currentLang][key];
                }
            });
        }

        // RENDER KANBAN FLOW BOARD
        function renderKanbanBoard() {
            const colPending = document.getElementById('col-pending');
            const colProgress = document.getElementById('col-progress');
            const colPrinting = document.getElementById('col-printing');
            const colCompleted = document.getElementById('col-completed');

            [colPending, colProgress, colPrinting, colCompleted].forEach(c => c.innerHTML = '');

            let countPending = 0, countProgress = 0, countPrinting = 0, countCompleted = 0;

            ordersDB.forEach(o => {
                const cardHTML = generateCardHTML(o);

                // Map statuses logically
                if (o.status === 'New' || o.status === 'Pending') {
                    colPending.innerHTML += cardHTML;
                    countPending++;
                } else if (o.status === 'In Production') {
                    colProgress.innerHTML += cardHTML;
                    countProgress++;
                } else if (o.status === 'Ready to Pack') {
                    colPrinting.innerHTML += cardHTML;
                    countPrinting++;
                } else if (o.status === 'Completed' || o.status === 'Shipped' || o.status === 'Delivered') {
                    colCompleted.innerHTML += cardHTML;
                    countCompleted++;
                }
            });

            document.getElementById('badge-pending').innerText = countPending;
            document.getElementById('badge-progress').innerText = countProgress;
            document.getElementById('badge-printing').innerText = countPrinting;
            document.getElementById('badge-completed').innerText = countCompleted;
        }

        function generateCardHTML(o) {
            const priorityBadgeStyle = o.balance > 1000
                ? 'bg-rose-100 text-rose-800 border-rose-200' 
                : 'bg-stone-100 text-stone-600 border-stone-200';
            
            const priorityText = o.balance > 1000 ? langData[currentLang]['priority_urgent'] : langData[currentLang]['priority_normal'];

            let staffOptionsHTML = '';
            staffs.forEach(s => {
                staffOptionsHTML += `<option value="${s}" ${o.staff === s ? 'selected' : ''}>${s}</option>`;
            });

            return `
                <div id="${o.id}" draggable="true" ondragstart="handleDragStart(event)" class="glass-panel p-4 rounded-2xl shadow-sm border border-stone-200/50 space-y-3 cursor-grab hover:shadow-md transition relative">
                    <div class="flex justify-between items-center">
                        <span class="px-2 py-0.5 text-[9px] font-bold rounded border uppercase ${priorityBadgeStyle}">${priorityText}</span>
                        <span class="font-bold text-stone-400 text-[10px] font-mono">${o.id}</span>
                    </div>

                    <div>
                        <h4 class="font-bold text-stone-850 text-xs">${o.customer}</h4>
                        <div class="text-[10px] text-stone-500 mt-1 leading-normal">
                            <strong>${langData[currentLang]['lbl_work_type']}:</strong> Photo Frame & Graphic Edit
                        </div>
                    </div>

                    <div class="text-[10px] space-y-1">
                        <label class="font-bold text-stone-400 block">${langData[currentLang]['lbl_assigned_staff']}:</label>
                        <select onchange="updateAssignedStaff('${o.id}', this.value)" class="w-full bg-white border border-stone-200 px-2 py-1 rounded text-stone-700 font-semibold focus:outline-none cursor-pointer">
                            <option value="">-- Assign Staff --</option>
                            ${staffOptionsHTML}
                        </select>
                    </div>

                    <div class="p-2 bg-stone-50 border border-stone-150 rounded-lg text-[9px] text-stone-500 leading-normal">
                        <strong>${langData[currentLang]['lbl_notes']}:</strong> ${o.address || 'Standard Smudge Painting & Frame.'}
                    </div>

                    <div class="flex justify-between items-center text-[9px] text-stone-400 font-medium">
                        <span>${langData[currentLang]['lbl_deadline']}:</span>
                        <strong class="text-stone-600 font-mono">${o.date}</strong>
                    </div>

                    <!-- Mobile fallback buttons -->
                    <div class="flex justify-between gap-1 pt-2 border-t border-stone-100 lg:hidden">
                        <button onclick="transitionMobileStatus('${o.id}', 'prev')" class="flex-1 py-1 bg-stone-100 hover:bg-stone-200 text-[9px] font-bold rounded-md">← Back</button>
                        <button onclick="transitionMobileStatus('${o.id}', 'next')" class="flex-1 py-1 bg-amber-600 hover:bg-amber-700 text-white text-[9px] font-bold rounded-md">Next →</button>
                    </div>
                </div>
            `;
        }

        function updateAssignedStaff(id, staffName) {
            const order = ordersDB.find(o => o.id === id);
            if (order) {
                order.staff = staffName;
                saveOrdersToLocalStorage();
                showToast(langData[currentLang]['toast_staff_changed'], 'success');
            }
        }

        // DESKTOP DRAG AND DROP
        function allowDrop(event) {
            event.preventDefault();
        }

        function handleDragStart(event) {
            event.dataTransfer.setData("text/plain", event.target.id);
        }

        function handleDrop(event, targetStatus) {
            event.preventDefault();
            const cardId = event.dataTransfer.getData("text/plain");
            const order = ordersDB.find(o => o.id === cardId);
            
            if (order) {
                let statusKeyword = targetStatus;
                if (targetStatus === 'Pending') statusKeyword = 'New';
                
                order.status = statusKeyword;
                saveOrdersToLocalStorage();
                renderKanbanBoard();
                showToast(langData[currentLang]['toast_moved'], 'success');
            }
        }

        // MOBILE STATUS TRANSITIONS
        function transitionMobileStatus(id, direction) {
            const order = ordersDB.find(o => o.id === id);
            if (!order) return;

            const stages = ['New', 'In Production', 'Ready to Pack', 'Completed'];
            let currIndex = stages.indexOf(order.status);
            if (currIndex === -1) currIndex = 0; 

            if (direction === 'next') {
                if (currIndex < stages.length - 1) {
                    order.status = stages[currIndex + 1];
                }
            } else {
                if (currIndex > 0) {
                    order.status = stages[currIndex - 1];
                }
            }

            saveOrdersToLocalStorage();
            renderKanbanBoard();
            showToast(langData[currentLang]['toast_moved'], 'success');
        }

        function saveOrdersToLocalStorage() {
            localStorage.setItem('roaji_orders', JSON.stringify(ordersDB));
        }

        // TOAST NOTIFICATIONS ENGINE
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let bgClass = 'bg-stone-900 text-white';
            let iconSvg = '';

            if (type === 'success') {
                bgClass = 'bg-emerald-50 border border-emerald-200 text-emerald-800';
                iconSvg = `<svg class="h-5 w-5 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
            }

            toast.className = `flex items-center gap-3 p-4 rounded-xl shadow-lg transition-all duration-300 transform translate-x-12 opacity-0 ${bgClass}`;
            toast.innerHTML = `<div class="flex-shrink-0">${iconSvg}</div><div class="text-xs font-semibold leading-relaxed">${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-x-12', 'opacity-0'); }, 10);
            setTimeout(() => {
                toast.classList.add('translate-x-12', 'opacity-0');
                setTimeout(() => { toast.remove(); }, 300);
            }, 4000);
        }
    </script>
</body>
</html>
