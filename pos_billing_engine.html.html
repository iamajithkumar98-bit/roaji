<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roaji SaaS Suite - Ultimate Core POS Billing Engine</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505; /* Deep luxury streaming-app dark base */
            color: #F5F5F4;
            margin: 0;
            overflow-x: hidden;
        }
        .premium-card {
            background: rgba(18, 16, 15, 0.85); /* Premium Stone-900 Alpha */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(87, 83, 78, 0.4); /* Stone-600 Alpha border */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        .glow-accent:focus {
            outline: none;
            border-color: #F97316; /* Orange-500 Neon */
            box-shadow: 0 0 15px rgba(249, 115, 22, 0.35);
        }
        .yellow-pulse {
            animation: yellowPulseAnimation 2s infinite;
        }
        @keyframes yellowPulseAnimation {
            0% { box-shadow: 0 0 5px rgba(234, 179, 8, 0.2); border-color: rgba(234, 179, 8, 0.3); }
            50% { box-shadow: 0 0 20px rgba(234, 179, 8, 0.6); border-color: rgba(234, 179, 8, 0.8); }
            100% { box-shadow: 0 0 5px rgba(234, 179, 8, 0.2); border-color: rgba(234, 179, 8, 0.3); }
        }
    </style>
</head>
<body class="min-h-screen relative p-4 md:p-6 flex flex-col items-center justify-start overflow-hidden">

    <!-- Background Ambiance Glows -->
    <div class="absolute top-[-25%] left-[-15%] w-[65vw] h-[65vw] rounded-full bg-amber-500/5 blur-[130px] pointer-events-none"></div>
    <div class="absolute bottom-[-25%] right-[-15%] w-[65vw] h-[65vw] rounded-full bg-orange-600/5 blur-[130px] pointer-events-none"></div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full"></div>

    <!-- MAIN CORE CONTAINER -->
    <div class="w-full max-w-7xl z-10 space-y-4">

        <!-- HEADER AREA -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 pb-3 border-b border-stone-900">
            <div class="space-y-1">
                <div class="flex items-center gap-2">
                    <a href="index.html" data-key="back_dashboard" class="text-xs font-bold text-amber-700 hover:text-amber-800 transition">← பில்லிங் பக்கத்திற்குச் செல்</a>
                </div>
                <h1 id="app-title" data-key="app_title" class="text-lg font-bold tracking-tight text-white uppercase">அதிநவீன பில்லிங் முனையம்</h1>
                <p class="text-xs text-stone-500 font-semibold uppercase tracking-wider">High-frequency Multi-Billing Engine</p>
            </div>

            <!-- Topbar options -->
            <div class="flex flex-wrap items-center gap-3 self-end md:self-auto">
                
                <!-- Niche-Specific Contextual UI Adapter Toggle -->
                <div class="relative">
                    <select id="niche-selector" onchange="switchNicheContext(this.value)" class="pl-3 pr-8 py-1.5 bg-stone-900/60 border border-stone-850 rounded-xl text-stone-300 text-xs font-bold focus:outline-none cursor-pointer appearance-none">
                        <option value="gift">Gifts & Frame Studio</option>
                        <option value="textiles">Textiles & Garments</option>
                        <option value="xerox">Instant Xerox Matrix</option>
                    </select>
                </div>

                <!-- Global Language Toggle -->
                <div class="glass-panel p-1 rounded-2xl flex items-center shadow-sm bg-stone-900/60 border border-stone-850">
                    <button onclick="changeLanguage('en')" id="lang-btn-en" class="px-3.5 py-1.5 text-xs font-bold rounded-lg transition duration-200">EN</button>
                    <button onclick="changeLanguage('ta')" id="lang-btn-ta" class="px-3.5 py-1.5 text-xs font-bold rounded-lg transition duration-200 text-stone-400">தமிழ்</button>
                </div>

            </div>
        </header>

        <!-- MULTI-BILLING TABS (Apple/MacBook Style) -->
        <div class="flex items-center gap-2 bg-stone-950/40 border border-stone-900 p-1.5 rounded-2xl overflow-x-auto" id="tabs-bar">
            <!-- Active tabs populated dynamically -->
            <button onclick="createNewBillingTab()" class="px-3.5 py-1.5 bg-stone-900 hover:bg-stone-800 border border-stone-800 text-amber-500 text-xs font-bold rounded-xl transition flex items-center gap-1.5">
                <span>+</span> <span data-key="btn_add_tab">புதிய பில்</span>
            </button>
        </div>

        <!-- MAIN LAYOUT GRID -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
            
            <!-- LEFT AREA: POS SELECTION & CART (Col 7) -->
            <div class="lg:col-span-7 space-y-4">
                
                <!-- Dynamic Niche-Specific Adapter Area -->
                <div id="niche-adapter-container" class="premium-card p-4 rounded-3xl">
                    <!-- Contextual inputs loaded dynamically -->
                </div>

                <!-- Product Selection / Picker Block -->
                <div class="premium-card p-5 rounded-3xl space-y-4">
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input id="barcode-input" type="text" placeholder="Barcode / பார்கோடு..." onkeydown="handleBarcodeSearch(event)" class="flex-1 px-4 py-2.5 bg-stone-950/50 border border-stone-850 rounded-xl text-stone-200 text-xs glow-focus">
                        <select id="product-picker" onchange="addProductToActiveCart(this.value)" class="flex-[1.5] px-4 py-2.5 bg-stone-950/50 border border-stone-850 rounded-xl text-stone-200 text-xs focus:outline-none cursor-pointer">
                            <!-- Dynamic option tags -->
                        </select>
                    </div>

                    <!-- Selected Billing Tab Cart Details Table -->
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs border-collapse">
                            <thead>
                                <tr class="border-b border-stone-850 text-stone-500 font-bold">
                                    <th class="py-2.5 px-2" data-key="th_item">பொருள்</th>
                                    <th class="py-2.5 px-2 text-center" data-key="th_price">விலை</th>
                                    <th class="py-2.5 px-2 text-center" data-key="th_qty">அளவு</th>
                                    <th class="py-2.5 px-2 text-right">மொத்தம்</th>
                                    <th class="py-2.5 px-2"></th>
                                </tr>
                            </thead>
                            <tbody id="cart-table-body" class="divide-y divide-stone-900">
                                <!-- Loaded dynamically per active tab state -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>

            <!-- RIGHT AREA: PAYMENT, HELD & DISPATCH DETAILS (Col 5) -->
            <div class="lg:col-span-5 space-y-4">
                
                <!-- Calculations & Split Payments checkout matrix -->
                <div class="premium-card p-5 rounded-3xl space-y-4">
                    <div class="flex justify-between items-center border-b border-stone-850 pb-2">
                        <h3 data-key="checkout_calc_lbl" class="text-xs font-bold text-stone-400 uppercase tracking-wider">பில்தொகை விபரங்கள்</h3>
                        <div class="flex gap-1.5">
                            <button onclick="holdActiveBillingState()" class="px-2.5 py-1 bg-stone-950 hover:bg-stone-900 border border-stone-800 text-stone-300 font-bold text-[9px] rounded-lg tracking-wider uppercase transition">Hold</button>
                            <button onclick="toggleHeldDrawer(true)" class="px-2.5 py-1 bg-amber-500/10 hover:bg-amber-500/20 text-amber-500 font-bold text-[9px] rounded-lg tracking-wider uppercase transition">Resume (<span id="held-drawer-count">0</span>)</button>
                        </div>
                    </div>

                    <!-- Math values -->
                    <div class="space-y-2 text-xs text-stone-400 border-b border-stone-850 pb-3">
                        <div class="flex justify-between">
                            <span data-key="checkout_subtotal">துணைத் தொகை:</span>
                            <span id="calc-subtotal">₹0.00</span>
                        </div>
                        <div class="flex justify-between">
                            <span>GST Tax:</span>
                            <span id="calc-tax">₹0.00</span>
                        </div>
                        <div class="flex justify-between text-base font-bold text-stone-200 border-t border-stone-850 pt-2">
                            <span data-key="checkout_grand_total">மொத்தத் தொகை:</span>
                            <span id="calc-grand-total">₹0.00</span>
                        </div>
                    </div>

                    <!-- Split Payment checkout inputs -->
                    <div class="p-3.5 bg-stone-950/60 border border-stone-850 rounded-2xl space-y-3">
                        <h4 data-key="pay_split" class="text-[10px] font-bold text-stone-500 uppercase tracking-widest block">பகுதி கட்டணம் (Split Pay)</h4>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label data-key="pay_cash" class="block text-[9px] font-bold text-stone-400 mb-1 uppercase">ரொக்கம் (Cash)</label>
                                <input type="number" id="split-cash" value="0" oninput="updateCalculations()" class="w-full px-3 py-1.5 bg-stone-900 border border-stone-800 rounded-xl text-stone-100 text-xs glow-focus">
                            </div>
                            <div>
                                <label data-key="pay_upi" class="block text-[9px] font-bold text-stone-400 mb-1 uppercase">யுபிஐ (UPI)</label>
                                <input type="number" id="split-upi" value="0" oninput="updateCalculations()" class="w-full px-3 py-2 bg-stone-900 border border-stone-800 rounded-xl text-stone-100 text-xs glow-focus">
                            </div>
                        </div>
                        <div class="flex justify-between items-center text-[10px] text-stone-500 font-bold border-t border-stone-850 pt-2">
                            <span>REMAINING BALANCE DUE / நிலுவை:</span>
                            <span id="split-balance" class="text-rose-500">₹0.00</span>
                        </div>
                    </div>

                    <!-- Dispatch actions -->
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="dispatchBillingOutput('print')" class="py-2.5 bg-stone-900 hover:bg-stone-850 border border-stone-800 text-stone-300 font-bold text-[10px] rounded-xl transition tracking-wide uppercase">Print</button>
                        <button onclick="dispatchBillingOutput('pdf')" class="py-2.5 bg-stone-900 hover:bg-stone-850 border border-stone-800 text-stone-300 font-bold text-[10px] rounded-xl transition tracking-wide uppercase">PDF</button>
                        <button onclick="dispatchBillingOutput('whatsapp')" class="py-2.5 bg-emerald-600/10 hover:bg-emerald-600/20 text-emerald-500 border border-emerald-500/20 font-bold text-[10px] rounded-xl transition tracking-wide uppercase">WhatsApp</button>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <!-- ==================== HELD TRANSACTIONS DRAWER OVERLAY ==================== -->
    <div id="held-drawer" class="fixed inset-0 bg-stone-950/80 backdrop-blur-md z-50 items-center justify-end p-4 hidden transition-all duration-300">
        <div class="w-full max-w-sm bg-stone-900 border border-stone-850 p-6 rounded-3xl shadow-2xl h-full flex flex-col justify-between">
            <div>
                <h3 class="text-sm font-bold text-white mb-4 border-b border-stone-800 pb-2 uppercase tracking-widest">Held Transactions Drawer</h3>
                <div id="held-list-container" class="space-y-3">
                    <!-- Populated dynamically -->
                </div>
            </div>
            <button onclick="toggleHeldDrawer(false)" class="w-full py-2 bg-stone-800 hover:bg-stone-700 text-stone-300 rounded-xl text-xs font-semibold transition">Close Drawer</button>
        </div>
    </div>

    <!-- VANILLA JS COMPONENT & TRANSACTION EXECUTOR ENGINE -->
    <script>
        // BILINGUAL LANGUAGE TRANSLATOR DICTIONARY
        const langData = {
            ta: {
                app_title: "அதிநவீன பில்லிங் முனையம் (POS)",
                back_dashboard: "← முகப்புப்பக்கத்திற்குச் செல்",
                th_item: "பொருள்",
                th_price: "விலை",
                th_qty: "அளவு",
                btn_add_tab: "புதிய பில்",
                checkout_calc_lbl: "பில்தொகை விபரங்கள்",
                checkout_subtotal: "துணைத் தொகை:",
                checkout_grand_total: "மொத்தத் தொகை:",
                pay_split: "பகுதி கட்டணம் (Split Pay)",
                pay_cash: "ரொக்கம் (Cash)",
                pay_upi: "யுபிஐ (UPI)",
                choose_product_lbl: "-- தயாரிப்பைத் தேர்ந்தெடு --",
                toast_cart_added: "பொருள் வெற்றிகரமாக வண்டியில் சேர்க்கப்பட்டது!"
            },
            en: {
                app_title: "High-Frequency POS Terminal",
                back_dashboard: "← Go to Dashboard",
                th_item: "Item",
                th_price: "Price",
                th_qty: "Qty",
                btn_add_tab: "Add Bill Tab",
                checkout_calc_lbl: "POS Calculation Matrix",
                checkout_subtotal: "Subtotal:",
                checkout_grand_total: "Grand Total:",
                pay_split: "Split Payment",
                pay_cash: "Cash Amount",
                pay_upi: "UPI Amount",
                choose_product_lbl: "-- Choose Product --",
                toast_cart_added: "Item added to cart!"
            }
        };

        let currentLang = 'en';
        let currentNiche = 'gift';

        // STATIC HARDCODED PRODUCTS DATABASE MOCKUP
        let productsDB = [];
        
        // MULTI-BILLING TABS ARRAY STORAGE
        let billingTabs = [
            { id: "tab_1", name: "Tab 1 / பில் 1", cart: [], selectedCustomer: null, is_held: false }
        ];
        let activeTabId = "tab_1";

        // HELD TRANSACTIONS STATE CACHE
        let heldTransactions = [];

        // ON RUNTIME START
        window.addEventListener('DOMContentLoaded', () => {
            // Retrieve shared DB components
            productsDB = JSON.parse(localStorage.getItem('roaji_products')) || [];
            
            const savedGlobalLang = localStorage.getItem('roaji_language');
            if (savedGlobalLang === 'ta' || savedGlobalLang === 'en') {
                currentLang = savedGlobalLang;
            }
            applyLanguage();
            populateProductPickers();
            switchNicheContext('gift');
            renderBillingTabsBar();
            renderActiveTabCart();
        });

        // LANGUAGE TOGGLE
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('roaji_language', lang);
            applyLanguage();
            populateProductPickers();
            renderActiveTabCart();
        }

        function applyLanguage() {
            const btnTa = document.getElementById('lang-btn-ta');
            const btnEn = document.getElementById('lang-btn-en');

            if (currentLang === 'ta') {
                btnTa.className = "px-3.5 py-1.5 text-xs font-bold rounded-lg bg-orange-600 text-white shadow-sm";
                btnEn.className = "px-3.5 py-1.5 text-xs font-bold rounded-lg text-stone-400";
            } else {
                btnEn.className = "px-3.5 py-1.5 text-xs font-bold rounded-lg bg-orange-600 text-white shadow-sm";
                btnTa.className = "px-3.5 py-1.5 text-xs font-bold rounded-lg text-stone-400";
            }

            const elements = document.querySelectorAll('[data-key]');
            elements.forEach(element => {
                const key = element.getAttribute('data-key');
                if (langData[currentLang][key]) {
                    element.innerText = langData[currentLang][key];
                }
            });
        }

        // ==================== Premium Tabbed/Windowed Management ====================
        function renderBillingTabsBar() {
            const bar = document.getElementById('tabs-bar');
            
            // Remove previous dynamically loaded tab buttons
            const activeTabsElements = document.querySelectorAll('.dynamic-tab-btn');
            activeTabsElements.forEach(el => el.remove());

            billingTabs.forEach(tab => {
                const activeStyle = tab.id === activeTabId 
                    ? 'bg-orange-600 text-white shadow-md' 
                    : 'bg-stone-900 border border-stone-850 text-stone-300';

                // Prepend tab button
                const btn = document.createElement('button');
                btn.className = `dynamic-tab-btn px-4 py-1.5 text-xs font-bold rounded-xl transition flex items-center gap-2 ${activeStyle}`;
                btn.innerHTML = `
                    <span onclick="switchActiveTab('${tab.id}')">${tab.name}</span>
                    <span onclick="event.stopPropagation(); closeBillingTab('${tab.id}')" class="text-stone-500 hover:text-rose-500 text-[10px] ml-1.5">✖</span>
                `;
                
                bar.insertBefore(btn, bar.lastElementChild);
            });
        }

        function createNewBillingTab() {
            const newId = "tab_" + Date.now();
            const tabCount = billingTabs.length + 1;
            
            billingTabs.push({
                id: newId,
                name: `Tab ${tabCount} / பில் ${tabCount}`,
                cart: [],
                selectedCustomer: null,
                is_held: false
            });

            activeTabId = newId;
            renderBillingTabsBar();
            renderActiveTabCart();
        }

        function switchActiveTab(tabId) {
            activeTabId = tabId;
            renderBillingTabsBar();
            renderActiveTabCart();
        }

        function closeBillingTab(tabId) {
            if (billingTabs.length === 1) return; // Prevent deleting the last remaining tab
            
            billingTabs = billingTabs.filter(t => t.id !== tabId);
            
            if (activeTabId === tabId) {
                activeTabId = billingTabs[0].id;
            }

            renderBillingTabsBar();
            renderActiveTabCart();
        }

        // ==================== Niche-Specific Contextual UI Adapters ====================
        function switchNicheContext(nicheKey) {
            currentNiche = nicheKey;
            const container = document.getElementById('niche-adapter-container');

            if (nicheKey === 'gift') {
                container.innerHTML = `
                    <div class="space-y-3">
                        <span class="inline-block px-2.5 py-0.5 text-[9px] font-bold tracking-wider uppercase text-amber-500 bg-amber-500/10 rounded-md">Context: Gifts & Frames</span>
                        <div class="flex flex-wrap gap-2 pt-1">
                            <button onclick="setNicheFrameSize('10x12')" class="frame-chip px-3 py-1.5 bg-stone-950 border border-stone-850 hover:border-amber-500 rounded-lg text-[10px] font-bold transition">10x12 Inch</button>
                            <button onclick="setNicheFrameSize('12x15')" class="frame-chip px-3 py-1.5 bg-stone-950 border border-stone-850 hover:border-amber-500 rounded-lg text-[10px] font-bold transition">12x15 Inch</button>
                            <button onclick="setNicheFrameSize('16x20')" class="frame-chip px-3 py-1.5 bg-stone-950 border border-stone-850 hover:border-amber-500 rounded-lg text-[10px] font-bold transition">16x20 Inch</button>
                        </div>
                    </div>
                `;
            } else if (nicheKey === 'textiles') {
                container.innerHTML = `
                    <div class="space-y-3">
                        <span class="inline-block px-2.5 py-0.5 text-[9px] font-bold tracking-wider uppercase text-orange-400 bg-orange-500/10 rounded-md">Context: Textiles & Garments</span>
                        <div class="flex flex-wrap gap-2 pt-1">
                            <button class="px-3.5 py-1.5 bg-stone-950 border border-stone-850 text-stone-300 font-bold text-[10px] rounded-lg">Size: S</button>
                            <button class="px-3.5 py-1.5 bg-stone-950 border border-stone-850 text-stone-300 font-bold text-[10px] rounded-lg">Size: M</button>
                            <button class="px-3.5 py-1.5 bg-stone-950 border border-stone-850 text-stone-300 font-bold text-[10px] rounded-lg">Size: XL</button>
                            <button class="px-3.5 py-1.5 bg-stone-950 border border-stone-850 text-stone-300 font-bold text-[10px] rounded-lg">Size: XXL</button>
                        </div>
                    </div>
                `;
            } else if (nicheKey === 'xerox') {
                container.innerHTML = `
                    <div class="space-y-3">
                        <span class="inline-block px-2.5 py-0.5 text-[9px] font-bold tracking-wider uppercase text-indigo-400 bg-indigo-500/10 rounded-md">Context: Instant Xerox Matrix</span>
                        <div class="flex gap-2.5 pt-1">
                            <button onclick="addInstantXeroxToCart('B&W Copy', 2)" class="flex-1 py-3 bg-stone-950 hover:bg-stone-900 border border-stone-850 rounded-2xl text-[11px] font-bold transition">B&W (₹2.00 / Page)</button>
                            <button onclick="addInstantXeroxToCart('Color Copy', 10)" class="flex-1 py-3 bg-stone-950 hover:bg-stone-900 border border-stone-850 rounded-2xl text-[11px] font-bold transition">Color (₹10.00 / Page)</button>
                        </div>
                    </div>
                `;
            }
        }

        function setNicheFrameSize(size) {
            showToast(`Selected Frame Size: ${size} inches`, "success");
        }

        function addInstantXeroxToCart(name, pageCost) {
            const pageCountPrompt = parseInt(prompt("Enter page count / பக்கங்களின் எண்ணிக்கை:", "1")) || 0;
            if (pageCountPrompt <= 0) return;

            const activeTab = billingTabs.find(t => t.id === activeTabId);
            if (!activeTab) return;

            // Generate virtual product object
            const virtualXeroxProduct = {
                id: "xerox_" + Date.now(),
                barcode: "N/A",
                name: { ta: `${name} (பக்கங்கள்: ${pageCountPrompt})`, en: `${name} (Pages: ${pageCountPrompt})` },
                price: pageCost * pageCountPrompt,
                stock: 9999, // unlimited stock
                minStock: 5
            };

            activeTab.cart.push({ product: virtualXeroxProduct, qty: 1 });
            renderActiveTabCart();
            showToast(langData[currentLang]['toast_cart_added'], "success");
        }

        // ==================== FEATURE A: HOLD & RESUME STATE ENGINE ====================
        function holdActiveBillingState() {
            const activeTab = billingTabs.find(t => t.id === activeTabId);
            if (!activeTab || activeTab.cart.length === 0) {
                showToast("Cart is empty. Nothing to hold!", "error");
                return;
            }

            // Lock and freeze tab state into Held Cache Drawer
            heldTransactions.push({
                id: "held_" + Date.now(),
                tabName: activeTab.name,
                cart: [...activeTab.cart],
                timestamp: new Date().toLocaleTimeString()
            });

            // Wipe active tab cart clean for next high-frequency checkout transaction
            activeTab.cart = [];
            renderActiveTabCart();
            updateStatisticsBadges();
            showToast("Transaction successfully held!", "info");
        }

        function toggleHeldDrawer(open) {
            const drawer = document.getElementById('held-drawer');
            if (open) {
                renderHeldDrawerList();
                drawer.classList.remove('hidden');
                drawer.classList.add('flex');
            } else {
                drawer.classList.add('hidden');
            }
        }

        function renderHeldDrawerList() {
            const container = document.getElementById('held-list-container');
            container.innerHTML = '';

            if (heldTransactions.length === 0) {
                container.innerHTML = `<p class="text-xs text-stone-500 text-center py-6">No held bills found.</p>`;
                return;
            }

            heldTransactions.forEach((tx, idx) => {
                container.innerHTML += `
                    <div class="p-3.5 bg-stone-950 border border-stone-850 rounded-2xl flex justify-between items-center group hover:border-amber-500 transition">
                        <div>
                            <h4 class="text-xs font-bold text-stone-200">${tx.tabName}</h4>
                            <span class="text-[9px] text-stone-500 font-bold block mt-1">${tx.timestamp} (${tx.cart.length} items)</span>
                        </div>
                        <button onclick="resumeHeldTransaction('${tx.id}')" class="px-2 py-1 bg-amber-600 hover:bg-amber-700 text-stone-950 font-bold text-[9px] rounded-lg tracking-wider uppercase transition">Resume</button>
                    </div>
                `;
            });
        }

        function resumeHeldTransaction(txId) {
            const tx = heldTransactions.find(t => t.id === txId);
            if (!tx) return;

            const activeTab = billingTabs.find(t => t.id === activeTabId);
            if (activeTab) {
                // Merge held items back into current tab
                activeTab.cart = [...activeTab.cart, ...tx.cart];
                
                // Pop transaction out of held drawer queue
                heldTransactions = heldTransactions.filter(t => t.id !== txId);

                toggleHeldDrawer(false);
                renderActiveTabCart();
                updateStatisticsBadges();
                showToast("Held transaction restored successfully!", "success");
            }
        }

        // ==================== FEATURE B: ADVANCED CALCULATIONS & LIMITS ====================
        let calculatedTotals = { subtotal: 0, tax: 0, grandTotal: 0, cash: 0, upi: 0, balance: 0 };

        function updateCalculations() {
            const activeTab = billingTabs.find(t => t.id === activeTabId);
            if (!activeTab) return;

            let subtotal = 0;
            activeTab.cart.forEach(item => {
                subtotal += item.product.price * item.qty;
            });

            const taxBracket = subtotal * 0.18; // default 18% calculation
            const grandTotal = subtotal + taxBracket;

            // Split payments resolution computations
            const cashPaid = parseFloat(document.getElementById('split-cash').value) || 0;
            const upiPaid = parseFloat(document.getElementById('split-upi').value) || 0;
            const totalPaid = cashPaid + upiPaid;
            const remainingBalance = Math.max(0, grandTotal - totalPaid);

            calculatedTotals = {
                subtotal: subtotal,
                tax: taxBracket,
                grandTotal: grandTotal,
                cash: cashPaid,
                upi: upiPaid,
                balance: remainingBalance
            };

            document.getElementById('calc-subtotal').innerText = `₹${subtotal.toFixed(2)}`;
            document.getElementById('calc-tax').innerText = `₹${taxBracket.toFixed(2)}`;
            document.getElementById('calc-grand-total').innerText = `₹${grandTotal.toFixed(2)}`;
            document.getElementById('split-balance').innerText = `₹${remainingBalance.toFixed(2)}`;
        }

        // ==================== FEATURE C: OUTPUT DISPATCH ENGINE ====================
        function dispatchBillingOutput(mode) {
            const activeTab = billingTabs.find(t => t.id === activeTabId);
            if (!activeTab || activeTab.cart.length === 0) {
                showToast("Cart is empty! Cannot dispatch billing transaction.", "error");
                return;
            }

            if (mode === 'print') {
                showToast("Broadcasting raw ESC/POS thermal command stream...", "success");
            } else if (mode === 'pdf') {
                showToast("Generating secure client PDF invoice blob...", "success");
            } else if (mode === 'whatsapp') {
                showToast("AI Bot triggered: Sending PDF link via automated WhatsApp gateway...", "success");
            }

            // Log dynamic transaction out to database
            const mockSales = JSON.parse(localStorage.getItem('roaji_sales')) || [];
            mockSales.unshift({
                invoiceNo: "ROAJI-" + Math.floor(100000 + Math.random() * 900000),
                date: new Date().toISOString().split('T')[0],
                customer: "POS walk-in client",
                cost: calculatedTotals.subtotal * 0.6, // simulated base cost margin
                total: calculatedTotals.grandTotal,
                tax: calculatedTotals.tax,
                profit: calculatedTotals.grandTotal - (calculatedTotals.subtotal * 0.6)
            });
            localStorage.setItem('roaji_sales', JSON.stringify(mockSales));

            // Subtract quantities from mock shared inventory DB
            activeTab.cart.forEach(item => {
                const dbProduct = productsDB.find(p => p.id === item.product.id);
                if (dbProduct) {
                    dbProduct.stock = Math.max(0, dbProduct.stock - item.qty);
                }
            });
            localStorage.setItem('roaji_products', JSON.stringify(productsDB));

            // Clear current tab cart and switch view context
            activeTab.cart = [];
            renderActiveTabCart();
        }

        // ==================== DYNAMIC GRAPH LIST CONTROLLERS ====================
        function populateProductPickers() {
            const picker = document.getElementById('product-picker');
            picker.innerHTML = `<option value="">${langData[currentLang]['choose_product_lbl']}</option>`;
            productsDB.forEach(p => {
                picker.innerHTML += `<option value="${p.id}">${p.name[currentLang]} - ₹${p.price}</option>`;
            });
        }

        function addProductToActiveCart(productId) {
            if (!productId) return;
            const activeTab = billingTabs.find(t => t.id === activeTabId);
            if (!activeTab) return;

            const product = productsDB.find(p => p.id === productId);
            if (!product) return;

            const existingItem = activeTab.cart.find(i => i.product.id === productId);
            if (existingItem) {
                existingItem.qty += 1;
            } else {
                activeTab.cart.push({ product, qty: 1 });
            }

            document.getElementById('product-picker').value = '';
            renderActiveTabCart();
            showToast(langData[currentLang]['toast_cart_added'], "success");
        }

        function updateCartQty(productId, amt) {
            const activeTab = billingTabs.find(t => t.id === activeTabId);
            if (!activeTab) return;

            const item = activeTab.cart.find(i => i.product.id === productId);
            if (!item) return;

            item.qty += amt;
            if (item.qty <= 0) {
                activeTab.cart = activeTab.cart.filter(i => i.product.id !== productId);
            }

            renderActiveTabCart();
        }

        function removeCartItem(productId) {
            const activeTab = billingTabs.find(t => t.id === activeTabId);
            if (activeTab) {
                activeTab.cart = activeTab.cart.filter(i => i.product.id !== productId);
                renderActiveTabCart();
            }
        }

        function renderActiveTabCart() {
            const activeTab = billingTabs.find(t => t.id === activeTabId);
            const tableBody = document.getElementById('cart-table-body');
            const emptyMsg = document.getElementById('empty-cart-message');

            tableBody.innerHTML = '';
            if (!activeTab || activeTab.cart.length === 0) {
                emptyMsg.classList.remove('hidden');
                updateCalculations();
                return;
            }
            emptyMsg.classList.add('hidden');

            activeTab.cart.forEach(item => {
                const total = item.product.price * item.qty;
                
                // FEATURE C (Visual triggers): Low stock neon yellow glow warning alert pulse
                const isCriticallyLowStock = item.product.stock <= item.product.minStock || item.qty >= item.product.stock;
                const pulseClass = isCriticallyLowStock ? 'yellow-pulse border border-yellow-500/30' : '';

                tableBody.innerHTML += `
                    <tr class="border-b border-stone-850 py-2 hover:bg-stone-900/30 transition rounded-xl ${pulseClass}">
                        <td class="py-3.5 px-2">
                            <p class="font-semibold text-stone-200">${item.product.name[currentLang]}</p>
                            <span class="text-[9px] text-stone-500 font-bold uppercase tracking-wider">Stock: ${item.product.stock} left</span>
                        </td>
                        <td class="py-3.5 px-2 text-center font-bold">₹${item.product.price}</td>
                        <td class="py-3.5 px-2 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <button onclick="updateCartQty('${item.product.id}', -1)" class="w-6 h-6 rounded-lg bg-stone-950 border border-stone-800 flex items-center justify-center text-stone-400 font-bold hover:bg-stone-900">-</button>
                                <span class="font-bold w-4">${item.qty}</span>
                                <button onclick="updateCartQty('${item.product.id}', 1)" class="w-6 h-6 rounded-lg bg-stone-950 border border-stone-800 flex items-center justify-center text-stone-400 font-bold hover:bg-stone-900">+</button>
                            </div>
                        </td>
                        <td class="py-3.5 px-2 text-right font-bold text-orange-500">₹${total}</td>
                        <td class="py-3.5 px-2 text-center">
                            <button onclick="removeCartItem('${item.product.id}')" class="text-rose-600 hover:text-rose-800 ml-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:16px; height:16px; max-width:100%;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </td>
                    </tr>
                `;
            });

            updateCalculations();
        }

        // BARCODE HARDWARE EMULATION LISTENER
        function handleBarcodeSearch(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const barcode = event.target.value.trim();
                const prod = productsDB.find(p => p.barcode === barcode);
                if (prod) {
                    addProductToActiveCart(prod.id);
                    event.target.value = ''; // clear input
                } else {
                    showToast("Product SKU matching barcode not found!", "error");
                }
            }
        }

        function updateStatisticsBadges() {
            document.getElementById('held-drawer-count').innerText = heldTransactions.length;
        }

        function toggleSidebar(open) {
            // Simulated toggle action
            showToast("Sidebar toggled", "info");
        }

        function switchShop(shopId) {
            showToast(`Shop switched: ${shopId}`, "success");
        }

        function toggleNotifications() {
            showToast("No new notifications.", "info");
        }

        // TOAST NOTIFICATIONS ENGINE
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            let bgClass = 'bg-stone-900 text-white border-stone-850';
            let iconSvg = '';

            if (type === 'success') {
                bgClass = 'bg-emerald-950/90 border border-emerald-500/30 text-emerald-300';
                iconSvg = `<svg class="h-5 w-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px; height:20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
            } else if (type === 'error') {
                bgClass = 'bg-rose-950/90 border border-rose-500/30 text-rose-300';
                iconSvg = `<svg class="h-5 w-5 text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px; height:20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
            } else if (type === 'info') {
                bgClass = 'bg-amber-950/90 border border-amber-500/30 text-amber-300';
                iconSvg = `<svg class="h-5 w-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:20px; height:20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>`;
            }

            toast.className = `flex items-center gap-3 p-4 rounded-xl shadow-lg backdrop-blur-md transition-all duration-300 transform translate-x-12 opacity-0 ${bgClass}`;
            toast.innerHTML = `<div class="flex-shrink-0">${iconSvg}</div><div class="text-xs font-semibold leading-relaxed">${message}</div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-x-12', 'opacity-0'); }, 10);
            setTimeout(() => {
                toast.classList.add('translate-x-12', 'opacity-0');
                setTimeout(() => { toast.remove(); }, 300);
            }, 4000);
        }
    </script>
</body>
</html>
