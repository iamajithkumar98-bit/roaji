<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROAJI - Business Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAF7; /* Warm White Base */
        }
        .sidebar-active {
            color: #3B82F6;
            background-color: #EFF6FF;
            border-right: 4px solid #3B82F6;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Mobile Header -->
    <div class="lg:hidden flex items-center justify-between p-4 bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <button id="mobileMenuBtn" class="p-2 text-gray-600">
                <i data-lucide="menu"></i>
            </button>
            <span class="font-black text-xl text-blue-600 tracking-tighter">ROAJI</span>
        </div>
        <button onclick="logout()" class="p-2 text-red-500">
            <i data-lucide="log-out"></i>
        </button>
    </div>

    <div class="flex">
        <!-- Sidebar Menu (Desktop) -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 bg-white w-64 border-r border-gray-100 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out z-40 lg:sticky lg:h-screen">
            <div class="p-6 hidden lg:block">
                <span class="font-black text-3xl text-blue-600 tracking-tighter">ROAJI</span>
                <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest font-bold">Business Engine</p>
            </div>
            
            <nav class="mt-4 space-y-1">
                <a href="#" class="flex items-center gap-4 px-6 py-4 sidebar-active transition-all">
                    <i data-lucide="layout-dashboard"></i>
                    <span class="font-semibold">Dashboard</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-6 py-4 text-gray-500 hover:bg-gray-50 transition-all">
                    <i data-lucide="receipt"></i>
                    <span class="font-semibold">Billing</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-6 py-4 text-gray-500 hover:bg-gray-50 transition-all">
                    <i data-lucide="package"></i>
                    <span class="font-semibold">Inventory</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-6 py-4 text-gray-500 hover:bg-gray-50 transition-all">
                    <i data-lucide="users"></i>
                    <span class="font-semibold">CRM</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-6 py-4 text-gray-500 hover:bg-gray-50 transition-all">
                    <i data-lucide="settings"></i>
                    <span class="font-semibold">Settings</span>
                </a>
            </nav>

            <div class="absolute bottom-10 px-6 w-full hidden lg:block">
                <button onclick="logout()" class="flex items-center gap-4 w-full p-4 rounded-xl text-red-500 hover:bg-red-50 transition-all font-bold">
                    <i data-lucide="log-out"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 p-6 lg:p-10">
            <!-- Top Nav (Desktop Only) -->
            <header class="hidden lg:flex items-center justify-between mb-10">
                <div>
                    <h2 class="text-3xl font-bold text-gray-800">Hello, Admin!</h2>
                    <p class="text-gray-500">Here's what's happening today.</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="bg-white px-4 py-2 rounded-xl shadow-sm border border-gray-100 font-semibold text-gray-600">
                        <span id="currentDate"></span>
                    </div>
                </div>
            </header>

            <!-- KPI Cards Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Today Sales -->
                <div class="glass-card p-6 rounded-[2rem] shadow-sm hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-blue-100 text-blue-600 rounded-2xl">
                            <i data-lucide="indian-rupee"></i>
                        </div>
                        <span class="text-xs font-bold text-green-500 bg-green-50 px-2 py-1 rounded-full">+12%</span>
                    </div>
                    <p class="text-gray-500 font-semibold">Today Sales</p>
                    <h3 class="text-3xl font-black text-gray-800 mt-1">₹12,450</h3>
                </div>

                <!-- Profit -->
                <div class="glass-card p-6 rounded-[2rem] shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-green-100 text-green-600 rounded-2xl">
                            <i data-lucide="trending-up"></i>
                        </div>
                    </div>
                    <p class="text-gray-500 font-semibold">Profit Today</p>
                    <h3 class="text-3xl font-black text-gray-800 mt-1">₹4,200</h3>
                </div>

                <!-- Expenses -->
                <div class="glass-card p-6 rounded-[2rem] shadow-sm">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-red-100 text-red-600 rounded-2xl">
                            <i data-lucide="shopping-cart"></i>
                        </div>
                    </div>
                    <p class="text-gray-500 font-semibold">Expenses</p>
                    <h3 class="text-3xl font-black text-gray-800 mt-1">₹850</h3>
                </div>

                <!-- Pending Dues -->
                <div class="glass-card p-6 rounded-[2rem] shadow-sm border-l-4 border-orange-400">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-orange-100 text-orange-600 rounded-2xl">
                            <i data-lucide="clock"></i>
                        </div>
                    </div>
                    <p class="text-gray-500 font-semibold">Pending Dues</p>
                    <h3 class="text-3xl font-black text-gray-800 mt-1">₹2,800</h3>
                </div>
            </div>

            <!-- Quick Action Buttons (Finger Friendly) -->
            <div class="mt-12">
                <h4 class="text-lg font-bold text-gray-800 mb-6">Quick Actions</h4>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <button class="flex flex-col items-center justify-center p-8 bg-blue-600 text-white rounded-3xl shadow-lg shadow-blue-100 active:scale-95 transition-all">
                        <i data-lucide="plus-circle" class="mb-2"></i>
                        <span class="font-bold">New Bill</span>
                    </button>
                    <button class="flex flex-col items-center justify-center p-8 bg-white border-2 border-blue-50 text-blue-600 rounded-3xl shadow-sm active:scale-95 transition-all">
                        <i data-lucide="user-plus" class="mb-2"></i>
                        <span class="font-bold">Customer</span>
                    </button>
                    <button class="flex flex-col items-center justify-center p-8 bg-white border-2 border-blue-50 text-blue-600 rounded-3xl shadow-sm active:scale-95 transition-all">
                        <i data-lucide="box" class="mb-2"></i>
                        <span class="font-bold">Add Stock</span>
                    </button>
                    <button class="flex flex-col items-center justify-center p-8 bg-white border-2 border-blue-50 text-blue-600 rounded-3xl shadow-sm active:scale-95 transition-all">
                        <i data-lucide="message-square" class="mb-2"></i>
                        <span class="font-bold">WhatsApp</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Icons initialize
        lucide.createIcons();

        // Display current date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', options);

        // Mobile Menu Toggle
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('sidebar');

        mobileMenuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('-translate-x-full');
        });

        // Logout function
        function logout() {
            if(confirm("Are you sure you want to logout?")) {
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
