<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROAJI - Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAF7; /* Warm White Theme */
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-10">
            <div class="inline-block p-4 rounded-2xl bg-blue-600 text-white font-black text-3xl mb-3 shadow-lg tracking-widest">
                ROAJI
            </div>
            <h1 class="text-2xl font-bold text-gray-800">நிர்வாகி உள்நுழைவு</h1>
            <p class="text-gray-500 mt-1">உங்கள் வணிகத்தை நிர்வகிக்கவும்</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
            <form id="loginForm" class="space-y-6">
                
                <!-- Email Input -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">மின்னஞ்சல் (Email)</label>
                    <input type="email" id="email" required 
                        class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all text-lg"
                        placeholder="iamajithkumar98@gmail.com">
                </div>

                <!-- Password Input -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">கடவுச்சொல் (Password)</label>
                    <input type="password" id="password" required 
                        class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-100 outline-none transition-all text-lg"
                        placeholder="••••••••">
                </div>

                <!-- Login Button -->
                <button type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-200 active:scale-95 transition-all text-lg">
                    Sign In
                </button>

            </form>
        </div>

        <div class="mt-8 text-center text-gray-400 text-sm">
            &copy; 2024 ROAJI Master Blueprint
        </div>
    </div>

    <script>
        // படிவத்தைச் சரிபார்க்கும் செயல்பாடு
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // பக்கம் Refresh ஆவதைத் தடுக்கிறது

            // நிர்வாகி விவரங்கள்
            const adminEmail = "iamajithkumar98@gmail.com";
            const adminPass = "ajithroja98@";

            // பயனாளர் உள்ளீடு செய்யும் விவரங்கள்
            const emailInput = document.getElementById('email').value;
            const passwordInput = document.getElementById('password').value;

            // சரிபார்ப்பு முறை (Validation)
            if (emailInput === adminEmail && passwordInput === adminPass) {
                // சரியாக இருந்தால் டேஷ்போர்டு பக்கத்திற்குச் செல்லும்
                window.location.href = "index.html";
            } else {
                // தவறாக இருந்தால் எச்சரிக்கை செய்தி காட்டும்
                alert("Invalid Credentials (தவறான மின்னஞ்சல் அல்லது கடவுச்சொல்)");
            }
        });
    </script>

</body>
</html>
