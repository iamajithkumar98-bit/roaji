<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROAJI - Login</title>
</head>
<!-- Basic "Warm White" theme implemented via legacy HTML attribute as CSS is restricted -->
<body bgcolor="#FDFBF7">

    <center>
        <br><br>
        <!-- ROAJI logo area -->
        <div id="logo-area">
            <h1>ROAJI</h1>
        </div>

        <p>Login to your account</p>

        <form action="#" method="POST">
            <!-- Mobile Number field -->
            <div>
                <label for="mobile">Mobile Number</label><br>
                <input type="tel" id="mobile" name="mobile" placeholder="e.g. 9876543210" required>
            </div>

            <br>

            <!-- Password field -->
            <div>
                <label for="password">Password</label><br>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
                <!-- Show/Hide password button (Requires JS for functionality) -->
                <button type="button">Show</button>
            </div>

            <br>

            <!-- Remember Me checkbox -->
            <div>
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember Me</label>
            </div>

            <br>

            <!-- Forgot Password link -->
            <div>
                <a href="#">Forgot Password?</a>
            </div>

            <br>

            <!-- Login button -->
            <div>
                <button type="submit">
                    <b>Login</b>
                </button>
            </div>
        </form>

        <br><br>
        <hr width="200">
        <small>&copy; 2024 ROAJI</small>
    </center>

</body>
</html>
