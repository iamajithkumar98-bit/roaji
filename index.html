  <!-- Console safety shim — restores any methods a browser extension may have removed -->
  <script>
    (function() {
      var noop = function(){};
      var methods = ['log','info','warn','error','debug','trace','dir','group','groupEnd','groupCollapsed','time','timeEnd','assert','count','clear','table'];
      if (!window.console) { window.console = {}; }
      for (var i = 0; i < methods.length; i++) {
        if (typeof window.console[methods[i]] !== 'function') {
          window.console[methods[i]] = noop;
        }
      }
    })();
  </script>

  <script>
    /* ══════════════════════════════════════════════════════════════════
       PART 12B-2 ─ RETAIL STOCK HOOK LAYER
       ─────────────────────────────────────────────────────────────────
       PURPOSE:
         Maintains a single authoritative master inventory array,
         window.RoajiMasterInventory, that mirrors every SKU tracked
         across the Stationery and Xerox modules.

         The moment a cashier clicks "Checkout" in either module the
         ROAJI_STOCK_CHECKOUT_EVENT CustomEvent fires synchronously
         BEFORE the receipt modal opens. The event detail carries the
         full list of decremented line items so that any subscriber
         (analytics panel, low-stock dashboard, future cloud sync) can
         react instantly without polling.

       MASTER INVENTORY SCHEMA:
         window.RoajiMasterInventory = [
           {
             sku:      string,   — unique key (ST-xxx | XR-xxx)
             name:     string,
             module:   'stationery' | 'xerox',
             unit:     string,   — 'ream', 'pack', 'unit', 'sheet'
             qty:      number,   — current live quantity
             reorder:  number,   — low-stock threshold
             price:    number,   — unit retail price (₦)
             cost:     number,   — wholesale cost (₦, best-estimate)
           },
           …
         ]

       EVENT: 'roaji:stock-checkout'
         detail.module   — 'stationery' | 'xerox'
         detail.items    — [{ sku, name, qtyDecremented, priceEach, lineTotal }]
         detail.saleTotal — ₦ total of the entire transaction
         detail.ts       — ISO timestamp
         detail.snapshot — full RoajiMasterInventory array after decrement

       DECREMENT RULE:
         Both modules own their own React state (stock / paperStock).
         The hook calls the module's existing setState setter AND mirrors
         the change into RoajiMasterInventory atomically so both sources
         stay in sync without a shared React context.
    ══════════════════════════════════════════════════════════════════ */

    /* ── PART 12B-2 ── Master Inventory State Array ──────────────── */
    window.RoajiMasterInventory = [
      /* Stationery SKUs — qty mirrors StationeryPanel INIT_STOCK */
      { sku:'ST-001', name:'A4 Paper (500s)',        module:'stationery', unit:'ream',  qty:320, reorder:50,  price:3200,  cost:1400  },
      { sku:'ST-002', name:'Biro Pens Blue (50pk)',  module:'stationery', unit:'pack',  qty:88,  reorder:20,  price:1800,  cost:750   },
      { sku:'ST-003', name:'Cardstock A4 250gsm',    module:'stationery', unit:'ream',  qty:12,  reorder:10,  price:7500,  cost:4100  },
      { sku:'ST-004', name:'Stapler Heavy Duty',     module:'stationery', unit:'unit',  qty:6,   reorder:5,   price:4200,  cost:1800  },
      { sku:'ST-005', name:'Manila Envelopes 100pk', module:'stationery', unit:'pack',  qty:44,  reorder:15,  price:2600,  cost:1000  },
      { sku:'ST-006', name:'Correction Fluid',       module:'stationery', unit:'unit',  qty:30,  reorder:10,  price:600,   cost:220   },
      { sku:'ST-007', name:'HB Pencils (12pk)',       module:'stationery', unit:'pack',  qty:55,  reorder:20,  price:900,   cost:350   },
      { sku:'ST-008', name:'Sticky Notes 3×3"',      module:'stationery', unit:'pad',   qty:70,  reorder:25,  price:1200,  cost:480   },
      { sku:'ST-009', name:'Lever Arch File A4',     module:'stationery', unit:'unit',  qty:18,  reorder:8,   price:2800,  cost:1200  },
      { sku:'ST-010', name:'Scissors (Large)',       module:'stationery', unit:'unit',  qty:9,   reorder:5,   price:1500,  cost:550   },
      /* Xerox paper stock SKUs — qty mirrors XeroxPanel INIT_PAPER (sheets) */
      { sku:'XR-a4bw',    name:'A4 80gsm (B&W)',    module:'xerox', unit:'sheet', qty:12000, reorder:500,  price:10,   cost:4    },
      { sku:'XR-a3bw',    name:'A3 80gsm (B&W)',    module:'xerox', unit:'sheet', qty:3000,  reorder:200,  price:18,   cost:7    },
      { sku:'XR-a4color', name:'A4 100gsm (Color)', module:'xerox', unit:'sheet', qty:2500,  reorder:200,  price:25,   cost:10   },
      { sku:'XR-a4gloss', name:'A4 Gloss 180gsm',   module:'xerox', unit:'sheet', qty:800,   reorder:100,  price:60,   cost:22   },
      { sku:'XR-photo',   name:'4×6 Photo Paper',   module:'xerox', unit:'sheet', qty:600,   reorder:50,   price:80,   cost:30   },
    ];

    /* ── PART 12B-2 ── Decrement helper: master array ─────────────── */
    /* Called by both modules' checkout handlers before dispatching the event.
       paperStockId is the XeroxPanel id string (e.g. 'a4bw'); maps to 'XR-' prefix. */
    window.roajiDecrementMasterQty = function(sku, qty) {
      const entry = window.RoajiMasterInventory.find(function(r){ return r.sku === sku; });
      if (!entry) return;
      entry.qty = Math.max(0, entry.qty - qty);
    };

    /* XeroxPanel paper-stock key → master SKU mapper */
    window.roajiXeroxStockKeyToSku = function(stockKey) {
      return 'XR-' + stockKey;  /* e.g. 'a4bw' → 'XR-a4bw' */
    };

    /* ── PART 12B-2 ── Checkout event dispatcher ──────────────────── */
    /* Fires 'roaji:stock-checkout' on window synchronously so any listener
       (analytics panel, audit log, cloud sync) reacts before the UI updates. */
    window.roajiDispatchCheckoutEvent = function(module, items, saleTotal) {
      /* Mirror each line item into the master array */
      items.forEach(function(item) {
        window.roajiDecrementMasterQty(item.sku, item.qtyDecremented);
      });

      var evt = new CustomEvent('roaji:stock-checkout', {
        bubbles: true,
        detail: {
          module:    module,
          items:     items,
          saleTotal: saleTotal,
          ts:        new Date().toISOString(),
          snapshot:  window.RoajiMasterInventory.map(function(r){ return Object.assign({}, r); }),
        },
      });
      window.dispatchEvent(evt);

      console.info(
        '[Roaji 12B-2] Stock checkout fired | module:', module,
        '| items:', items.length,
        '| total: ₦' + saleTotal.toLocaleString('en-NG')
      );
    };

    /* Low-stock convenience query — used by analytics panel subscriber */
    window.roajiGetLowStockItems = function() {
      return window.RoajiMasterInventory.filter(function(r){ return r.qty <= r.reorder; });
    };

    console.info('[Roaji 12B-2] Master inventory state initialised —',
      window.RoajiMasterInventory.length, 'SKUs tracked across Stationery + Xerox modules.');

  </script>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <script>
    /* ══════════════════════════════════════════════════════════════════
       PART 13A-1 ─ FIREBASE V2 CORE CREDENTIALS
       ─────────────────────────────────────────────────────────────────
       Static initialization constants for the Roaji V2 Firebase
       application instance.  All keys below are custom placeholders —
       replace each value with the real credentials from your Firebase
       Console (Project Settings → General → Your apps → Web app)
       before deploying to production.

       PART 9B-1 ─ FIREBASE V2 STORE CONFIGURATION LAYER
       PART 9B-2 ─ MULTI-TENANT / MULTI-INSTANCE SAFETY FILTER LAYER
       ─────────────────────────────────────────────────────────────────
       COLLECTION POINTERS (V2 — fully isolated, ignores all prior state)
         • roaji_v2_users  → stores cloud user profile documents
         • roaji_v2_bills  → stores cloud billing / invoice records
    ══════════════════════════════════════════════════════════════════ */

    /* ── PART 13A-1 ── Static Firebase V2 initialization constants ── */
    const ROAJI_V2_APP_NAME           = "roaji-v2";
    const ROAJI_V2_SCHEMA_VERSION     = "v2";
    const ROAJI_V2_TENANT_VERSION_TAG = "v2-mt";

    /* ── PART 13A-1 ── Firebase V2 project credentials object ────── */
    const ROAJI_V2_FIREBASE_CONFIG = {
      apiKey:            "ROAJI_V2_API_KEY_PLACEHOLDER",
      authDomain:        "ROAJI_V2_PROJECT_ID_PLACEHOLDER.firebaseapp.com",
      projectId:         "ROAJI_V2_PROJECT_ID_PLACEHOLDER",
      storageBucket:     "ROAJI_V2_PROJECT_ID_PLACEHOLDER.appspot.com",
      messagingSenderId: "ROAJI_V2_MESSAGING_SENDER_ID_PLACEHOLDER",
      appId:             "ROAJI_V2_APP_ID_PLACEHOLDER",
    };

    /* ── PART 13A-1 ── Isolated V2 collection pointer name constants */
    const ROAJI_V2_COLLECTION_USERS = "roaji_v2_users";   /* cloud user profile documents  */
    const ROAJI_V2_COLLECTION_BILLS = "roaji_v2_bills";   /* cloud billing / invoice records */

    /* ══════════════════════════════════════════════════════════════════
       PART 9B-2 ─ MULTI-TENANT / MULTI-INSTANCE SAFETY FILTER LAYER
       ─────────────────────────────────────────────────────────────────
       PURPOSE:
         Every Firestore read and write is EXPLICITLY scoped to the
         active Tenant ID (ownerUid) AND the active Store/Branch ID
         (storeId).  No query is ever allowed to execute without both
         filters in place.  This provides hard cross-outlet data
         isolation: a user of Branch A can NEVER read, write, or mutate
         documents belonging to Branch B, even if they share the same
         ownerUid (multi-instance owner) or the same storeId namespace.

       ENFORCEMENT RULES (non-bypassable):
         1. roajiV2AssertTenant(uid, storeId)
              Throws immediately if either value is falsy / invalid.
              Called as the FIRST statement inside every helper.
         2. roajiV2SafeBillsQuery(uid, storeId)
              Returns a Firestore Query that mandates BOTH:
                .where('ownerUid', '==', uid)
                .where('storeId',  '==', storeId)
              No raw .collection(BILLS) reference is used outside this
              factory — all helpers call it internally.
         3. roajiV2SafeDocGuard(snap, uid, storeId)
              After any .get() call, verifies the returned document's
              ownerUid and storeId fields match the caller's session.
              If they diverge (stale cache, manual Firestore edit, or
              privilege escalation attempt), the function throws and
              the document data is NEVER returned to the caller.
         4. All bill writes stamp { ownerUid, storeId, _tenantVersion }
              on every document so guard checks work on every future read.
         5. Active store context is driven by the BranchSelector component
              via window.RoajiV2Store.setActiveTenant(uid, storeId).
              The active context is read-only from outside; it cannot be
              overwritten silently by downstream code.

       SECURITY GUARANTEE:
         Even if a bug in UI state accidentally passes the wrong storeId,
         the guard layer will abort the operation with a console.error
         and throw, making silent cross-outlet data leaks structurally
         impossible at the database access layer.
    ══════════════════════════════════════════════════════════════════ */

    /* ── Active tenant context (set at login + on branch switch) ──── */
    let _roajiActiveTenantUid     = null;
    let _roajiActiveTenantStoreId = null;

    /* ── GUARD 1: Tenant assertion — throws on any missing context ── */
    function roajiV2AssertTenant(uid, storeId, context = 'unknown') {
      if (!uid || typeof uid !== 'string' || uid.trim() === '') {
        const msg = `[Roaji 9B-2] TENANT VIOLATION in "${context}": ownerUid is null/empty. Operation aborted.`;
        console.error(msg);
        throw new Error(msg);
      }
      if (!storeId || typeof storeId !== 'string' || storeId.trim() === '') {
        const msg = `[Roaji 9B-2] TENANT VIOLATION in "${context}": storeId is null/empty. Operation aborted.`;
        console.error(msg);
        throw new Error(msg);
      }
      /* Cross-check against the live session context when available */
      if (_roajiActiveTenantUid && _roajiActiveTenantUid !== uid) {
        const msg = `[Roaji 9B-2] TENANT MISMATCH in "${context}": caller uid "${uid}" ≠ session uid "${_roajiActiveTenantUid}". Operation aborted.`;
        console.error(msg);
        throw new Error(msg);
      }
    }

    /* ── GUARD 2: Tenant-scoped bills query factory ─────────────────
       Returns a Firestore Query always filtered by BOTH ownerUid AND
       storeId.  No bills query may ever bypass this factory.          */
    function roajiV2SafeBillsQuery(uid, storeId) {
      roajiV2AssertTenant(uid, storeId, 'roajiV2SafeBillsQuery');
      return roajiV2Firestore
        .collection(ROAJI_V2_COLLECTION_BILLS)
        .where('ownerUid', '==', uid)
        .where('storeId',  '==', storeId);
    }

    /* ── GUARD 3: Post-read document ownership verifier ─────────────
       After any .get(), call this before touching snap.data().
       Throws if the document doesn't belong to the calling tenant.   */
    function roajiV2SafeDocGuard(snap, uid, storeId, context = 'unknown') {
      if (!snap || !snap.exists) return; /* non-existent docs are safe */
      const d = snap.data();
      if (d.ownerUid !== uid) {
        const msg = `[Roaji 9B-2] DOC OWNER MISMATCH in "${context}": doc.ownerUid "${d.ownerUid}" ≠ session uid "${uid}". Read blocked.`;
        console.error(msg);
        throw new Error(msg);
      }
      if (d.storeId && d.storeId !== storeId) {
        const msg = `[Roaji 9B-2] DOC STORE MISMATCH in "${context}": doc.storeId "${d.storeId}" ≠ active storeId "${storeId}". Read blocked.`;
        console.error(msg);
        throw new Error(msg);
      }
    }

    /* ── GUARD 4: Write payload enforcer ────────────────────────────
       Stamps mandatory tenant fields onto every outgoing write payload
       and strips any attempt to override them from userland code.     */
    function roajiV2SafeWritePayload(uid, storeId, userPayload, context = 'unknown') {
      roajiV2AssertTenant(uid, storeId, context);
      /* Clone & enforce — userland CANNOT override ownerUid / storeId */
      const safe = { ...userPayload };
      safe.ownerUid        = uid;      /* always authoritative */
      safe.storeId         = storeId;  /* always authoritative */
      safe._tenantVersion  = ROAJI_V2_TENANT_VERSION_TAG; /* multi-tenant schema marker */
      return safe;
    }

    /* ── Tenant context setters / getters (called by BranchSelector) */
    function roajiV2SetActiveTenant(uid, storeId) {
      if (!uid || !storeId) {
        console.warn('[Roaji 9B-2] setActiveTenant called with falsy values — context unchanged.');
        return;
      }
      _roajiActiveTenantUid     = uid;
      _roajiActiveTenantStoreId = storeId;
      console.info(
        `%c[Roaji 9B-2] Active tenant set ✓  uid=${uid}  storeId=${storeId}`,
        'color:#00f5d4;font-weight:700;'
      );
    }
    function roajiV2GetActiveTenant() {
      return { uid: _roajiActiveTenantUid, storeId: _roajiActiveTenantStoreId };
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 13A-2 ─ FIREBASE V2 CORE APP INITIALIZATION
       ─────────────────────────────────────────────────────────────────
       PURPOSE:
         Boots the isolated 'roaji-v2' Firebase application instance
         exactly once, regardless of hot-reload cycles, Babel re-runs,
         or concurrent script evaluations.

         Three concerns are handled here:
           1. ISOLATED CONDITIONAL INITIALIZATION
                Uses the named-app guard pattern:
                  firebase.apps.find(a => a.name === ROAJI_V2_APP_NAME)
                to prevent duplicate-app errors when the script block is
                evaluated more than once (React hot-reload, Babel
                retranspile, or HMR in dev servers).  A new app instance
                is created only when the named app does not yet exist.

           2. GLOBAL REFERENCE ROUTING POINTERS
                After initialization, the canonical service references
                  roajiV2Auth       — firebase.auth(roajiV2App)
                  roajiV2Firestore  — firebase.firestore(roajiV2App)
                are written to both module-scope variables (for use by
                the Store API functions below) AND to the window object
                  window.roajiV2Auth
                  window.roajiV2Firestore
                so that any external script segment, React component, or
                future micro-module can resolve them via a single,
                predictable global path without re-importing Firebase.

           3. PERSISTENCE LAYER WITH MULTI-TAB FALLBACK
                Calls enablePersistence({ synchronizeTabs: true }) so
                that Firestore caches reads/writes to IndexedDB across
                the browser session.  Three distinct failure codes are
                trapped and logged with actionable guidance:
                  • failed-precondition  — more than one tab is open;
                      IndexedDB locking prevents multi-tab persistence.
                      A yellow warning is surfaced; the app continues in
                      memory-only mode without data loss.
                  • unimplemented        — the browser (e.g. Safari < 15,
                      Firefox private mode) does not support IndexedDB
                      persistence.  A yellow warning is logged; the app
                      falls back gracefully to network-only mode.
                  • (any other error)    — unexpected failure; full error
                      object is logged at console.error level so the dev
                      team can investigate without silent swallowing.

       GLOBAL ROUTING MAP (post-init):
         window.roajiV2App          → firebase.app('roaji-v2')
         window.roajiV2Auth         → firebase.auth(roajiV2App)
         window.roajiV2Firestore    → firebase.firestore(roajiV2App)
         window.roajiV2Ready        → boolean — true after successful boot
         window.roajiV2PersistMode  → 'indexeddb' | 'memory' | 'unknown'

       ISOLATION GUARANTEE:
         The named app 'roaji-v2' is structurally separate from any
         default firebase app ([DEFAULT]) or any prior V1 instance.
         It cannot accidentally read, write, or authenticate against
         any other project or app name in the same JS context.
    ══════════════════════════════════════════════════════════════════ */

    /* ── PART 13A-2 ── Module-scope global reference variables ───── */
    /* These vars are declared here in module scope (inside the <script>
       tag) so all Store API functions below can reference them directly
       without a window. prefix.  They are ALSO mirrored to window.*
       inside the IIFE for cross-module external access.               */
    let roajiV2App           = null;
    let roajiV2Auth          = null;
    let roajiV2Firestore     = null;
    let roajiV2Ready         = false;
    let roajiV2PersistMode   = 'unknown';  /* 'indexeddb' | 'memory' | 'unknown' */

    /* ── PART 13A-2 ── Isolated conditional initialization IIFE ─── */
    /* Wrapped in a retry-on-load helper: if the Firebase CDN script  */
    /* hasn't populated window.firebase yet (slow CDN, throttled      */
    /* connection), we wait for DOMContentLoaded and retry once more  */
    /* before hard-failing. This eliminates false FATAL errors caused  */
    /* by CDN load order races on slow or firewalled connections.      */
    function _roajiTryFirebaseInit() {
    (function initRoajiV2Firebase() {
      'use strict';

      /* ── Step 1: Pre-flight — confirm Firebase SDK is available ── */
      if (typeof firebase === 'undefined' || !firebase.initializeApp) {
        console.error(
          '[Roaji 13A-2] FATAL: Firebase compat SDK not found on window.firebase. ' +
          'Ensure firebase-app-compat.js CDN tag is loaded before this script block.'
        );
        return; /* abort — do not set roajiV2Ready */
      }

      try {

        /* ── Step 2: Isolated named-app guard (hot-reload safety) ──
           firebase.apps is an array of all live app instances.
           If an app named exactly ROAJI_V2_APP_NAME ('roaji-v2')
           already exists (from a prior evaluation of this block),
           we REUSE it instead of calling initializeApp() again.
           Calling initializeApp() with a duplicate name would throw
           "Firebase: Firebase App named 'roaji-v2' already exists".
           This guard makes the block idempotent.                     */
        const _existingApp = firebase.apps
          ? firebase.apps.find(function(a) { return a.name === ROAJI_V2_APP_NAME; })
          : null;

        if (_existingApp) {
          /* Reuse existing app — hot-reload / re-eval path */
          roajiV2App = _existingApp;
          console.info(
            '%c[Roaji 13A-2] Named app "' + ROAJI_V2_APP_NAME + '" already exists — reusing instance (hot-reload safe).',
            'color:#f5c842;font-weight:600;'
          );
        } else {
          /* Fresh init — first-load path */
          roajiV2App = firebase.initializeApp(ROAJI_V2_FIREBASE_CONFIG, ROAJI_V2_APP_NAME);
          console.info(
            '%c[Roaji 13A-2] Named app "' + ROAJI_V2_APP_NAME + '" created successfully.',
            'color:#00f5d4;font-weight:700;'
          );
        }

        /* ── Step 3: Core global reference routing pointers ─────────
           Bind the Auth and Firestore service instances to the named
           app, then expose them on BOTH the module-scope variables
           (for Store API functions in this same <script> tag) and
           on the window object (for React components, cross-module
           helpers, and future micro-modules).                        */
        roajiV2Auth      = firebase.auth(roajiV2App);
        roajiV2Firestore = firebase.firestore(roajiV2App);

        /* Window routing pointers — accessible from any script context */
        window.roajiV2App       = roajiV2App;
        window.roajiV2Auth      = roajiV2Auth;
        window.roajiV2Firestore = roajiV2Firestore;

        console.info(
          '%c[Roaji 13A-2] Global reference pointers routed ✓',
          'color:#00f5d4;font-weight:700;',
          '\n  window.roajiV2App       →', roajiV2App.name,
          '\n  window.roajiV2Auth      →', 'firebase.auth(' + roajiV2App.name + ')',
          '\n  window.roajiV2Firestore →', 'firebase.firestore(' + roajiV2App.name + ')',
          '\n  Collection (users)      →', ROAJI_V2_COLLECTION_USERS,
          '\n  Collection (bills)      →', ROAJI_V2_COLLECTION_BILLS
        );

        /* ── Step 4: enablePersistence() — multi-tab IndexedDB cache ─
           synchronizeTabs: true   → shares the IndexedDB cache across
             all tabs for the same origin, preventing cache divergence
             when the user has multiple Roaji tabs open.
           The call returns a Promise; we do NOT await it here to keep
           boot non-blocking.  The .catch() handler below handles all
           known failure modes with actionable console guidance.       */
        roajiV2Firestore
          .enablePersistence({ synchronizeTabs: true })
          .then(function() {
            roajiV2PersistMode         = 'indexeddb';
            window.roajiV2PersistMode  = 'indexeddb';
            console.info(
              '%c[Roaji 13A-2] Firestore IndexedDB persistence ACTIVE ✓  ' +
              '(synchronizeTabs: true — multi-tab cache enabled)',
              'color:#00f5d4;font-weight:700;'
            );
          })
          .catch(function(err) {
            if (err.code === 'failed-precondition') {
              /* ── Multi-tab conflict ────────────────────────────────
                 Firestore can only enable IndexedDB persistence in ONE
                 tab at a time per origin.  A second tab's attempt is
                 rejected with this code.  The existing tab retains
                 persistence; this tab will run in memory-only mode.
                 No data will be lost — all writes are queued in memory
                 and flushed to the server when online.               */
              roajiV2PersistMode        = 'memory';
              window.roajiV2PersistMode = 'memory';
              console.warn(
                '[Roaji 13A-2] ⚠  Firestore persistence UNAVAILABLE in this tab ' +
                '(failed-precondition: multiple tabs detected).\n' +
                '  → This tab will operate in MEMORY-ONLY mode.\n' +
                '  → The tab that first opened IndexedDB retains full offline cache.\n' +
                '  → Close duplicate tabs if offline persistence is needed here.\n' +
                '  → All online reads/writes remain fully functional.'
              );
            } else if (err.code === 'unimplemented') {
              /* ── Browser does not support IndexedDB persistence ────
                 Affects: Safari < 15 in some modes, Firefox private
                 browsing, certain embedded WebViews.
                 The app degrades gracefully to network-only mode.    */
              roajiV2PersistMode        = 'memory';
              window.roajiV2PersistMode = 'memory';
              console.warn(
                '[Roaji 13A-2] ⚠  Firestore persistence UNSUPPORTED in this browser ' +
                '(unimplemented: IndexedDB not available).\n' +
                '  → This browser/tab will operate in MEMORY-ONLY mode.\n' +
                '  → Offline data caching is disabled for this session.\n' +
                '  → All reads and writes require an active network connection.\n' +
                '  → Recommended: use Chrome/Edge/Firefox (non-private) for full offline support.'
              );
            } else {
              /* ── Unexpected persistence failure ─────────────────── */
              roajiV2PersistMode        = 'memory';
              window.roajiV2PersistMode = 'memory';
              console.error(
                '[Roaji 13A-2] ✖  Firestore persistence failed with an unexpected error.',
                '\n  Code   :', err.code    || '(none)',
                '\n  Message:', err.message || '(none)',
                '\n  Full error object:', err,
                '\n  → App will continue in MEMORY-ONLY mode.',
                '\n  → Please report this error to the Roaji dev team.'
              );
            }
          });

        /* ── Step 5: Mark boot complete ─────────────────────────── */
        roajiV2Ready        = true;
        window.roajiV2Ready = true;

        console.info(
          '%c[Roaji 13A-2] Firebase V2 boot complete ✓  App: "' + ROAJI_V2_APP_NAME + '"',
          'color:#00f5d4;font-weight:800;font-size:1.05em;'
        );

      } catch (err) {
        /* Catch-all for synchronous init errors (bad config, SDK bug, etc.) */
        roajiV2Ready        = false;
        window.roajiV2Ready = false;
        console.error(
          '[Roaji 13A-2] ✖  Firebase V2 initialization FAILED.',
          '\n  Error   :', err.message || err,
          '\n  → roajiV2Auth and roajiV2Firestore will be null.',
          '\n  → Verify ROAJI_V2_FIREBASE_CONFIG values in PART 13A-1.',
          '\n  → Ensure firebase-app-compat.js / firebase-firestore-compat.js are loaded.'
        );
      }
    })();
    } /* end _roajiTryFirebaseInit */

    /* ── Retry wrapper: call immediately, then once more after DOM   */
    /* is ready in case the Firebase CDN script was still parsing.    */
    if (typeof firebase !== 'undefined' && firebase.initializeApp) {
      _roajiTryFirebaseInit();
    } else {
      document.addEventListener('DOMContentLoaded', function() {
        _roajiTryFirebaseInit();
      });
      /* Also try after a short tick in case scripts finish just after */
      setTimeout(_roajiTryFirebaseInit, 200);
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 13A-3 MODULE 1 ─ ASSERT AND SAFE QUERY GUARDS
       ─────────────────────────────────────────────────────────────────
       PURPOSE:
         This module contains the two primary read-security enforcement
         primitives that gate every Firestore data access path in the
         Roaji V2 architecture.  They are defined here as standalone,
         fully-documented module functions so that:

           • They can be audited, tested, and replaced in isolation
             without touching the broader Store API surface.
           • They serve as the single authoritative implementation of
             the tenant assertion contract and the dual-where query
             factory contract across the entire codebase.
           • Their doc-block commentary makes the security contract
             explicit and machine-readable for future static analysis.

       MODULE 1 CONTAINS:
         1. roajiV2AssertTenant(uid, storeId, context)
              Hard structural error gate — throws immediately on any
              null, empty, non-string, or session-mismatched credential.
              Called as the FIRST statement inside every read and write
              helper.  There is no soft-fail or warning-only path; the
              function either passes silently or throws unconditionally.

         2. roajiV2SafeBillsQuery(uid, storeId)
              Dual-where query factory — returns a Firestore CollectionReference
              Query pre-filtered by BOTH ownerUid AND storeId.  No
              raw .collection(BILLS) reference is ever used for reads
              outside this factory.  This makes it structurally
              impossible to construct an unscoped query accidentally.

       SECURITY CONTRACT:
         Both functions co-operate to enforce the multi-tenant isolation
         invariant: for any given (uid, storeId) session pair, the query
         returned by roajiV2SafeBillsQuery will ONLY ever surface
         documents that were stamped with that exact pair by
         roajiV2SafeWritePayload at write time.

         The invariant holds even if:
           • Firestore Security Rules are misconfigured or disabled.
           • The caller accidentally passes a wrong storeId in UI state.
           • A future developer bypasses a higher-level helper and calls
             a lower-level Firestore method directly — as long as they
             call roajiV2AssertTenant first and route queries through
             roajiV2SafeBillsQuery.

       DEPENDENCY MAP:
         roajiV2AssertTenant  ← no upstream dependencies
         roajiV2SafeBillsQuery ← calls roajiV2AssertTenant internally
                               ← reads roajiV2Firestore (module-scope)
                               ← reads ROAJI_V2_COLLECTION_BILLS (const)

       CALL CONVENTION:
         Both functions are synchronous and throw synchronously.
         Callers inside async functions should NOT wrap the assert call
         in try/catch unless they intend to handle the violation locally.
         Unhandled throws propagate up to the Store API caller where they
         surface as rejected Promises, which the UI layer displays as
         error states.

       VERSIONING:
         These functions supersede and canonically document the inline
         GUARD 1 and GUARD 2 stubs defined in the PART 9B-2 block above.
         The 9B-2 stubs remain as structural scaffolding to preserve the
         original four-guard architecture comment block.  This Module 1
         block is the authoritative implementation reference.
    ══════════════════════════════════════════════════════════════════ */

    /**
     * roajiV2AssertTenant
     * ─────────────────────────────────────────────────────────────────
     * SECURITY VALIDATION RULE — PART 13A-3 MODULE 1, GUARD 1
     *
     * Immediately throws a hard structural Error if any of the following
     * conditions are detected in the caller's session credentials or
     * branch target parameters:
     *
     *   CONDITION A — uid is falsy (null, undefined, empty string, 0)
     *   CONDITION B — uid is not of type 'string'
     *   CONDITION C — uid is a whitespace-only string after trimming
     *   CONDITION D — storeId is falsy (null, undefined, empty string, 0)
     *   CONDITION E — storeId is not of type 'string'
     *   CONDITION F — storeId is a whitespace-only string after trimming
     *   CONDITION G — uid does not match the live session uid held in
     *                 _roajiActiveTenantUid (cross-session mismatch guard)
     *                 NOTE: this check is skipped when no session context
     *                 is set yet (e.g. during initial sign-up flow).
     *
     * THROW BEHAVIOUR:
     *   On any failing condition the function:
     *     1. Constructs a descriptive message that names the violation
     *        type, the calling context string, and the offending value
     *        (uid or storeId) so that stack traces are immediately
     *        actionable without needing to attach a debugger.
     *     2. Emits console.error() with the message BEFORE throwing so
     *        the message is captured in browser error monitors even if
     *        the throw is caught upstream.
     *     3. Throws new Error(msg) synchronously — there is no async
     *        path, no Promise rejection, no soft-fail return value.
     *
     * PASS BEHAVIOUR:
     *   Returns void (undefined) silently when all checks pass.
     *   The caller may treat a non-throwing return as a green light.
     *
     * @param {string} uid      — Firebase Auth user UID for the caller's session.
     *                            Must be a non-empty, non-whitespace string.
     * @param {string} storeId  — Active branch / store identifier.
     *                            Must be a non-empty, non-whitespace string.
     * @param {string} [context='unknown'] — Human-readable label for the
     *                            calling helper or component, embedded in
     *                            the error message for fast triage.
     * @throws {Error}          — Hard structural error on any invalid input.
     * @returns {void}
     */
    function roajiV2AssertTenant(uid, storeId, context = 'unknown') {

      /* ── CONDITION A/B/C: uid null, non-string, or blank ──────────── */
      if (!uid || typeof uid !== 'string' || uid.trim() === '') {
        const msg =
          `[Roaji 13A-3] TENANT VIOLATION in "${context}": ` +
          `ownerUid is ${uid === null ? 'null' : uid === undefined ? 'undefined' : `"${uid}"`} ` +
          `(expected non-empty string). Operation aborted. ` +
          `Verify that the calling code resolves the Firebase Auth UID ` +
          `before invoking this guard.`;
        console.error(msg);
        throw new Error(msg);
      }

      /* ── CONDITION D/E/F: storeId null, non-string, or blank ─────── */
      if (!storeId || typeof storeId !== 'string' || storeId.trim() === '') {
        const msg =
          `[Roaji 13A-3] TENANT VIOLATION in "${context}": ` +
          `storeId is ${storeId === null ? 'null' : storeId === undefined ? 'undefined' : `"${storeId}"`} ` +
          `(expected non-empty string). Operation aborted. ` +
          `Verify that the BranchSelector has set an active storeId via ` +
          `roajiV2SetActiveTenant() before this operation was attempted.`;
        console.error(msg);
        throw new Error(msg);
      }

      /* ── CONDITION G: Cross-session uid mismatch ──────────────────── */
      /* Only checked when a live session context exists (_roajiActiveTenantUid
         is non-null).  Skipped during initial sign-up before context is set. */
      if (_roajiActiveTenantUid !== null && _roajiActiveTenantUid !== uid) {
        const msg =
          `[Roaji 13A-3] TENANT MISMATCH in "${context}": ` +
          `caller uid "${uid}" does not match live session uid "${_roajiActiveTenantUid}". ` +
          `This indicates a cross-session data access attempt or a stale ` +
          `uid reference surviving a sign-out/sign-in cycle. Operation aborted.`;
        console.error(msg);
        throw new Error(msg);
      }

      /* ── All conditions passed — return void (green light) ─────── */
    }

    /**
     * roajiV2SafeBillsQuery
     * ─────────────────────────────────────────────────────────────────
     * DUAL-WHERE QUERY FACTORY — PART 13A-3 MODULE 1, GUARD 2
     *
     * Returns a Firestore Query object that is explicitly and
     * unconditionally restricted by BOTH of the following where clauses:
     *
     *   .where('ownerUid', '==', uid)     ← tenant ownership filter
     *   .where('storeId',  '==', storeId) ← branch isolation filter
     *
     * These two clauses are MANDATORY on every database fetch that
     * reads from the roaji_v2_bills collection.  No raw
     * .collection(ROAJI_V2_COLLECTION_BILLS) reference is permitted
     * for reads outside this factory — all read-path helpers (real-time
     * listeners, one-shot gets, paginated queries) must route through
     * this function to receive their base Query.
     *
     * WHY DUAL-WHERE IS REQUIRED:
     *   A query filtered only by ownerUid would expose all bills across
     *   every branch owned by that user — unacceptable for multi-branch
     *   operators where Branch A cashiers must never see Branch B data.
     *   A query filtered only by storeId would expose bills from any
     *   user whose storeId happened to collide (e.g. a storeId derived
     *   from an external reference code rather than the owner's uid).
     *   Both filters together guarantee the intersection: only documents
     *   that belong to THIS user AND THIS branch are ever returned.
     *
     * INTERNAL OPERATION:
     *   1. Calls roajiV2AssertTenant(uid, storeId, 'roajiV2SafeBillsQuery')
     *      as its FIRST statement.  If either credential is invalid the
     *      function throws before any Firestore reference is constructed.
     *   2. Resolves roajiV2Firestore (the module-scope Firestore instance
     *      bound to the isolated 'roaji-v2' named Firebase app).
     *   3. Throws a clear configuration error if roajiV2Firestore is
     *      null/undefined at call time (i.e. Firebase has not been
     *      initialised yet), preventing a cryptic "Cannot read property
     *      'collection' of null" error from surfacing to the caller.
     *   4. Constructs and returns the dual-where CollectionReference Query.
     *      The returned Query object is NOT yet executed — callers chain
     *      additional modifiers (.orderBy, .limit, .startAfter) on it
     *      before calling .get() or .onSnapshot().
     *
     * RETURNED OBJECT:
     *   A firebase.firestore.Query pre-scoped to:
     *     collection : ROAJI_V2_COLLECTION_BILLS ('roaji_v2_bills')
     *     filter 1   : ownerUid == uid
     *     filter 2   : storeId  == storeId
     *
     *   Callers may safely chain any read-only modifiers on the returned
     *   Query.  They must NOT call .add() or .doc().set() on it — those
     *   operations must use the write-path guards (roajiV2SafeWritePayload
     *   + roajiV2AddBill / roajiV2UpdateBill).
     *
     * @param {string} uid      — Firebase Auth user UID. Validated by
     *                            roajiV2AssertTenant before use.
     * @param {string} storeId  — Active branch / store identifier. Validated
     *                            by roajiV2AssertTenant before use.
     * @throws {Error}          — If uid or storeId fail assertion.
     * @throws {Error}          — If roajiV2Firestore is not yet initialised.
     * @returns {firebase.firestore.Query} — Dual-where scoped query ready
     *                            for .orderBy/.limit/.get/.onSnapshot chaining.
     */
    function roajiV2SafeBillsQuery(uid, storeId) {

      /* ── Step 1: Assert credentials before constructing any reference ── */
      roajiV2AssertTenant(uid, storeId, 'roajiV2SafeBillsQuery');

      /* ── Step 2: Guard against uninitialised Firestore reference ──────── */
      if (!roajiV2Firestore) {
        const msg =
          '[Roaji 13A-3] CONFIGURATION ERROR in "roajiV2SafeBillsQuery": ' +
          'roajiV2Firestore is null or undefined. ' +
          'Firebase V2 must be fully initialised (roajiV2Ready === true) ' +
          'before any bills query is constructed. ' +
          'Ensure PART 13A-2 initRoajiV2Firebase() has completed without error.';
        console.error(msg);
        throw new Error(msg);
      }

      /* ── Step 3: Construct and return the mandatory dual-where query ──── */
      /*
         MANDATORY DUAL-WHERE CONTRACT:
           Both .where() clauses are non-negotiable.  Removing or
           commenting out either clause is a security defect, not a
           performance optimisation.  The Firestore composite index
           (ownerUid ASC, storeId ASC, createdAt DESC) must exist in
           the Firebase Console to satisfy these two equality filters
           alongside any .orderBy('createdAt', 'desc') the caller appends.
      */
      return roajiV2Firestore
        .collection(ROAJI_V2_COLLECTION_BILLS)
        .where('ownerUid', '==', uid)      /* ← MANDATORY: tenant ownership filter  */
        .where('storeId',  '==', storeId); /* ← MANDATORY: branch isolation filter  */
    }

    /* ── PART 13A-3 MODULE 1: Initialisation confirmation log ───────── */
    console.info(
      '%c[Roaji 13A-3] Assert & Safe Query Guards loaded ✓' +
      '  roajiV2AssertTenant · roajiV2SafeBillsQuery',
      'color:#00f5d4;font-weight:700;'
    );

    /* ══════════════════════════════════════════════════════════════════
       PART 13A-3 MODULE 2 ─ POST-FETCH AND WRITE PAYLOAD GUARDS
       ─────────────────────────────────────────────────────────────────
       PURPOSE:
         This module contains the two post-access security enforcement
         primitives that protect every Firestore document read result and
         every outgoing write payload in the Roaji V2 architecture.

         MODULE 1 (Assert + Query Factory) prevents unscoped queries from
         ever being sent to Firestore.  MODULE 2 (Doc Guard + Write
         Payload) closes the two remaining attack surfaces that MODULE 1
         cannot cover:

           A. POST-FETCH OWNERSHIP BYPASS:
                Even with a dual-where query, a document snapshot can
                arrive with wrong ownership fields in three real-world
                scenarios:
                  1. STALE BROWSER CACHE — Firestore IndexedDB cache may
                     hold a document from a previous session for a
                     different tenant.  A .get() call returns the cached
                     version before the server responds, and the document
                     fields may reflect the prior owner's uid/storeId.
                  2. MANUAL FIRESTORE EDIT — A database admin or a
                     compromised service account edits a bill document's
                     ownerUid or storeId fields directly in the Firebase
                     Console.  The mutated document will satisfy the
                     query's where clauses by storeId but carry a
                     different ownerUid in its fields (or vice versa).
                  3. COMPOSITE INDEX RACE — In rare multi-tab edge cases,
                     a document may be served from the local cache under
                     an index key that no longer matches after an offline
                     write conflict is resolved by the server.
                roajiV2SafeDocGuard catches all three by performing an
                explicit field-level equality check on every snapshot
                BEFORE returning any data to the caller.

           B. WRITE PAYLOAD INJECTION:
                Any bill write that relies on userland code to attach
                the ownerUid and storeId fields is vulnerable to:
                  1. PRIVILEGE ESCALATION — A malicious or buggy caller
                     passes a different uid/storeId in the payload object,
                     causing the bill to land in a different tenant's
                     namespace (readable by the wrong user on next query).
                  2. MISSING METADATA — A developer adds a new bill-write
                     code path and forgets to stamp the tenant fields,
                     causing the document to be invisible to all queries
                     (since every query uses the dual-where filter) and
                     orphaned in the collection with no tenant owner.
                  3. SCHEMA DRIFT — The _tenantVersion tag is omitted,
                     breaking future migration scripts that use it to
                     identify which documents belong to the v2-mt schema.
                roajiV2SafeWritePayload eliminates all three by accepting
                only a raw userland payload, stripping any uid/storeId
                fields the caller may have included, and re-stamping the
                authoritative session values unconditionally.

       MODULE 2 CONTAINS:
         1. roajiV2SafeDocGuard(snap, uid, storeId, context)
              Post-fetch ownership verifier.  Throws immediately if:
                • snap.data().ownerUid !== uid
                • snap.data().storeId  !== storeId  (when storeId present)
              Returns void on pass.  Called on EVERY DocumentSnapshot
              before its .data() is consumed by any Store API helper.

         2. roajiV2SafeWritePayload(uid, storeId, userPayload, context)
              Write payload enforcer.  Returns a new object that:
                • Contains all fields from userPayload (shallow clone)
                • Unconditionally overwrites ownerUid with the session uid
                • Unconditionally overwrites storeId with the session storeId
                • Stamps _tenantVersion = ROAJI_V2_TENANT_VERSION_TAG
                • Stamps _guardVersion  = '13A-3-M2' (module traceability)
                • Records _payloadStampedAt ISO timestamp (audit trail)
              Any ownerUid or storeId value the caller placed in
              userPayload is SILENTLY REPLACED — there is no error on
              detect; the replacement IS the security measure.

       SECURITY CONTRACT:
         MODULE 1 guards ensure a correctly scoped query is sent.
         MODULE 2 guards ensure the result that comes back is verified
         and the payload that goes out is clean.  Together, all four
         guards form a closed loop:

           roajiV2AssertTenant     ← validates credentials before any I/O
           roajiV2SafeBillsQuery   ← scopes the read query at construction
           roajiV2SafeDocGuard     ← verifies the read result after fetch
           roajiV2SafeWritePayload ← enforces tenant fields before write

         The loop is non-bypassable: skipping ANY guard creates a
         structural gap that the other three cannot compensate for.

       DEPENDENCY MAP:
         roajiV2SafeDocGuard    ← reads ROAJI_V2_TENANT_VERSION_TAG (const)
                                ← calls roajiV2AssertTenant internally
         roajiV2SafeWritePayload ← calls roajiV2AssertTenant internally
                                ← reads ROAJI_V2_TENANT_VERSION_TAG (const)

       CALL CONVENTION:
         Both functions are synchronous and throw synchronously.
         roajiV2SafeDocGuard   → call immediately after every .get()
                                 before reading snap.data()
         roajiV2SafeWritePayload → call as the LAST step before every
                                 .set() / .add() / .update() to obtain
                                 the safe payload object

       VERSIONING:
         These functions supersede and canonically document the inline
         GUARD 3 and GUARD 4 stubs defined in the PART 9B-2 block above.
         The 9B-2 stubs remain as structural scaffolding.  This Module 2
         block is the authoritative implementation reference.
    ══════════════════════════════════════════════════════════════════ */

    /**
     * roajiV2SafeDocGuard
     * ─────────────────────────────────────────────────────────────────
     * POST-FETCH OWNERSHIP VERIFIER — PART 13A-3 MODULE 2, GUARD 3
     *
     * Performs an explicit ownership and branch-isolation check on every
     * Firestore DocumentSnapshot immediately after a .get() call returns,
     * before any of the document's field data is consumed by the caller.
     *
     * This guard exists because the dual-where query (MODULE 1 Guard 2)
     * enforces scoping at the QUERY CONSTRUCTION stage, but three
     * post-construction scenarios can still deliver a document snapshot
     * whose stored fields diverge from the calling session's identity:
     *
     *   SCENARIO 1 — STALE CACHE LEAK:
     *     Firestore's IndexedDB persistence cache stores document data
     *     locally.  When a .get() is called with source:'cache' (default),
     *     or when the network is slow and the cache is served first, the
     *     returned snapshot may reflect data written by a prior session
     *     (e.g. the previous logged-in user on a shared device, or a
     *     prior branch context before a BranchSelector switch).  The
     *     where-clauses were applied when the document was INDEXED, not
     *     when the snapshot is SERVED from cache, so field-level drift is
     *     possible in these edge cases.
     *
     *   SCENARIO 2 — MANUAL FIRESTORE EDIT:
     *     A Firebase Console admin, a service account, or a compromised
     *     Cloud Function may directly mutate a document's ownerUid or
     *     storeId fields without going through the Roaji write-path guards.
     *     The next .get() will return this mutated document.  The query
     *     may still match it (if e.g. the storeId was changed to match
     *     another tenant's namespace) giving the wrong tenant's cashier
     *     read access to a document they should never see.
     *
     *   SCENARIO 3 — COMPOSITE INDEX RACE (multi-tab offline edge case):
     *     In rare multi-tab scenarios where one tab performs an offline
     *     write that is later rejected by Firestore Security Rules (server
     *     rollback), a second tab may briefly serve a locally-cached
     *     version of the document that has not yet received the rollback
     *     event.  The snapshot fields may temporarily mismatch the server
     *     truth.
     *
     * GUARD BEHAVIOUR:
     *   CASE A — snap is null or snap.exists === false:
     *     Non-existent documents carry no field data and represent no
     *     ownership claim.  The guard returns void immediately — this is
     *     a safe, expected state (e.g. a bill that was deleted).
     *
     *   CASE B — snap.data().ownerUid !== uid:
     *     The document's stored ownerUid does not match the calling
     *     session's uid.  This is a hard ownership mismatch regardless of
     *     how the snapshot arrived.  The guard:
     *       1. Constructs a detailed violation message naming the context,
     *          the document's stored ownerUid, and the session uid.
     *       2. Emits console.error() before throwing so the violation is
     *          captured by browser error monitors even if caught upstream.
     *       3. Throws new Error(msg) synchronously — no data is returned.
     *
     *   CASE C — snap.data().storeId is present AND !== storeId:
     *     The document's stored storeId does not match the active branch.
     *     The storeId field is checked only when present in the document
     *     (older documents may lack it; they pass this check by design to
     *     allow backwards-compatible migration).  Same throw behaviour as
     *     CASE B.
     *
     *   CASE D — all checks pass:
     *     Returns void silently.  The caller may treat a non-throwing
     *     return as authorisation to consume snap.data() safely.
     *
     * INTERNAL CALL SEQUENCE:
     *   1. roajiV2AssertTenant(uid, storeId, context)
     *        Validates caller credentials before any snapshot inspection.
     *        Throws immediately if uid or storeId are invalid — prevents
     *        the guard itself from being called with a null uid that would
     *        trivially pass the ownerUid === uid check (both null).
     *   2. Early-exit on non-existent snapshot (CASE A).
     *   3. ownerUid field check (CASE B).
     *   4. storeId field check — conditional on field presence (CASE C).
     *   5. Return void on pass (CASE D).
     *
     * @param {firebase.firestore.DocumentSnapshot} snap
     *                          — The snapshot returned by a .get() call.
     *                            May be null or have .exists === false.
     * @param {string} uid      — Firebase Auth UID of the calling session.
     *                            Must match snap.data().ownerUid exactly.
     * @param {string} storeId  — Active branch/store ID of the calling session.
     *                            Must match snap.data().storeId when present.
     * @param {string} [context='unknown']
     *                          — Caller label embedded in violation messages.
     * @throws {Error}          — TENANT VIOLATION: uid or storeId are invalid.
     * @throws {Error}          — DOC OWNER MISMATCH: snap.ownerUid !== uid.
     * @throws {Error}          — DOC STORE MISMATCH: snap.storeId !== storeId.
     * @returns {void}          — Silent return on all-checks-pass.
     */
    function roajiV2SafeDocGuard(snap, uid, storeId, context = 'unknown') {

      /* ── Step 1: Assert session credentials before inspecting snapshot ─── */
      /* Prevents a null/invalid uid from trivially passing the ownerUid
         equality check below (null === null would incorrectly pass).        */
      roajiV2AssertTenant(uid, storeId, context);

      /* ── Step 2: CASE A — non-existent snapshot is always safe ──────────── */
      /* A missing document carries no field data and makes no ownership
         claim.  This is a valid, expected state (deleted bill, new user,
         first-run before any data is written).  Return immediately.         */
      if (!snap || !snap.exists) {
        return; /* safe — no field data to verify */
      }

      /* ── Step 3: Extract document data for field-level checks ────────────── */
      /* snap.data() returns the Firestore field map.  We extract once here
         to avoid multiple .data() calls (each call creates a new JS object
         copy in the compat SDK, which is wasteful and also means checking
         different copies — a defensive coding practice).                    */
      const docData = snap.data();

      /* ── Step 4: CASE B — ownerUid ownership mismatch check ─────────────── */
      /* The ownerUid field is MANDATORY on every roaji_v2_bills document.
         It is stamped unconditionally by roajiV2SafeWritePayload at write
         time.  If this field does not match the calling session uid, the
         document does not belong to this tenant and must never be returned.

         Attack vectors blocked here:
           • Stale cache serving a prior user's document on a shared device
           • Admin console edits that changed ownerUid to another user's uid
           • A Cloud Function bug that wrote the wrong ownerUid at creation   */
      if (docData.ownerUid !== uid) {
        const msg =
          `[Roaji 13A-3-M2] DOC OWNER MISMATCH in "${context}": ` +
          `document ownerUid "${docData.ownerUid}" does not match ` +
          `calling session uid "${uid}". ` +
          `This document does not belong to the current tenant session. ` +
          `Possible causes: stale IndexedDB cache from a prior session, ` +
          `a manual Firestore Console edit, or a write-path guard bypass. ` +
          `Document data has been blocked — it will NOT be returned to the caller. ` +
          `Investigate the origin of this snapshot immediately.`;
        console.error(msg, {
          guardModule:      'PART 13A-3 MODULE 2 GUARD 3',
          context,
          sessionUid:       uid,
          sessionStoreId:   storeId,
          docOwnerUid:      docData.ownerUid,
          docStoreId:       docData.storeId || '(field absent)',
          snapId:           snap.id || '(unknown)',
          _tenantVersion:   docData._tenantVersion || '(absent)',
        });
        throw new Error(msg);
      }

      /* ── Step 5: CASE C — storeId branch-isolation mismatch check ────────── */
      /* The storeId field is present on all documents written by the v2-mt
         schema.  The check is conditional on field presence to allow
         backwards-compatible reading of any legacy documents that pre-date
         the multi-tenant field stamp (they implicitly belong to the owner's
         primary store and are safe to surface in a primary-store context).

         When the field IS present, it must match the active storeId exactly.

         Attack vectors blocked here:
           • Admin console edits that changed storeId to another branch's id
           • Offline write conflict resolution surfacing a wrong-branch doc
           • A BranchSelector race condition that set the wrong active storeId */
      if (docData.storeId !== undefined && docData.storeId !== null) {
        if (docData.storeId !== storeId) {
          const msg =
            `[Roaji 13A-3-M2] DOC STORE MISMATCH in "${context}": ` +
            `document storeId "${docData.storeId}" does not match ` +
            `active session storeId "${storeId}". ` +
            `This document belongs to a different branch than the current session. ` +
            `Possible causes: stale cache from a prior branch context, a ` +
            `manual Firestore Console edit to the storeId field, or a ` +
            `BranchSelector switch race condition. ` +
            `Document data has been blocked — it will NOT be returned to the caller. ` +
            `Verify the active branch context via roajiV2GetActiveTenant().`;
          console.error(msg, {
            guardModule:    'PART 13A-3 MODULE 2 GUARD 3',
            context,
            sessionUid:     uid,
            sessionStoreId: storeId,
            docOwnerUid:    docData.ownerUid,
            docStoreId:     docData.storeId,
            snapId:         snap.id || '(unknown)',
            _tenantVersion: docData._tenantVersion || '(absent)',
          });
          throw new Error(msg);
        }
      }

      /* ── Step 6: CASE D — all checks passed, return void (green light) ─── */
      /* The snapshot's ownership fields are consistent with the calling
         session.  The caller is now authorised to consume snap.data()
         without risk of reading cross-tenant or cross-branch data.         */
    }

    /**
     * roajiV2SafeWritePayload
     * ─────────────────────────────────────────────────────────────────
     * WRITE PAYLOAD ENFORCER — PART 13A-3 MODULE 2, GUARD 4
     *
     * Constructs and returns the final, authoritative Firestore write
     * payload for every bill write operation (add, set, update) by:
     *
     *   1. Accepting the raw userland payload object as submitted by the
     *      caller (React component, Store API helper, or any future write
     *      path).
     *   2. Performing a shallow clone of the userland payload so the
     *      original object is never mutated in place.
     *   3. UNCONDITIONALLY OVERWRITING the following fields on the clone,
     *      regardless of any values the caller may have placed there:
     *        ownerUid        ← always set to the validated session uid
     *        storeId         ← always set to the validated session storeId
     *        _tenantVersion  ← always set to ROAJI_V2_TENANT_VERSION_TAG
     *        _guardVersion   ← always set to '13A-3-M2' (module traceability)
     *        _payloadStampedAt ← always set to current ISO timestamp
     *   4. Returning the safe, stamped clone to the caller for use in the
     *      Firestore write call.
     *
     * WHY UNCONDITIONAL OVERWRITE (NOT CONDITIONAL MERGE):
     *   The payload enforcer does NOT check whether the caller provided a
     *   uid/storeId — it always overwrites them.  This design choice is
     *   deliberate and critical:
     *
     *   If the guard only stamped the fields when they were ABSENT, a
     *   malicious or buggy caller could include a forged ownerUid in the
     *   payload and the guard would silently pass it through.  By always
     *   overwriting, the guard makes it structurally impossible for any
     *   caller to influence what ownerUid or storeId land in Firestore,
     *   regardless of what they submit in userPayload.
     *
     *   There is no legitimate reason for any Roaji write-path code to
     *   need to specify its own uid/storeId in the payload — those values
     *   come from the validated session context, period.
     *
     * BYPASS ATTEMPT DETECTION:
     *   When the caller's userPayload contains ownerUid or storeId fields
     *   that differ from the session values, the guard logs a console.warn
     *   with the attempted override values before replacing them.  This
     *   creates an audit trail in browser error monitors without aborting
     *   the write (since the override is simply neutralised, not malicious
     *   by itself — it may be the result of a copy-paste coding error).
     *
     *   If the caller's userPayload contains ownerUid or storeId that
     *   MATCH the session values, no warning is emitted — this is the
     *   normal path for callers that already stamp them out of habit.
     *
     * CREDENTIAL VALIDATION:
     *   Calls roajiV2AssertTenant(uid, storeId, context) as its FIRST
     *   statement.  If either credential is invalid, the function throws
     *   before cloning the payload, ensuring no partial or corrupted
     *   write payload is ever constructed with invalid tenant identity.
     *
     * RETURNED OBJECT SCHEMA (guaranteed fields on every returned payload):
     *   {
     *     ...userPayload fields (shallow clone),
     *     ownerUid:           string  — validated session uid (authoritative)
     *     storeId:            string  — validated session storeId (authoritative)
     *     _tenantVersion:     string  — 'v2-mt' (multi-tenant schema marker)
     *     _guardVersion:      string  — '13A-3-M2' (write guard module tag)
     *     _payloadStampedAt:  string  — ISO 8601 timestamp of payload creation
     *   }
     *
     * NOTE ON TIMESTAMPS:
     *   _payloadStampedAt is a client-side ISO string, NOT a Firestore
     *   ServerTimestamp.  It records when the payload was CONSTRUCTED,
     *   not when Firestore persisted it.  It is intended for audit and
     *   debugging, not for temporal ordering of records (use createdAt /
     *   updatedAt with FieldValue.serverTimestamp() for ordering).
     *
     * @param {string} uid          — Validated Firebase Auth UID of the session.
     * @param {string} storeId      — Validated active branch/store ID.
     * @param {Object} userPayload  — Raw payload object from the calling code.
     *                                May contain any Firestore-compatible fields.
     *                                Any ownerUid / storeId fields are overwritten.
     * @param {string} [context='unknown']
     *                              — Caller label for error/warning messages.
     * @throws {Error}              — If uid or storeId fail roajiV2AssertTenant.
     * @throws {Error}              — If userPayload is null or not an object.
     * @returns {Object}            — Safe, stamped Firestore write payload.
     */
    function roajiV2SafeWritePayload(uid, storeId, userPayload, context = 'unknown') {

      /* ── Step 1: Assert session credentials before constructing payload ─── */
      /* Ensures the payload is never constructed with a null/empty/mismatched
         uid or storeId.  Throws synchronously on any credential violation.  */
      roajiV2AssertTenant(uid, storeId, context);

      /* ── Step 2: Validate that userPayload is a usable object ────────────── */
      /* Callers should always pass a plain JS object.  A null or non-object
         userPayload likely indicates a coding error in the write-path helper
         — surface it immediately rather than silently writing empty documents.*/
      if (userPayload === null || userPayload === undefined || typeof userPayload !== 'object' || Array.isArray(userPayload)) {
        const msg =
          `[Roaji 13A-3-M2] PAYLOAD TYPE ERROR in "${context}": ` +
          `userPayload must be a plain object (received ${
            userPayload === null      ? 'null'
            : userPayload === undefined ? 'undefined'
            : Array.isArray(userPayload) ? 'Array'
            : typeof userPayload
          }). ` +
          `Every Firestore bill write must supply a non-null plain object ` +
          `as the payload argument to roajiV2SafeWritePayload. ` +
          `Check the calling write-path helper for an incorrect payload reference.`;
        console.error(msg);
        throw new Error(msg);
      }

      /* ── Step 3: Detect and log any bypass attempts before overwriting ───── */
      /* If the caller embedded uid/storeId values that diverge from the
         session, emit a console.warn for the audit trail.  This is a warning
         (not a throw) because the overwrite below neutralises the attempt —
         it is most likely a copy-paste coding error, not a deliberate attack.
         However, security monitors should alert on repeated occurrences.     */
      const callerOwnerUid = userPayload.ownerUid;
      const callerStoreId  = userPayload.storeId;

      if (callerOwnerUid !== undefined && callerOwnerUid !== uid) {
        console.warn(
          `[Roaji 13A-3-M2] BYPASS ATTEMPT NEUTRALISED in "${context}": ` +
          `userPayload.ownerUid "${callerOwnerUid}" differs from session uid "${uid}". ` +
          `The caller-supplied ownerUid has been silently replaced with the ` +
          `authoritative session uid.  If this is intentional, your calling ` +
          `code has a logic error — the write payload should never carry a ` +
          `hardcoded or caller-derived ownerUid.`,
          { context, callerOwnerUid, sessionUid: uid }
        );
      }

      if (callerStoreId !== undefined && callerStoreId !== storeId) {
        console.warn(
          `[Roaji 13A-3-M2] BYPASS ATTEMPT NEUTRALISED in "${context}": ` +
          `userPayload.storeId "${callerStoreId}" differs from session storeId "${storeId}". ` +
          `The caller-supplied storeId has been silently replaced with the ` +
          `authoritative session storeId.  Verify that the BranchSelector ` +
          `is correctly setting the active tenant context before the write ` +
          `was initiated.`,
          { context, callerStoreId, sessionStoreId: storeId }
        );
      }

      /* ── Step 4: Shallow-clone the userPayload ───────────────────────────── */
      /* Cloning prevents mutation of the caller's original object.  A shallow
         clone is sufficient here because Firestore write payloads should
         contain only primitive values, arrays of primitives, or plain nested
         objects — deep reference sharing in a Firestore payload is a
         separate concern addressed by the calling write helper.              */
      const safePayload = { ...userPayload };

      /* ── Step 5: Unconditional authoritative field stamp ─────────────────── */
      /* These five assignments are the core security operation.  They happen
         AFTER the clone so the original userPayload is untouched, and they
         overwrite any values the caller may have included in the clone —
         there is no conditional logic here, no "only if absent" guard, no
         way for any value in userPayload to survive into the returned object
         for these five keys.                                                 */

      safePayload.ownerUid          = uid;                          /* ← authoritative: session uid        */
      safePayload.storeId           = storeId;                      /* ← authoritative: session storeId    */
      safePayload._tenantVersion    = ROAJI_V2_TENANT_VERSION_TAG;  /* ← multi-tenant schema marker        */
      safePayload._guardVersion     = '13A-3-M2';                   /* ← write guard module traceability   */
      safePayload._payloadStampedAt = new Date().toISOString();     /* ← client-side audit timestamp       */

      /* ── Step 6: Return the safe, fully-stamped payload ─────────────────── */
      /* The caller is now authorised to pass safePayload directly to a
         Firestore .set(), .add(), or .update() call.  All tenant identity
         fields are guaranteed to reflect the validated session context.     */
      return safePayload;
    }

    /* ── PART 13A-3 MODULE 2: Initialisation confirmation log ───────── */
    console.info(
      '%c[Roaji 13A-3-M2] Post-Fetch & Write Payload Guards loaded ✓' +
      '  roajiV2SafeDocGuard · roajiV2SafeWritePayload',
      'color:#00f5d4;font-weight:700;'
    );
    console.info(
      '%c[Roaji 13A-3] All four multi-tenant security guards active ✓' +
      '  Assert → QueryFactory → DocGuard → WritePayload',
      'color:#00f5d4;font-weight:800;font-size:1.03em;'
    );

    /* ══════════════════════════════════════════════════════════════════
       PART 13A-4 ─ TENANT WRITE DATA PRIVACY INTEGRATION
       ──────────────────────────────────────────────────────────────────
       This segment upgrades the two primary bill write helpers
       (roajiV2AddBill and roajiV2UpdateBill) with:

         1. DYNAMIC TENANT SESSION SYNC
            At the moment of every write, the live Firebase Auth
            currentUser.uid is compared against the registered
            _roajiActiveTenantUid.  A drift (e.g. mid-session token
            refresh, account switch, or BranchSelector race) triggers
            an automatic re-synchronisation from Firestore profile
            (primaryStoreId) before the guard pipeline executes.

         2. AUTHORITATIVE CALLER-SUPPLIED FIELD OVERRIDE
            Any ownerUid or storeId embedded in the caller payload
            (billData / updates) is unconditionally overwritten by
            roajiV2SafeWritePayload with the verified session values.
            storeIdOverride only determines which storeId becomes the
            authoritative session value — it does not bypass stamping.

         3. FULL 13A-3 GUARD PIPELINE ON EVERY WRITE
            AddBill  : Guard 1 (AssertTenant) → Guard 4 (WritePayload)
            UpdateBill: Guard 1 → Guard 3 (DocGuard) → Guard 4

         4. DOCUMENT NOT FOUND GUARD (UpdateBill only)
            Explicit existence check before Guard 3 — prevents silent
            Firestore .update() no-ops on stale billId references.

       _guardVersion stamp on all writes produced by this module: '13A-4'
    ══════════════════════════════════════════════════════════════════ */
    console.info(
      '%c[Roaji 13A-4] Tenant Write Data Privacy Integration active ✓' +
      '  roajiV2AddBill · roajiV2UpdateBill — dynamic session sync engaged',
      'color:#7ee8a2;font-weight:700;'
    );

    /* ══════════════════════════════════════════════════════════════════
       ROAJI V2 STORE API
       Public helpers consumed by the React layer below.
       All writes route exclusively to roaji_v2_users / roaji_v2_bills.
    ══════════════════════════════════════════════════════════════════ */

    /* ══════════════════════════════════════════════════════════════════
       LOCAL-FIRST MASTER SAAS ADMIN ENGINE  — ESG-2
       ─────────────────────────────────────────────────────────────────
       Replaces all Firestore-dependent auth loops that caused the
       "Cannot read properties of undefined (reading 'indexOf')" crash.

       DESIGN:
         • Hardcoded Primary Master Super-Admin credentials.
         • All sign-up/sign-in operations run LOCALLY first.
         • If Firebase IS configured and ready, cloud sync happens as
           a non-blocking background operation — it never gates the UI.
         • New registrations default to status "pending_approval".
         • Master email bypasses all allowedStores checks immediately.
         • User registry persisted in localStorage under 'roaji_local_users'.
    ══════════════════════════════════════════════════════════════════ */

    /* ── ESG-2: Hardcoded Master Credentials ─────────────────────── */
    const ROAJI_MASTER_EMAIL    = 'iamajithkumar98@gmail.com';
    const ROAJI_MASTER_PW_DEFAULT = 'RoajiMaster98@';
    const ROAJI_LOCAL_USERS_KEY    = 'roaji_local_users';
    const ROAJI_LOCAL_TENANTS_KEY  = 'roaji_local_tenants';  /* spec-required alias */
    const ROAJI_MASTER_PW_KEY     = 'roaji_master_pw_override';

    /* ── ESG-2 LOCAL STORE: localStorage-backed user registry ─────── */
    const RoajiLocalUserStore = {
      /* Load all users from localStorage */
      load() {
        try {
          const raw = localStorage.getItem(ROAJI_LOCAL_USERS_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch(_) { return []; }
      },
      /* Persist the full registry — writes to both keys for spec compliance */
      save(users) {
        try {
          const json = JSON.stringify(users);
          localStorage.setItem(ROAJI_LOCAL_USERS_KEY,   json);
          localStorage.setItem(ROAJI_LOCAL_TENANTS_KEY, json);  /* roaji_local_tenants alias */
        } catch(_) {}
      },
      /* Find by email (case-insensitive) */
      findByEmail(email) {
        return this.load().find(u => (u.email || '').toLowerCase() === (email || '').toLowerCase()) || null;
      },
      /* Find by uid */
      findByUid(uid) {
        return this.load().find(u => u.uid === uid) || null;
      },
      /* Upsert (insert or replace) */
      upsert(profile) {
        const all = this.load().filter(u => u.uid !== profile.uid);
        all.push(profile);
        this.save(all);
      },
      /* Update fields for a given uid */
      update(uid, fields) {
        const all = this.load();
        const idx = all.findIndex(u => u.uid === uid);
        if (idx >= 0) { all[idx] = { ...all[idx], ...fields, updatedAt: new Date().toISOString() }; this.save(all); }
        return this.findByUid(uid);
      },
      /* Return all (excluding master) */
      allStandard() {
        return this.load().filter(u => u.status !== 'master');
      },
    };

    /* ── ESG-2: Get the current effective master password ─────────── */
    function roajiGetMasterPw() {
      try { return localStorage.getItem(ROAJI_MASTER_PW_KEY) || ROAJI_MASTER_PW_DEFAULT; } catch(_) { return ROAJI_MASTER_PW_DEFAULT; }
    }
    function roajiSetMasterPw(newPw) {
      try { localStorage.setItem(ROAJI_MASTER_PW_KEY, newPw); } catch(_) {}
    }

    /* ── ESG-2: Nano UUID generator (no crypto dependency) ────────── */
    function roajiNanoId() {
      return 'local_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now().toString(36);
    }

    /* ── ESG-2: Build a clean profile object ─────────────────────── */
    function roajiBuildProfile({ uid, email, fullName, businessName, phone, role, storeId, status }) {
      const isMaster        = (email || '').toLowerCase().trim() === ROAJI_MASTER_EMAIL.toLowerCase();
      const resolvedStoreId = storeId || (isMaster ? 'ROAJI_MAIN' : uid);
      const accountStatus   = isMaster ? 'master' : (status || 'pending_approval');
      const allowedStores   = isMaster ? ['ROAJI_MAIN'] : [resolvedStoreId];
      return {
        uid,
        email:                 (email || '').toLowerCase().trim(),
        fullName:              fullName      || '',
        businessName:          businessName  || '',
        phone:                 phone         || '',
        role:                  isMaster ? 'Master Admin' : (role || 'Owner'),
        plan:                  isMaster ? 'lifetime' : 'free',
        status:                accountStatus,
        primaryStoreId:        resolvedStoreId,
        allowedStores:         allowedStores,
        storeIds:              [resolvedStoreId],
        subscriptionPlan:      isMaster ? 'lifetime' : 'none',
        subscriptionExpiresAt: null,
        subscriptionAlertSent: false,
        createdAt:             new Date().toISOString(),
        updatedAt:             new Date().toISOString(),
        _schemaVersion:        'v2',
        _tenantVersion:        'v2-mt-esg2-local',
        _source:               'local',
      };
    }

    /* ── ESG-2: Ensure master profile exists in local registry ─────── */
    (function ensureMasterProfile() {
      const existing = RoajiLocalUserStore.findByEmail(ROAJI_MASTER_EMAIL);
      if (!existing) {
        const masterUid = 'MASTER_UID_ROAJI';
        RoajiLocalUserStore.upsert(roajiBuildProfile({
          uid: masterUid, email: ROAJI_MASTER_EMAIL,
          fullName: 'Ajith Kumar', businessName: 'Roaji HQ',
          phone: '', role: 'Master Admin', storeId: 'ROAJI_MAIN',
        }));
        console.info('[Roaji ESG-2] Master profile bootstrapped in local registry.');
      }
    })();

    /* ── ESG-2: LOCAL AUTH: Sign-Up ───────────────────────────────── */
    async function roajiV2SignUp({ email, password, fullName, businessName, phone, role, storeId }) {
      const normalEmail = (email || '').toLowerCase().trim();
      const isMaster    = normalEmail === ROAJI_MASTER_EMAIL.toLowerCase();

      /* Check for duplicate email in local registry */
      const existing = RoajiLocalUserStore.findByEmail(normalEmail);
      if (existing) throw Object.assign(new Error('This email is already registered. Please sign in.'), { code: 'auth/email-already-in-use' });

      /* Validate password */
      if (!password || password.length < 6) throw Object.assign(new Error('Password must be at least 6 characters.'), { code: 'auth/weak-password' });

      /* Master password enforcement */
      if (isMaster && password !== roajiGetMasterPw()) {
        throw Object.assign(new Error('Incorrect master setup password.'), { code: 'auth/wrong-password' });
      }

      const uid     = isMaster ? 'MASTER_UID_ROAJI' : roajiNanoId();
      const profile = roajiBuildProfile({ uid, email: normalEmail, fullName, businessName, phone, role, storeId });

      /* Store password hash (simple — local-only, not sent to any server) */
      const pwEntry = { uid, pw: btoa(password), updatedAt: new Date().toISOString() };
      try {
        const pwStore = JSON.parse(localStorage.getItem('roaji_local_pw') || '{}');
        pwStore[uid] = pwEntry.pw;
        localStorage.setItem('roaji_local_pw', JSON.stringify(pwStore));
      } catch(_) {}

      RoajiLocalUserStore.upsert(profile);
      if (typeof roajiV2SetActiveTenant === 'function') {
        roajiV2SetActiveTenant(uid, profile.primaryStoreId);
      }

      /* Background Firebase sync — non-blocking, never gates UI */
      if (roajiV2Ready && roajiV2Firestore) {
        try {
          roajiV2Firestore.collection(ROAJI_V2_COLLECTION_USERS).doc(uid).set(profile)
            .then(() => console.info('[Roaji ESG-2] Profile synced to Firestore.'))
            .catch(e  => console.warn('[Roaji ESG-2] Firestore sync skipped:', e.message));
        } catch(_) {}
      }

      /* Return a fake firebaseUser-compatible object */
      return { uid, email: normalEmail, displayName: fullName || normalEmail };
    }
