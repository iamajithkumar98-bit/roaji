        .access-search::placeholder { color:var(--c-dim); }
      `;
      document.head.appendChild(el);
    })();

    /* ── Permission Toggle ───────────────────────────────────────────── */
    const PermToggle = ({ on, onChange, color='#00f5d4', size='md' }) => {
      const w = size==='sm' ? 28 : 34;
      const h = size==='sm' ? 15 : 18;
      const th = size==='sm' ? 11 : 14;
      const top = size==='sm' ? 2 : 2;
      return (
        <div
          onClick={() => onChange(!on)}
          style={{
            position:'relative', display:'inline-flex', alignItems:'center',
            width:w, height:h, borderRadius:h/2, cursor:'pointer',
            background: on ? `${color}cc` : 'rgba(255,255,255,0.12)',
            boxShadow: on ? `0 0 10px ${color}55` : 'none',
            transition:'background 0.22s, box-shadow 0.22s', flexShrink:0,
          }}
          title={on ? 'Enabled — click to revoke' : 'Disabled — click to grant'}
        >
          <div style={{
            position:'absolute', top, left: on ? w-th-2 : 2,
            width:th, height:th, borderRadius:'50%', background:'#fff',
            boxShadow: on ? `0 1px 4px ${color}88` : '0 1px 3px rgba(0,0,0,0.35)',
            transition:'left 0.22s cubic-bezier(0.16,1,0.3,1)',
          }} />
        </div>
      );
    };

    /* ── Staff Role badge chip (richer variant with icons — used by ControlCenter) ── */
    const StaffRoleBadge = ({ role }) => {
      const map = {
        'Master Admin': { bg:'rgba(255,215,0,0.14)', border:'rgba(255,215,0,0.55)', color:'#ffd700', icon:'👑' },
        'Admin':        { bg:'rgba(124,58,237,0.14)', border:'rgba(124,58,237,0.50)', color:'#a78bfa', icon:'🛡️' },
        'Manager':      { bg:'rgba(0,245,212,0.10)', border:'rgba(0,245,212,0.40)', color:'#00f5d4', icon:'🔷' },
        'Cashier':      { bg:'rgba(96,165,250,0.10)', border:'rgba(96,165,250,0.35)', color:'#60a5fa', icon:'💳' },
        'Viewer':       { bg:'rgba(113,128,150,0.12)', border:'rgba(113,128,150,0.30)', color:'#718096', icon:'👁️' },
        'Staff':        { bg:'rgba(52,211,153,0.10)', border:'rgba(52,211,153,0.35)', color:'#34d399', icon:'👤' },
      };
      const s = map[role] || map['Staff'];
      return (
        <span className="badge-pop" style={{
          display:'inline-flex', alignItems:'center', gap:'0.3rem',
          padding:'0.18rem 0.6rem', borderRadius:'99px',
          background:s.bg, border:`1px solid ${s.border}`,
          color:s.color, fontSize:'0.65rem', fontWeight:700, letterSpacing:'0.03em',
          whiteSpace:'nowrap',
        }}>
          <span style={{ fontSize:'0.7rem' }}>{s.icon}</span>{role}
        </span>
      );
    };

    /* ── Module permission matrix data ────────────────────────────────── */
    const MODULE_PERMS = [
      { id:'pos',       label:'POS',        icon:'💳' },
      { id:'gifts',     label:'Gifts',      icon:'🎁' },
      { id:'frame',     label:'Frame',      icon:'🖼️' },
      { id:'studio',    label:'Studio',     icon:'📷' },
      { id:'stationery',label:'Stationery', icon:'📋' },
      { id:'xerox',     label:'Xerox',      icon:'🖨️' },
      { id:'reports',   label:'Reports',    icon:'📊' },
      { id:'invoices',  label:'Invoices',   icon:'🧾' },
      { id:'payments',  label:'Payments',   icon:'💰' },
      { id:'control',   label:'Control',    icon:'⚙️' },
    ];

    const PERM_ACTIONS = ['View', 'Create', 'Edit', 'Delete'];

    const ROLE_PRESETS = {
      'Master Admin': () => true,
      'Admin':        (mod, act) => act !== 'Delete' || !['control','payments'].includes(mod),
      'Manager':      (mod, act) => ['View','Create','Edit'].includes(act) && mod !== 'control',
      'Cashier':      (mod, act) => ['pos','gifts','stationery','xerox'].includes(mod) && ['View','Create'].includes(act),
      'Viewer':       (mod, act) => act === 'View',
      'Staff':        (mod, act) => ['View','Create'].includes(act) && !['control','reports','payments'].includes(mod),
    };

    const buildPermsForRole = (role) => {
      const preset = ROLE_PRESETS[role] || ROLE_PRESETS['Viewer'];
      const perms = {};
      MODULE_PERMS.forEach(m => {
        perms[m.id] = {};
        PERM_ACTIONS.forEach(a => { perms[m.id][a] = preset(m.id, a); });
      });
      return perms;
    };

    /* ── Initial employee roster ─────────────────────────────────────── */
    const INIT_EMPLOYEES = [
      { id:1,  name:'Amina Bello',    email:'amina@roaji.ng',    role:'Master Admin', branch:'Head Office',  status:'Active',    avatar:'AB', lastSeen:'Just now',    perms: buildPermsForRole('Master Admin') },
      { id:2,  name:'Chidi Okafor',   email:'chidi@roaji.ng',    role:'Admin',        branch:'Head Office',  status:'Active',    avatar:'CO', lastSeen:'5 min ago',   perms: buildPermsForRole('Admin')        },
      { id:3,  name:'Fatima Usman',   email:'fatima@roaji.ng',   role:'Manager',      branch:'Ikeja Branch', status:'Active',    avatar:'FU', lastSeen:'12 min ago',  perms: buildPermsForRole('Manager')      },
      { id:4,  name:'Emeka Nwosu',    email:'emeka@roaji.ng',    role:'Cashier',      branch:'Head Office',  status:'Active',    avatar:'EN', lastSeen:'31 min ago',  perms: buildPermsForRole('Cashier')      },
      { id:5,  name:'Ngozi Adeyemi',  email:'ngozi@roaji.ng',    role:'Cashier',      branch:'Lekki Branch', status:'Active',    avatar:'NA', lastSeen:'1 hr ago',    perms: buildPermsForRole('Cashier')      },
      { id:6,  name:'Taiwo Adesanya', email:'taiwo@roaji.ng',    role:'Staff',        branch:'Ikeja Branch', status:'Active',    avatar:'TA', lastSeen:'2 hr ago',    perms: buildPermsForRole('Staff')        },
      { id:7,  name:'Grace Obi',      email:'grace@roaji.ng',    role:'Staff',        branch:'Lekki Branch', status:'Suspended', avatar:'GO', lastSeen:'Yesterday',   perms: buildPermsForRole('Staff')        },
      { id:8,  name:'Seun Bankole',   email:'seun@roaji.ng',     role:'Viewer',       branch:'Head Office',  status:'Active',    avatar:'SB', lastSeen:'3 days ago',  perms: buildPermsForRole('Viewer')       },
    ];

    /* ── Staff Setup Add-Employee Modal ───────────────────────────────── */
    const BLANK_STAFF_FORM = {
      fullName:'', email:'', phone:'', role:'Staff', branch:'Head Office',
      pin:'', confirmPin:'', department:'',
      /* Privilege status controls */
      allowBilling:     true,
      hideProfitMargins: false,
      blockBillDeletion: false,
    };

    const StaffSetupModal = ({ onClose, onAdd, branches }) => {
      const [form,   setForm]   = useState(BLANK_STAFF_FORM);
      const [errors, setErrors] = useState({});
      const [saving, setSaving] = useState(false);
      const [step,   setStep]   = useState(1); // 1=identity, 2=privileges

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      /* ── Field-level validation ── */
      const validateStep1 = () => {
        const e = {};
        if (!form.fullName.trim())          e.fullName = 'Full name is required';
        if (!form.email.includes('@'))      e.email    = 'Valid email required';
        if (form.pin.length < 4)            e.pin      = 'PIN must be at least 4 digits';
        if (!/^\d+$/.test(form.pin))        e.pin      = 'PIN must be numeric';
        if (form.pin !== form.confirmPin)   e.confirmPin = 'PINs do not match';
        return e;
      };

      const handleNext = () => {
        const e = validateStep1();
        if (Object.keys(e).length) { setErrors(e); return; }
        setErrors({});
        setStep(2);
      };

      const handleAdd = () => {
        setSaving(true);
        setTimeout(() => {
          const initials = form.fullName.trim().split(' ').map(w=>w[0]?.toUpperCase()||'').join('').slice(0,2);
          onAdd({
            id: Date.now(),
            name:     form.fullName.trim(),
            email:    form.email.trim(),
            phone:    form.phone.trim(),
            role:     form.role,
            branch:   form.branch,
            department: form.department.trim(),
            status:   'Active',
            avatar:   initials,
            lastSeen: 'Just now',
            perms:    buildPermsForRole(form.role),
            /* Privilege flags */
            allowBilling:      form.allowBilling,
            hideProfitMargins: form.hideProfitMargins,
            blockBillDeletion: form.blockBillDeletion,
          });
          setSaving(false);
          onClose();
        }, 900);
      };

      const fieldErr = k => errors[k]
        ? <span style={{ fontSize:'0.67rem', color:'#f87171', marginTop:'3px', display:'block' }}>{errors[k]}</span>
        : null;

      /* Reusable labelled input */
      const StaffInput = ({ label, kk, type='text', placeholder, half }) => (
        <div style={{ marginBottom:'0.9rem', flex: half ? '1 1 45%' : '1 1 100%', minWidth:0 }}>
          <label style={{
            display:'block', marginBottom:'0.35rem',
            fontSize:'0.68rem', fontWeight:700, letterSpacing:'0.08em',
            textTransform:'uppercase', color:'var(--c-muted)',
          }}>{label}</label>
          <input
            type={type}
            value={form[kk]}
            onChange={e => set(kk, e.target.value)}
            placeholder={placeholder}
            style={{
              width:'100%', padding:'0.65rem 0.9rem',
              background:'rgba(255,255,255,0.05)', border:`1px solid ${errors[kk] ? 'rgba(248,113,113,0.5)' : 'rgba(255,255,255,0.10)'}`,
              borderRadius:'0.6rem', color:'var(--c-text)',
              fontSize:'0.8rem', fontFamily:'var(--ff-main)', outline:'none',
              transition:'border-color 0.18s, box-shadow 0.18s',
            }}
            onFocus={e  => { e.target.style.borderColor='rgba(0,245,212,0.40)'; e.target.style.boxShadow='0 0 0 3px rgba(0,245,212,0.08)'; }}
            onBlur={e   => { e.target.style.borderColor=errors[kk]?'rgba(248,113,113,0.5)':'rgba(255,255,255,0.10)'; e.target.style.boxShadow='none'; }}
          />
          {fieldErr(kk)}
        </div>
      );

      /* Privilege toggle row */
      const PrivilegeRow = ({ label, desc, kk, color='#00f5d4', icon }) => (
        <div style={{
          display:'flex', alignItems:'center', gap:'0.85rem',
          padding:'0.8rem 1rem', borderRadius:'0.7rem',
          background:'rgba(8,5,24,0.60)',
          border:`1px solid ${form[kk] ? color+'28' : 'rgba(255,255,255,0.06)'}`,
          transition:'border-color 0.2s, background 0.2s',
          cursor:'pointer',
        }}
          onClick={() => set(kk, !form[kk])}
        >
          <div style={{
            width:34, height:34, borderRadius:'0.55rem', flexShrink:0,
            background: form[kk] ? `${color}18` : 'rgba(255,255,255,0.04)',
            border: `1px solid ${form[kk] ? color+'40' : 'rgba(255,255,255,0.08)'}`,
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:'1rem', transition:'all 0.2s',
          }}>{icon}</div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:'0.8rem', fontWeight:700, color: form[kk] ? 'var(--c-text)' : 'var(--c-muted)', marginBottom:'0.18rem' }}>{label}</div>
            <div style={{ fontSize:'0.66rem', color:'var(--c-dim)', lineHeight:1.5 }}>{desc}</div>
          </div>
          <PermToggle on={form[kk]} onChange={v => set(kk, v)} color={color} />
        </div>
      );

      return (
        /* Backdrop */
        <div style={{
          position:'fixed', inset:0, zIndex:9999,
          background:'rgba(4,4,15,0.82)',
          backdropFilter:'blur(12px)',
          WebkitBackdropFilter:'blur(12px)',
          display:'flex', alignItems:'center', justifyContent:'center',
          padding:'1.5rem',
          animation:'fadeSlideDown 0.28s cubic-bezier(0.16,1,0.3,1) both',
        }} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>

          {/* Modal card */}
          <div style={{
            width:'100%', maxWidth:520,
            background:'rgba(10,5,32,0.96)',
            border:'1px solid rgba(124,58,237,0.35)',
            borderRadius:'1.2rem',
            boxShadow:'0 0 0 1px rgba(0,245,212,0.08), 0 32px 80px rgba(0,0,0,0.75), inset 0 1px 0 rgba(255,255,255,0.06)',
            overflow:'hidden',
            animation:'fadeSlideUp 0.32s cubic-bezier(0.16,1,0.3,1) both',
          }}>

            {/* Modal header */}
            <div style={{
              padding:'1.1rem 1.4rem 0.9rem',
              borderBottom:'1px solid rgba(255,255,255,0.07)',
              display:'flex', alignItems:'center', gap:'0.8rem',
            }}>
              <div style={{
                width:36, height:36, borderRadius:'0.65rem', flexShrink:0,
                background:'linear-gradient(135deg, rgba(124,58,237,0.35), rgba(0,245,212,0.20))',
                border:'1px solid rgba(124,58,237,0.45)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:'1rem',
              }}>👤</div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:'0.92rem', fontWeight:800, color:'var(--c-text)' }}>Add New Staff Member</div>
                <div style={{ fontSize:'0.67rem', color:'var(--c-muted)', fontFamily:'var(--ff-mono)', marginTop:2 }}>
                  STEP {step} OF 2 — {step===1 ? 'IDENTITY & CREDENTIALS' : 'PRIVILEGE CONTROLS'}
                </div>
              </div>
              {/* Progress pills */}
              <div style={{ display:'flex', gap:'0.3rem', alignItems:'center' }}>
                {[1,2].map(n => (
                  <div key={n} style={{
                    width: step===n ? 20 : 8, height:8, borderRadius:4,
                    background: step===n ? 'var(--c-teal)' : step>n ? 'rgba(52,211,153,0.5)' : 'rgba(255,255,255,0.12)',
                    boxShadow: step===n ? '0 0 8px var(--c-teal)' : 'none',
                    transition:'all 0.3s cubic-bezier(0.16,1,0.3,1)',
                  }} />
                ))}
              </div>
              <button type="button" onClick={onClose} style={{
                background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.10)',
                borderRadius:'0.5rem', width:30, height:30, cursor:'pointer',
                display:'flex', alignItems:'center', justifyContent:'center',
                color:'var(--c-muted)', fontSize:'1rem', flexShrink:0,
                transition:'all 0.14s',
              }}
                onMouseOver={e=>{e.currentTarget.style.background='rgba(248,113,113,0.14)'; e.currentTarget.style.color='#f87171';}}
                onMouseOut={e=>{e.currentTarget.style.background='rgba(255,255,255,0.06)'; e.currentTarget.style.color='var(--c-muted)';}}
              >✕</button>
            </div>

            {/* Modal body */}
            <div style={{ padding:'1.2rem 1.4rem 0.5rem', maxHeight:'66vh', overflowY:'auto' }}>

              {/* ── STEP 1: Identity & Credentials ── */}
              {step === 1 && (
                <div>
                  <div style={{ display:'flex', gap:'0.75rem', flexWrap:'wrap' }}>
                    <StaffInput label="Full Name *"     kk="fullName"    placeholder="e.g. Emeka Okafor" />
                    <StaffInput label="Work Email *"    kk="email"       placeholder="staff@roaji.ng"   type="email" />
                    <StaffInput label="Phone Number"    kk="phone"       placeholder="+234 800 000 0000" type="tel"   half />
                    <StaffInput label="Department"      kk="department"  placeholder="e.g. Sales, Admin" half />
                  </div>

                  {/* Role + Branch selectors */}
                  <div style={{ display:'flex', gap:'0.75rem', flexWrap:'wrap', marginBottom:'0.9rem' }}>
                    {[
                      { label:'Role *', kk:'role', options:['Admin','Manager','Cashier','Staff','Viewer'] },
                      { label:'Branch *', kk:'branch', options: branches.filter(b=>b!=='All') },
                    ].map(sel => (
                      <div key={sel.kk} style={{ flex:'1 1 45%', minWidth:140 }}>
                        <label style={{
                          display:'block', marginBottom:'0.35rem',
                          fontSize:'0.68rem', fontWeight:700, letterSpacing:'0.08em',
                          textTransform:'uppercase', color:'var(--c-muted)',
                        }}>{sel.label}</label>
                        <select
                          value={form[sel.kk]}
                          onChange={e => set(sel.kk, e.target.value)}
                          style={{
                            width:'100%', padding:'0.65rem 0.9rem',
                            background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.10)',
                            borderRadius:'0.6rem', color:'var(--c-text)',
                            fontSize:'0.8rem', fontFamily:'var(--ff-main)', outline:'none',
                          }}
                        >
                          {sel.options.map(o => <option key={o} value={o} style={{ background:'#0a0520' }}>{o}</option>)}
                        </select>
                      </div>
                    ))}
                  </div>

                  {/* PIN fields */}
                  <div style={{
                    padding:'0.85rem 1rem', borderRadius:'0.7rem',
                    background:'rgba(124,58,237,0.07)', border:'1px solid rgba(124,58,237,0.22)',
                    marginBottom:'1rem',
                  }}>
                    <div style={{ fontSize:'0.7rem', fontWeight:700, color:'#a78bfa', marginBottom:'0.7rem', display:'flex', alignItems:'center', gap:'0.4rem' }}>
                      <span>🔐</span> Set Staff Login PIN
                    </div>
                    <div style={{ display:'flex', gap:'0.75rem', flexWrap:'wrap' }}>
                      <div style={{ flex:'1 1 45%', minWidth:120 }}>
                        <label style={{ display:'block', marginBottom:'0.35rem', fontSize:'0.67rem', fontWeight:700, letterSpacing:'0.07em', textTransform:'uppercase', color:'var(--c-muted)' }}>PIN *</label>
                        <input
                          type="password"
                          value={form.pin}
                          onChange={e => set('pin', e.target.value.replace(/\D/g,'').slice(0,8))}
                          placeholder="4–8 digits"
                          maxLength={8}
                          style={{
                            width:'100%', padding:'0.65rem 0.9rem',
                            background:'rgba(255,255,255,0.05)',
                            border:`1px solid ${errors.pin ? 'rgba(248,113,113,0.5)' : 'rgba(124,58,237,0.28)'}`,
                            borderRadius:'0.6rem', color:'var(--c-text)',
                            fontSize:'0.8rem', fontFamily:'var(--ff-mono)', outline:'none',
                            letterSpacing:'0.25em',
                          }}
                          onFocus={e=>{ e.target.style.borderColor='rgba(124,58,237,0.55)'; e.target.style.boxShadow='0 0 0 3px rgba(124,58,237,0.10)'; }}
                          onBlur={e =>{ e.target.style.borderColor=errors.pin?'rgba(248,113,113,0.5)':'rgba(124,58,237,0.28)'; e.target.style.boxShadow='none'; }}
                        />
                        {fieldErr('pin')}
                      </div>
                      <div style={{ flex:'1 1 45%', minWidth:120 }}>
                        <label style={{ display:'block', marginBottom:'0.35rem', fontSize:'0.67rem', fontWeight:700, letterSpacing:'0.07em', textTransform:'uppercase', color:'var(--c-muted)' }}>Confirm PIN *</label>
                        <input
                          type="password"
                          value={form.confirmPin}
                          onChange={e => set('confirmPin', e.target.value.replace(/\D/g,'').slice(0,8))}
                          placeholder="Re-enter PIN"
                          maxLength={8}
                          style={{
                            width:'100%', padding:'0.65rem 0.9rem',
                            background:'rgba(255,255,255,0.05)',
                            border:`1px solid ${errors.confirmPin ? 'rgba(248,113,113,0.5)' : 'rgba(124,58,237,0.28)'}`,
                            borderRadius:'0.6rem', color:'var(--c-text)',
                            fontSize:'0.8rem', fontFamily:'var(--ff-mono)', outline:'none',
                            letterSpacing:'0.25em',
                          }}
                          onFocus={e=>{ e.target.style.borderColor='rgba(124,58,237,0.55)'; e.target.style.boxShadow='0 0 0 3px rgba(124,58,237,0.10)'; }}
                          onBlur={e =>{ e.target.style.borderColor=errors.confirmPin?'rgba(248,113,113,0.5)':'rgba(124,58,237,0.28)'; e.target.style.boxShadow='none'; }}
                        />
                        {fieldErr('confirmPin')}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* ── STEP 2: Privilege Controls ── */}
              {step === 2 && (
                <div style={{ display:'flex', flexDirection:'column', gap:'0.6rem' }}>

                  {/* Section banner */}
                  <div style={{
                    padding:'0.65rem 0.9rem', borderRadius:'0.65rem',
                    background:'rgba(0,245,212,0.06)', border:'1px solid rgba(0,245,212,0.18)',
                    marginBottom:'0.25rem',
                  }}>
                    <div style={{ fontSize:'0.72rem', fontWeight:700, color:'var(--c-teal)', marginBottom:'0.2rem' }}>
                      ⚙️ Privilege Status Controls
                    </div>
                    <div style={{ fontSize:'0.65rem', color:'var(--c-muted)', lineHeight:1.6 }}>
                      Configure sensitive financial privileges for <strong style={{ color:'var(--c-text)' }}>{form.fullName || 'this staff member'}</strong>.
                      These controls are separate from module-level permissions and apply across all active sessions.
                    </div>
                  </div>

                  {/* PRIVILEGE TOGGLE 1 — Allow Billing */}
                  <PrivilegeRow
                    kk="allowBilling"
                    label="Allow Billing"
                    desc="Staff can create, issue, and finalise customer bills and invoices."
                    icon="🧾"
                    color="#34d399"
                  />

                  {/* PRIVILEGE TOGGLE 2 — Hide Profit Margins */}
                  <PrivilegeRow
                    kk="hideProfitMargins"
                    label="Hide Profit Margins"
                    desc="Cost price and profit margin columns will be hidden from this staff member's view."
                    icon="🙈"
                    color="#f59e0b"
                  />

                  {/* PRIVILEGE TOGGLE 3 — Block Bill Deletion */}
                  <PrivilegeRow
                    kk="blockBillDeletion"
                    label="Block Bill Deletion"
                    desc="Prevents this staff member from deleting any issued bills or invoices."
                    icon="🚫"
                    color="#f87171"
                  />

                  {/* Summary chip row */}
                  <div style={{
                    marginTop:'0.35rem', padding:'0.65rem 0.9rem',
                    background:'rgba(8,5,24,0.60)', border:'1px solid rgba(255,255,255,0.07)',
                    borderRadius:'0.65rem',
                    display:'flex', flexWrap:'wrap', gap:'0.45rem', alignItems:'center',
                  }}>
                    <span style={{ fontSize:'0.63rem', color:'var(--c-dim)', fontFamily:'var(--ff-mono)', marginRight:'0.25rem' }}>SUMMARY:</span>
                    {[
                      { label:'Billing',        active: form.allowBilling,      onLabel:'Allowed',  offLabel:'Blocked',  onColor:'#34d399', offColor:'#f87171' },
                      { label:'Profit View',    active:!form.hideProfitMargins, onLabel:'Visible',  offLabel:'Hidden',   onColor:'#60a5fa', offColor:'#f59e0b' },
                      { label:'Bill Deletion',  active:!form.blockBillDeletion, onLabel:'Allowed',  offLabel:'Blocked',  onColor:'#a78bfa', offColor:'#f87171' },
                    ].map(chip => (
                      <span key={chip.label} style={{
                        display:'inline-flex', alignItems:'center', gap:'0.3rem',
                        fontSize:'0.63rem', fontWeight:700, padding:'0.18rem 0.55rem',
                        borderRadius:'99px',
                        background: chip.active ? `${chip.onColor}14` : `${chip.offColor}14`,
                        border:`1px solid ${chip.active ? chip.onColor+'40' : chip.offColor+'40'}`,
                        color: chip.active ? chip.onColor : chip.offColor,
                      }}>
                        <span style={{ width:5, height:5, borderRadius:'50%', background: chip.active ? chip.onColor : chip.offColor, display:'inline-block' }} />
                        {chip.label}: {chip.active ? chip.onLabel : chip.offLabel}
                      </span>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* Modal footer */}
            <div style={{
              padding:'0.9rem 1.4rem 1.1rem',
              borderTop:'1px solid rgba(255,255,255,0.07)',
              display:'flex', gap:'0.65rem', justifyContent:'flex-end',
            }}>
              {step === 2 && (
                <button type="button" onClick={() => setStep(1)} style={{
                  padding:'0.55rem 1.1rem', borderRadius:'0.6rem', cursor:'pointer',
                  background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.12)',
                  color:'var(--c-muted)', fontSize:'0.8rem', fontWeight:700, fontFamily:'var(--ff-main)',
                  transition:'all 0.14s',
                }}>← Back</button>
              )}
              <button type="button" onClick={onClose} style={{
                padding:'0.55rem 1.1rem', borderRadius:'0.6rem', cursor:'pointer',
                background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.10)',
                color:'var(--c-dim)', fontSize:'0.8rem', fontWeight:700, fontFamily:'var(--ff-main)',
                transition:'all 0.14s',
              }}>Cancel</button>

              {step === 1 ? (
                <button type="button" onClick={handleNext} style={{
                  padding:'0.55rem 1.3rem', borderRadius:'0.6rem', cursor:'pointer',
                  background:'linear-gradient(135deg, rgba(124,58,237,0.85), rgba(0,245,212,0.6))',
                  border:'1px solid rgba(0,245,212,0.35)',
                  color:'#fff', fontSize:'0.8rem', fontWeight:700, fontFamily:'var(--ff-main)',
                  boxShadow:'0 4px 18px rgba(124,58,237,0.30)',
                  transition:'all 0.15s',
                }}>Next: Privileges →</button>
              ) : (
                <button type="button" onClick={handleAdd} disabled={saving} style={{
                  padding:'0.55rem 1.3rem', borderRadius:'0.6rem',
                  cursor: saving ? 'not-allowed' : 'pointer',
                  background: saving ? 'rgba(52,211,153,0.25)' : 'linear-gradient(135deg, rgba(52,211,153,0.85), rgba(0,245,212,0.75))',
                  border:'1px solid rgba(52,211,153,0.45)',
                  color:'#fff', fontSize:'0.8rem', fontWeight:700, fontFamily:'var(--ff-main)',
                  boxShadow:'0 4px 18px rgba(52,211,153,0.25)',
                  transition:'all 0.15s',
                  display:'flex', alignItems:'center', gap:'0.5rem',
                }}>
                  {saving
                    ? <><span style={{ display:'inline-block', width:13, height:13, border:'2px solid rgba(255,255,255,0.3)', borderTopColor:'#fff', borderRadius:'50%', animation:'spin 0.9s linear infinite' }} /> Adding…</>
                    : '✅ Add Staff Member'
                  }
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    /* ── Granular Employee Access Manager ────────────────────────────── */
    const GranularAccessManager = () => {
      const [employees, setEmployees]       = useState(INIT_EMPLOYEES);
      const [selectedId, setSelectedId]     = useState(null);
      const [search, setSearch]             = useState('');
      const [filterRole, setFilterRole]     = useState('All');
      const [filterBranch, setFilterBranch] = useState('All');
      const [activePermTab, setActivePermTab] = useState('matrix');
      const [saveFlash, setSaveFlash]       = useState(false);
      const [changedPerms, setChangedPerms] = useState({});  // track unsaved
      const [showAddModal, setShowAddModal] = useState(false);

      const selectedEmp = employees.find(e => e.id === selectedId) || null;

      const filtered = employees.filter(e => {
        const q = search.toLowerCase();
        const matchQ = !q || e.name.toLowerCase().includes(q) || e.email.toLowerCase().includes(q);
        const matchR = filterRole === 'All' || e.role === filterRole;
        const matchB = filterBranch === 'All' || e.branch === filterBranch;
        return matchQ && matchR && matchB;
      });

      const roles    = ['All', ...Array.from(new Set(INIT_EMPLOYEES.map(e => e.role)))];
      const branches = ['All', ...Array.from(new Set(INIT_EMPLOYEES.map(e => e.branch)))];

      const togglePerm = (empId, modId, action) => {
        setEmployees(prev => prev.map(e => {
          if (e.id !== empId) return e;
          if (e.role === 'Master Admin') return e; // lock master admin
          const updated = {
            ...e,
            perms: {
              ...e.perms,
              [modId]: { ...e.perms[modId], [action]: !e.perms[modId][action] },
            },
          };
          return updated;
        }));
        setChangedPerms(p => ({ ...p, [`${empId}-${modId}-${action}`]: true }));
      };

      const applyRolePreset = (empId, role) => {
        setEmployees(prev => prev.map(e =>
          e.id === empId ? { ...e, role, perms: buildPermsForRole(role) } : e
        ));
        setChangedPerms({});
      };

      const toggleStatus = (empId) => {
        setEmployees(prev => prev.map(e =>
          e.id === empId ? { ...e, status: e.status === 'Active' ? 'Suspended' : 'Active' } : e
        ));
      };

      const handleSave = () => {
        setChangedPerms({});
        setSaveFlash(true);
        setTimeout(() => setSaveFlash(false), 1800);
      };

      const handleAddEmployee = (newEmp) => {
        setEmployees(prev => [...prev, newEmp]);
        setSelectedId(newEmp.id);
      };

      const pendingCount = Object.keys(changedPerms).length;

      /* ── colour helpers ── */
      const statusColor = s => s === 'Active' ? '#34d399' : s === 'Suspended' ? '#f87171' : '#f59e0b';
      const actionColor = a => ({ View:'#60a5fa', Create:'#34d399', Edit:'#f59e0b', Delete:'#f87171' }[a] || '#718096');

      return (
        <>
        {/* ── Add Staff Modal (portal-style, rendered at top of tree) ── */}
        {showAddModal && (
          <StaffSetupModal
            branches={branches}
            onClose={() => setShowAddModal(false)}
            onAdd={handleAddEmployee}
          />
        )}

        <div className="access-card-in" style={{ display:'flex', flexDirection:'column', gap:'1.1rem' }}>

          {/* ── Header bar ── */}
          <div style={{
            display:'flex', alignItems:'center', justifyContent:'space-between',
            flexWrap:'wrap', gap:'0.7rem',
          }}>
            <div style={{ display:'flex', alignItems:'center', gap:'0.65rem' }}>
              <div style={{
                width:36, height:36, borderRadius:'0.65rem',
                background:'linear-gradient(135deg, rgba(124,58,237,0.35), rgba(0,245,212,0.20))',
                border:'1px solid rgba(124,58,237,0.45)',
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:'1.1rem', flexShrink:0,
                boxShadow:'0 0 18px rgba(124,58,237,0.22)',
              }}>🔐</div>
              <div>
                <div style={{ fontSize:'0.92rem', fontWeight:800, color:'var(--c-text)', letterSpacing:'-0.01em' }}>
                  Granular Employee Access Manager
                </div>
                <div style={{ fontSize:'0.68rem', color:'var(--c-muted)', fontFamily:'var(--ff-mono)', letterSpacing:'0.04em' }}>
                  {employees.filter(e=>e.status==='Active').length} ACTIVE · {employees.length} TOTAL · {MODULE_PERMS.length} MODULES
                </div>
              </div>
            </div>

            {/* Save / unsaved indicator + Add Staff button */}
            <div style={{ display:'flex', alignItems:'center', gap:'0.55rem' }}>
              {pendingCount > 0 && (
                <span style={{
                  fontSize:'0.68rem', fontWeight:700, fontFamily:'var(--ff-mono)',
                  color:'#f59e0b', padding:'0.22rem 0.6rem',
                  background:'rgba(245,158,11,0.10)', border:'1px solid rgba(245,158,11,0.30)',
                  borderRadius:'99px', animation:'badgePop 0.25s both',
                }}>
                  {pendingCount} UNSAVED CHANGE{pendingCount!==1?'S':''}
                </span>
              )}
              {/* ── + Add Staff button ── */}
              <button type="button" onClick={() => setShowAddModal(true)} style={{
                padding:'0.42rem 1rem', borderRadius:'0.55rem', cursor:'pointer',
                background:'rgba(0,245,212,0.10)',
                border:'1px solid rgba(0,245,212,0.35)',
                color:'var(--c-teal)',
                fontSize:'0.74rem', fontWeight:700, fontFamily:'var(--ff-main)',
                display:'flex', alignItems:'center', gap:'0.35rem',
                transition:'all 0.18s',
                boxShadow:'0 0 10px rgba(0,245,212,0.08)',
              }}
                onMouseOver={e=>{e.currentTarget.style.background='rgba(0,245,212,0.16)'; e.currentTarget.style.boxShadow='0 0 16px rgba(0,245,212,0.18)';}}
                onMouseOut={e =>{e.currentTarget.style.background='rgba(0,245,212,0.10)'; e.currentTarget.style.boxShadow='0 0 10px rgba(0,245,212,0.08)';}}
              >
                <span style={{ fontSize:'0.9rem', lineHeight:1 }}>＋</span> Add Staff
              </button>
              <button type="button" onClick={handleSave} style={{
                padding:'0.42rem 1.1rem', borderRadius:'0.55rem', cursor:'pointer',
                background: saveFlash ? 'rgba(52,211,153,0.22)' : 'rgba(124,58,237,0.18)',
                border: saveFlash ? '1px solid rgba(52,211,153,0.55)' : '1px solid rgba(124,58,237,0.45)',
                color: saveFlash ? '#34d399' : '#a78bfa',
                fontSize:'0.74rem', fontWeight:700, fontFamily:'var(--ff-main)',
                transition:'all 0.22s',
                boxShadow: saveFlash ? '0 0 12px rgba(52,211,153,0.25)' : 'none',
              }}>
                {saveFlash ? '✓ Saved' : '💾 Save Changes'}
              </button>
            </div>
          </div>

          {/* ── Two-pane layout ── */}
          <div style={{ display:'flex', gap:'1rem', minHeight:0, flexWrap:'wrap' }}>

            {/* ── LEFT PANE: Employee Roster ── */}
            <div style={{
              flex:'0 0 260px', display:'flex', flexDirection:'column', gap:'0.7rem',
              background:'rgba(8,5,24,0.60)', border:'1px solid rgba(255,255,255,0.07)',
              borderRadius:'0.85rem', padding:'0.85rem', minWidth:0,
            }}>
              {/* Search */}
              <div style={{ position:'relative' }}>
                <span style={{
                  position:'absolute', left:'0.65rem', top:'50%', transform:'translateY(-50%)',
                  fontSize:'0.8rem', pointerEvents:'none', color:'var(--c-dim)',
                }}>🔍</span>
                <input
                  className="access-search"
                  placeholder="Search employees…"
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                />
              </div>

              {/* Filter pills */}
              <div style={{ display:'flex', gap:'0.35rem', flexWrap:'wrap' }}>
                {/* Role filter */}
                <select
                  value={filterRole}
                  onChange={e => setFilterRole(e.target.value)}
                  style={{
                    flex:1, minWidth:0,
                    background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.10)',
                    borderRadius:'0.45rem', padding:'0.3rem 0.5rem',
                    color:'var(--c-muted)', fontSize:'0.68rem', fontFamily:'var(--ff-main)',
                    cursor:'pointer', outline:'none',
                  }}
                >
                  {roles.map(r => <option key={r} value={r} style={{ background:'#0a0520' }}>{r}</option>)}
                </select>
                {/* Branch filter */}
                <select
                  value={filterBranch}
                  onChange={e => setFilterBranch(e.target.value)}
                  style={{
                    flex:1, minWidth:0,
                    background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.10)',
                    borderRadius:'0.45rem', padding:'0.3rem 0.5rem',
                    color:'var(--c-muted)', fontSize:'0.68rem', fontFamily:'var(--ff-main)',
                    cursor:'pointer', outline:'none',
                  }}
                >
                  {branches.map(b => <option key={b} value={b} style={{ background:'#0a0520' }}>{b==='All'?'All Branches':b.replace(' Branch','')}</option>)}
                </select>
              </div>

              {/* Employee list */}
              <div style={{ display:'flex', flexDirection:'column', gap:'0.3rem', overflowY:'auto', maxHeight:420 }}>
                {filtered.length === 0 && (
                  <div style={{ textAlign:'center', padding:'1.5rem 0', color:'var(--c-dim)', fontSize:'0.75rem' }}>No employees found</div>
                )}
                {filtered.map((emp, idx) => {
                  const isSelected = selectedId === emp.id;
                  return (
                    <div
                      key={emp.id}
                      className="access-emp-row access-row-in"
                      onClick={() => setSelectedId(isSelected ? null : emp.id)}
                      style={{
                        animationDelay:`${idx*35}ms`,
                        display:'flex', alignItems:'center', gap:'0.6rem',
                        padding:'0.55rem 0.65rem', borderRadius:'0.6rem', cursor:'pointer',
                        background: isSelected ? 'rgba(124,58,237,0.14)' : 'transparent',
                        border: isSelected ? '1px solid rgba(124,58,237,0.35)' : '1px solid transparent',
                        transition:'all 0.14s',
                      }}
                    >
                      {/* Avatar */}
                      <div style={{
                        width:30, height:30, borderRadius:'50%', flexShrink:0,
                        background:`linear-gradient(135deg, rgba(124,58,237,0.55), rgba(0,245,212,0.35))`,
                        border:`2px solid ${statusColor(emp.status)}55`,
                        display:'flex', alignItems:'center', justifyContent:'center',
                        fontSize:'0.62rem', fontWeight:800, color:'#fff', letterSpacing:'0.02em',
                      }}>{emp.avatar}</div>

                      {/* Name + role */}
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:'0.76rem', fontWeight:700, color: isSelected ? '#a78bfa' : 'var(--c-text)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                          {emp.name}
                        </div>
                        <div style={{ fontSize:'0.62rem', color:'var(--c-dim)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                          {emp.role}
                        </div>
                      </div>

                      {/* Status dot */}
                      <div style={{
                        width:7, height:7, borderRadius:'50%', flexShrink:0,
                        background: statusColor(emp.status),
                        boxShadow: emp.status==='Active' ? `0 0 6px ${statusColor(emp.status)}` : 'none',
                      }} />
                    </div>
                  );
                })}
              </div>

              {/* Roster summary */}
              <div style={{
                borderTop:'1px solid rgba(255,255,255,0.06)',
                paddingTop:'0.6rem',
                display:'flex', gap:'0.5rem', justifyContent:'space-between',
              }}>

    /* ════════════════════════════════════════════════════════════════════
       ERROR BOUNDARY — wraps the Analytics Panel to catch render errors
    ════════════════════════════════════════════════════════════════════ */
    class ProfitAnalyticsErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, info: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, info) {
        console.error('[Roaji 10A-2 Profit Panel] Render error caught by ErrorBoundary:', error, info);
        this.setState({ info });
      }
      render() {
        if (this.state.hasError) {
          return (
            <div style={{
              padding:'1.5rem', margin:'1.25rem',
              background:'rgba(239,68,68,0.10)',
              border:'1px solid rgba(239,68,68,0.32)',
              borderRadius:'0.85rem',
              color:'#fca5a5',
            }}>
              <div style={{ fontSize:'1rem', fontWeight:800, marginBottom:'0.4rem' }}>
                ⚠️ Profit Analytics Panel Error
              </div>
              <div style={{ fontSize:'0.73rem', color:'rgba(252,165,165,0.75)', lineHeight:1.6 }}>
                The analytics panel encountered an unexpected render error and has been isolated
                to prevent affecting the rest of the application.
              </div>
              <pre style={{
                marginTop:'0.75rem', padding:'0.65rem 0.85rem',
                background:'rgba(0,0,0,0.3)', borderRadius:'0.5rem',
                fontSize:'0.65rem', color:'#f87171', overflowX:'auto', lineHeight:1.7,
              }}>{this.state.error?.message || 'Unknown error'}</pre>
              <button
                type="button"
                onClick={() => this.setState({ hasError:false, error:null, info:null })}
                style={{
                  marginTop:'0.85rem', padding:'0.4rem 1rem', borderRadius:'0.5rem',
                  background:'rgba(239,68,68,0.18)', border:'1px solid rgba(239,68,68,0.40)',
                  color:'#f87171', cursor:'pointer', fontSize:'0.75rem', fontWeight:700,
                  fontFamily:'var(--ff-main)',
                }}
              >↺ Retry</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    /* ═══ Derived profit metrics ═══ */
    function computeProfitMetrics(data) {
      const netProfit       = data.grossRevenue - data.totalCOGS - data.totalRefunds - data.totalExpenses;
      const grossMarginPct  = data.grossRevenue > 0
        ? ((data.grossRevenue - data.totalCOGS) / data.grossRevenue * 100).toFixed(1)
        : '0.0';
      const netMarginPct    = data.grossRevenue > 0
        ? (netProfit / data.grossRevenue * 100).toFixed(1)
        : '0.0';

      const productMetrics  = data.products.map(p => ({
        ...p,
        unitProfit:  p.retail - p.cost,
        marginPct:   p.retail > 0 ? ((p.retail - p.cost) / p.retail * 100).toFixed(1) : '0.0',
        totalProfit: (p.retail - p.cost) * p.qty_sold,
        totalRevenue: p.retail * p.qty_sold,
        lowStock:    p.in_stock <= p.reorder,
      }));

      const lowStockItems = productMetrics
        .filter(p => p.lowStock)
        .sort((a, b) => a.in_stock - b.in_stock);

      return { netProfit, grossMarginPct, netMarginPct, productMetrics, lowStockItems };
    }

    /* ═══ CSV / Excel-layout export ═══ */
    function exportMonthlyCSV(data, metrics) {
      const fmtNum = n => n.toLocaleString('en-NG');

      /* Sheet 1 — Monthly Summary */
      const rows = [
        ['ROAJI BILLING — MONTHLY PROFIT REPORT'],
        [`Generated: ${new Date().toLocaleString('en-NG')}`],
        [],
        ['Month', 'Gross Revenue (₦)', 'COGS (₦)', 'Net Profit (₦)', 'Net Margin (%)'],
        ...data.monthly.map(m => [
          m.month,
          fmtNum(m.gross),
          fmtNum(m.cogs),
          fmtNum(m.net),
          m.gross > 0 ? (m.net / m.gross * 100).toFixed(1) + '%' : '0.0%',
        ]),
        [],
        ['TOTALS', fmtNum(data.grossRevenue), fmtNum(data.totalCOGS), fmtNum(metrics.netProfit), metrics.netMarginPct + '%'],
        [],
        ['--- PRODUCT PROFIT BREAKDOWN ---'],
        ['SKU', 'Product', 'Retail (₦)', 'Cost (₦)', 'Unit Profit (₦)', 'Margin %', 'Units Sold', 'Total Revenue (₦)', 'Total Profit (₦)', 'Stock', 'Status'],
        ...metrics.productMetrics.map(p => [
          p.sku, p.name,
          fmtNum(p.retail), fmtNum(p.cost), fmtNum(p.unitProfit),
          p.marginPct + '%',
          fmtNum(p.qty_sold), fmtNum(p.totalRevenue), fmtNum(p.totalProfit),
          p.in_stock,
          p.lowStock ? 'LOW STOCK ⚠️' : 'OK',
        ]),
        [],
        ['--- LOW STOCK ALERTS ---'],
        ['SKU', 'Product', 'In Stock', 'Reorder Level', 'Action Required'],
        ...metrics.lowStockItems.map(p => [
          p.sku, p.name, p.in_stock, p.reorder, p.in_stock === 0 ? 'OUT OF STOCK' : 'REORDER NOW',
        ]),
      ];

      /* Convert to TSV (tab-separated) — opens cleanly in Excel as .tsv */
      const tsv = rows.map(r => Array.isArray(r) ? r.join('\t') : r).join('\r\n');
      const blob = new Blob(['\uFEFF' + tsv], { type: 'text/tab-separated-values;charset=utf-8;' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `Roaji_Profit_Report_${new Date().toISOString().slice(0,10)}.tsv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    /* ════════════════════════════════════════════════════════════════════
       PART 15A-1 — EXCEL CSV EXPORT UTILITY
       ─────────────────────────────────────────────────────────────────
       roajiV2ExportBillsToCSV(bills)
         Reads the live bills array from OwnerDashboard state, constructs
         a UTF-8 BOM-prefixed CSV string (\uFEFF) so Tamil and Naira (₦)
         characters render correctly when opened in Microsoft Excel, then
         triggers a browser download of the resulting .csv file.

       COLUMN SCHEMA (matches roaji_v2_bills Firestore document fields):
         Bill ID | Date | Time | Customer | Module | Items | Total | Cost | Profit | Payment | Staff
    ════════════════════════════════════════════════════════════════════ */

    function roajiV2ExportBillsToCSV(bills) {
      if (!Array.isArray(bills) || bills.length === 0) {
        alert('No bill records found to export. Issue at least one bill first.');
        return;
      }

      /* ── Helpers ────────────────────────────────────────────────── */
      const safeStr = (v) => {
        if (v == null || v === undefined) return '';
        const s = String(v).trim();
        /* Wrap in double-quotes and escape any internal double-quotes  */
        return '"' + s.replace(/"/g, '""') + '"';
      };

      const fmtCurrency = (n) => {
        const num = Number(n);
        if (isNaN(num)) return '0.00';
        return num.toFixed(2);
      };

      /* Format a Firestore Timestamp, JS Date, or epoch number into
         human-readable DATE and TIME strings for Excel columns.        */
      const fmtTimestamp = (raw) => {
        let d = null;
        if (!raw) {
          return { date: '', time: '' };
        }
        /* Firestore Timestamp object (.toDate())                       */
        if (raw && typeof raw.toDate === 'function') {
          d = raw.toDate();
        /* Firestore Timestamp-like plain object { seconds, nanoseconds } */
        } else if (raw && typeof raw.seconds === 'number') {
          d = new Date(raw.seconds * 1000);
        /* Already a JS Date                                            */
        } else if (raw instanceof Date) {
          d = raw;
        /* ISO string or epoch number                                   */
        } else if (typeof raw === 'string' || typeof raw === 'number') {
          d = new Date(raw);
        }

        if (!d || isNaN(d.getTime())) return { date: '', time: '' };

        const pad = (n) => String(n).padStart(2, '0');
        const date = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
        const time = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        return { date, time };
      };

      /* Flatten items array (if present) into a readable summary      */
      const fmtItems = (items) => {
        if (!Array.isArray(items) || items.length === 0) return '';
        return items
          .map(it => {
            const name = it.name || it.productName || it.item || '';
            const qty  = it.qty  || it.quantity    || it.count || '';
            const price= it.price|| it.unitPrice   || '';
            if (qty && price) return `${name} x${qty} @${fmtCurrency(price)}`;
            if (qty)          return `${name} x${qty}`;
            return name;
          })
          .filter(Boolean)
          .join('; ');
      };

      /* ── CSV Header (Excel BOM + column row) ───────────────────── */
      const BOM     = '\uFEFF';
      const HEADERS = [
        'Bill ID', 'Date', 'Time', 'Customer Name', 'Module',
        'Items Summary', 'Total (₦)', 'Wholesale Cost (₦)', 'Net Profit (₦)',
        'Payment Method', 'Staff / Operator',
      ];

      const rows = [HEADERS.map(h => safeStr(h)).join(',')];

      /* ── Data rows ─────────────────────────────────────────────── */
      bills.forEach((bill) => {
        /* Resolve revenue field — mirrors reactive calculation layer   */
        const revenue = Number(bill.total) || Number(bill.grandTotal) || Number(bill.amount) || 0;

        /* Resolve cost field — mirrors netProfit calculation in OwnerDashboard */
        let cost = 0;
        if (bill.wholesaleCost != null && Number(bill.wholesaleCost) > 0) {
          cost = Number(bill.wholesaleCost);
        } else if (bill.paperCost != null && Number(bill.paperCost) > 0) {
          cost = Number(bill.paperCost);
        } else if (bill.cogs != null && Number(bill.cogs) > 0) {
          cost = Number(bill.cogs);
        } else {
          cost = revenue * 0.35;   /* conservative fallback margin floor */
        }

        const profit = revenue - cost;

        /* Timestamp — try common field names                          */
        const tsRaw  = bill.createdAt || bill.timestamp || bill.date || bill.billDate || null;
        const { date, time } = fmtTimestamp(tsRaw);

        /* Customer — try common field names                           */
        const customer = bill.customerName || bill.customer || bill.buyerName || bill.clientName || '';

        /* Module — try common field names                             */
        const module = bill.module || bill.panel || bill.source || bill.category || '';

        /* Payment method                                              */
        const payment = bill.paymentMethod || bill.payment || bill.method || '';

        /* Staff / operator                                            */
        const staff = bill.staffName || bill.staff || bill.operator || bill.processedBy || '';

        /* Items                                                       */
        const items = fmtItems(bill.items || bill.products || bill.lineItems || []);

        /* Bill ID                                                     */
        const billId = bill.id || bill.billId || bill.billNo || bill.invoiceId || '';

        const row = [
          safeStr(billId),
          safeStr(date),
          safeStr(time),
          safeStr(customer),
          safeStr(module),
          safeStr(items),
          safeStr(fmtCurrency(revenue)),
          safeStr(fmtCurrency(cost)),
          safeStr(fmtCurrency(profit)),
          safeStr(payment),
          safeStr(staff),
        ];

        rows.push(row.join(','));
      });

      /* ── Trigger browser download ───────────────────────────────── */
      const csvContent = BOM + rows.join('\r\n');   /* CRLF per RFC 4180 */
      const blob       = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url        = URL.createObjectURL(blob);

      /* Derive filename: roaji-bills-YYYY-MM-DD.csv                   */
      const today      = new Date();
      const pad        = (n) => String(n).padStart(2, '0');
      const dateStamp  = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;
      const filename   = `roaji-bills-${dateStamp}.csv`;

      const anchor     = document.createElement('a');
      anchor.href      = url;
      anchor.download  = filename;
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);

      /* Release object URL after a short delay to allow download start */
      setTimeout(() => URL.revokeObjectURL(url), 5000);

      console.log(`[Roaji 15A-1] CSV export complete — ${bills.length} bill(s) → ${filename}`);
    }

    /* ════════════════════════════════════════════════════════════════════
       PART 14A-2 — OWNER ANALYTICS REACT CALCULATION LOGIC
       ─────────────────────────────────────────────────────────────────
       REACTIVE CALCULATION LAYER
         • Subscribes to roajiV2OnBills (live Firestore listener) so the
           four KPI cards update the instant a new bill is committed —
           no page refresh, no manual polling.
         • Falls back gracefully when Firebase is not yet initialised
           (shows loading shimmer state on cards).
         • Also listens to 'roaji:stock-checkout' CustomEvent so the
           Stock Alerts card refreshes the moment a cashier checks out,
           without waiting for the next Firestore snapshot.

       COMPUTED VALUES (all derived from the live bills array):
         totalRevenue  — sum of bill.total across every document in the
                         tenant-scoped bills snapshot.
         netProfit     — totalRevenue minus the aggregate wholesale/paper
                         cost estimated from RoajiMasterInventory unit
                         costs.  Each bill's `wholesaleCost` field is
                         used when present (stamped by checkout handlers);
                         falls back to 35 % of bill.total as a safe
                         conservative margin estimate when the field is
                         absent (e.g. legacy records, gift module bills).
         totalBills    — bills.length — the raw document count for this
                         tenant / store session.
         stockAlerts   — live filter of window.RoajiMasterInventory where
                         item.qty < 10 units (hard threshold per spec).

       GRID LAYOUT
         The component renders inside .roaji-analytics-wrapper /
         .roaji-analytics-grid defined in PART 14A-1 CSS.  Each KPI card
         uses the variant class that matches its accent colour:
           Total Revenue  → .roaji-akpi--revenue  (Neon Green)
           Net Profit     → .roaji-akpi--profit   (Electric Blue)
           Total Bills    → .roaji-akpi--bills    (Deep Purple)
           Stock Alerts   → .roaji-akpi--stock    (Neon Amber)
    ════════════════════════════════════════════════════════════════════ */
    const OwnerDashboard = ({ user }) => {

      /* ── Local state ─────────────────────────────────────────────── */
      const [bills,        setBills]        = useState([]);
      const [stockAlerts,  setStockAlerts]  = useState([]);
      const [loading,      setLoading]      = useState(true);
      const [lastUpdated,  setLastUpdated]  = useState(null);
      const [flashRev,     setFlashRev]     = useState(0);   // triggers re-render flash on revenue card
      const [flashProfit,  setFlashProfit]  = useState(0);
      const [flashBills,   setFlashBills]   = useState(0);
      const [flashStock,   setFlashStock]   = useState(0);

      /* ── Helpers ─────────────────────────────────────────────────── */

      /* Naira formatter — compact for large values */
      const fmtNaira = (n) => {
        const num = Number(n) || 0;
        if (num >= 1_000_000) return '₦' + (num / 1_000_000).toFixed(2) + 'M';
        if (num >= 1_000)     return '₦' + (num / 1_000).toFixed(1) + 'K';
        return '₦' + num.toLocaleString('en-NG', { minimumFractionDigits: 0 });
      };

      /* Full Naira formatter — for sub-card detail line */
      const fmtFull = (n) =>
        '₦' + Number(n || 0).toLocaleString('en-NG', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

      /* ── REACTIVE CALCULATION LAYER ─────────────────────────────── */

      /* totalRevenue: sum of every bill's `total` field.
         Bills from all checkout modules use `total` as the grandTotal
         field (see GiftsPanel bill record schema, line ~9480).         */
      const totalRevenue = bills.reduce((sum, b) => {
        const t = Number(b.total) || Number(b.grandTotal) || Number(b.amount) || 0;
        return sum + t;
      }, 0);

      /* netProfit: totalRevenue minus aggregate wholesale/paper cost.
         Priority order for cost per bill:
           1. bill.wholesaleCost  — stamped by checkout handlers when available
           2. bill.paperCost      — Xerox-module paper cost field
           3. bill.cogs           — generic COGS field
           4. Fallback: 35 % of bill.total (conservative margin floor)        */
      const totalWholesaleCost = bills.reduce((sum, b) => {
        const billRevenue = Number(b.total) || Number(b.grandTotal) || Number(b.amount) || 0;
        let cost = 0;
        if (b.wholesaleCost != null && Number(b.wholesaleCost) > 0) {
          cost = Number(b.wholesaleCost);
        } else if (b.paperCost != null && Number(b.paperCost) > 0) {
          cost = Number(b.paperCost);
        } else if (b.cogs != null && Number(b.cogs) > 0) {
          cost = Number(b.cogs);
        } else {
          /* Fallback: estimate wholesale cost at 35 % of retail total */
          cost = billRevenue * 0.35;
        }
        return sum + cost;
      }, 0);

      const netProfit      = totalRevenue - totalWholesaleCost;
      const isNetPositive  = netProfit >= 0;
      const netMarginPct   = totalRevenue > 0
        ? ((netProfit / totalRevenue) * 100).toFixed(1)
        : '0.0';

      /* totalBills: direct document count from the Firestore snapshot   */
      const totalBills = bills.length;

      /* stockAlerts count — sourced from live state (refreshed by both
         the Firestore listener AND the stock-checkout CustomEvent)      */
      const alertCount = stockAlerts.length;

      /* Revenue target attainment bar (against a 5 M monthly target)   */
      const REVENUE_TARGET   = 5_000_000;
      const revenueTargetPct = Math.min(100, (totalRevenue / REVENUE_TARGET) * 100);

      /* Bills target: 400 bills / month                                 */
      const BILLS_TARGET   = 400;
      const billsTargetPct = Math.min(100, (totalBills / BILLS_TARGET) * 100);

      /* ── Live Firestore bills subscription ───────────────────────── */
      useEffect(() => {
        if (!user) { setLoading(false); return; }

        const uid = user.uid || user.id || (typeof user === 'string' ? user : null);
        if (!uid) { setLoading(false); return; }

        /* Attempt Firestore real-time listener via RoajiV2Store           */
        if (window.RoajiV2Store && window.RoajiV2Store.ready()) {
          let unsubscribe;
          try {
            unsubscribe = window.RoajiV2Store.onBills(uid, (liveBills) => {
              setBills(liveBills);
              setLastUpdated(new Date());
              setLoading(false);
              setFlashRev(k => k + 1);
              setFlashProfit(k => k + 1);
              setFlashBills(k => k + 1);
            });
          } catch (err) {
            console.warn('[Roaji 14A-2] onBills subscription failed, running in offline mode:', err.message);
            setLoading(false);
          }
          return () => {
            if (typeof unsubscribe === 'function') unsubscribe();
          };
        } else {
          /* Firebase not ready — degrade gracefully                        */
          setLoading(false);
        }
      }, [user]);

      /* ── Subscribe to roaji:sync-complete — flush events ──────────── */
      useEffect(() => {
        const onSync = (e) => {
          /* Refresh flash on KPI cards when offline queue flushes          */
          setFlashRev(k => k + 1);
          setFlashProfit(k => k + 1);
          setFlashBills(k => k + 1);
          setLastUpdated(new Date());
        };
        window.addEventListener('roaji:sync-complete', onSync);
        return () => window.removeEventListener('roaji:sync-complete', onSync);
      }, []);

      /* ── Subscribe to roaji:stock-checkout — instant stock refresh ── */
      useEffect(() => {
        /* Seed initial stock alerts on mount from master inventory        */
        const seedAlerts = () => {
          const alerts = (window.RoajiMasterInventory || []).filter(item => item.qty < 10);
          setStockAlerts(alerts);
          if (alerts.length > 0) setFlashStock(k => k + 1);
        };
        seedAlerts();

        const onCheckout = (e) => {
          /* Re-compute from snapshot embedded in the event detail so the
             card reflects the post-decrement state synchronously            */
          const snapshot = (e.detail && e.detail.snapshot) || window.RoajiMasterInventory || [];
          const alerts   = snapshot.filter(item => item.qty < 10);
          setStockAlerts(alerts);
          setFlashStock(k => k + 1);
        };

        window.addEventListener('roaji:stock-checkout', onCheckout);
        return () => window.removeEventListener('roaji:stock-checkout', onCheckout);
      }, []);

      /* ── Timestamp display ───────────────────────────────────────── */
      const syncLabel = lastUpdated
        ? 'Updated ' + lastUpdated.toLocaleTimeString('en-NG', { hour:'2-digit', minute:'2-digit' })
        : 'Waiting for data…';

      /* ── Loading skeleton value ──────────────────────────────────── */
      const skelVal = loading ? '—' : null;

      /* ════════════════════════════════════════════════════════════════
         RENDER
      ════════════════════════════════════════════════════════════════ */
      return (
        <div className="roaji-analytics-wrapper panel-content-enter">

          {/* ── Dashboard Header row ── */}
          <div className="roaji-analytics-header">
            <h2 className="roaji-analytics-header-title">
              Owner Live Analytics
            </h2>
            <div className="roaji-analytics-header-meta">
              <span className="roaji-analytics-live-dot" />
              {loading ? 'Connecting to Firestore…' : syncLabel}
            </div>
          </div>

          {/* ════ PRIMARY KPI GRID — 4-column ════ */}
          <div className="roaji-analytics-grid">

            {/* ── CARD 1: TOTAL REVENUE ── */}
            <div className={`roaji-akpi-card roaji-akpi--revenue${loading ? ' roaji-akpi-loading' : ''}`}>
              <div className="roaji-akpi-top-row">
                <span className="roaji-akpi-icon">💰</span>
                <span className="roaji-akpi-label">Total Revenue</span>
              </div>
              <div
                className={`roaji-akpi-value${flashRev > 1 ? ' roaji-akpi-flash' : ''}`}
                key={`rev-${flashRev}`}
              >
                {skelVal ?? fmtNaira(totalRevenue)}
              </div>
              <div className="roaji-akpi-sub">
                {loading ? 'Loading…' : `${totalBills} bill${totalBills !== 1 ? 's' : ''} · Avg ${totalBills > 0 ? fmtNaira(totalRevenue / totalBills) : '₦0'}`}
              </div>
              <div className="roaji-akpi-progress-track">
                <div
                  className="roaji-akpi-progress-fill"
                  style={{ width: loading ? '0%' : `${revenueTargetPct.toFixed(1)}%` }}
                />
              </div>
              <div className="roaji-akpi-sub" style={{ marginTop:'0.3rem' }}>
                {loading ? '' : `${revenueTargetPct.toFixed(0)}% of ₦5M monthly target`}
              </div>
            </div>

            {/* ── CARD 2: NET PROFIT ── */}
            <div className={`roaji-akpi-card roaji-akpi--profit${loading ? ' roaji-akpi-loading' : ''}`}>
              <div className="roaji-akpi-top-row">
                <span className="roaji-akpi-icon">{loading ? '📊' : isNetPositive ? '📈' : '📉'}</span>
                <span className="roaji-akpi-label">Net Profit</span>
              </div>
              <div
                className={`roaji-akpi-value${flashProfit > 1 ? ' roaji-akpi-flash' : ''}`}
                key={`profit-${flashProfit}`}
                style={{ color: loading ? undefined : (isNetPositive ? '#60a5fa' : '#f87171') }}
              >
                {skelVal ?? fmtNaira(Math.abs(netProfit))}
              </div>
              <div className="roaji-akpi-sub">
                {loading
                  ? 'Loading…'
                  : `Net margin ${netMarginPct}% · COGS ${fmtNaira(totalWholesaleCost)}`}
              </div>
              <div className="roaji-akpi-progress-track">
                <div
                  className="roaji-akpi-progress-fill"
                  style={{
                    width: loading ? '0%' : `${Math.min(100, Math.max(0, parseFloat(netMarginPct)))}%`,
                    background: isNetPositive
                      ? 'linear-gradient(90deg,#3b82f6,#60a5fa)'
                      : 'linear-gradient(90deg,#f87171,#fca5a5)',
                  }}
                />
              </div>
              <div className="roaji-akpi-sub" style={{ marginTop:'0.3rem' }}>
                {loading ? '' : (isNetPositive ? `${netMarginPct}% margin` : '⚠️ Below breakeven')}
              </div>
            </div>

            {/* ── CARD 3: TOTAL BILLS ISSUED ── */}
            <div className={`roaji-akpi-card roaji-akpi--bills${loading ? ' roaji-akpi-loading' : ''}`}>
              <div className="roaji-akpi-top-row">
                <span className="roaji-akpi-icon">🧾</span>
                <span className="roaji-akpi-label">Total Bills Issued</span>
              </div>
              <div
                className={`roaji-akpi-value${flashBills > 1 ? ' roaji-akpi-flash' : ''}`}
                key={`bills-${flashBills}`}
              >
                {skelVal ?? totalBills.toLocaleString('en-NG')}
              </div>
              <div className="roaji-akpi-sub">
                {loading
                  ? 'Loading…'
                  : `Avg value ${totalBills > 0 ? fmtFull(totalRevenue / totalBills) : '₦0'} per bill`}
              </div>
              <div className="roaji-akpi-progress-track">
                <div
                  className="roaji-akpi-progress-fill"
                  style={{ width: loading ? '0%' : `${billsTargetPct.toFixed(1)}%` }}
                />
              </div>
              <div className="roaji-akpi-sub" style={{ marginTop:'0.3rem' }}>
                {loading ? '' : `${billsTargetPct.toFixed(0)}% of ${BILLS_TARGET}-bill monthly target`}
              </div>
            </div>

            {/* ── CARD 4: STOCK ALERTS ── */}
            <div className={`roaji-akpi-card roaji-akpi--stock${alertCount > 0 ? ' has-alerts' : ''}${loading ? ' roaji-akpi-loading' : ''}`}>
              <div className="roaji-akpi-top-row">
                <span className="roaji-akpi-icon">⚠️</span>
                <span className="roaji-akpi-label">Stock Alerts</span>
              </div>
              <div
                className={`roaji-akpi-value${flashStock > 1 ? ' roaji-akpi-flash' : ''}`}
                key={`stock-${flashStock}`}
              >
                {skelVal ?? alertCount}
              </div>
              <div className="roaji-akpi-sub">
                {loading
                  ? 'Loading inventory…'
                  : alertCount === 0
                    ? '✅ All items above 10-unit threshold'
                    : `${alertCount} SKU${alertCount !== 1 ? 's' : ''} below 10 units — reorder now`}
              </div>
              <div className="roaji-akpi-progress-track">
                <div
                  className="roaji-akpi-progress-fill"
                  style={{
                    width: loading ? '0%' : alertCount === 0 ? '100%' : `${Math.max(4, 100 - (alertCount / ((window.RoajiMasterInventory || []).length || 1)) * 100).toFixed(1)}%`,
                    background: alertCount === 0
                      ? 'linear-gradient(90deg,#34d399,#00f5a0)'
                      : alertCount >= 3
                        ? 'linear-gradient(90deg,#f87171,#fca5a5)'
                        : 'linear-gradient(90deg,#f59e0b,#fbbf24)',
                  }}
                />
              </div>
              <div className="roaji-akpi-sub" style={{ marginTop:'0.3rem' }}>
                {loading ? '' : `${(window.RoajiMasterInventory || []).length} total SKUs tracked`}
              </div>
            </div>

          </div>{/* /roaji-analytics-grid */}

          {/* ════ LOW STOCK SKU LIST (shown only when alerts exist) ════ */}
          {!loading && alertCount > 0 && (
            <div style={{
              marginTop:'1.1rem',
              background:'rgba(10,8,28,0.72)',
              border:'1px solid rgba(245,158,11,0.28)',
              borderRadius:'0.9rem',
              overflow:'hidden',
            }}>
              <div style={{
                padding:'0.75rem 1rem',
                borderBottom:'1px solid rgba(245,158,11,0.14)',
                display:'flex', alignItems:'center', justifyContent:'space-between',
              }}>
                <span style={{
                  fontSize:'0.72rem', fontWeight:800,
                  color:'var(--c-text)', letterSpacing:'0.04em',
                  textTransform:'uppercase', fontFamily:'var(--ff-mono)',
                }}>
                  ⚠️ Low Stock SKUs — Below 10 Units
                </span>
                <span style={{
                  fontSize:'0.65rem', color:'#f59e0b',
                  fontFamily:'var(--ff-mono)', fontWeight:700,
                }}>
                  {alertCount} alert{alertCount !== 1 ? 's' : ''}
                </span>
              </div>
              <div style={{ padding:'0.35rem 0' }}>
                {stockAlerts.map((item, i) => {
                  const isCritical = item.qty === 0;
                  const rowColor   = isCritical ? '#f87171' : '#fbbf24';
                  return (
                    <div key={item.sku} style={{
                      display:'flex', alignItems:'center', gap:'0.65rem',
                      padding:'0.45rem 1rem',
                      borderBottom: i < stockAlerts.length - 1
                        ? '1px solid rgba(255,255,255,0.04)' : 'none',
                      transition:'background 0.15s',
                    }}
                      onMouseOver={e => { e.currentTarget.style.background = 'rgba(245,158,11,0.06)'; }}
                      onMouseOut={e  => { e.currentTarget.style.background = 'transparent'; }}
                    >
                      {/* SKU badge */}
                      <span style={{
                        fontSize:'0.62rem', fontFamily:'var(--ff-mono)', fontWeight:700,
                        color: rowColor, flexShrink:0,
                        background: isCritical ? 'rgba(248,113,113,0.10)' : 'rgba(251,191,36,0.10)',
                        border: `1px solid ${rowColor}44`,
                        borderRadius:'0.35rem', padding:'0.15rem 0.45rem',
                        minWidth:72, textAlign:'center',
                      }}>
                        {item.sku}
                      </span>
                      {/* Name */}
                      <span style={{
                        flex:1, fontSize:'0.76rem', fontWeight:500,
                        color:'var(--c-text)', minWidth:0,
                        whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                      }}>
                        {item.name}
                      </span>
                      {/* Module badge */}
                      <span style={{
                        fontSize:'0.62rem', color:'var(--c-dim)',
                        fontFamily:'var(--ff-mono)', flexShrink:0,
                        textTransform:'uppercase', letterSpacing:'0.04em',
                      }}>
                        {item.module}
                      </span>
                      {/* Qty */}
                      <span style={{
                        fontSize:'0.82rem', fontFamily:'var(--ff-mono)', fontWeight:800,
                        color: rowColor, flexShrink:0, minWidth:36, textAlign:'right',
                        textShadow:`0 0 8px ${rowColor}66`,
                      }}>
                        {isCritical ? 'OUT' : item.qty}
                      </span>
                      {/* Unit */}
                      <span style={{
                        fontSize:'0.62rem', color:'var(--c-dim)',
                        fontFamily:'var(--ff-mono)', flexShrink:0,
                        minWidth:28,
                      }}>
                        {isCritical ? '' : item.unit}
                      </span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ════ REVENUE SUMMARY FOOTER ROW ════ */}
          {!loading && (
            <div style={{
              marginTop:'1.1rem',
              display:'flex', gap:'0.75rem', flexWrap:'wrap',
            }}>
              {/* Gross Revenue breakdown mini-card */}
              <div style={{
                flex:'1 1 220px',
                background:'rgba(10,8,28,0.72)',
                border:'1px solid rgba(0,245,160,0.16)',
                borderRadius:'0.9rem', padding:'1rem 1.1rem',
              }}>
                <div style={{ fontSize:'0.68rem', fontWeight:700, color:'var(--c-dim)', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:'0.65rem', fontFamily:'var(--ff-mono)' }}>
                  Revenue Breakdown
                </div>
                {[
                  { label:'Total Revenue',    val: totalRevenue,        color:'#00f5a0' },
                  { label:'Wholesale Cost',   val: totalWholesaleCost,  color:'#f59e0b' },
                  { label:'Net Profit',       val: netProfit,           color: isNetPositive ? '#60a5fa' : '#f87171' },
                ].map(row => (
                  <div key={row.label} style={{
                    display:'flex', justifyContent:'space-between', alignItems:'center',
                    padding:'0.3rem 0',
                    borderBottom:'1px solid rgba(255,255,255,0.04)',
                  }}>
                    <span style={{ fontSize:'0.73rem', color:'var(--c-muted)', fontWeight:500 }}>{row.label}</span>
                    <span style={{
                      fontSize:'0.78rem', fontFamily:'var(--ff-mono)',
                      fontWeight:800, color: row.color,
                      textShadow:`0 0 8px ${row.color}44`,
                    }}>
                      {fmtFull(row.val)}
                    </span>
                  </div>
                ))}
              </div>

              {/* Bills issued summary mini-card */}
              <div style={{
                flex:'1 1 220px',
                background:'rgba(10,8,28,0.72)',
                border:'1px solid rgba(124,58,237,0.16)',
                borderRadius:'0.9rem', padding:'1rem 1.1rem',
              }}>
                <div style={{ fontSize:'0.68rem', fontWeight:700, color:'var(--c-dim)', textTransform:'uppercase', letterSpacing:'0.07em', marginBottom:'0.65rem', fontFamily:'var(--ff-mono)' }}>
                  Billing Summary
                </div>
                {[
                  { label:'Bills Issued',   val: totalBills.toLocaleString('en-NG'),             color:'#a78bfa' },
                  { label:'Avg Bill Value', val: totalBills > 0 ? fmtFull(totalRevenue / totalBills) : '₦0', color:'#c4b5fd' },
                  { label:'Monthly Target', val: `${billsTargetPct.toFixed(0)}% of ${BILLS_TARGET}`, color: billsTargetPct >= 100 ? '#34d399' : '#f59e0b' },
                ].map(row => (
                  <div key={row.label} style={{
                    display:'flex', justifyContent:'space-between', alignItems:'center',
                    padding:'0.3rem 0',
                    borderBottom:'1px solid rgba(255,255,255,0.04)',

                    <span style={{ fontSize:'0.73rem', color:'var(--c-muted)', fontWeight:500 }}>{row.label}</span>
                    <span style={{
                      fontSize:'0.78rem', fontFamily:'var(--ff-mono)',
                      fontWeight:800, color: row.color,
