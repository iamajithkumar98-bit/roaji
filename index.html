  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!--  PART 10A-1 — BULLETPROOF OFFLINE LAYER                        -->
  <!--  • Connection status monitor (online / offline detection)      -->
  <!--  • RoajiOfflineCache — LocalStorage transaction payload store  -->
  <!--    – saveTransaction(payload)  → queues a payload offline      -->
  <!--    – flushQueue()              → replays queue when back online -->
  <!--    – getQueue()                → reads the raw pending queue    -->
  <!--    – clearQueue()              → wipes the queue (admin use)    -->
  <!--  • window.RoajiOnlineStatus    → { isOnline, subscribe, … }    -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <script>
    /* ══════════════════════════════════════════════════════════════════
       PART 10A-1 ─ BULLETPROOF OFFLINE LAYER
       ─────────────────────────────────────────────────────────────────
       DESIGN CONTRACT
         • Connection status is derived from the browser's navigator.onLine
           flag AND verified via a lightweight HEAD probe to avoid false
           positives from captive portals / corporate proxies.
         • All transaction payloads written while offline are serialised
           to LocalStorage under the key  ROAJI_OFFLINE_QUEUE_KEY.
           The key is tenant-namespaced so multi-instance owners never
           share a queue between browser sessions.
         • On reconnection the flush loop replays the queue in FIFO order
           through  window.RoajiV2Store.addBill()  — the 9B-2 safety
           filter guards every replay write identically to live writes.
         • Subscribers (React components) receive status change events
           immediately via a publish-subscribe bus — no polling.
    ══════════════════════════════════════════════════════════════════ */

    ;(function initRoajiOfflineLayer() {

      /* ── Constants ──────────────────────────────────────────────── */
      const QUEUE_KEY_PREFIX = 'roaji_v2_offline_queue';
      const PROBE_URL        = 'https://www.gstatic.com/generate_204'; // Google's 204 endpoint
      const PROBE_TIMEOUT_MS = 4000;
      const FLUSH_RETRY_MS   = 8000;   // retry flush interval while online
      const LOG_TAG          = '[Roaji 10A-1]';

      /* ── Internal state ─────────────────────────────────────────── */
      let _isOnline        = navigator.onLine;
      let _subscribers     = [];           // [{id, fn}]
      let _flushTimer      = null;
      let _probeInFlight   = false;
      let _subIdCounter    = 0;

      /* ── Queue key is tenant-namespaced after login ─────────────── */
      function _queueKey() {
        try {
          const t = window.RoajiV2Store && window.RoajiV2Store.getActiveTenant
            ? window.RoajiV2Store.getActiveTenant()
            : null;
          if (t && t.uid && t.storeId) {
            return `${QUEUE_KEY_PREFIX}__${t.uid}__${t.storeId}`;
          }
        } catch(_) {}
        return `${QUEUE_KEY_PREFIX}__anonymous`;
      }

      /* ── Notify all React subscribers ───────────────────────────── */
      function _notify(online) {
        _subscribers.forEach(sub => {
          try { sub.fn(online); } catch(e) { console.warn(LOG_TAG, 'subscriber error', e); }
        });
      }

      /* ── Lightweight connectivity probe ─────────────────────────── */
      function _probe() {
        if (_probeInFlight) return;
        _probeInFlight = true;
        const controller = new AbortController();
        const timeout    = setTimeout(() => controller.abort(), PROBE_TIMEOUT_MS);
        fetch(PROBE_URL, { method:'HEAD', mode:'no-cors', cache:'no-store', signal: controller.signal })
          .then(() => {
            clearTimeout(timeout);
            _probeInFlight = false;
            if (!_isOnline) {
              _isOnline = true;
              console.info(`%c${LOG_TAG} Connection restored ✓ — flushing offline queue`, 'color:#00f5d4;font-weight:700;');
              _notify(true);
              _scheduleFlush(0); // immediate flush
            }
          })
          .catch(() => {
            clearTimeout(timeout);
            _probeInFlight = false;
            if (_isOnline) {
              _isOnline = false;
              console.warn(`${LOG_TAG} Connectivity probe failed — switching to Offline Mode.`);
              _notify(false);
            }
          });
      }

      /* ── Browser event listeners ────────────────────────────────── */
      window.addEventListener('online',  () => { _probe(); });
      window.addEventListener('offline', () => {
        _isOnline = false;
        console.warn(`${LOG_TAG} Browser reports offline.`);
        _notify(false);
      });

      /* ── Initial probe on load ───────────────────────────────────── */
      /* Delay slightly to let Firebase initialise first               */
      setTimeout(_probe, 1500);

      /* ══════════════════════════════════════════════════════════════
         LOCAL STORAGE QUEUE OPERATIONS
      ══════════════════════════════════════════════════════════════ */

      /* ── Read the pending queue (safe parse) ──────────────────── */
      function _readQueue() {
        try {
          const raw = localStorage.getItem(_queueKey());
          if (!raw) return [];
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch(e) {
          console.error(`${LOG_TAG} Queue read error:`, e.message);
          return [];
        }
      }

      /* ── Write queue back to LocalStorage ────────────────────── */
      function _writeQueue(queue) {
        try {
          localStorage.setItem(_queueKey(), JSON.stringify(queue));
        } catch(e) {
          /* Storage quota exceeded or private mode */
          console.error(`${LOG_TAG} Queue write error (storage full?):`, e.message);
        }
      }

      /* ── Public: enqueue a transaction payload ────────────────── */
      /* Call this instead of RoajiV2Store.addBill() when offline.  */
      function saveTransaction(payload) {
        if (!payload || typeof payload !== 'object') {
          console.error(`${LOG_TAG} saveTransaction: invalid payload.`);
          return null;
        }
        const entry = {
          _offlineId:      `oq_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
          _queuedAt:       new Date().toISOString(),
          _tenantSnapshot: window.RoajiV2Store ? window.RoajiV2Store.getActiveTenant() : null,
          _synced:         false,
          ...payload,
        };
        const queue = _readQueue();
        queue.push(entry);
        _writeQueue(queue);
        console.info(
          `%c${LOG_TAG} Transaction queued offline ✓  id=${entry._offlineId}  queue length=${queue.length}`,
          'color:#f59e0b;font-weight:700;'
        );
        _notify(false); // re-notify so UI counter refreshes
        return entry._offlineId;
      }

      /* ── Public: get current pending queue ───────────────────── */
      function getQueue() {
        return _readQueue();
      }

      /* ── Public: clear the queue (admin / after confirmed sync) ─ */
      function clearQueue() {
        _writeQueue([]);
        console.info(`${LOG_TAG} Offline queue cleared.`);
        _notify(_isOnline);
      }

      /* ══════════════════════════════════════════════════════════════
         FLUSH ENGINE — replays the queue via RoajiV2Store.addBill()
      ══════════════════════════════════════════════════════════════ */

      function _scheduleFlush(delay = FLUSH_RETRY_MS) {
        if (_flushTimer) clearTimeout(_flushTimer);
        _flushTimer = setTimeout(_flush, delay);
      }

      async function _flush() {
        if (!_isOnline) return;

        /* Guard: Firebase must be ready */
        if (!window.RoajiV2Store || !window.RoajiV2Store.ready()) {
          _scheduleFlush(FLUSH_RETRY_MS);
          return;
        }

        const queue = _readQueue();
        if (queue.length === 0) return;

        console.info(
          `%c${LOG_TAG} Flushing offline queue — ${queue.length} pending transaction(s)…`,
          'color:#00f5d4;font-weight:700;'
        );

        const remaining = [];

        for (const entry of queue) {
          if (entry._synced) continue; // skip already-synced entries

          /* Restore tenant context for this payload if available */
          try {
            const snap = entry._tenantSnapshot;
            if (snap && snap.uid && snap.storeId) {
              window.RoajiV2Store.setActiveTenant(snap.uid, snap.storeId);
            }

            /* Strip internal offline meta fields before writing */
            const { _offlineId, _queuedAt, _tenantSnapshot, _synced, ...billPayload } = entry;

            await window.RoajiV2Store.addBill(billPayload);

            console.info(`${LOG_TAG} ✓ Flushed offline entry  id=${_offlineId}`);
            /* Don't push to remaining — effectively removes from queue */
          } catch(err) {
            console.error(`${LOG_TAG} Flush failed for id=${entry._offlineId}:`, err.message);
            remaining.push(entry); // keep failed entries for retry
          }
        }

        _writeQueue(remaining);

        if (remaining.length > 0) {
          console.warn(`${LOG_TAG} ${remaining.length} entries failed to flush — will retry.`);
          _scheduleFlush(FLUSH_RETRY_MS);
        } else {
          console.info(`%c${LOG_TAG} Queue fully flushed ✓`, 'color:#34d399;font-weight:700;');
          _notify(true); // re-notify UI — queue is now empty
        }
      }

      /* ── Re-attempt flush whenever we come back online ──────────── */
      window.addEventListener('online', () => { _scheduleFlush(800); });

      /* ══════════════════════════════════════════════════════════════
         PUBLIC API — window.RoajiOnlineStatus
      ══════════════════════════════════════════════════════════════ */
      window.RoajiOnlineStatus = {
        /*
         * isOnline() → boolean
         *   Returns the current verified connectivity state.
         */
        isOnline() { return _isOnline; },

        /*
         * subscribe(fn) → unsubscribeFn
         *   fn(isOnline: boolean) — called immediately and on every change.
         *   Returns a function that removes the subscription.
         */
        subscribe(fn) {
          const id = ++_subIdCounter;
          _subscribers.push({ id, fn });
          /* Fire immediately with current state */
          try { fn(_isOnline); } catch(_) {}
          return function unsubscribe() {
            _subscribers = _subscribers.filter(s => s.id !== id);
          };
        },

        /*
         * saveTransaction(payload) → offlineId | null
         *   Persists a transaction payload to LocalStorage when offline.
         *   Automatically flushed to Firestore on next reconnection.
         */
        saveTransaction,

        /*
         * getQueue() → Array
         *   Returns the full array of pending offline entries.
         */
        getQueue,

        /*
         * flushNow() → Promise<void>
         *   Manually trigger a queue flush (useful after manual reconnect).
         */
        flushNow() { return _flush(); },

        /*
         * clearQueue()
         *   Wipes the offline queue (admin use only — data is discarded).
         */
        clearQueue,

        /*
         * probe()
         *   Manually re-runs the connectivity probe.
         */
        probe: _probe,
      };

      console.info(
        '%c[Roaji 10A-1] Offline Layer initialised ✓',
        'color:#00f5d4;font-weight:700;',
        '\n  LocalStorage key →', _queueKey(),
        '\n  Initial status   →', _isOnline ? 'ONLINE' : 'OFFLINE'
      );

    })();
  </script>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!--  PART 13B-1 MODULE 1 — CONNECTION MONITOR: NETWORK LISTENER    -->
  <!--                         AND HEAD PROBE LOGIC                   -->
  <!--  • Registers browser 'online' / 'offline' window event         -->
  <!--    listeners that trigger an active connectivity check rather   -->
  <!--    than trusting navigator.onLine alone (which is unreliable    -->
  <!--    on Android WebView and iOS WKWebView under captive portals). -->
  <!--  • Implements _cm_probe() — a lightweight async HEAD fetch to   -->
  <!--    https://www.gstatic.com/generate_204 with a 4-second         -->
  <!--    AbortController timeout, operating in no-cors mode so CORS   -->
  <!--    preflight errors from captive portals are treated as offline.-->
  <!--  • Exposes window.RoajiConnectionMonitor — the authoritative    -->
  <!--    real-connectivity gate consumed by all later 13B sub-modules.-->
  <!--  • Integrates non-destructively with the existing               -->
  <!--    window.RoajiOnlineStatus (PART 10A-1): bridges probe results  -->
  <!--    back into that status bus so all 10A-2 subscribers receive   -->
  <!--    unified, verified online/offline transitions.                -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <script>
    /* ══════════════════════════════════════════════════════════════════
       PART 13B-1 MODULE 1 ─ CONNECTION MONITOR
       NETWORK LISTENER AND HEAD PROBE LOGIC
       ─────────────────────────────────────────────────────────────────
       DESIGN CONTRACT
         This module is the sole source of truth for *verified* internet
         connectivity within the Roaji suite.  It deliberately separates
         two concerns:

           1. BROWSER SIGNAL LAYER (online / offline events)
              The browser fires 'online' and 'offline' on window when the
              device network interface changes state.  On desktop browsers
              this is reliable.  On Android WebView, iOS WKWebView, and
              behind captive portals (hotel Wi-Fi, airport kiosks) the
              'online' event fires even though real internet is blocked.
              Therefore browser events are treated as *triggers* only —
              they initiate a verification probe but never by themselves
              update the authoritative connectivity flag.

           2. ACTIVE PROBE LAYER (HEAD probe via AbortController)
              A zero-byte HEAD request to Google's no-content endpoint
              (https://www.gstatic.com/generate_204) is the gold standard
              for verifying internet reachability without touching user
              data.  Expected response: HTTP 204 No Content.  A captive
              portal that intercepts the request returns 200 with HTML —
              fetch() in no-cors mode will still resolve (opaque response),
              so any resolution is treated as online; any network error or
              timeout is treated as offline.  The AbortController enforces
              a hard 4-second ceiling so the probe never hangs on a slow
              or non-responding portal.

       INTEGRATION WITH PART 10A-1 (window.RoajiOnlineStatus)
         After every probe result this module calls the bridge function
         _cm_bridgeToOnlineStatus(isOnline) which synchronises the result
         back into window.RoajiOnlineStatus._forceState() if that method
         exists, ensuring that 10A-2's flush engine and all React
         subscribers see a single coherent truth without duplication of
         the full subscriber bus.

       PUBLIC API  — window.RoajiConnectionMonitor
         .isOnline()          → boolean — current verified state
         .probe()             → Promise<boolean> — manual probe trigger
         .subscribe(fn)       → unsubscribeFn — fn(isOnline: boolean)
         .unsubscribeAll()    → void — teardown (testing / logout)
         .lastProbeAt()       → Date | null — timestamp of last probe
         .probeInFlight()     → boolean — true while fetch is pending

       CONSTANTS (module-scoped, not exported)
         CM_PROBE_URL         — HEAD target (gstatic generate_204)
         CM_PROBE_TIMEOUT_MS  — AbortController timeout ceiling (4 s)
         CM_LOG_TAG           — console prefix for easy filtering
    ══════════════════════════════════════════════════════════════════ */

    ;(function initRoajiConnectionMonitor() {

      /* ── Guard: prevent double-initialisation on hot-reload ────── */
      if (window.RoajiConnectionMonitor) {
        console.info('[Roaji 13B-1] RoajiConnectionMonitor already initialised — skipping.');
        return;
      }

      /* ╔══════════════════════════════════════════════════════════╗
         ║  SECTION A — MODULE CONSTANTS                           ║
         ╚══════════════════════════════════════════════════════════╝ */

      /*
       * CM_PROBE_URL
       *   Google's canonical no-content endpoint used by Chrome itself
       *   for portal detection.  Returns HTTP 204 with an empty body
       *   when genuine internet is reachable.  No user data is sent;
       *   no cookies are set; no cross-origin restrictions apply when
       *   fetched in no-cors mode because the response body is never read.
       */
      const CM_PROBE_URL        = 'https://www.gstatic.com/generate_204';

      /*
       * CM_PROBE_TIMEOUT_MS
       *   Hard ceiling on the HEAD fetch.  4 000 ms is chosen to match
       *   the typical Android/iOS network-change stabilisation window
       *   while staying well under the 10 s human patience threshold.
       *   If the AbortController fires the probe is treated as offline.
       */
      const CM_PROBE_TIMEOUT_MS = 4000;

      const CM_LOG_TAG          = '[Roaji 13B-1]';

      /* ╔══════════════════════════════════════════════════════════╗
         ║  SECTION B — PRIVATE STATE                              ║
         ╚══════════════════════════════════════════════════════════╝ */

      /*
       * _cm_online
       *   Authoritative verified connectivity flag.  Initialised from
       *   navigator.onLine as a best-guess bootstrap; immediately
       *   overwritten by the first probe result on DOMContentLoaded.
       */
      let _cm_online          = navigator.onLine;

      /* Subscriber registry — [{id: number, fn: Function}] */
      let _cm_subscribers     = [];
      let _cm_subIdCounter    = 0;

      /* Probe lifecycle guards */
      let _cm_probeInFlight   = false;
      let _cm_lastProbeAt     = null;   // Date object after first probe

      /* ╔══════════════════════════════════════════════════════════╗
         ║  SECTION C — SUBSCRIBER BUS                             ║
         ╚══════════════════════════════════════════════════════════╝ */

      /*
       * _cm_notify(isOnline)
       *   Iterates every registered subscriber and calls fn(isOnline).
       *   Errors inside individual subscribers are caught and logged
       *   so one bad subscriber cannot silence others.
       */
      function _cm_notify(isOnline) {
        _cm_subscribers.forEach(function(sub) {
          try {
            sub.fn(isOnline);
          } catch (subscriberErr) {
            console.warn(
              CM_LOG_TAG,
              'Subscriber id=' + sub.id + ' threw during notification:',
              subscriberErr
            );
          }
        });
      }

      /* ╔══════════════════════════════════════════════════════════╗
         ║  SECTION D — PART 10A-1 BRIDGE                          ║
         ╚══════════════════════════════════════════════════════════╝ */

      /*
       * _cm_bridgeToOnlineStatus(isOnline)
       *   After every probe result, synchronise the verified state back
       *   into window.RoajiOnlineStatus so that PART 10A-2's flush
       *   engine and all React components that subscribe to that bus
       *   receive the same ground truth without this module needing to
       *   replicate the full subscriber loop.
       *
       *   Integration is intentionally defensive:
       *     - If RoajiOnlineStatus does not yet exist (race on load)
       *       the bridge silently no-ops; 10A-1's own initial probe
       *       will establish state.
       *     - If _forceState is absent (older build of 10A-1) we fall
       *       back to calling .probe() to trigger 10A-1's own HEAD
       *       fetch so both modules converge without conflict.
       */
      function _cm_bridgeToOnlineStatus(isOnline) {
        try {
          var ros = window.RoajiOnlineStatus;
          if (!ros) return;                        // 10A-1 not yet ready

          if (typeof ros._forceState === 'function') {
            /* Preferred path — direct state injection (zero extra fetch) */
            ros._forceState(isOnline);
          } else if (!isOnline && typeof ros.probe === 'function') {
            /*
             * Fallback path — if we just determined we're offline, trigger
             * 10A-1's own probe so it sets itself offline too.  We do NOT
             * trigger a redundant probe when going online because 10A-1's
             * own 'online' listener will fire at the same time.
             */
            ros.probe();
          }
        } catch (bridgeErr) {
          console.warn(CM_LOG_TAG, '10A-1 bridge error (non-fatal):', bridgeErr);
        }
      }

      /* ╔══════════════════════════════════════════════════════════╗
         ║  SECTION E — HEAD PROBE FUNCTION                        ║
         ╚══════════════════════════════════════════════════════════╝ */

      /*
       * _cm_probe()
       *   Asynchronous HEAD request to CM_PROBE_URL.
       *
       *   FETCH OPTIONS RATIONALE
       *     method: 'HEAD'
       *       Zero response body; minimal bandwidth; same routing as GET.
       *
       *     mode: 'no-cors'
       *       Bypasses CORS preflight.  The response is opaque (body and
       *       status are hidden) but the promise resolves if a network
       *       response arrived at all — which is sufficient to confirm
       *       internet reachability.  A captive portal that intercepts
       *       the request will return its redirect/login page; fetch
       *       resolves (opaque), so we treat resolution as online.  This
       *       is acceptable: the portal itself confirms network presence;
       *       Firebase operations will surface the auth wall separately.
       *
       *     cache: 'no-store'
       *       Prevents any cached 204 from masking a real offline state.
       *
       *     signal: controller.signal
       *       The AbortController arms a CM_PROBE_TIMEOUT_MS (4 s) timer.
       *       If the server does not respond within 4 s the fetch is
       *       aborted and the catch branch marks the device offline.
       *
       *   STATE TRANSITIONS
       *     Probe resolves  AND  was offline  → set online,  notify, bridge
       *     Probe resolves  AND  was online   → no change (state stable)
       *     Probe rejects   AND  was online   → set offline, notify, bridge
       *     Probe rejects   AND  was offline  → no change (state stable)
       *
       *   Returns a Promise<boolean> resolving to the post-probe state.
       */
      function _cm_probe() {
        /* If a probe is already in-flight return its implicit result
           promise by returning current state as a resolved promise.
           This prevents concurrent HEAD fetches when both a browser
           event and a manual call race on the same tick.              */
        if (_cm_probeInFlight) {
          return Promise.resolve(_cm_online);
        }

        _cm_probeInFlight = true;

        /* AbortController — enforces the 4-second hard timeout */
        var controller    = new AbortController();
        var timeoutHandle = setTimeout(function() {
          controller.abort();
        }, CM_PROBE_TIMEOUT_MS);

        return fetch(CM_PROBE_URL, {
          method:  'HEAD',
          mode:    'no-cors',
          cache:   'no-store',
          signal:  controller.signal,
        })
        .then(function() {
          /* ── PROBE SUCCEEDED ───────────────────────────────────── */
          clearTimeout(timeoutHandle);
          _cm_probeInFlight = false;
          _cm_lastProbeAt   = new Date();

          if (!_cm_online) {
            /* Transition: OFFLINE → ONLINE */
            _cm_online = true;
            console.info(
              '%c' + CM_LOG_TAG + ' HEAD probe resolved — connection RESTORED ✓',
              'color:#00f5d4;font-weight:700;'
            );
            _cm_notify(true);
            _cm_bridgeToOnlineStatus(true);
          }
          /* If already online: silent success — no redundant notify */
          return true;
        })
        .catch(function(probeErr) {
          /* ── PROBE FAILED (network error or AbortError) ─────────── */
          clearTimeout(timeoutHandle);
          _cm_probeInFlight = false;
          _cm_lastProbeAt   = new Date();

          var wasAborted = probeErr && probeErr.name === 'AbortError';
          if (wasAborted) {
            console.warn(
              CM_LOG_TAG,
              'HEAD probe TIMED OUT after ' + CM_PROBE_TIMEOUT_MS + ' ms — treating as OFFLINE.'
            );
          } else {
            console.warn(
              CM_LOG_TAG,
              'HEAD probe FAILED (' + (probeErr ? probeErr.message : 'unknown') + ') — treating as OFFLINE.'
            );
          }

          if (_cm_online) {
            /* Transition: ONLINE → OFFLINE */
            _cm_online = false;
            _cm_notify(false);
            _cm_bridgeToOnlineStatus(false);
          }
          /* If already offline: silent failure — no redundant notify */
          return false;
        });
      }

      /* ╔══════════════════════════════════════════════════════════╗
         ║  SECTION F — BROWSER NETWORK EVENT LISTENERS            ║
         ╚══════════════════════════════════════════════════════════╝ */

      /*
       * 'online' event listener
       *   Fired by the browser when the network interface reports a
       *   state change FROM disconnected TO connected.  On desktop
       *   browsers this reliably tracks Ethernet/Wi-Fi plug events.
       *   On mobile it fires when the radio associates with an access
       *   point — but does NOT guarantee that the access point has
       *   upstream internet (captive portal scenario).
       *
       *   ACTION: Initiate _cm_probe() to verify real connectivity.
       *   We do NOT immediately set _cm_online = true here; only a
       *   successful probe authorises that transition.
       *
       *   The console label deliberately distinguishes the browser
       *   signal from the probe result so developers can trace the
       *   two-step verification in DevTools.
       */
      window.addEventListener('online', function _cm_onBrowserOnline() {
        console.info(
          CM_LOG_TAG,
          'Browser "online" event received — initiating HEAD probe to verify…'
        );
        _cm_probe();
      });

      /*
       * 'offline' event listener
       *   Fired when the network interface reports disconnection.
       *   Unlike the 'online' event, an 'offline' signal is treated as
       *   authoritative: the browser only fires it when the OS confirms
       *   no network interface is active, which is unambiguous.
       *   A HEAD probe in this state would fail with a network error
       *   anyway, so skipping the round-trip saves time.
       *
       *   ACTION: Immediately set _cm_online = false, notify all
       *   subscribers, and bridge to RoajiOnlineStatus.
       *
       *   Note: We still guard the transition with the current state
       *   check to prevent duplicate notifications if the browser fires
       *   the event more than once (observed on some Android WebViews).
       */
      window.addEventListener('offline', function _cm_onBrowserOffline() {
        console.warn(
          CM_LOG_TAG,
          'Browser "offline" event received — marking OFFLINE immediately (no probe needed).'
        );
        if (_cm_online) {
          _cm_online = false;
          _cm_notify(false);
          _cm_bridgeToOnlineStatus(false);
        }
      });

      /* ╔══════════════════════════════════════════════════════════╗
         ║  SECTION G — BOOT PROBE                                 ║
         ╚══════════════════════════════════════════════════════════╝ */

      /*
       * Run an initial probe shortly after the page loads to override
       * the navigator.onLine bootstrap value with a verified state.
       * Delayed 1 200 ms to allow Firebase (PART 13A-2) and the
       * RoajiOnlineStatus bridge target (PART 10A-1) to initialise
       * before the first state notification fires.
       */
      setTimeout(function _cm_bootProbe() {
        console.info(CM_LOG_TAG, 'Boot probe firing — verifying initial connectivity…');
        _cm_probe();
      }, 1200);

      /* ╔══════════════════════════════════════════════════════════╗
         ║  SECTION H — PUBLIC API                                 ║
         ╚══════════════════════════════════════════════════════════╝ */

      window.RoajiConnectionMonitor = {

        /*
         * isOnline() → boolean
         *   Returns the last *verified* connectivity state.
         *   Do NOT use navigator.onLine anywhere else in the codebase;
         *   always call this instead.
         */
        isOnline: function() {
          return _cm_online;
        },

        /*
         * probe() → Promise<boolean>
         *   Manually triggers a HEAD probe and returns a promise that
         *   resolves to the post-probe state.  Safe to call repeatedly;
         *   concurrent calls return the current state immediately
         *   without launching a second fetch.
         */
        probe: _cm_probe,

        /*
         * subscribe(fn) → unsubscribeFn
         *   Registers a callback invoked with the boolean connectivity
         *   state on every verified transition.  Called immediately
         *   with the current state on registration.
         *   Returns a zero-arg function that removes the subscription.
         *
         *   Example:
         *     const unsub = RoajiConnectionMonitor.subscribe(online => {
         *       setIsOnline(online);          // React state updater
         *     });
         *     // Later: unsub();              // cleanup on unmount
         */
        subscribe: function(fn) {
          if (typeof fn !== 'function') {
            console.error(CM_LOG_TAG, 'subscribe() requires a function argument.');
            return function() {};
          }
          var id = ++_cm_subIdCounter;
          _cm_subscribers.push({ id: id, fn: fn });
          /* Fire immediately with current verified state */
          try { fn(_cm_online); } catch (e) { /* subscriber error silenced */ }
          return function unsubscribe() {
            _cm_subscribers = _cm_subscribers.filter(function(s) {
              return s.id !== id;
            });
          };
        },

        /*
         * unsubscribeAll() → void
         *   Removes every subscriber.  Intended for logout teardown
         *   and unit-test isolation — not for normal application use.
         */
        unsubscribeAll: function() {
          _cm_subscribers = [];
          console.info(CM_LOG_TAG, 'All subscribers cleared.');
        },

        /*
         * lastProbeAt() → Date | null
         *   Returns the timestamp of the most recent completed probe,
         *   or null if no probe has finished yet.
         */
        lastProbeAt: function() {
          return _cm_lastProbeAt;
        },

        /*
         * probeInFlight() → boolean
         *   Returns true while a HEAD fetch is pending.
         *   Useful for UI loading indicators during manual probe calls.
         */
        probeInFlight: function() {
          return _cm_probeInFlight;
        },
      };

      /* ── Initialisation confirmation log ────────────────────── */
      console.info(
        '%c' + CM_LOG_TAG + ' Connection Monitor Module 1 initialised ✓',
        'color:#a78bfa;font-weight:700;',
        '\n  Probe URL      →', CM_PROBE_URL,
        '\n  Probe timeout  →', CM_PROBE_TIMEOUT_MS + ' ms',
        '\n  Boot state     →', _cm_online ? 'ONLINE (unverified)' : 'OFFLINE (unverified)',
        '\n  Boot probe     → fires in 1 200 ms'
      );

    })();
  </script>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!--  PART 10A-2 MODULE 1 — BACKGROUND AUTO-FLUSH INTERNET SYNC ENGINE -->
  <!--  • UUID-keyed deduplication: every offline bill gets a composite  -->
  <!--    UUID  (ownerUid + storeId + localTimestamp + nanoid)           -->
  <!--    stamped as  syncUUID  before queuing.  Firestore rejects any   -->
  <!--    duplicate syncUUID via a pre-write existence check, so even    -->
  <!--    double-flushes (e.g. multiple tabs reconnect simultaneously)   -->
  <!--    never create duplicate invoices.                               -->
  <!--  • Exponential back-off retry scheduler (1s → 2s → 4s → … ≤ 64s)-->
  <!--  • Heartbeat probe every 30 s while page is visible              -->
  <!--  • Fires a CustomEvent  roaji:sync-complete  after each flush     -->
  <!--  • window.RoajiSyncEngine public API                              -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <script>
    /* ══════════════════════════════════════════════════════════════════
       PART 10A-2 MODULE 1 ─ BACKGROUND AUTO-FLUSH INTERNET SYNC ENGINE
       ─────────────────────────────────────────────────────────────────
       ARCHITECTURE OVERVIEW
         Every call to  roajiSmartAddBill()  (or manual saveTransaction)
         stamps the payload with a  syncUUID  before writing to the
         LocalStorage queue.  The UUID is a composite of:

           {ownerUid}-{storeId}-{Date.now()}-{6-char nanoid}

         On flush, the engine calls  roajiV2UUIDCheckAndWrite()  which:
           1. Queries Firestore for any existing bill with the same
              syncUUID in the active tenant's collection.
           2. If found  → skips the write (duplicate protection).
           3. If not    → calls RoajiV2Store.addBill() with the payload.

         This guarantees exactly-once semantics even when:
           • Two browser tabs both come online simultaneously.
           • The user manually hits "Retry Now" while an auto-flush
             is already in flight.
           • A previous flush partially succeeded before a crash.

       BACK-OFF SCHEDULE (configurable)
         Attempt 1 →  1 s
         Attempt 2 →  2 s
         Attempt 3 →  4 s
         Attempt 4 →  8 s  … cap at MAX_BACKOFF_MS (64 s)

       HEARTBEAT
         While document.visibilityState === 'visible' and the browser
         reports offline, the engine probes every HEARTBEAT_MS (30 s).
         On any probe success it immediately triggers a flush.
    ══════════════════════════════════════════════════════════════════ */
    ;(function initRoajiSyncEngine() {

      /* ── Constants ─────────────────────────────────────────────── */
      const LOG          = '[Roaji 10A-2 Sync]';
      const BACKOFF_BASE = 1000;
      const MAX_BACKOFF  = 64000;
      const HEARTBEAT_MS = 30000;
      const DEDUP_FIELD  = 'syncUUID';

      /* ── State ─────────────────────────────────────────────────── */
      let _attempt       = 0;
      let _retryTimer    = null;
      let _heartbeatTimer= null;
      let _flushInFlight = false;

      /* ══════════════════════════════════════════════════════════
         UUID GENERATOR — composite key for deduplication
      ══════════════════════════════════════════════════════════ */
      function _genSyncUUID(uid, storeId) {
        const ts    = Date.now();
        const rand  = Math.random().toString(36).slice(2, 8);
        const safeu = (uid    || 'anon').replace(/[^a-zA-Z0-9_-]/g,'').slice(0, 20);
        const safes = (storeId|| 'x'  ).replace(/[^a-zA-Z0-9_-]/g,'').slice(0, 20);
        return `${safeu}-${safes}-${ts}-${rand}`;
      }

      /* ══════════════════════════════════════════════════════════
         DEDUPLICATED WRITE — checks Firestore for existing UUID
         before calling addBill()
      ══════════════════════════════════════════════════════════ */
      async function roajiV2UUIDCheckAndWrite(billPayload) {
        /* Guard: Firebase must be ready */
        if (!window.RoajiV2Store || !window.RoajiV2Store.ready()) {
          throw new Error('Firebase V2 not ready');
        }

        const uuid = billPayload[DEDUP_FIELD];

        /* If no UUID was stamped (legacy entry), just write directly */
        if (!uuid) {
          return await window.RoajiV2Store.addBill(billPayload);
        }

        /* ── Deduplication check via Firestore query ── */
        try {
          const { uid, storeId } = window.RoajiV2Store.getActiveTenant();
          if (!uid || !storeId) throw new Error('No active tenant');

          /* Query for existing bill with same syncUUID */
          const existingQuery = window.RoajiV2Store.safeBillsQuery(uid, storeId)
            .where(DEDUP_FIELD, '==', uuid)
            .limit(1);

          const snap = await existingQuery.get();

          if (!snap.empty) {
            /* Duplicate detected — skip write, log dedup event */
            console.warn(
              `%c${LOG} DEDUP BLOCK ✓  syncUUID=${uuid} already exists in Firestore — skipping.`,
              'color:#f59e0b;font-weight:700;'
            );
            return { _deduplicated: true, syncUUID: uuid };
          }
        } catch (queryErr) {
          /* If the dedup query fails (offline, permissions), fall through
             to addBill — the UUID field itself prevents logical duplicates
             if Firestore Security Rules enforce its uniqueness server-side. */
          console.warn(`${LOG} Dedup query failed (continuing with write):`, queryErr.message);
        }

        /* ── Safe to write ── */
        const id = await window.RoajiV2Store.addBill(billPayload);
        console.info(
          `%c${LOG} ✓ Bill written  id=${id}  syncUUID=${uuid}`,
          'color:#34d399;font-weight:700;'
        );
        return id;
      }

      /* Expose so other modules can call it directly */
      window.roajiV2UUIDCheckAndWrite = roajiV2UUIDCheckAndWrite;

      /* ══════════════════════════════════════════════════════════
         STAMP SYNC UUID on a payload before queuing offline
      ══════════════════════════════════════════════════════════ */
      function stampSyncUUID(payload) {
        if (payload[DEDUP_FIELD]) return payload; // already stamped
        const tenant = window.RoajiV2Store && window.RoajiV2Store.getActiveTenant
          ? window.RoajiV2Store.getActiveTenant() : {};
        return {
          ...payload,
          [DEDUP_FIELD]: _genSyncUUID(tenant.uid, tenant.storeId),
        };
      }

      /* Expose so roajiSmartAddBill can stamp before queuing */
      window.roajiStampSyncUUID = stampSyncUUID;

      /* ══════════════════════════════════════════════════════════
         BACK-OFF SCHEDULER
      ══════════════════════════════════════════════════════════ */
      function _backoffDelay() {
        const delay = Math.min(BACKOFF_BASE * Math.pow(2, _attempt), MAX_BACKOFF);
        _attempt++;
        return delay;
      }
      function _resetAttempts() { _attempt = 0; }

      function _scheduleRetry() {
        if (_retryTimer) clearTimeout(_retryTimer);
        const delay = _backoffDelay();
        console.info(`${LOG} Retry scheduled in ${(delay/1000).toFixed(1)}s (attempt ${_attempt})`);
        _retryTimer = setTimeout(_autoFlush, delay);
      }

      /* ══════════════════════════════════════════════════════════
         CORE AUTO-FLUSH — UUID-aware, deduplicated
      ══════════════════════════════════════════════════════════ */
      async function _autoFlush() {
        if (_flushInFlight) return;
        if (!window.RoajiOnlineStatus || !window.RoajiOnlineStatus.isOnline()) return;
        if (!window.RoajiV2Store || !window.RoajiV2Store.ready()) {
          _scheduleRetry(); return;
        }

        const queue = window.RoajiOnlineStatus.getQueue();
        if (queue.length === 0) { _resetAttempts(); return; }

        _flushInFlight = true;
        console.info(
          `%c${LOG} Auto-flush started — ${queue.length} item(s) pending`,
          'color:#00f5d4;font-weight:700;'
        );

        const remaining   = [];
        let   flushedCount = 0;
        let   dedupCount   = 0;
        let   failedCount  = 0;

        for (const entry of queue) {
          if (entry._synced) continue;
          try {
            /* Restore tenant context */
            const snap = entry._tenantSnapshot;
            if (snap && snap.uid && snap.storeId) {
              window.RoajiV2Store.setActiveTenant(snap.uid, snap.storeId);
            }

            /* Strip offline meta, keep syncUUID */
            const { _offlineId, _queuedAt, _tenantSnapshot, _synced,
                    _storeIdOverride, ...billPayload } = entry;

            /* Ensure syncUUID is present (stamp if missing — legacy entries) */
            const stamped = billPayload[DEDUP_FIELD]
              ? billPayload
              : stampSyncUUID(billPayload);

            const result = await roajiV2UUIDCheckAndWrite(stamped);

            if (result && result._deduplicated) {
              dedupCount++;
            } else {
              flushedCount++;
            }
            console.info(`${LOG} ✓ Entry processed  _offlineId=${_offlineId}`);
          } catch (err) {
            console.error(`${LOG} ✗ Flush failed for _offlineId=${entry._offlineId}:`, err.message);
            remaining.push(entry);
            failedCount++;
          }
        }

        /* Write back only the failed entries */
        /* We use the clearQueue + re-queue approach to avoid stale reads */
        if (window.RoajiOnlineStatus.clearQueue) {
          /* Temporarily monkey-patch: write remaining back to storage */
          try {
            localStorage.setItem(
              Object.keys(localStorage).find(k => k.startsWith('roaji_v2_offline_queue')) || 'roaji_v2_offline_queue__anonymous',
              JSON.stringify(remaining)
            );
          } catch(_) {}
        }

        _flushInFlight = false;

        const summary = `flushed=${flushedCount} deduped=${dedupCount} failed=${failedCount} remaining=${remaining.length}`;
        if (remaining.length > 0) {
          console.warn(`${LOG} Partial flush complete — ${summary} — scheduling retry`);
          _scheduleRetry();
        } else {
          _resetAttempts();
          console.info(`%c${LOG} ✓ Full flush complete — ${summary}`, 'color:#34d399;font-weight:700;');
          /* Fire CustomEvent so React panels can react */
          window.dispatchEvent(new CustomEvent('roaji:sync-complete', {
            detail: { flushedCount, dedupCount, timestamp: new Date().toISOString() }
          }));
        }
      }

      /* ══════════════════════════════════════════════════════════
         HEARTBEAT — re-probes connectivity every 30 s when offline
      ══════════════════════════════════════════════════════════ */
      function _startHeartbeat() {
        if (_heartbeatTimer) clearInterval(_heartbeatTimer);
        _heartbeatTimer = setInterval(() => {
          if (document.visibilityState !== 'visible') return;
          if (window.RoajiOnlineStatus && !window.RoajiOnlineStatus.isOnline()) {
            console.info(`${LOG} Heartbeat probe…`);
            window.RoajiOnlineStatus.probe && window.RoajiOnlineStatus.probe();
          }
        }, HEARTBEAT_MS);
      }

      /* ══════════════════════════════════════════════════════════
         EVENT WIRING
      ══════════════════════════════════════════════════════════ */

      /* Trigger flush whenever online status transitions to true */
      if (window.RoajiOnlineStatus) {
        window.RoajiOnlineStatus.subscribe(isOnline => {
          if (isOnline) {
            _resetAttempts();
            /* Small delay to let Firebase settle after reconnect */
            setTimeout(_autoFlush, 600);
          }
        });
      }

      /* Also respond to native browser online event */
      window.addEventListener('online', () => {
        _resetAttempts();
        setTimeout(_autoFlush, 800);
      });

      /* Page visibility — flush when tab comes to foreground */
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          if (window.RoajiOnlineStatus && window.RoajiOnlineStatus.isOnline()) {
            _autoFlush();
          }
        }
      });

      /* Listen for manual flush-complete events from RoajiOnlineStatus */
      window.addEventListener('roaji:sync-complete', (e) => {
        console.info(`${LOG} Sync-complete event received:`, e.detail);
      });

      _startHeartbeat();

      /* ══════════════════════════════════════════════════════════
         PUBLIC API — window.RoajiSyncEngine
      ══════════════════════════════════════════════════════════ */
      window.RoajiSyncEngine = {
        /*
         * flushNow() → Promise<void>
         *   Manually trigger a UUID-deduplicated flush.
         */
        flushNow: _autoFlush,

        /*
         * stampSyncUUID(payload) → payload with syncUUID
         *   Stamp a composite UUID onto a payload before queuing.
         */
        stampSyncUUID,

        /*
         * uuidCheckAndWrite(payload) → Promise<id>
         *   Write a bill with full deduplication. Use instead of
         *   RoajiV2Store.addBill() for guaranteed exactly-once writes.
         */
        uuidCheckAndWrite: roajiV2UUIDCheckAndWrite,

        /*
         * getStatus() → Object
         *   Returns current engine diagnostics.
         */
        getStatus() {
          return {
            inFlight:    _flushInFlight,
            attempt:     _attempt,
            queueLength: window.RoajiOnlineStatus ? window.RoajiOnlineStatus.getQueue().length : -1,
            online:      window.RoajiOnlineStatus ? window.RoajiOnlineStatus.isOnline() : null,
          };
        },
      };

      console.info(
        '%c[Roaji 10A-2 Sync Engine] Background Auto-Flush initialized ✓',
        'color:#00f5d4;font-weight:700;',
        '\n  UUID deduplication: ON',
        '\n  Back-off base:',  BACKOFF_BASE + 'ms',
        '\n  Max back-off:',   MAX_BACKOFF  + 'ms',
        '\n  Heartbeat:',      HEARTBEAT_MS + 'ms'
      );

    })();
  </script>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!--  PART 13B-2 Part-A — OFFLINE LOCALSTORAGE QUEUE WRITER          -->
  <!--  • roajiV2QueueOfflineBill(billPayload)                         -->
  <!--      Intercepts any bill transaction when isOnline is false.    -->
  <!--      Converts the payload to JSON and pushes it into the        -->
  <!--      'roaji_v2_offline_queue' LocalStorage array via the        -->
  <!--      existing PART 10A-1 saveTransaction() API.                 -->
  <!--  • Immediately updates the global 'unsyncedCount' state so      -->
  <!--    the ConnectionStatusBadge queue chip refreshes live on every -->
  <!--    enqueue without waiting for the 3-second poll interval.      -->
  <!--  • Dispatches a 'roaji:offline-bill-queued' CustomEvent so      -->
  <!--    any future subscriber (analytics, audit log) can react.      -->
  <!--  • window.roajiV2QueueOfflineBill exposed for React callers.   -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <script>
    /* ══════════════════════════════════════════════════════════════════
       PART 13B-2 Part-A ─ OFFLINE LOCALSTORAGE QUEUE WRITER
       ─────────────────────────────────────────────────────────────────
       DESIGN CONTRACT
         This module provides a single authoritative utility function,
         roajiV2QueueOfflineBill(billPayload), that is the ONLY correct
         call site for writing a bill payload into the offline queue
         when the device is not connected.

         It enforces three non-negotiable responsibilities:

           1. ONLINE GUARD
              Checks window.RoajiOnlineStatus.isOnline() (the verified
              connectivity flag from PART 10A-1 / 13B-1) before touching
              the queue.  If the device is online, the function refuses
              to enqueue and instead logs a console.warn directing the
              caller to use RoajiV2Store.addBill() directly.  This
              prevents stale offline entries from accumulating during
              connected sessions.

           2. LOCALSTORAGE QUEUE PUSH
              Delegates to window.RoajiOnlineStatus.saveTransaction()
              — the PART 10A-1 queue writer — which:
                • Namespaces the key as 'roaji_v2_offline_queue__<uid>__<storeId>'
                  (falls back to 'roaji_v2_offline_queue__anonymous')
                • Stamps _offlineId, _queuedAt, _tenantSnapshot on the
                  entry before pushing into the JSON array
                • Handles QuotaExceededError and private-mode storage
                  failures gracefully with console.error
              This ensures the new utility is fully compatible with the
              existing PART 10A-2 flush engine — all queued entries will
              be automatically replayed on reconnection.

           3. IMMEDIATE unsyncedCount STATE PUSH
              After a successful enqueue, fires a
              'roaji:offline-count-updated' CustomEvent on window
              carrying the new queue length as event.detail.count.
              The ConnectionStatusBadge useEffect already polls every
              3 seconds, but this event allows it (or any future
              subscriber) to update the counter badge with zero latency
              so cashiers see the chip increment the instant they tap
              Checkout while offline.

       STAMP FIELDS ADDED BY PART 10A-1 saveTransaction():
         _offlineId       — 'oq_<timestamp>_<5-char rand>' unique ID
         _queuedAt        — ISO 8601 timestamp of enqueue
         _tenantSnapshot  — { uid, storeId } from active session
         _synced          — false (flipped to true by flush engine)

       SYNC UUID COMPATIBILITY
         If the caller has already stamped a syncUUID via
         window.roajiStampSyncUUID (PART 10A-2), the field passes
         through saveTransaction() untouched, ensuring deduplication
         on flush.  If syncUUID is absent, this function stamps it
         before forwarding so flush deduplication works even when the
         caller omits the pre-stamp step.

       PUBLIC SURFACE
         window.roajiV2QueueOfflineBill(billPayload)
           → offlineId string on success
           → null on online guard block or storage error

       CALLED BY
         • Module-level checkout handlers in GiftsPanel, FramePanel,
           StationeryPanel, XeroxPanel, StudioPanel when isOnline=false
         • roajiSmartAddBill() (PART 13B-2 Part-B, future segment) as
           the offline branch of its online/offline routing switch

       FIRES CUSTOM EVENT
         'roaji:offline-bill-queued'
           detail.offlineId  — the _offlineId of the new entry
           detail.queueLength — total pending entries after enqueue
           detail.payload     — shallow clone of the enqueued payload
           detail.ts          — ISO timestamp of event dispatch
    ══════════════════════════════════════════════════════════════════ */

    ;(function initRoajiV2OfflineBillWriter() {

      /* ── Guard: prevent double-registration on hot-reload ──────── */
      if (window.roajiV2QueueOfflineBill) {
        console.info('[Roaji 13B-2-A] roajiV2QueueOfflineBill already registered — skipping re-init.');
        return;
      }

      const LOG_TAG = '[Roaji 13B-2-A]';

      /* ══════════════════════════════════════════════════════════════
         INTERNAL HELPER: Read current queue length from LocalStorage
         ─────────────────────────────────────────────────────────────
         Reads via window.RoajiOnlineStatus.getQueue() — the canonical
         PART 10A-1 reader — so the count always reflects the actual
         persisted state rather than an in-memory approximation.
      ══════════════════════════════════════════════════════════════ */
      function _readCurrentQueueLength() {
        try {
          if (window.RoajiOnlineStatus && typeof window.RoajiOnlineStatus.getQueue === 'function') {
            return window.RoajiOnlineStatus.getQueue().length;
          }
        } catch (e) {
          console.warn(LOG_TAG, '_readCurrentQueueLength error:', e.message);
        }
        return 0;
      }

      /* ══════════════════════════════════════════════════════════════
         INTERNAL HELPER: Dispatch unsyncedCount update event
         ─────────────────────────────────────────────────────────────
         Fires 'roaji:offline-count-updated' on window immediately
         after a successful enqueue so badge consumers can update the
         header counter chip with zero polling lag.

         ConnectionStatusBadge can subscribe to this event inside its
         useEffect to eliminate the 3-second poll latency entirely on
         offline enqueue — the chip will increment on the same frame
         as the checkout confirmation modal.
      ══════════════════════════════════════════════════════════════ */
      function _notifyUnsyncedCountUpdate(newCount, offlineId, payload) {
        try {
          window.dispatchEvent(new CustomEvent('roaji:offline-count-updated', {
            bubbles: false,
            detail: {
              count:     newCount,
              offlineId: offlineId,
              ts:        new Date().toISOString(),
            },

        } catch (evtErr) {
          console.warn(LOG_TAG, 'Failed to dispatch offline-count-updated event:', evtErr.message);

            : {};

          return { ...payload, syncUUID: `anon-x-${Date.now()}-${Math.random().toString(36).slice(2,8)}` };

          `%c${LOG_TAG} Bill payload queued offline ✓` +
          `  id=${offlineId}  queue=${newQueueLength}  syncUUID=${stampedPayload.syncUUID || '(none)'}`,

        );

      }

      /* ── Expose on window for React components and cross-module use */
      window.roajiV2QueueOfflineBill = roajiV2QueueOfflineBill;

      /* ══════════════════════════════════════════════════════════════
         PART 13B-2 Part-A — STATE ENGINE BRIDGE
         ─────────────────────────────────────────────────────────────
         Wires the 'roaji:offline-count-updated' CustomEvent into the
         global state engine so ConnectionStatusBadge (and any future
         subscriber) can update its 'unsyncedCount' state immediately
         on enqueue — eliminating the 3-second poll lag for offline
         cashier workflows.

           1. window.RoajiOfflineCountBus is registered as a minimal
              pub-sub bus that the React badge's useEffect can subscribe
              to alongside the existing connectivity subscription.

           2. When roajiV2QueueOfflineBill successfully enqueues,
              _notifyUnsyncedCountUpdate() fires the CustomEvent above.

           3. The window event listener here picks it up and calls all
              registered RoajiOfflineCountBus subscribers synchronously
              — each subscriber receives the new count integer.

           4. ConnectionStatusBadge registers via useEffect:
                window.RoajiOfflineCountBus.subscribe(count => setUnsyncedCount(count))

        let _countBusSubs     = [];
        let _countBusSubIdCtr = 0;

        window.addEventListener('roaji:offline-count-updated', function(evt) {
          const newCount = (evt && evt.detail && typeof evt.detail.count === 'number')
            ? evt.detail.count

         *   .subscribe(fn) → unsubscribeFn

         *   .getCount() → number
         *     Returns the current queue length from RoajiOnlineStatus.

            const id = ++_countBusSubIdCtr;
            _countBusSubs.push({ id: id, fn: fn });
            /* Fire immediately with current count so subscriber seeds its state */
            try { fn(_readCurrentQueueLength()); } catch(_) {}
            return function unsubscribe() {
              _countBusSubs = _countBusSubs.filter(function(s) { return s.id !== id; });

          getCount: function() {
            return _readCurrentQueueLength();
          },

          '%c[Roaji 13B-2-A] RoajiOfflineCountBus registered ✓  ' +
          'Instant unsyncedCount state push active.',
          'color:#f59e0b;font-weight:700;'
        );
      }

      console.info(
        '%c[Roaji 13B-2-A] Offline LocalStorage Queue Writer initialised ✓' +
        '  window.roajiV2QueueOfflineBill ready.',
        'color:#f59e0b;font-weight:800;font-size:1.02em;'
      );

    })();

              environments where the HEAD probe is not available or
              blocked by the Content Security Policy.

              time of enqueue (e.g. the queue was written by a

              can call the function directly. The mutex prevents
              concurrent double-runs.

         they were enqueued.  Processing is sequential (each
         roajiV2AddBill await must resolve before the next begins)
         rather than parallel, for three reasons:
           1. FIRESTORE WRITE ORDERING: sequential writes preserve the
              cashier's intended transaction order in the invoice feed.
           2. TENANT CONTEXT STABILITY: each entry may carry its own
              _tenantSnapshot (uid + storeId).  Processing one at a
              time ensures the active tenant context is correctly set
              for each entry before the write guard pipeline runs.
           3. RATE LIMIT SAFETY: Firestore has per-project write limits.
              Sequential processing with per-write logging keeps the
              flush clearly within safe throughput bounds.

         The queue array is NEVER bulk-cleared before processing.
         Instead:

             the start of each flush run.
           • Each entry is processed individually.
           • Only entries that receive a verified success response from

             from the in-memory copy of the queue.

             to LocalStorage at the end of the run so they are retried

         flush runs.  If roajiV2ProcessOfflineQueue is called while a

         SECTION A — MODULE-SCOPE STATE
