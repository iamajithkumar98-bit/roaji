       *   offline meta fields should reach Firestore.
       *
       *   Fields stripped:
       *     _offlineId       — local queue identity, not a Firestore field
       *     _queuedAt        — offline timestamp, superseded by createdAt server stamp
       *     _tenantSnapshot  — consumed by _rpoq_restoreTenantContext
       *     _synced          — local flag, meaningless in Firestore
       *     _storeIdOverride — consumed by context restoration
       *
       *   Fields PRESERVED (intentionally):
       *     syncUUID         — required for PART 10A-2 deduplication check
       *
       * @param {Object} entry — raw queue entry from LocalStorage.
       * @returns {Object} — clean bill payload ready for Firestore write.
       */
      function _rpoq_stripOfflineMeta(entry) {
        const {
          _offlineId,
          _queuedAt,
          _tenantSnapshot,
          _synced,
          _storeIdOverride,
          ...billPayload
        } = entry;
        return billPayload;
      }

      /* ══════════════════════════════════════════════════════════════
         SECTION C — PRIMARY EXPORT: roajiV2ProcessOfflineQueue()
      ══════════════════════════════════════════════════════════════ */

      /**
       * roajiV2ProcessOfflineQueue
       * ─────────────────────────────────────────────────────────────────
       * BACKGROUND AUTO-SYNC ENGINE LOOP — PART 13B-2 Part-B
       *
       * Asynchronous background worker that reads the local
       * 'roaji_v2_offline_queue' from localStorage, sequentially fires
       * individual roajiV2AddBill network requests for each item, and
       * safely splices / clears the queue ONLY upon verified success
       * responses to prevent data loss.
       *
       * SAFE TO CALL FROM:
       *   • Any connectivity-change event handler
       *   • Any React useEffect on isOnline transitions
       *   • The browser DevTools console for manual debugging
       *   • Automated test harnesses
       *
       * NEVER THROWS:
       *   All internal errors are caught and logged. The function
       *   always resolves (never rejects) so callers do not need
       *   try/catch wrappers.
       *
       * @returns {Promise<void>} — resolves when flush is complete.
       */
      async function roajiV2ProcessOfflineQueue() {

        /* ── PRE-CHECK 1: Mutex — abort if already in-flight ─────── */
        if (_rpoqInFlight) {
          console.info(
            LOG_TAG,
            'roajiV2ProcessOfflineQueue: flush already in-flight — ' +
            'skipping duplicate trigger. The running flush will process all ' +
            'current queue entries.'
          );
          return;
        }

        /* ── PRE-CHECK 2: Connectivity — abort if not online ─────── */
        if (!_rpoq_isOnline()) {
          console.info(
            LOG_TAG,
            'roajiV2ProcessOfflineQueue: device is OFFLINE — ' +
            'flush deferred. Will re-trigger on next online event.'
          );
          return;
        }

        /* ── PRE-CHECK 3: Firebase readiness ─────────────────────── */
        /* If Firebase has not completed boot, defer the flush by 2 s.
           Cancel any existing defer timer first to avoid piling up   */
        if (!window.RoajiV2Store || !window.RoajiV2Store.ready()) {
          if (_rpoqDeferTimer) clearTimeout(_rpoqDeferTimer);
          console.warn(
            LOG_TAG,
            'roajiV2ProcessOfflineQueue: Firebase V2 is not yet ready — ' +
            'deferring flush by 2 000 ms.'
          );
          _rpoqDeferTimer = setTimeout(function() {
            _rpoqDeferTimer = null;
            roajiV2ProcessOfflineQueue();
          }, 2000);
          return;
        }

        /* ── PRE-CHECK 4: Read queue — abort if empty ────────────── */
        const queueSnapshot = _rpoq_readQueue();
        if (queueSnapshot.length === 0) {
          console.info(
            LOG_TAG,
            'roajiV2ProcessOfflineQueue: offline queue is empty — no flush needed.'
          );
          return;
        }

        /* ════════════════════════════════════════════════════════════
           FLUSH RUN — mutex acquired
        ════════════════════════════════════════════════════════════ */
        _rpoqInFlight = true;

        const startTs = Date.now();
        console.info(
          '%c' + LOG_TAG + ' roajiV2ProcessOfflineQueue: flush run STARTED — ' +
          queueSnapshot.length + ' queued entr' +
          (queueSnapshot.length === 1 ? 'y' : 'ies') + ' to process.',
          'color:#00f5d4;font-weight:700;'
        );

        /* Dispatch flush-start event so UI can show a syncing indicator */
        _rpoq_dispatchFlushStart(queueSnapshot.length);

        /* ── COUNTERS (for summary log + flush-complete event) ─── */
        let flushedCount = 0;   /* successfully written to Firestore */
        let dedupCount   = 0;   /* blocked by UUID deduplication     */
        let failedCount  = 0;   /* errored entries — kept in queue   */

        /*
         * REMAINING QUEUE — starts as a copy of the snapshot.
         * Successfully processed entries are spliced out individually
         * during the loop.  Entries that error remain in this array
         * and are written back to LocalStorage at the end.
         * This means that if the device goes offline mid-flush and
         * the remaining entries are never processed, they survive in
         * LocalStorage and are retried on the next online trigger.
         */
        const remainingQueue = [...queueSnapshot];

        try {

          /* ══════════════════════════════════════════════════════════
             SEQUENTIAL FIFO PROCESSING LOOP
          ══════════════════════════════════════════════════════════ */
          for (let i = 0; i < queueSnapshot.length; i++) {

            const entry = queueSnapshot[i];

            /* ── Skip entries already marked synced ──────────────── */
            /* The _synced flag is not normally set by the queue writer
               (it defaults false) but may be present on legacy entries
               written by older versions of the flush engine.          */
            if (entry._synced === true) {
              /* Remove from remaining queue — it's already done */
              const idx = remainingQueue.findIndex(function(r) {
                return r._offlineId === entry._offlineId;
              });
              if (idx !== -1) remainingQueue.splice(idx, 1);
              console.info(
                LOG_TAG,
                'Entry ' + (i + 1) + '/' + queueSnapshot.length +
                ' _offlineId=' + (entry._offlineId || '(none)') +
                ' already marked _synced=true — skipping.'
              );
              flushedCount++;
              continue;
            }

            /* ── Re-check connectivity on each iteration ─────────── */
            /* If the device drops offline mid-flush, abort the loop
               immediately to avoid queuing failed writes that would
               error out and confuse the failure log.  The remaining
               entries in remainingQueue will be written back to
               LocalStorage below the loop.                            */
            if (!_rpoq_isOnline()) {
              console.warn(
                LOG_TAG,
                'Device went OFFLINE during flush at entry ' +
                (i + 1) + '/' + queueSnapshot.length +
                '. Aborting flush loop. ' +
                remainingQueue.length + ' entr' +
                (remainingQueue.length === 1 ? 'y' : 'ies') +
                ' will remain in queue for next online trigger.'
              );
              break; /* exit the for loop; write remaining below */
            }

            /* ── Step 1: Restore tenant context for this entry ────── */
            _rpoq_restoreTenantContext(entry);

            /* ── Step 2: Build clean bill payload (strip meta) ─────── */
            const billPayload = _rpoq_stripOfflineMeta(entry);

            /* ── Step 3: Ensure syncUUID is present ─────────────────── */
            /* Stamp one if the caller omitted the pre-stamp step.
               roajiV2UUIDCheckAndWrite will read it for dedup.        */
            if (!billPayload.syncUUID) {
              if (window.roajiStampSyncUUID && typeof window.roajiStampSyncUUID === 'function') {
                const stamped = window.roajiStampSyncUUID(billPayload);
                Object.assign(billPayload, stamped);
              } else {
                /* Local fallback stamper */
                try {
                  const t = window.RoajiV2Store.getActiveTenant();
                  const uid     = ((t && t.uid)     || 'anon').replace(/[^a-zA-Z0-9_-]/g,'').slice(0,20);
                  const storeId = ((t && t.storeId) || 'x'   ).replace(/[^a-zA-Z0-9_-]/g,'').slice(0,20);
                  billPayload.syncUUID = uid + '-' + storeId + '-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
                } catch (_) {
                  billPayload.syncUUID = 'anon-x-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
                }
              }
            }

            /* ── Step 4: Fire the network write with dedup ──────────── */
            /* Routes through roajiV2UUIDCheckAndWrite (PART 10A-2)
               which performs a Firestore syncUUID existence check
               before calling RoajiV2Store.addBill().  This guarantees
               exactly-once semantics across concurrent flush attempts. */
            let writeResult = null;
            let writeError  = null;

            try {
              const uuidWriter = window.roajiV2UUIDCheckAndWrite;
              if (uuidWriter && typeof uuidWriter === 'function') {
                /* Preferred path — UUID-deduplicated write (PART 10A-2) */
                writeResult = await uuidWriter(billPayload);
              } else {
                /* Fallback path — direct addBill (no dedup; use when
                   10A-2 is not loaded in the environment)              */
                console.warn(
                  LOG_TAG,
                  'roajiV2UUIDCheckAndWrite not available — ' +
                  'falling back to direct RoajiV2Store.addBill() for entry ' +
                  (entry._offlineId || '(no id)') + '. ' +
                  'Deduplication is disabled for this entry.'
                );
                writeResult = await window.RoajiV2Store.addBill(billPayload);
              }
            } catch (networkErr) {
              writeError = networkErr;
            }

            /* ── Step 5: Evaluate write result ──────────────────────── */
            if (writeError) {
              /* ── FAILURE: Keep entry in remainingQueue for retry ── */
              console.error(
                LOG_TAG,
                'WRITE FAILED for entry ' + (i + 1) + '/' + queueSnapshot.length +
                '  _offlineId=' + (entry._offlineId || '(none)') +
                '  syncUUID=' + (billPayload.syncUUID || '(none)') +
                '  Error: ' + writeError.message
              );
              failedCount++;
              /* Entry stays in remainingQueue — do NOT splice */

            } else if (writeResult && writeResult._deduplicated === true) {
              /* ── DEDUP: Entry already in Firestore — remove from queue ── */
              console.info(
                LOG_TAG,
                'DEDUP SKIP ✓ entry ' + (i + 1) + '/' + queueSnapshot.length +
                '  _offlineId=' + (entry._offlineId || '(none)') +
                '  syncUUID=' + (writeResult.syncUUID || billPayload.syncUUID || '(none)') +
                ' — already exists in Firestore. Entry removed from queue.'
              );
              /* SAFE SPLICE: remove this entry from remainingQueue */
              const dedupIdx = remainingQueue.findIndex(function(r) {
                return r._offlineId === entry._offlineId;
              });
              if (dedupIdx !== -1) remainingQueue.splice(dedupIdx, 1);
              dedupCount++;

            } else if (writeResult !== null && writeResult !== undefined) {
              /* ── SUCCESS: Entry written — remove from queue ─────── */
              /* A successful addBill returns the new Firestore document
                 ID string.  Any truthy, non-null return that is not a
                 _deduplicated sentinel is treated as a success.        */
              console.info(
                '%c' + LOG_TAG + ' ✓ FLUSHED entry ' +
                (i + 1) + '/' + queueSnapshot.length +
                '  _offlineId=' + (entry._offlineId || '(none)') +
                '  firestoreId=' + (typeof writeResult === 'string' ? writeResult : JSON.stringify(writeResult)) +
                '  syncUUID=' + (billPayload.syncUUID || '(none)'),
                'color:#34d399;font-weight:700;'
              );
              /* SAFE SPLICE: remove this entry from remainingQueue */
              const successIdx = remainingQueue.findIndex(function(r) {
                return r._offlineId === entry._offlineId;
              });
              if (successIdx !== -1) remainingQueue.splice(successIdx, 1);
              flushedCount++;

            } else {
              /* ── AMBIGUOUS: addBill returned null/undefined ──────── */
              /* This should not happen under normal operation.  Treat as
                 a failure and keep the entry in the queue so the issue
                 surfaces on retry rather than silently losing the bill. */
              console.warn(
                LOG_TAG,
                'AMBIGUOUS RESULT for entry ' + (i + 1) + '/' + queueSnapshot.length +
                '  _offlineId=' + (entry._offlineId || '(none)') +
                ' — roajiV2UUIDCheckAndWrite returned null/undefined. ' +
                'Entry kept in queue for retry. ' +
                'Investigate the write path for this payload: ' +
                JSON.stringify(Object.keys(billPayload))
              );
              failedCount++;
              /* Entry stays in remainingQueue — do NOT splice */
            }

          } /* ── END of FIFO processing loop ── */

        } catch (loopErr) {
          /* Catch any unexpected error that escaped individual entry handlers.
             Log it but do not re-throw — the finally block will always run and
             write the remaining queue back to LocalStorage.                    */
          console.error(
            LOG_TAG,
            'Unexpected error during flush loop:', loopErr.message, loopErr,
            '\n  Flush loop aborted early. ' + remainingQueue.length +
            ' entries will be written back to LocalStorage for retry.'
          );
        } finally {

          /* ════════════════════════════════════════════════════════
             ALWAYS-RUN CLEANUP — executes even if loop threw
          ════════════════════════════════════════════════════════ */

          /* ── Write remaining (failed) entries back to LocalStorage ── */
          /* SAFE CLEAR CONTRACT: only entries that were successfully
             processed (flushed or deduped) have been spliced from
             remainingQueue.  Failed entries are still present and
             will be persisted here for the next flush cycle.           */
          _rpoq_writeRemainingQueue(remainingQueue);

          /* ── Release the mutex ─────────────────────────────────── */
          _rpoqInFlight = false;

          /* ── Build summary stats ───────────────────────────────── */
          const elapsedMs    = Date.now() - startTs;
          const totalHandled = flushedCount + dedupCount + failedCount;
          const summaryStr   =
            'flushed=' + flushedCount +
            ' deduped=' + dedupCount +
            ' failed='  + failedCount +
            ' remaining=' + remainingQueue.length +
            ' elapsed=' + elapsedMs + 'ms';

          if (remainingQueue.length === 0) {
            console.info(
              '%c' + LOG_TAG + ' roajiV2ProcessOfflineQueue: flush run COMPLETE ✓  ' + summaryStr,
              'color:#34d399;font-weight:700;font-size:1.02em;'
            );
          } else {
            console.warn(
              LOG_TAG,
              'roajiV2ProcessOfflineQueue: flush run PARTIAL — ' +
              remainingQueue.length + ' entr' +
              (remainingQueue.length === 1 ? 'y' : 'ies') +
              ' remain in queue for next retry.  ' + summaryStr
            );
          }

          /* ── Dispatch flush-complete event ─────────────────────── */
          _rpoq_dispatchFlushComplete({
            flushedCount:   flushedCount,
            dedupCount:     dedupCount,
            failedCount:    failedCount,
            remainingCount: remainingQueue.length,
          });

          /* ── Also fire the legacy roaji:sync-complete event ─────── */
          /* PART 10A-2 Module 2 analytics panel subscribes to this
             event to trigger a live data refresh after every sync.    */
          if (flushedCount > 0 || dedupCount > 0) {
            try {
              window.dispatchEvent(new CustomEvent('roaji:sync-complete', {
                bubbles: true,
                detail: {
                  flushedCount:   flushedCount,
                  dedupCount:     dedupCount,
                  remainingCount: remainingQueue.length,
                  timestamp:      new Date().toISOString(),
                  source:         'roajiV2ProcessOfflineQueue',
                },
              }));
            } catch (_) {}
          }

        } /* END finally */

      } /* END roajiV2ProcessOfflineQueue */

      /* ══════════════════════════════════════════════════════════════
         SECTION D — ONLINE TRIGGER WIRING
         ─────────────────────────────────────────────────────────────
         Wire all five trigger sources to call
         roajiV2ProcessOfflineQueue() when connectivity is restored.
         Each trigger is registered defensively:
           • RoajiConnectionMonitor.subscribe() — primary 13B-1 bus
           • RoajiOnlineStatus.subscribe()      — secondary 10A-1 bus
           • window 'online' event              — browser native signal
           • window 'roaji:offline-count-updated' — queue enqueue event
             (triggers immediate flush if already online)
         All registrations are idempotent because the function's mutex
         (_rpoqInFlight) prevents double-processing even if multiple
         triggers fire simultaneously.
      ══════════════════════════════════════════════════════════════ */

      /* ── TRIGGER 1: RoajiConnectionMonitor (PART 13B-1) ─────────── */
      /* The 13B-1 HEAD-probe bus — fires on verified transitions only. */
      if (window.RoajiConnectionMonitor &&
          typeof window.RoajiConnectionMonitor.subscribe === 'function') {
        window.RoajiConnectionMonitor.subscribe(function _rpoq_cmTrigger(isOnline) {
          if (isOnline) {
            console.info(
              LOG_TAG,
              'RoajiConnectionMonitor → online transition detected. ' +
              'Triggering offline queue flush.'
            );
            /* Small settle delay to let Firebase re-authenticate after
               a network change before hitting Firestore.               */
            setTimeout(roajiV2ProcessOfflineQueue, 500);
          }
        });
        console.info(LOG_TAG, 'Wired to RoajiConnectionMonitor (PART 13B-1) ✓');
      } else {
        console.warn(
          LOG_TAG,
          'RoajiConnectionMonitor not available at init time — ' +
          'will rely on RoajiOnlineStatus and native browser events.'
        );
      }

      /* ── TRIGGER 2: RoajiOnlineStatus (PART 10A-1) ──────────────── */
      /* Secondary bus — fires when 10A-1 probe resolves online.
         The mutex ensures this doesn't double-run alongside Trigger 1. */
      if (window.RoajiOnlineStatus &&
          typeof window.RoajiOnlineStatus.subscribe === 'function') {
        window.RoajiOnlineStatus.subscribe(function _rpoq_rosTrigger(isOnline) {
          if (isOnline) {
            console.info(
              LOG_TAG,
              'RoajiOnlineStatus → online transition detected. ' +
              'Triggering offline queue flush.'
            );
            setTimeout(roajiV2ProcessOfflineQueue, 700);
          }
        });
        console.info(LOG_TAG, 'Wired to RoajiOnlineStatus (PART 10A-1) ✓');
      } else {
        console.warn(
          LOG_TAG,
          'RoajiOnlineStatus not available at init time — ' +
          'will rely on native browser events only.'
        );
      }

      /* ── TRIGGER 3: Native browser 'online' event ────────────────── */
      /* Catches environments where the HEAD probe buses are blocked
         by CSP or not yet initialised (very early page loads).        */
      window.addEventListener('online', function _rpoq_browserOnlineTrigger() {
        console.info(
          LOG_TAG,
          'Browser "online" event received — triggering offline queue flush.'
        );
        /* Longer settle delay for browser events: the OS reports the
           radio association before TCP is fully usable.               */
        setTimeout(roajiV2ProcessOfflineQueue, 1200);
      });
      console.info(LOG_TAG, 'Wired to window "online" event ✓');

      /* ── TRIGGER 4: roaji:offline-count-updated CustomEvent ──────── */
      /* Fired by roajiV2QueueOfflineBill (PART 13B-2-A) on every
         enqueue.  If the device is already online (e.g. a queued bill
         from another tab's offline session is being processed while
         this tab is online), trigger an immediate flush.              */
      window.addEventListener('roaji:offline-count-updated', function _rpoq_countUpdatedTrigger() {
        if (_rpoq_isOnline()) {
          console.info(
            LOG_TAG,
            '"roaji:offline-count-updated" event received while online — ' +
            'triggering immediate flush of newly-enqueued entry.'
          );
          setTimeout(roajiV2ProcessOfflineQueue, 200);
        }
      });
      console.info(LOG_TAG, 'Wired to "roaji:offline-count-updated" event ✓');

      /* ══════════════════════════════════════════════════════════════
         SECTION E — EXPOSE ON WINDOW
      ══════════════════════════════════════════════════════════════ */

      /* Primary export — callable by React components, DevTools, tests */
      window.roajiV2ProcessOfflineQueue = roajiV2ProcessOfflineQueue;

      /* ── Initialisation confirmation log ────────────────────────── */
      console.info(
        '%c[Roaji 13B-2-B] Background Auto-Sync Engine Loop initialised ✓' +
        '  window.roajiV2ProcessOfflineQueue ready.' +
        '\n  4 online triggers wired: ConnectionMonitor · OnlineStatus · browser-online · offline-count-updated',
        'color:#34d399;font-weight:800;font-size:1.02em;'
      );

    })();
  </script>

    /* ══════════════════════════════════════════════════════════════════
       PART 13B-1 MODULE 2 PART-A — CONNECTION BADGE CSS STYLES
       ─────────────────────────────────────────────────────────────────
       Keyframe animations:
         online-ping         — ripple ring expand + soft glow on badge
         online-dot-pulse    — scale+opacity breathe on the green dot
         offline-throb       — amber ring throb + warm aura on badge
         queue-badge-pop     — spring entrance for the queue count chip
       CSS classes:
         .roaji-conn-badge          — pill container (base)
         .roaji-conn-badge.online   — green state
         .roaji-conn-badge.offline  — amber state
         .roaji-conn-dot            — status indicator dot
         .roaji-queue-chip          — offline queue count chip
    ══════════════════════════════════════════════════════════════════ */

    /* ── online-ping ────────────────────────────────────────────────
       Two-layer box-shadow animation:
         Layer 1: expanding ring that fades from 70 % → 0 % opacity
         Layer 2: constant soft halo at 40 % opacity — anchors glow
       The outer ring reaches 8 px spread (mobile-friendly, not clipped
       by overflow:hidden on badge containers).                        */
    @keyframes online-ping {
      0% {
        box-shadow:
          0 0 0 0   rgba(52,211,153,0.72),
          0 0 7px 2px rgba(52,211,153,0.38);
      }
      55% {
        box-shadow:
          0 0 0 8px rgba(52,211,153,0.00),
          0 0 12px 3px rgba(52,211,153,0.22);
      }
      100% {
        box-shadow:
          0 0 0 0   rgba(52,211,153,0.00),
          0 0 7px 2px rgba(52,211,153,0.38);
      }
    }

    /* ── online-dot-pulse ───────────────────────────────────────────
       Gentle breathe: dot shrinks to 72 % and dims to 55 % opacity
       at mid-cycle, giving a heartbeat feel without harsh flicker.   */
    @keyframes online-dot-pulse {
      0%,  100% { opacity: 1;    transform: scale(1);    }
      50%        { opacity: 0.55; transform: scale(0.72); }
    }

    /* ── offline-throb ──────────────────────────────────────────────
       Amber ring throb — slightly slower cadence than the online ping
       (2.8 s) to feel more urgent/warning-like.  Two layers:
         Layer 1: ring expands to 6 px at 65 % alpha → 0 %
         Layer 2: warm background aura constant at 28 %             */
    @keyframes offline-throb {
      0%, 100% {
        box-shadow:
          0 0 0 0   rgba(245,158,11,0.68),
          0 0 9px 2px rgba(245,158,11,0.28);
      }
      52% {
        box-shadow:
          0 0 0 6px rgba(245,158,11,0.00),
          0 0 16px 4px rgba(245,158,11,0.16);
      }
    }

    /* ── queue-badge-pop ────────────────────────────────────────────
       Spring entrance for the queue count chip:
         0 %  → invisible, scaled to 50 %
         68 % → overshoots to 118 % (spring bounce)
        100 % → settles at natural scale 1, fully visible
       Uses cubic-bezier spring; apply 'both' fill-mode on element.  */
    @keyframes queue-badge-pop {
      0%   { transform: scale(0.50); opacity: 0; }
      68%  { transform: scale(1.18); opacity: 1; }
      100% { transform: scale(1.00); opacity: 1; }
    }

    /* ── .roaji-conn-badge  BASE ────────────────────────────────────
       Pill-shaped badge container.  Uses inline-flex so it collapses
       cleanly inside any flex row (top bar, sidebar, toast header).
       gap:0.34rem separates dot + label + optional queue chip.
       white-space:nowrap prevents line-wrapping on narrow mobile.    */
    .roaji-conn-badge {
      display:         inline-flex;
      align-items:     center;
      gap:             0.34rem;
      padding:         0.20rem 0.60rem 0.20rem 0.44rem;
      border-radius:   99px;
      font-size:       0.65rem;
      font-weight:     700;
      font-family:     var(--ff-mono);
      letter-spacing:  0.048em;
      cursor:          default;
      user-select:     none;
      white-space:     nowrap;
      transition:
        background     0.38s ease,
        border-color   0.38s ease,
        color          0.38s ease;
    }

    /* ── .roaji-conn-badge.online  STATE ────────────────────────────
       Green teal tint background + emerald border + online-ping aura.
       Animation period: 2.4 s — crisp, not too frantic on OLED.     */
    .roaji-conn-badge.online {
      background:  rgba(52, 211, 153, 0.10);
      border:      1px solid rgba(52, 211, 153, 0.40);
      color:       #34d399;
      animation:   online-ping 2.4s ease-in-out infinite;
    }

    /* ── .roaji-conn-badge.offline  STATE ──────────────────────────
       Amber tint + offline-throb ring.  Slightly warmer background
       tint (0.12 alpha) vs online (0.10) for subtly heavier weight.  */
    .roaji-conn-badge.offline {
      background:  rgba(245, 158, 11, 0.12);
      border:      1px solid rgba(245, 158, 11, 0.40);
      color:       #f59e0b;
      animation:   offline-throb 2.8s ease-in-out infinite;
    }

    /* ── .roaji-conn-dot  BASE + STATE ─────────────────────────────
       6 × 6 px circle.  flex-shrink:0 prevents squash in tight rows.
       Online variant: emerald fill + online-dot-pulse heartbeat.
       Offline variant: amber fill + offline-dot-throb flicker.       */
    .roaji-conn-dot {
      width:        6px;
      height:       6px;
      border-radius: 50%;
      flex-shrink:  0;
    }
    .roaji-conn-badge.online  .roaji-conn-dot {
      background: #34d399;
      animation:  online-dot-pulse  1.9s ease-in-out infinite;
    }
    .roaji-conn-badge.offline .roaji-conn-dot {
      background: #f59e0b;
      animation:  offline-dot-throb 1.7s ease-in-out infinite;
    }

    /* ── .roaji-queue-chip  LAYOUT ──────────────────────────────────
       Compact amber pill showing offline queue count.
       inline-flex centers the digit(s) both axes.
       min-width:17px + height:17px accommodates 1–2 digit counts.
       margin-left:2px fine-tunes spacing after the badge label text.
       animation fill-mode 'both' ensures the spring entrance runs
       correctly even if the element is inserted mid-frame.           */
    .roaji-queue-chip {
      display:          inline-flex;
      align-items:      center;
      justify-content:  center;
      min-width:        17px;
      height:           17px;
      padding:          0 4px;
      border-radius:    99px;
      font-size:        0.57rem;
      font-weight:      800;
      font-family:      var(--ff-mono);
      background:       rgba(245, 158, 11, 0.24);
      border:           1px solid rgba(245, 158, 11, 0.48);
      color:            #fbbf24;
      margin-left:      2px;
      animation:        queue-badge-pop 0.36s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ══════════════════════════════════════════════════════════════════
       END PART 13B-1 MODULE 2 PART-A
    ══════════════════════════════════════════════════════════════════ */

    /* ── PART 3: Suspension overlay ────────────────────────────── */
    @keyframes revoke-pulse {

    /* ══════════════════════════════════════════════════════════════
       PART 8B-1 — THERMAL MINI PRINT LAYOUT (3-inch / 80mm roll)
       @media print — unified selector gateway + size-scoped rules
    ══════════════════════════════════════════════════════════════ */

    /* ── Base: hide entire UI, surface only the active print template ── */
    @media print {
      body * { visibility: hidden !important; }

      #roaji-print-invoice,
      #roaji-print-invoice * { visibility: visible !important; }

      #roaji-print-invoice {
        position: fixed !important;
        inset: 0 !important;
        z-index: 99999 !important;
        background: #fff !important;
        display: block !important;
      }

      /* ── Shared @page reset ── */
      @page { margin: 0; size: auto; }

      /* ────────────────────────────────────────────────────────────
         THERMAL MINI — 3-inch receipt (80mm wide)
         Activated when body carries class  .print-mode-thermal
      ──────────────────────────────────────────────────────────── */
      body.print-mode-thermal #roaji-print-invoice {
        width:    80mm !important;
        max-width: 80mm !important;
        min-height: auto !important;
        margin: 0 auto !important;
        padding: 0 !important;
        font-family: 'Courier New', Courier, monospace !important;
        font-size: 8pt !important;
        line-height: 1.35 !important;
        color: #000 !important;
        background: #fff !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* Thermal: remove all box shadows & borders from child cards */
      body.print-mode-thermal #roaji-print-invoice * {
        box-shadow: none !important;
        text-shadow: none !important;
        border-radius: 0 !important;
        letter-spacing: 0 !important;
      }

      /* Thermal: store header bar */
      body.print-mode-thermal .thm-header {
        background: #000 !important;
        color: #fff !important;
        text-align: center;
        padding: 5mm 3mm 4mm !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      body.print-mode-thermal .thm-store-name {
        font-size: 11pt !important;
        font-weight: 700 !important;
        letter-spacing: 0.08em !important;
        text-transform: uppercase !important;
        display: block;
        margin-bottom: 1mm;
      }
      body.print-mode-thermal .thm-store-sub {
        font-size: 7pt !important;
        opacity: 0.82;
        display: block;
      }

      /* Thermal: divider rules — solid, dashed, dotted variants */
      body.print-mode-thermal .thm-rule-solid  { border: none; border-top: 1px solid #000; margin: 2mm 0; display: block; }
      body.print-mode-thermal .thm-rule-dashed { border: none; border-top: 1px dashed #555; margin: 2mm 0; display: block; }
      body.print-mode-thermal .thm-rule-dotted { border: none; border-top: 1px dotted #888; margin: 1.5mm 0; display: block; }

      /* Thermal: invoice meta block */
      body.print-mode-thermal .thm-meta {
        padding: 2mm 3mm !important;
        font-size: 7.5pt !important;
      }
      body.print-mode-thermal .thm-meta-row {
        display: flex !important;
        justify-content: space-between !important;
        margin-bottom: 0.8mm !important;
      }
      body.print-mode-thermal .thm-meta-label {
        color: #444 !important;
        font-weight: 400 !important;
      }
      body.print-mode-thermal .thm-meta-value {
        font-weight: 700 !important;
        color: #000 !important;
        text-align: right !important;
      }

      /* Thermal: customer block */
      body.print-mode-thermal .thm-customer {
        padding: 1.5mm 3mm !important;

      body.print-mode-a4 .roaji-inv-footer,
      body.print-mode-a5 .roaji-inv-footer {
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        padding: 3mm 8mm !important;
        background: #f7f6fb !important;
        border-top: 1px solid #e0ddf0 !important;
        font-size: 7pt !important;
        color: #888 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      body.print-mode-a5 .roaji-inv-footer { font-size: 6pt !important; }
      body.print-mode-a4 .roaji-inv-footer-tagline,
      body.print-mode-a5 .roaji-inv-footer-tagline {
        font-weight: 700 !important;
        color: #0a0520 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.08em !important;
      }
      body.print-mode-a4 .roaji-inv-footer-url,
      body.print-mode-a5 .roaji-inv-footer-url {
        color: #7c3aed !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* ── A4/A5 — loyalty strip ── */
      body.print-mode-a4 .roaji-inv-loyalty,
      body.print-mode-a5 .roaji-inv-loyalty {
        padding: 2mm 8mm !important;
        background: #f0edfb !important;
        border-top: 1px solid #ddd9f5 !important;
        border-bottom: 1px solid #ddd9f5 !important;
        font-size: 7.5pt !important;
        color: #7c3aed !important;
        text-align: center !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      body.print-mode-a5 .roaji-inv-loyalty { font-size: 6.5pt !important; }

      /* ── Hide thermal-only layout elements when printing A4/A5 ── */
      body.print-mode-a4 .thm-only,
      body.print-mode-a5 .thm-only { display: none !important; }
    }

    /* ══════════════════════════════════════════════════════════════
       PART 11A — THREE-SIZE PRINT ENGINE: @page DECLARATIONS
       ─────────────────────────────────────────────────────────────
       @page size rules must live OUTSIDE @media print to be
       honoured by all major browser print engines (Chrome, Edge,
       Firefox, Safari).

       HOW SIZE SELECTION WORKS:
         1. User selects "Thermal Mini", "A5", or "A4" from the
            print-size dropdown inside the billing form.
         2. handlePrint() calls injectPageSize() which writes the
            correct @page { size: … } into a transient <style> tag
            (id="roaji-page-size-style") BEFORE window.print().
         3. Simultaneously, the matching body class is applied:
              .print-mode-thermal  →  80mm × auto (roll paper)
              .print-mode-a5       →  A5  148 × 210mm portrait
              .print-mode-a4       →  A4  210 × 297mm portrait
         4. After the print dialog closes (~1 400 ms), the transient
            <style> tag and body class are both removed, restoring
            the screen layout automatically.

       DEFAULT FALLBACK (@page with no class suffix):
         Browsers that don't support the injected per-class @page
         rule will fall back to margin:0 / size:auto so the print
         dialog's own paper-size picker takes over — safe default.
    ══════════════════════════════════════════════════════════════ */

    /* ── Default fallback: no margin, let browser/dialog decide size ── */
    @page {
      margin: 0;
      size: auto;
    }

    /* ── Thermal Mini receipt: 80mm × auto continuous roll ── */
    @page :roaji-thermal {
      size: 80mm auto;
      margin: 0;
    }

    /* ── A5 portrait sheet: 148 × 210mm ── */
    @page :roaji-a5 {
      size: A5 portrait;
      margin: 0;
    }

    /* ── A4 portrait sheet: 210 × 297mm ── */
    @page :roaji-a4 {
      size: A4 portrait;
      margin: 0;
    }

    /*
     * NOTE: Named @page rules (e.g. @page :roaji-thermal) cannot
     * be auto-selected by body class in CSS alone — browsers do not
     * support @page body.class selectors.  Instead, handlePrint()
     * injects the correct @page { size: … } dynamically via a
     * transient <style id="roaji-page-size-style"> tag immediately
     * before calling window.print(), then removes it afterwards.
     * The named rules above serve as living documentation of the
     * three target sizes used by the injection helper.
     */

    /* ── Screen-mode: legacy class aliases (non-print) ── */
    .print-size-thermal #roaji-print-invoice { width: 80mm  !important; min-height: 100vh; }
    .print-size-a5      #roaji-print-invoice { width: 148mm !important; min-height: 210mm; }
    .print-size-a4      #roaji-print-invoice { width: 210mm !important; min-height: 297mm; }

    /* ── Base hidden state for print container ── */
    #roaji-print-invoice {
      font-family: 'Arial', Helvetica, sans-serif;
      color: #111 !important;
      background: #fff !important;
      padding: 0;
      display: none;
    }

    /* ── Shared fallback classes (non-mode-classed prints) ── */
    .roaji-inv-header    { background: #0a0520 !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .roaji-inv-accent    { color: #7c3aed !important; }
    .roaji-inv-table     { width: 100% !important; border-collapse: collapse !important; }
    .roaji-inv-table th  { background: #f4f4f8 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .roaji-inv-table tr:nth-child(even) td { background: #fafafa !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .roaji-inv-total-row { background: #0a0520 !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .roaji-inv-balance   { background: #7c3aed !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-1 — OWNER LIVE ANALYTICS DASHBOARD
       SEGMENT: Responsive 4-Column Layout Grid CSS + KPI Card Designs
       ─────────────────────────────────────────────────────────────────
       GRID SYSTEM:
         .roaji-analytics-wrapper  — outer scroll/padding shell
         .roaji-analytics-grid     — 4-col CSS Grid (mobile-first)
         .roaji-akpi-card          — shared base KPI card shell
       CARD VARIANTS (accent color classes):
         .roaji-akpi--revenue      — Neon Green  (#00f5a0 / #00d68f)
         .roaji-akpi--profit       — Electric Blue (#3b82f6 / #60a5fa)
         .roaji-akpi--bills        — Deep Purple   (#7c3aed / #a78bfa)
         .roaji-akpi--stock        — Neon Amber    (#f59e0b / #fbbf24)
       SECTION HEADER:
         .roaji-analytics-header   — dashboard title + live timestamp row
       GLASSMORPHISM TOKENS (shared):
         backdrop-filter: blur(28px) + inner-glow border + box-shadow stack
    ══════════════════════════════════════════════════════════════════ */

    /* ── CSS Custom Properties — Analytics accent palette ──────────── */
    :root {
      /* KPI accent colours */
      --akpi-green-primary:   #00f5a0;
      --akpi-green-secondary: #00d68f;
      --akpi-green-glow:      rgba(0, 245, 160, 0.22);
      --akpi-green-border:    rgba(0, 245, 160, 0.30);
      --akpi-green-bg:        rgba(0, 245, 160, 0.06);
      --akpi-green-icon-bg:   rgba(0, 245, 160, 0.12);

      --akpi-blue-primary:    #60a5fa;
      --akpi-blue-secondary:  #3b82f6;
      --akpi-blue-glow:       rgba(59, 130, 246, 0.22);
      --akpi-blue-border:     rgba(59, 130, 246, 0.30);
      --akpi-blue-bg:         rgba(59, 130, 246, 0.06);
      --akpi-blue-icon-bg:    rgba(59, 130, 246, 0.12);

      --akpi-purple-primary:  #a78bfa;
      --akpi-purple-secondary:#7c3aed;
      --akpi-purple-glow:     rgba(124, 58, 237, 0.22);
      --akpi-purple-border:   rgba(124, 58, 237, 0.30);
      --akpi-purple-bg:       rgba(124, 58, 237, 0.06);
      --akpi-purple-icon-bg:  rgba(124, 58, 237, 0.12);

      --akpi-amber-primary:   #fbbf24;
      --akpi-amber-secondary: #f59e0b;
      --akpi-amber-glow:      rgba(245, 158, 11, 0.22);
      --akpi-amber-border:    rgba(245, 158, 11, 0.30);
      --akpi-amber-bg:        rgba(245, 158, 11, 0.06);
      --akpi-amber-icon-bg:   rgba(245, 158, 11, 0.12);

      /* Grid spacing */
      --akpi-gap:     1rem;
      --akpi-radius:  1.1rem;
      --akpi-pad:     1.35rem 1.4rem;
      --akpi-pad-sm:  1.1rem 1.15rem;
    }

    /* ── Keyframes — KPI card entrance + glow pulses ───────────────── */
    @keyframes akpi-slide-in {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }
    @keyframes akpi-glow-green {
      0%, 100% {
        box-shadow:
          0 0 0 1px var(--akpi-green-border),
          0 8px 40px rgba(0,0,0,0.55),
          0 0 24px var(--akpi-green-glow),
          inset 0 1px 0 rgba(0,245,160,0.10);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(0,245,160,0.50),
          0 8px 40px rgba(0,0,0,0.60),
          0 0 44px rgba(0,245,160,0.36),
          inset 0 1px 0 rgba(0,245,160,0.16);
      }
    }
    @keyframes akpi-glow-blue {
      0%, 100% {
        box-shadow:
          0 0 0 1px var(--akpi-blue-border),
          0 8px 40px rgba(0,0,0,0.55),
          0 0 24px var(--akpi-blue-glow),
          inset 0 1px 0 rgba(59,130,246,0.10);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(59,130,246,0.50),
          0 8px 40px rgba(0,0,0,0.60),
          0 0 44px rgba(59,130,246,0.36),
          inset 0 1px 0 rgba(59,130,246,0.16);
      }
    }
    @keyframes akpi-glow-purple {
      0%, 100% {
        box-shadow:
          0 0 0 1px var(--akpi-purple-border),
          0 8px 40px rgba(0,0,0,0.55),
          0 0 24px var(--akpi-purple-glow),
          inset 0 1px 0 rgba(124,58,237,0.10);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(124,58,237,0.50),
          0 8px 40px rgba(0,0,0,0.60),
          0 0 44px rgba(124,58,237,0.36),
          inset 0 1px 0 rgba(124,58,237,0.16);
      }
    }
    @keyframes akpi-glow-amber {
      0%, 100% {
        box-shadow:
          0 0 0 1px var(--akpi-amber-border),
          0 8px 40px rgba(0,0,0,0.55),
          0 0 24px var(--akpi-amber-glow),
          inset 0 1px 0 rgba(245,158,11,0.10);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(245,158,11,0.50),
          0 8px 40px rgba(0,0,0,0.60),
          0 0 44px rgba(245,158,11,0.36),
          inset 0 1px 0 rgba(245,158,11,0.16);
      }
    }

    /* Icon badge pulse — subtle scale breathe */
    @keyframes akpi-icon-breathe {
      0%, 100% { transform: scale(1);    }
      50%       { transform: scale(1.08); }
    }

    /* Shimmer sweep — value loading skeleton */
    @keyframes akpi-value-shimmer {
      0%   { background-position: -320px 0; }
      100% { background-position:  320px 0; }
    }

    /* Live indicator dot pulse */
    @keyframes akpi-live-dot {
      0%, 100% { opacity: 1; transform: scale(1);    box-shadow: 0 0 0 0   rgba(0,245,160,0.6); }
      50%       { opacity: 0.7; transform: scale(0.8); box-shadow: 0 0 0 5px rgba(0,245,160,0); }
    }

    /* Trend arrow float */
    @keyframes akpi-trend-float {
      0%, 100% { transform: translateY(0px);  }
      50%       { transform: translateY(-2px); }
    }

    /* ── Outer wrapper — provides scroll + padding context ──────────── */
    .roaji-analytics-wrapper {
      width: 100%;
      padding: 1.25rem 1rem 2rem;
      box-sizing: border-box;
    }
    @media (min-width: 640px) {
      .roaji-analytics-wrapper { padding: 1.5rem 1.5rem 2.5rem; }
    }
    @media (min-width: 1024px) {
      .roaji-analytics-wrapper { padding: 1.75rem 2rem 3rem; }
    }

    /* ── Dashboard Section Header row ───────────────────────────────── */
    .roaji-analytics-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-bottom: 1.4rem;
    }
    .roaji-analytics-header-title {
      font-family: var(--ff-main);
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      background: linear-gradient(110deg, #00f5a0 0%, #60a5fa 50%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    @media (min-width: 640px) {
      .roaji-analytics-header-title { font-size: 1.2rem; }
    }
    .roaji-analytics-header-meta {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      font-family: var(--ff-mono);
      font-size: 0.63rem;
      color: var(--c-muted);
      letter-spacing: 0.04em;
    }
    .roaji-analytics-live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--akpi-green-primary);
      flex-shrink: 0;
      animation: akpi-live-dot 2s ease-in-out infinite;
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-1 — 4-COLUMN RESPONSIVE ANALYTICS GRID
       ─────────────────────────────────────────────────────────────────
       BREAKPOINT STRATEGY (mobile-first):
         Base (< 480px):   1 column  — single stacked cards, full width
         xs   (≥ 480px):   2 columns — 2-up grid for wide phones
         sm   (≥ 640px):   2 columns — tablet portrait, comfortable gaps
         md   (≥ 768px):   2 columns — small landscape / narrow desktop
         lg   (≥ 1024px):  4 columns — full owner dashboard target layout
         xl   (≥ 1280px):  4 columns — large screens, generous spacing
    ══════════════════════════════════════════════════════════════════ */
    .roaji-analytics-grid {
      display: grid;
      grid-template-columns: 1fr;           /* base: 1 column (small phones) */
      gap: var(--akpi-gap);
      width: 100%;
    }

    /* 2 columns — phones ≥ 480px */
    @media (min-width: 480px) {
      .roaji-analytics-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.85rem;
      }
    }

    /* 2 columns — tablets */
    @media (min-width: 640px) {
      .roaji-analytics-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }
    }

    /* Still 2 columns on medium (768 → 1023) — avoids cramped 4-col */
    @media (min-width: 768px) and (max-width: 1023px) {
      .roaji-analytics-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.1rem;
      }
    }

    /* 4 columns — full desktop target layout */
    @media (min-width: 1024px) {
      .roaji-analytics-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 1.25rem;
      }
    }

    /* Extra-wide: slight column-max prevents over-stretch on 4K */
    @media (min-width: 1600px) {
      .roaji-analytics-grid {
        grid-template-columns: repeat(4, minmax(0, 320px));
        gap: 1.5rem;
        justify-content: start;
      }
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-1 — KPI CARD BASE SHELL
       Shared glassmorphism skeleton all four cards inherit.
    ══════════════════════════════════════════════════════════════════ */
    .roaji-akpi-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: var(--akpi-pad-sm);
      border-radius: var(--akpi-radius);
      overflow: hidden;
      cursor: default;

      /* Glassmorphism base */
      background: rgba(10, 8, 28, 0.72);
      backdrop-filter: blur(28px) saturate(1.6);
      -webkit-backdrop-filter: blur(28px) saturate(1.6);

      /* Entrance animation — stagger via inline animation-delay */
      animation: akpi-slide-in 0.52s cubic-bezier(0.16, 1, 0.3, 1) both;

      /* Smooth hover lift */
      transition:
        transform        0.30s cubic-bezier(0.16, 1, 0.3, 1),
        background       0.30s ease,
        box-shadow       0.30s ease;

      /* Prevent content bleed */
      min-width: 0;
    }

    /* Micro-texture overlay — adds depth grain on dark glass */
    .roaji-akpi-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.035) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(255,255,255,0.018) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* Hover: smooth scale lift + brighter inner surface */
    .roaji-akpi-card:hover {
      transform: translateY(-4px) scale(1.018);
      background: rgba(12, 10, 34, 0.82);
    }

    /* Card content sits above the pseudo layers */
    .roaji-akpi-card > * { position: relative; z-index: 1; }

    /* Mobile: tighter padding on small phones */
    @media (max-width: 479px) {
      .roaji-akpi-card { padding: 1rem 1.05rem; border-radius: 0.9rem; }
    }
    @media (min-width: 1024px) {
      .roaji-akpi-card { padding: var(--akpi-pad); }
    }

    /* ── Card top row: icon badge + label ───────────────────────────── */
    .roaji-akpi-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.9rem;
    }

    /* Label chip */
    .roaji-akpi-label {
      font-family: var(--ff-mono);
      font-size: 0.60rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--c-muted);
    }
    @media (min-width: 640px) {
      .roaji-akpi-label { font-size: 0.63rem; }
    }

    /* Icon badge circle */
    .roaji-akpi-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.05rem;
      flex-shrink: 0;
      animation: akpi-icon-breathe 3.5s ease-in-out infinite;
    }
    @media (min-width: 640px) {
      .roaji-akpi-icon { width: 40px; height: 40px; font-size: 1.15rem; }
    }

    /* ── Primary value display ──────────────────────────────────────── */
    .roaji-akpi-value {
      font-family: var(--ff-main);
      font-size: 1.55rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 0.45rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @media (min-width: 480px) {
      .roaji-akpi-value { font-size: 1.65rem; }
    }
    @media (min-width: 640px) {
      .roaji-akpi-value { font-size: 1.8rem; }
    }
    @media (min-width: 1024px) {
      .roaji-akpi-value { font-size: 1.95rem; }
    }

    /* Loading shimmer state for value */
    .roaji-akpi-value.is-loading {
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0.05) 25%,
        rgba(255,255,255,0.12) 50%,
        rgba(255,255,255,0.05) 75%
      );
      background-size: 320px 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: akpi-value-shimmer 1.4s ease-in-out infinite;
    }

    /* ── Subtitle / sub-metric row ──────────────────────────────────── */
    .roaji-akpi-sub {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.70rem;
      color: var(--c-muted);
      font-family: var(--ff-main);
      line-height: 1.4;
    }

    /* Trend arrow badge */
    .roaji-akpi-trend {
      display: inline-flex;
      align-items: center;
      gap: 0.22rem;
      padding: 0.15rem 0.45rem;
      border-radius: 99px;
      font-size: 0.61rem;
      font-weight: 700;
      font-family: var(--ff-mono);
      letter-spacing: 0.02em;
      white-space: nowrap;
      flex-shrink: 0;
      animation: akpi-trend-float 3s ease-in-out infinite;
    }
    .roaji-akpi-trend.up {
      background: rgba(0, 245, 160, 0.12);
      border: 1px solid rgba(0, 245, 160, 0.28);
      color: #00f5a0;
    }
    .roaji-akpi-trend.down {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.28);
      color: #f87171;
    }
    .roaji-akpi-trend.neutral {
      background: rgba(113, 128, 150, 0.12);
      border: 1px solid rgba(113, 128, 150, 0.28);
      color: var(--c-muted);
    }

    /* ── Divider line above sub-metric row ─────────────────────────── */
    .roaji-akpi-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 30%, rgba(255,255,255,0.06) 70%, transparent 100%);
      margin: 0.8rem 0 0.7rem;
    }

    /* ── Bottom meta row (period label / last updated) ──────────────── */
    .roaji-akpi-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.60rem;
      color: var(--c-dim);
      font-family: var(--ff-mono);
      letter-spacing: 0.04em;
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-1 — CARD VARIANT: TOTAL REVENUE (Neon Green)
       Colour token: #00f5a0 / #00d68f
    ══════════════════════════════════════════════════════════════════ */
    .roaji-akpi--revenue {
      background: linear-gradient(
        145deg,
        rgba(0, 245, 160, 0.07) 0%,
        rgba(10, 8, 28, 0.80) 55%,
        rgba(0, 214, 143, 0.04) 100%
      );
      border: 1px solid var(--akpi-green-border);
      animation:
        akpi-slide-in   0.52s cubic-bezier(0.16,1,0.3,1) both,
        akpi-glow-green 3.8s ease-in-out infinite 0.6s;
    }
    .roaji-akpi--revenue:hover {
      background: linear-gradient(
        145deg,
        rgba(0, 245, 160, 0.13) 0%,
        rgba(12, 10, 34, 0.88) 55%,
        rgba(0, 214, 143, 0.08) 100%
      );
      border-color: rgba(0, 245, 160, 0.52);
    }
    .roaji-akpi--revenue .roaji-akpi-icon {
      background: var(--akpi-green-icon-bg);
      border: 1px solid var(--akpi-green-border);
      color: var(--akpi-green-primary);
    }
    .roaji-akpi--revenue .roaji-akpi-value {
      background: linear-gradient(110deg, #00f5a0 0%, #00d68f 60%, #00f5a0 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(0,245,160,0.40));
    }
    .roaji-akpi--revenue .roaji-akpi-label {
      color: rgba(0, 245, 160, 0.65);
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-1 — CARD VARIANT: NET PROFIT (Electric Blue)
       Colour token: #3b82f6 / #60a5fa
    ══════════════════════════════════════════════════════════════════ */
    .roaji-akpi--profit {
      background: linear-gradient(
        145deg,
        rgba(59, 130, 246, 0.07) 0%,
        rgba(10, 8, 28, 0.80) 55%,
        rgba(96, 165, 250, 0.04) 100%
      );
      border: 1px solid var(--akpi-blue-border);
      animation:
        akpi-slide-in  0.52s cubic-bezier(0.16,1,0.3,1) 0.08s both,
        akpi-glow-blue 3.8s ease-in-out infinite 0.8s;
    }
    .roaji-akpi--profit:hover {
      background: linear-gradient(
        145deg,
        rgba(59, 130, 246, 0.13) 0%,
        rgba(12, 10, 34, 0.88) 55%,
        rgba(96, 165, 250, 0.08) 100%
      );
      border-color: rgba(59, 130, 246, 0.52);
    }
    .roaji-akpi--profit .roaji-akpi-icon {
      background: var(--akpi-blue-icon-bg);
      border: 1px solid var(--akpi-blue-border);
      color: var(--akpi-blue-primary);
    }
    .roaji-akpi--profit .roaji-akpi-value {
      background: linear-gradient(110deg, #60a5fa 0%, #3b82f6 60%, #60a5fa 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(59,130,246,0.40));
    }
    .roaji-akpi--profit .roaji-akpi-label {
      color: rgba(96, 165, 250, 0.65);
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-1 — CARD VARIANT: TOTAL BILLS ISSUED (Deep Purple)
       Colour token: #7c3aed / #a78bfa
    ══════════════════════════════════════════════════════════════════ */
    .roaji-akpi--bills {
      background: linear-gradient(
        145deg,
        rgba(124, 58, 237, 0.07) 0%,
        rgba(10, 8, 28, 0.80) 55%,
        rgba(167, 139, 250, 0.04) 100%
      );
      border: 1px solid var(--akpi-purple-border);
      animation:
        akpi-slide-in    0.52s cubic-bezier(0.16,1,0.3,1) 0.16s both,
        akpi-glow-purple 3.8s ease-in-out infinite 1.0s;
    }
    .roaji-akpi--bills:hover {
      background: linear-gradient(
        145deg,
        rgba(124, 58, 237, 0.13) 0%,
        rgba(12, 10, 34, 0.88) 55%,
        rgba(167, 139, 250, 0.08) 100%
      );
      border-color: rgba(124, 58, 237, 0.52);
    }
    .roaji-akpi--bills .roaji-akpi-icon {
      background: var(--akpi-purple-icon-bg);
      border: 1px solid var(--akpi-purple-border);
      color: var(--akpi-purple-primary);
    }
    .roaji-akpi--bills .roaji-akpi-value {
      background: linear-gradient(110deg, #a78bfa 0%, #7c3aed 60%, #a78bfa 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(124,58,237,0.40));
    }
    .roaji-akpi--bills .roaji-akpi-label {
      color: rgba(167, 139, 250, 0.65);
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-1 — CARD VARIANT: STOCK ALERTS (Neon Amber)
       Colour token: #f59e0b / #fbbf24
    ══════════════════════════════════════════════════════════════════ */
    .roaji-akpi--stock {
      background: linear-gradient(
        145deg,
        rgba(245, 158, 11, 0.07) 0%,
        rgba(10, 8, 28, 0.80) 55%,
        rgba(251, 191, 36, 0.04) 100%
      );
      border: 1px solid var(--akpi-amber-border);
      animation:
        akpi-slide-in    0.52s cubic-bezier(0.16,1,0.3,1) 0.24s both,
        akpi-glow-amber  3.8s ease-in-out infinite 1.2s;
    }
    .roaji-akpi--stock:hover {
      background: linear-gradient(
        145deg,
        rgba(245, 158, 11, 0.13) 0%,
        rgba(12, 10, 34, 0.88) 55%,
        rgba(251, 191, 36, 0.08) 100%
      );
      border-color: rgba(245, 158, 11, 0.52);
    }
    .roaji-akpi--stock .roaji-akpi-icon {
      background: var(--akpi-amber-icon-bg);
      border: 1px solid var(--akpi-amber-border);
      color: var(--akpi-amber-primary);
    }
    .roaji-akpi--stock .roaji-akpi-value {
      background: linear-gradient(110deg, #fbbf24 0%, #f59e0b 60%, #fbbf24 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(245,158,11,0.40));
    }
    .roaji-akpi--stock .roaji-akpi-label {
      color: rgba(251, 191, 36, 0.65);
    }

    /* ── Stock alert pulse ring on the icon (critical warning state) ── */
    .roaji-akpi--stock.has-alerts .roaji-akpi-icon {
      animation:
        akpi-icon-breathe   3.5s ease-in-out infinite,
        pulse-glow-amber    2.4s ease-in-out infinite;
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-1 — PROGRESS BAR SUB-COMPONENT
       Used optionally inside cards to show target % attainment.
    ══════════════════════════════════════════════════════════════════ */
    .roaji-akpi-progress-track {
      width: 100%;
      height: 3px;
      border-radius: 99px;
      background: rgba(255,255,255,0.07);
      overflow: hidden;
      margin-top: 0.65rem;
    }
    .roaji-akpi-progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .roaji-akpi--revenue .roaji-akpi-progress-fill {
      background: linear-gradient(90deg, #00d68f, #00f5a0);
      box-shadow: 0 0 6px rgba(0,245,160,0.50);
    }
    .roaji-akpi--profit .roaji-akpi-progress-fill {
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      box-shadow: 0 0 6px rgba(59,130,246,0.50);
    }
    .roaji-akpi--bills .roaji-akpi-progress-fill {
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      box-shadow: 0 0 6px rgba(124,58,237,0.50);
    }
    .roaji-akpi--stock .roaji-akpi-progress-fill {
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      box-shadow: 0 0 6px rgba(245,158,11,0.50);
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-1 — SECONDARY ROW CARDS (span 2 or 4 cols)
       For chart panels, detail tables below the KPI row.
    ══════════════════════════════════════════════════════════════════ */
    .roaji-akpi-card--wide-2 {
      grid-column: span 1;  /* default: full width on mobile */
    }
    .roaji-akpi-card--wide-4 {
      grid-column: span 1;
    }
    @media (min-width: 480px) {
      .roaji-akpi-card--wide-2 { grid-column: span 2; }
    }
    @media (min-width: 1024px) {
      .roaji-akpi-card--wide-2 { grid-column: span 2; }
      .roaji-akpi-card--wide-4 { grid-column: span 4; }
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-1 — RESPONSIVE TOUCH TARGETS (mobile UX)
       Cards get a larger touch-active area on phone widths.
    ══════════════════════════════════════════════════════════════════ */
    @media (max-width: 479px) {
      .roaji-akpi-card {
        min-height: 110px;
      }
      .roaji-akpi-value { font-size: 1.45rem; }
      .roaji-akpi-icon  { width: 32px; height: 32px; font-size: 0.95rem; }
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-1 — REDUCED-MOTION SAFETY
       Respects OS-level prefers-reduced-motion accessibility preference.
    ══════════════════════════════════════════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      .roaji-akpi-card,
      .roaji-akpi--revenue,
      .roaji-akpi--profit,
      .roaji-akpi--bills,
      .roaji-akpi--stock {
        animation: none !important;
        transition: transform 0.15s ease, box-shadow 0.15s ease !important;
      }
      .roaji-akpi-card:hover {
        transform: translateY(-2px) !important;
      }
      .roaji-akpi-icon,
      .roaji-analytics-live-dot,
      .roaji-akpi-trend {
        animation: none !important;
      }
      /* Static box-shadow fallback per variant */
      .roaji-akpi--revenue {
        box-shadow: 0 0 0 1px var(--akpi-green-border), 0 8px 40px rgba(0,0,0,0.55), 0 0 24px var(--akpi-green-glow);
      }
      .roaji-akpi--profit {
        box-shadow: 0 0 0 1px var(--akpi-blue-border),  0 8px 40px rgba(0,0,0,0.55), 0 0 24px var(--akpi-blue-glow);
      }
      .roaji-akpi--bills {
        box-shadow: 0 0 0 1px var(--akpi-purple-border), 0 8px 40px rgba(0,0,0,0.55), 0 0 24px var(--akpi-purple-glow);
      }
      .roaji-akpi--stock {
        box-shadow: 0 0 0 1px var(--akpi-amber-border),  0 8px 40px rgba(0,0,0,0.55), 0 0 24px var(--akpi-amber-glow);
      }
    }

    /* ══════════════════════════════════════════════════════════════════
       PART 14A-2 — SUPPLEMENTAL CARD CSS
       Adds top-row alias, flash keyframe, and loading shimmer modifier
       needed by the OwnerDashboard reactive calculation layer.
    ══════════════════════════════════════════════════════════════════ */

    /* Alias: .roaji-akpi-top-row is the same layout as .roaji-akpi-top */
    .roaji-akpi-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.9rem;
    }

    /* Flash keyframe — fires when a new bill lands / stock changes */
    @keyframes akpi-value-flash {
      0%   { background-color: rgba(255,255,255,0.10); border-radius: 4px; }
      100% { background-color: transparent; }
    }
    .roaji-akpi-flash {
      animation: akpi-value-flash 0.55s ease-out both;
    }

    /* Loading modifier — dims card value and shows shimmer */
    .roaji-akpi-loading .roaji-akpi-value {
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0.05) 25%,
        rgba(255,255,255,0.12) 50%,
        rgba(255,255,255,0.05) 75%
      );
      background-size: 320px 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: akpi-value-shimmer 1.4s ease-in-out infinite;
    }

    /* ══════════════════════════════════════════════════════════════════
       END PART 14A-1 — OWNER ANALYTICS LAYOUT GRID CSS
    ══════════════════════════════════════════════════════════════════ */
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!--  APPLICATION SOURCE  (Parts 1–10 will be assembled here)       -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <script type="text/babel">
    /* ══════════════════════════════════════════════════════════════════
       SEGMENT 2 — AUTHENTICATION SCREENS
       • LoginScreen   — glass card, gradient logo, form, social row
       • SignUpScreen  — multi-field registration form
       • AuthRoot      — top-level router between the two screens
    ══════════════════════════════════════════════════════════════════ */

    const { useState, useRef, useEffect } = React;

    /* ── Tiny SVG icon helpers ──────────────────────────────────────── */
    const Icon = ({ d, size = 18, cls = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth={1.8} strokeLinecap="round"
           strokeLinejoin="round" className={cls}>
        <path d={d} />
      </svg>
    );

    const EyeIcon     = ({ open }) => open
      ? <Icon d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
      : <Icon d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22" />;

    /* ── Floating background blobs (shared decoration) ──────────────── */
    const AuthBlobs = () => (
      <div aria-hidden="true" style={{ position:'fixed', inset:0, overflow:'hidden', pointerEvents:'none', zIndex:0 }}>
        <div style={{
          position:'absolute', width:520, height:520,
          borderRadius:'50%', top:'-12%', left:'-10%',
          background:'radial-gradient(circle, rgba(124,58,237,0.18) 0%, transparent 70%)',
          animation:'blobFloat 9s ease-in-out infinite',
        }} />
        <div style={{
          position:'absolute', width:440, height:440,
          borderRadius:'50%', bottom:'-8%', right:'-8%',
          background:'radial-gradient(circle, rgba(0,245,212,0.14) 0%, transparent 70%)',
          animation:'blobFloat 11s ease-in-out infinite reverse',
        }} />
        <div style={{
          position:'absolute', width:300, height:300,
          borderRadius:'50%', top:'42%', left:'60%',
          background:'radial-gradient(circle, rgba(236,72,153,0.10) 0%, transparent 70%)',
          animation:'blobFloat 13s ease-in-out infinite 2s',
        }} />
        {/* Diagonal grid lines */}
        <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity:0.03 }}>
          <defs>
            <pattern id="authGrid" width="48" height="48" patternUnits="userSpaceOnUse">
              <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#fff" strokeWidth="0.5" />
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill="url(#authGrid)" />
        </svg>
      </div>
    );

    /* ── Reusable labelled input ─────────────────────────────────────── */
    const AuthField = ({ label, type='text', value, onChange, placeholder, children, autoComplete }) => {
      const [show, setShow] = useState(false);
      const isPassword = type === 'password';
      const inputType  = isPassword ? (show ? 'text' : 'password') : type;

      return (
        <div style={{ marginBottom:'1.1rem' }}>
          <label style={{
            display:'block', marginBottom:'0.4rem',
            fontSize:'0.72rem', fontWeight:600, letterSpacing:'0.08em',
            textTransform:'uppercase', color:'var(--c-muted)',
          }}>{label}</label>
          <div style={{ position:'relative' }}>
            <input
              type={inputType}
              value={value}
              onChange={onChange}
              placeholder={placeholder}
              autoComplete={autoComplete}
              style={{
                width:'100%', padding:'0.7rem 1rem',
                paddingRight: isPassword ? '2.8rem' : '1rem',
                background:'rgba(255,255,255,0.04)',
                border:'1px solid rgba(255,255,255,0.10)',
                borderRadius:'0.6rem',
                color:'var(--c-text)',
                fontSize:'0.92rem',
                fontFamily:'var(--ff-main)',
                outline:'none',
                transition:'border-color 0.2s, box-shadow 0.2s',
              }}
              onFocus={e => {
                e.target.style.borderColor = 'rgba(0,245,212,0.5)';
                e.target.style.boxShadow   = '0 0 0 3px rgba(0,245,212,0.08)';
              }}
              onBlur={e => {
                e.target.style.borderColor = 'rgba(255,255,255,0.10)';
                e.target.style.boxShadow   = 'none';
              }}
            />
            {isPassword && (
              <button
                type="button"
                onClick={() => setShow(v => !v)}
                style={{
                  position:'absolute', right:'0.75rem', top:'50%',
                  transform:'translateY(-50%)',
                  background:'none', border:'none', cursor:'pointer',
                  color:'var(--c-muted)', padding:'2px',
                  display:'flex', alignItems:'center',
                }}
              >
                <EyeIcon open={show} />
              </button>
            )}
          </div>
          {children}
        </div>
      );
    };

    /* ── Strength bar (password) ─────────────────────────────────────── */
    const StrengthBar = ({ password }) => {
      const score = (() => {
        let s = 0;
        if (password.length >= 8) s++;
        if (/[A-Z]/.test(password)) s++;
        if (/[0-9]/.test(password)) s++;
        if (/[^A-Za-z0-9]/.test(password)) s++;
        return s;
      })();
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      const colors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#10b981'];
      if (!password) return null;
      return (
        <div style={{ marginTop:'0.45rem' }}>
          <div style={{ display:'flex', gap:'4px', marginBottom:'4px' }}>
            {[1,2,3,4].map(i => (
              <div key={i} style={{
                flex:1, height:3, borderRadius:2,
                background: i <= score ? colors[score] : 'rgba(255,255,255,0.1)',
                transition:'background 0.3s',
              }} />
            ))}
          </div>
          <span style={{ fontSize:'0.68rem', color: colors[score] }}>{labels[score]}</span>
        </div>
      );
    };

    /* ── Divider with label ──────────────────────────────────────────── */
    const OrDivider = () => (
      <div style={{ display:'flex', alignItems:'center', gap:'0.75rem', margin:'1.4rem 0' }}>
        <div style={{ flex:1, height:1, background:'rgba(255,255,255,0.08)' }} />
        <span style={{ fontSize:'0.72rem', color:'var(--c-dim)', letterSpacing:'0.06em', fontWeight:600 }}>OR</span>
        <div style={{ flex:1, height:1, background:'rgba(255,255,255,0.08)' }} />
      </div>
    );

    /* ── Social login row ────────────────────────────────────────────── */
    const SocialBtn = ({ label, svgPath, color }) => (
      <button
        type="button"
        style={{
          flex:1, display:'flex', alignItems:'center', justifyContent:'center', gap:'0.5rem',
          padding:'0.6rem 0',
          background:'rgba(255,255,255,0.04)',
          border:'1px solid rgba(255,255,255,0.09)',
          borderRadius:'0.6rem',
          color:'var(--c-text)', fontSize:'0.78rem', fontWeight:600,
          cursor:'pointer', fontFamily:'var(--ff-main)',
          transition:'background 0.2s, border-color 0.2s',
        }}
        onMouseOver={e => { e.currentTarget.style.background='rgba(255,255,255,0.09)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.18)'; }}
        onMouseOut={e  => { e.currentTarget.style.background='rgba(255,255,255,0.04)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.09)'; }}
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill={color}><path d={svgPath} /></svg>
        {label}
      </button>
    );

    const SocialRow = () => (
      <div style={{ display:'flex', gap:'0.6rem' }}>
        <SocialBtn
          label="Google"
          color="#ea4335"
          svgPath="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
        />
        <SocialBtn
          label="Microsoft"
          color="#00a4ef"
          svgPath="M11.4 24H0V12.6h11.4V24zM24 24H12.6V12.6H24V24zM11.4 11.4H0V0h11.4v11.4zM24 11.4H12.6V0H24v11.4z"
        />
      </div>
    );

    /* ════════════════════════════════════════════════════════════════════
       LOGIN SCREEN
    ════════════════════════════════════════════════════════════════════ */
    const LoginScreen = ({ onSwitch, onSuccess }) => {
      const [email,    setEmail]    = useState('');
      const [password, setPassword] = useState('');
      const [remember, setRemember] = useState(false);
      const [loading,  setLoading]  = useState(false);
      const [error,    setError]    = useState('');

      const handleLogin = async () => {
        if (!email || !password) { setError('Please fill in all fields.'); return; }
        setError('');
        setLoading(true);
        /* ── ESG-2: Local-First Auth Engine — never crashes without Firebase ── */
        try {
          const { firebaseUser, profile } = await window.RoajiV2Store.signIn({ email, password });
          setLoading(false);
          const isMaster = (firebaseUser.email || '').toLowerCase().trim() === 'iamajithkumar98@gmail.com';
          onSuccess && onSuccess({
            uid:                   firebaseUser.uid,
            email:                 firebaseUser.email,
            displayName:           firebaseUser.displayName || (profile && profile.fullName) || email,
            businessName:          (profile && profile.businessName) || '',
            role:                  isMaster ? 'Master Admin' : ((profile && profile.role) || 'Owner'),
            plan:                  isMaster ? 'lifetime' : ((profile && profile.plan) || 'free'),
            /* ESG-2: master bypasses all checks; standard → pending_approval */
            status:                isMaster ? 'master' : ((profile && profile.status) || 'pending_approval'),
            primaryStoreId:        isMaster ? 'ROAJI_MAIN' : ((profile && profile.primaryStoreId) || firebaseUser.uid),
            allowedStores:         isMaster
                                     ? ['ROAJI_MAIN']
                                     : ((profile && Array.isArray(profile.allowedStores) && profile.allowedStores.length)
                                         ? profile.allowedStores
                                         : [firebaseUser.uid]),

    const SignUpScreen = ({ onSwitch, onSuccess }) => {

        password:'', confirm:'', role:'Owner', agree:false,

        const e = {};
        if (!form.fullName.trim())     e.fullName     = 'Required';
        if (!form.businessName.trim()) e.businessName = 'Required';
        if (!form.email.includes('@')) e.email        = 'Valid email required';
        return e;
      };
      const validateStep2 = () => {
        const e = {};
        if (form.password.length < 6)           e.password = 'Min 6 characters';
        if (form.password !== form.confirm)     e.confirm  = 'Passwords do not match';
        if (!form.agree)                        e.agree    = 'You must accept the terms';
        return e;
      };

        const e = validateStep1();
        if (Object.keys(e).length) { setErrors(e); return; }
        setErrors({});
        setStep(2);

      const handleSignUp = async () => {
        const e = validateStep2();
        if (Object.keys(e).length) { setErrors(e); return; }
        setErrors({});
        setLoading(true);
        /* ── ESG-2: Local-First Registration — never crashes without Firebase ── */
        try {
          const firebaseUser = await window.RoajiV2Store.signUp({
            email:        form.email,
            password:     form.password,
            fullName:     form.fullName,
            businessName: form.businessName,
            phone:        form.phone,
            role:         form.role,
          });
          setLoading(false);
          const isMaster = (firebaseUser.email || '').toLowerCase().trim() === 'iamajithkumar98@gmail.com';
          onSuccess && onSuccess({
            uid:                   firebaseUser.uid,
            email:                 firebaseUser.email,
            displayName:           form.fullName || firebaseUser.email,
            businessName:          form.businessName,
            role:                  isMaster ? 'Master Admin' : form.role,
            plan:                  isMaster ? 'lifetime' : 'free',
            /* ESG-2: new accounts = 'pending_approval' until master activates; master = instant 'master' */

            allowedStores:         isMaster ? ['ROAJI_MAIN'] : [firebaseUser.uid],
            subscriptionPlan:      isMaster ? 'lifetime' : 'none',
            subscriptionExpiresAt: null,
            _source:               'local',
          });

          setLoading(false);
