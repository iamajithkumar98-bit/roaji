                    : err.code === 'auth/weak-password'        ? 'Password is too weak. Use at least 6 characters.'
                    : err.message || 'Sign-up failed. Please try again.';

                {/* Phone (optional) */}
                <div style={{ marginBottom:'1.1rem' }}>

                <AuthField label="Confirm Password" type="password" value={form.confirm}

                  {fieldErr('confirm')}

                {/* Terms */}
                <label style={{
                  display:'flex', alignItems:'flex-start', gap:'0.6rem',

                  <input type="checkbox" checked={form.agree} onChange={e => set('agree', e.target.checked)}

                  <span style={{ fontSize:'0.78rem', color:'var(--c-muted)', lineHeight:1.5 }}>

                    <button type="button" style={{ background:'none', border:'none', cursor:'pointer', color:'var(--c-teal)', fontFamily:'var(--ff-main)', fontSize:'0.78rem' }}>Terms of Service</button>
                    {' '}and{' '}
                    <button type="button" style={{ background:'none', border:'none', cursor:'pointer', color:'var(--c-teal)', fontFamily:'var(--ff-main)', fontSize:'0.78rem' }}>Privacy Policy</button>
                  </span>

                {fieldErr('agree')}

                <button

                  onMouseOut={e  => { e.currentTarget.style.boxShadow='0 4px 20px rgba(124,58,237,0.35)'; }}

                    : 'Create Account'}

                <SocialRow />

              Already have an account?{' '}
              <button type="button" onClick={onSwitch} style={{
                background:'none', border:'none', cursor:'pointer',
                color:'var(--c-teal)', fontWeight:700, fontFamily:'var(--ff-main)', fontSize:'0.82rem',
              }}>Sign in</button>
            </p>
          </div>
        </div>
      );
    };

      { id:11, name:'Aba Outlet',        location:'Aba, Abia State',    status:'open',        revenue:'₦141,900', orders:9,  color:'#e879f9' },
      { id:12, name:'Warri Branch',      location:'Effurun, Delta',     status:'closed',      revenue:'₦88,400',  orders:0,  color:'#34d399' },
      { id:13, name:'Onitsha Market',    location:'Onitsha, Anambra',   status:'open',        revenue:'₦335,000', orders:26, color:'#fb7185' },
      { id:14, name:'Asaba Store',       location:'Asaba, Delta',       status:'open',        revenue:'₦112,700', orders:8,  color:'#818cf8' },
      { id:15, name:'Calabar Branch',    location:'Calabar, CRS',       status:'maintenance', revenue:'₦0',       orders:0,  color:'#2dd4bf' },
    ];

    /* ── Status config helper ────────────────────────────────────────── */
    const BRANCH_STATUS = {
      open:        { dot:'#22c55e', label:'Open',        bg:'rgba(34,197,94,0.12)',  border:'rgba(34,197,94,0.30)'  },
      closed:      { dot:'#ef4444', label:'Closed',      bg:'rgba(239,68,68,0.10)',  border:'rgba(239,68,68,0.28)'  },
      maintenance: { dot:'#f59e0b', label:'Maintenance', bg:'rgba(245,158,11,0.10)', border:'rgba(245,158,11,0.28)' },
    };

    /* ── Branch Selector component ───────────────────────────────────── */
    const BranchSelector = ({ branches = DEFAULT_BRANCHES }) => {
      const [open,          setOpen]          = useState(false);
      const [activeBranch,  setActiveBranch]  = useState(branches[0]);
      const [searchQuery,   setSearchQuery]   = useState('');
      const dropRef = useRef(null);

      /* Close on outside click */
      useEffect(() => {
        const handler = e => {
          if (dropRef.current && !dropRef.current.contains(e.target)) setOpen(false);
        };
        if (open) document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [open]);

      /* Filter branches by search */
      const filtered = branches.filter(b =>
        b.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
        b.location.toLowerCase().includes(searchQuery.toLowerCase())
      );

      const handleSelect = (branch) => {
        setActiveBranch(branch);
        setOpen(false);
        setSearchQuery('');
        /* ── PART 9B-2: Update active tenant context on branch switch ── */
        /* branch.id is used as the storeId — it is the unique per-outlet
           identifier that scopes all Firestore reads and writes.          */
        if (window.RoajiV2Store && window.RoajiV2Store.ready()) {
          const { uid } = window.RoajiV2Store.getActiveTenant();
          const activeUid = uid || (window.roajiV2Auth && window.roajiV2Auth.currentUser?.uid);
          if (activeUid) {
            window.RoajiV2Store.setActiveTenant(activeUid, String(branch.id));
          }
        }
      };

      const statusCfg = BRANCH_STATUS[activeBranch.status] || BRANCH_STATUS.open;

      return (
        <div ref={dropRef} style={{ position:'relative', flexShrink:0 }}>

          {/* ── Trigger button ── */}
          <button
            type="button"
            onClick={() => setOpen(v => !v)}
            style={{
              display:'flex', alignItems:'center', gap:'0.5rem',
              padding:'0.32rem 0.7rem 0.32rem 0.5rem',
              borderRadius:'10px',
              background: open
                ? 'rgba(0,245,212,0.10)'
                : 'rgba(255,255,255,0.05)',
              border: open
                ? `1px solid rgba(0,245,212,0.35)`
                : '1px solid rgba(255,255,255,0.09)',
              cursor:'pointer', transition:'all 0.18s',
              maxWidth:220,
            }}
            onMouseOver={e => { if (!open) { e.currentTarget.style.background='rgba(255,255,255,0.09)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.16)'; }}}
            onMouseOut={e  => { if (!open) { e.currentTarget.style.background='rgba(255,255,255,0.05)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.09)'; }}}
            title="Switch active branch"
          >
            {/* Color dot */}
            <span style={{
              width:9, height:9, borderRadius:'50%', flexShrink:0,
              background: activeBranch.color,
              boxShadow: `0 0 6px ${activeBranch.color}90`,
            }} />

            {/* Branch name + location */}
            <div style={{ textAlign:'left', lineHeight:1.25, minWidth:0 }}>
              <div style={{
                fontSize:'0.78rem', fontWeight:700, color:'var(--c-text)',
                whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:130,
              }}>{activeBranch.name}</div>
              <div style={{
                fontSize:'0.62rem', color:'var(--c-dim)',
                whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:130,
              }}>{activeBranch.location}</div>
            </div>

            {/* Live status badge */}
            <span style={{
              display:'inline-flex', alignItems:'center', gap:4,
              padding:'2px 7px', borderRadius:'99px', flexShrink:0,
              background: statusCfg.bg, border:`1px solid ${statusCfg.border}`,
              fontSize:'0.57rem', fontWeight:700, letterSpacing:'0.06em',
              textTransform:'uppercase', color: statusCfg.dot,
              fontFamily:'var(--ff-mono)',
            }}>
              <span style={{
                width:5, height:5, borderRadius:'50%',
                background: statusCfg.dot,
                display: activeBranch.status === 'open' ? 'inline-block' : 'inline-block',
                animation: activeBranch.status === 'open' ? 'pulse-glow 2s ease-in-out infinite' : 'none',
              }} />
              {statusCfg.label}
            </span>

            {/* Chevron */}
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--c-dim)" strokeWidth="2.4"
              strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink:0,
                transform: open ? 'rotate(180deg)' : 'none', transition:'transform 0.2s' }}>
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>

          {/* ── Dropdown panel ── */}
          {open && (
            <div className="animate-fadeSlideDown" style={{
              position:'absolute', top:'calc(100% + 10px)', left:0,
              width:320,
              background:'rgba(6,3,20,0.98)',
              border:'1px solid rgba(255,255,255,0.09)',
              borderRadius:'1rem',
              backdropFilter:'blur(32px)',
              WebkitBackdropFilter:'blur(32px)',
              boxShadow:'0 24px 72px rgba(0,0,0,0.75), 0 0 0 1px rgba(0,245,212,0.08)',
              zIndex:1100,
              overflow:'hidden',
            }}>

              {/* Panel header */}
              <div style={{
                padding:'0.85rem 1rem 0.7rem',
                borderBottom:'1px solid rgba(255,255,255,0.07)',
                display:'flex', alignItems:'center', justifyContent:'space-between',
              }}>
                <div>
                  <div style={{ fontSize:'0.78rem', fontWeight:700, color:'var(--c-text)' }}>
                    Switch Branch
                  </div>
                  <div style={{ fontSize:'0.65rem', color:'var(--c-dim)', marginTop:2 }}>
                    {branches.length} branches · {branches.filter(b => b.status === 'open').length} online now
                  </div>
                </div>
                {/* Branches count badge */}
                <span style={{
                  padding:'3px 9px', borderRadius:'99px',
                  background:'rgba(124,58,237,0.15)', border:'1px solid rgba(124,58,237,0.30)',
                  fontSize:'0.65rem', fontWeight:700, color:'#a78bfa',
                  fontFamily:'var(--ff-mono)',
                }}>{branches.length}</span>
              </div>

              {/* Search bar */}
              <div style={{ padding:'0.6rem 0.75rem', borderBottom:'1px solid rgba(255,255,255,0.05)' }}>
                <div style={{ position:'relative' }}>
                  <svg style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', pointerEvents:'none' }}
                    width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--c-dim)"
                    strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                  </svg>
                  <input
                    type="text"
                    placeholder="Search branches…"
                    value={searchQuery}
                    onChange={e => setSearchQuery(e.target.value)}
                    autoFocus
                    style={{
                      width:'100%', padding:'0.5rem 0.75rem 0.5rem 2rem',
                      background:'rgba(255,255,255,0.04)',
                      border:'1px solid rgba(255,255,255,0.09)',
                      borderRadius:'0.55rem',
                      color:'var(--c-text)', fontSize:'0.8rem',
                      fontFamily:'var(--ff-main)', outline:'none',
                      transition:'border-color 0.18s',
                    }}
                    onFocus={e => { e.target.style.borderColor='rgba(0,245,212,0.40)'; }}
                    onBlur={e  => { e.target.style.borderColor='rgba(255,255,255,0.09)'; }}
                  />
                </div>
              </div>

              {/* ── Dynamic branch list loop ── */}
              <div style={{ maxHeight:300, overflowY:'auto', padding:'0.4rem' }}>
                {filtered.length === 0 && (
                  <div style={{ padding:'1.5rem', textAlign:'center', color:'var(--c-dim)', fontSize:'0.78rem' }}>
                    No branches match "{searchQuery}"
                  </div>
                )}

                {filtered.map((branch, idx) => {
                  const isActive = activeBranch.id === branch.id;
                  const sCfg = BRANCH_STATUS[branch.status] || BRANCH_STATUS.open;

                  return (
                    <button
                      key={branch.id}
                      type="button"
                      onClick={() => handleSelect(branch)}
                      style={{
                        width:'100%', display:'flex', alignItems:'center', gap:'0.65rem',
                        padding:'0.6rem 0.7rem', borderRadius:'0.65rem',
                        background: isActive
                          ? `linear-gradient(135deg, ${branch.color}18, ${branch.color}08)`
                          : 'transparent',
                        border: isActive
                          ? `1px solid ${branch.color}40`
                          : '1px solid transparent',
                        cursor:'pointer', textAlign:'left',
                        transition:'all 0.15s',
                        marginBottom: idx < filtered.length - 1 ? 2 : 0,
                      }}
                      onMouseOver={e => { if (!isActive) { e.currentTarget.style.background='rgba(255,255,255,0.06)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.10)'; }}}
                      onMouseOut={e  => { if (!isActive) { e.currentTarget.style.background='transparent'; e.currentTarget.style.borderColor='transparent'; }}}
                    >
                      {/* Branch color swatch */}
                      <div style={{
                        width:34, height:34, borderRadius:'9px', flexShrink:0,
                        display:'flex', alignItems:'center', justifyContent:'center',
                        background: `${branch.color}20`,
                        border: `1px solid ${branch.color}35`,
                        boxShadow: isActive ? `0 0 10px ${branch.color}30` : 'none',
                      }}>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                          stroke={branch.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                          <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                      </div>

                      {/* Branch info */}
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ display:'flex', alignItems:'center', gap:'0.4rem', marginBottom:2 }}>
                          <span style={{
                            fontSize:'0.8rem', fontWeight: isActive ? 700 : 600,
                            color: isActive ? branch.color : 'var(--c-text)',
                            whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:130,
                          }}>{branch.name}</span>
                          {isActive && (
                            <span style={{
                              fontSize:'0.55rem', fontWeight:800, color:'#04040f',
                              background: branch.color, borderRadius:'99px',
                              padding:'1px 6px', letterSpacing:'0.06em', textTransform:'uppercase',
                              fontFamily:'var(--ff-mono)', flexShrink:0,
                            }}>ACTIVE</span>
                          )}
                        </div>
                        <div style={{ fontSize:'0.67rem', color:'var(--c-dim)' }}>{branch.location}</div>
                      </div>

                      {/* Right: revenue + status */}
                      <div style={{ textAlign:'right', flexShrink:0 }}>
                        <div style={{
                          fontSize:'0.72rem', fontWeight:700, fontFamily:'var(--ff-mono)',
                          color: branch.status === 'open' ? 'var(--c-text)' : 'var(--c-dim)',
                          marginBottom:3,
                        }}>{branch.revenue}</div>
                        <span style={{
                          display:'inline-flex', alignItems:'center', gap:3,
                          padding:'1px 6px', borderRadius:'99px',
                          background: sCfg.bg, border:`1px solid ${sCfg.border}`,
                          fontSize:'0.55rem', fontWeight:700, letterSpacing:'0.06em',
                          textTransform:'uppercase', color: sCfg.dot,
                          fontFamily:'var(--ff-mono)',
                        }}>
                          <span style={{ width:4, height:4, borderRadius:'50%', background: sCfg.dot, display:'inline-block' }} />
                          {sCfg.label}
                        </span>
                      </div>
                    </button>
                  );
                })}
              </div>

              {/* Footer CTA */}
              <div style={{
                padding:'0.65rem 1rem',
                borderTop:'1px solid rgba(255,255,255,0.07)',
                display:'flex', alignItems:'center', justifyContent:'space-between',
              }}>
                <span style={{ fontSize:'0.68rem', color:'var(--c-dim)' }}>
                  {activeBranch.orders > 0 ? `${activeBranch.orders} orders today` : 'No orders today'}
                </span>
                <button type="button" onClick={() => setOpen(false)} style={{
                  background:'none', border:'none', cursor:'pointer',
                  fontSize:'0.72rem', color:'var(--c-violet)', fontFamily:'var(--ff-main)', fontWeight:600,
                  display:'flex', alignItems:'center', gap:'0.3rem',
                }}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"
                    strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                  </svg>
                  Manage Branches →
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    /* ── Notification bell with animated badge ──────────────────────── */
    const NotificationBell = () => {
      const [open,  setOpen]  = useState(false);
      const [count, setCount] = useState(4);

      const notifications = [
        { id:1, type:'payment',  icon:'💳', title:'Payment received',     body:'Invoice #1042 paid — ₦85,000',      time:'2m ago',  unread:true  },
        { id:2, type:'alert',    icon:'⚠️', title:'Low stock alert',       body:'Indomie Noodles (5 units left)',     time:'18m ago', unread:true  },
        { id:3, type:'order',    icon:'📦', title:'New order placed',       body:'Order #2091 from Walk-in customer',  time:'1h ago',  unread:true  },
        { id:4, type:'system',   icon:'🔔', title:'Backup completed',       body:'Daily cloud backup successful',     time:'3h ago',  unread:true  },
        { id:5, type:'payment',  icon:'💳', title:'Payment reminder sent',  body:'Invoice #1039 overdue 3 days',      time:'5h ago',  unread:false },
      ];

      const markAllRead = () => setCount(0);

      return (
        <div style={{ position:'relative' }}>
          {/* Bell button */}
          <button
            type="button"
            onClick={() => { setOpen(v => !v); }}
            style={{
              position:'relative',
              width:40, height:40,
              borderRadius:'10px',
              display:'flex', alignItems:'center', justifyContent:'center',
              background: open ? 'rgba(0,245,212,0.10)' : 'rgba(255,255,255,0.05)',
              border: open ? '1px solid rgba(0,245,212,0.30)' : '1px solid rgba(255,255,255,0.08)',
              cursor:'pointer',
              transition:'all 0.18s',
              color: open ? 'var(--c-teal)' : 'var(--c-muted)',
            }}
            onMouseOver={e => { if (!open) { e.currentTarget.style.background='rgba(255,255,255,0.09)'; e.currentTarget.style.color='var(--c-text)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.14)'; }}}
            onMouseOut={e  => { if (!open) { e.currentTarget.style.background='rgba(255,255,255,0.05)'; e.currentTarget.style.color='var(--c-muted)';  e.currentTarget.style.borderColor='rgba(255,255,255,0.08)'; }}}
            title="Notifications"
          >
            {/* Bell SVG */}
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            {/* Count badge */}
            {count > 0 && (
              <span style={{
                position:'absolute', top:-3, right:-3,
                minWidth:17, height:17, borderRadius:'99px',
                background:'linear-gradient(135deg,#ec4899,#7c3aed)',
                fontSize:'0.6rem', fontWeight:800, color:'#fff',
                display:'flex', alignItems:'center', justifyContent:'center',
                border:'2px solid #04040f',
                fontFamily:'var(--ff-mono)',
                padding:'0 3px',
              }}>{count > 9 ? '9+' : count}</span>
            )}
          </button>

          {/* Dropdown panel */}
          {open && (
            <div className="animate-fadeSlideDown" style={{
              position:'absolute', top:'calc(100% + 10px)', right:0,
              width:340,
              background:'rgba(8,4,24,0.97)',
              border:'1px solid rgba(255,255,255,0.09)',
              borderRadius:'0.9rem',
              backdropFilter:'blur(28px)',
              WebkitBackdropFilter:'blur(28px)',
              boxShadow:'0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(124,58,237,0.12)',
              zIndex:1000,
              overflow:'hidden',
            }}>
              {/* Header */}
              <div style={{
                padding:'0.85rem 1rem 0.75rem',
                borderBottom:'1px solid rgba(255,255,255,0.07)',
                display:'flex', alignItems:'center', justifyContent:'space-between',
              }}>
                <span style={{ fontSize:'0.82rem', fontWeight:700, color:'var(--c-text)' }}>
                  Notifications {count > 0 && <span style={{ color:'var(--c-pink)', fontSize:'0.72rem', marginLeft:4 }}>{count} new</span>}
                </span>
                <button type="button" onClick={markAllRead} style={{
                  background:'none', border:'none', cursor:'pointer',
                  fontSize:'0.7rem', color:'var(--c-teal)', fontFamily:'var(--ff-main)', fontWeight:600,
                }}>Mark all read</button>
              </div>

              {/* List */}
              <div style={{ maxHeight:320, overflowY:'auto' }}>
                {notifications.map(n => (
                  <div key={n.id} style={{
                    padding:'0.75rem 1rem',
                    borderBottom:'1px solid rgba(255,255,255,0.05)',
                    display:'flex', gap:'0.7rem', alignItems:'flex-start',
                    background: n.unread ? 'rgba(124,58,237,0.05)' : 'transparent',
                    cursor:'pointer',
                    transition:'background 0.15s',
                  }}
                    onMouseOver={e => e.currentTarget.style.background='rgba(255,255,255,0.04)'}
                    onMouseOut={e  => e.currentTarget.style.background= n.unread ? 'rgba(124,58,237,0.05)' : 'transparent'}
                  >
                    <div style={{
                      width:34, height:34, borderRadius:'9px', flexShrink:0,
                      display:'flex', alignItems:'center', justifyContent:'center',
                      fontSize:'1rem',
                      background:'rgba(255,255,255,0.06)',
                      border:'1px solid rgba(255,255,255,0.07)',

                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{
                        fontSize:'0.78rem', fontWeight: n.unread ? 700 : 500,
                        color: n.unread ? 'var(--c-text)' : 'var(--c-muted)',
                        marginBottom:'2px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                      }}>{n.title}</div>
                      <div style={{ fontSize:'0.72rem', color:'var(--c-dim)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{n.body}</div>
                    </div>
                    <div style={{ flexShrink:0, fontSize:'0.65rem', color:'var(--c-dim)', marginTop:1 }}>{n.time}</div>
                    {n.unread && (
                      <div style={{
                        width:7, height:7, borderRadius:'50%', flexShrink:0, marginTop:5,

                      }} />

                  </div>
                ))}
              </div>

              {/* Footer */}
              <div style={{
                padding:'0.65rem 1rem',
                borderTop:'1px solid rgba(255,255,255,0.07)',
                textAlign:'center',
              }}>
                <button type="button" style={{
                  background:'none', border:'none', cursor:'pointer',
                  fontSize:'0.75rem', color:'var(--c-violet)', fontFamily:'var(--ff-main)', fontWeight:600,
                }}>View all notifications →</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    /* ── Quick-Add action button ─────────────────────────────────────── */
    const QuickAddButton = () => {
      const [open, setOpen] = useState(false);

      const actions = [
        { icon:'🧾', label:'New Invoice',    color:'#00f5d4' },
        { icon:'🛒', label:'New Sale',       color:'#7c3aed' },
        { icon:'📦', label:'Add Product',   color:'#f59e0b' },
        { icon:'👤', label:'Add Customer',  color:'#ec4899' },
        { icon:'💸', label:'Record Expense', color:'#3b82f6' },

      return (
        <div style={{ position:'relative' }}>
          <button
            type="button"

            onMouseOut={e  => { if (!open) { e.currentTarget.style.background='linear-gradient(135deg,rgba(0,245,212,0.18),rgba(6,182,212,0.12))'; e.currentTarget.style.color='var(--c-teal)'; e.currentTarget.style.boxShadow='none'; }}}

          >

              <line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>

          {open && (
            <div className="animate-fadeSlideDown" style={{
              position:'absolute', top:'calc(100% + 10px)', right:0,
              width:200,
              background:'rgba(8,4,24,0.97)',
              border:'1px solid rgba(255,255,255,0.09)',
              borderRadius:'0.9rem',
              backdropFilter:'blur(28px)',
              WebkitBackdropFilter:'blur(28px)',
              boxShadow:'0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,245,212,0.10)',
              zIndex:1000,
              padding:'0.5rem',
              overflow:'hidden',
            }}>
              <div style={{ padding:'0.4rem 0.65rem 0.5rem', borderBottom:'1px solid rgba(255,255,255,0.07)', marginBottom:'0.35rem' }}>

    /* ════════════════════════════════════════════════════════════════════
       PART 13B-1 MODULE 2 PART-B — CONNECTION BADGE REACT COMPONENT
       ─────────────────────────────────────────────────────────────────
       GLOBAL STATE SOURCES:
         isOnline      — derived from window.RoajiOnlineStatus.isOnline()
                         Subscribed via window.RoajiOnlineStatus.subscribe(fn)
                         so every connectivity flip triggers an immediate
                         synchronous React state update with no polling lag.

         unsyncedCount — derived from window.RoajiOnlineStatus.getQueue().length
                         Polled every 3 s via setInterval to capture entries
                         appended by checkout handlers, offline write guards,
                         or any background code that enqueues without firing a
                         subscribe callback.  Also refreshed synchronously on
                         every connectivity change so the chip updates the
                         instant the badge flips between online / offline.

       RENDERING CONTRACT:
         The component exclusively targets the '.roaji-conn-badge' CSS
         framework defined in PART 13B-1 MODULE 2 PART-A.  It returns a
         single root <div> whose className is composed dynamically from
         the 'online' | 'offline' state modifier.  Three sub-elements
         are returned in deterministic order:

           1. <span className="roaji-conn-dot" />
                — 6×6 px animated circle; colour and keyframe are
                  controlled entirely by the Part-A CSS state modifier.
                  No inline style override is applied here.

           2. Status label text node
                — 'LIVE ONLINE' when isOnline is true.
                — 'OFFLINE MODE' when isOnline is false.
                  Rendered as a plain text child (no wrapper span) so
                  the badge collapses cleanly on narrow mobile viewports.

           3. <span className="roaji-queue-chip"> (conditional)
                — Rendered ONLY when isOnline is false AND unsyncedCount
                  exceeds zero.  Shows the raw integer so cashiers can
                  see exactly how many transactions are waiting to sync.
                  The spring entrance animation (queue-badge-pop) is
                  driven by the Part-A keyframe applied on the class.
                  A React key={unsyncedCount} is set so the entrance
                  animation re-fires whenever the count changes, giving
                  cashiers a visible confirmation each time a new
                  offline transaction is enqueued.

       ACCESSIBILITY:
         role="status" + aria-live="polite" let screen readers announce
         connectivity changes without interrupting active interactions.
         aria-label is recomputed on every render so assistive technology
         always reads the current count.

       CLEANUP:
         The useEffect return value unsubscribes the RoajiOnlineStatus
         listener AND clears the poll interval atomically, preventing
         memory leaks on unmount (e.g. sign-out or hot-reload cycles).
    ════════════════════════════════════════════════════════════════════ */

    const ConnectionStatusBadge = () => {
      /* ── State: isOnline ─────────────────────────────────────────────
         Seed from the live global at mount time so the badge renders
         the correct state on first paint without waiting for a subscribe
         callback.  Falls back to true (online) when the global is not
         yet available (e.g. script evaluation race on slow networks).  */
      const [isOnline, setIsOnline] = useState(
        window.RoajiOnlineStatus ? window.RoajiOnlineStatus.isOnline() : true
      );

      /* ── State: unsyncedCount ────────────────────────────────────────
         Count of pending offline transactions in the local queue.
         Seeded at 0; refreshed immediately in the effect so the chip
         appears on the first render cycle if bills are already queued.  */
      const [unsyncedCount, setUnsyncedCount] = useState(0);

      /* ── Helper: read live queue length from global store ────────────
         Reads window.RoajiOnlineStatus.getQueue() — the authoritative
         LocalStorage-backed offline queue managed by PART 10A-1.
         Guards against missing global gracefully (returns 0).          */
      const readUnsyncedCount = () => {
        if (
          window.RoajiOnlineStatus &&
          typeof window.RoajiOnlineStatus.getQueue === 'function'
        ) {
          return window.RoajiOnlineStatus.getQueue().length;
        }
        if (
          window.RoajiSyncEngine &&
          typeof window.RoajiSyncEngine.getStatus === 'function'
        ) {
          const status = window.RoajiSyncEngine.getStatus();
          return typeof status.queueLength === 'number' && status.queueLength >= 0
            ? status.queueLength
            : 0;
        }
        return 0;
      };

      /* ── Effect: subscribe + poll ────────────────────────────────────
         1. Subscribe to RoajiOnlineStatus for instant connectivity flips.
            On each flip: update isOnline AND resample unsyncedCount so
            both states stay in sync on the same render frame.
         2. Seed unsyncedCount synchronously after subscription is live.
         3. Start a 3 s poll interval to catch queue entries added by
            checkout handlers that do not trigger the subscribe callback.
         4. Return a cleanup fn that unsubscribes + clears the interval.  */
      useEffect(() => {
        if (!window.RoajiOnlineStatus) return;

        const handleConnectivityChange = (nowOnline) => {
          setIsOnline(nowOnline);
          setUnsyncedCount(readUnsyncedCount());
        };

        const unsubscribe = window.RoajiOnlineStatus.subscribe(handleConnectivityChange);

        /* ── PART 13B-2 Part-A: Subscribe to RoajiOfflineCountBus ──────────
           Eliminates the 3-second poll lag for offline cashier workflows.
           When roajiV2QueueOfflineBill enqueues a bill, the bus fires
           immediately with the new queue length so this badge updates
           on the same React render frame as the checkout confirmation.  */
        let unsubscribeCountBus = null;
        if (window.RoajiOfflineCountBus &&
            typeof window.RoajiOfflineCountBus.subscribe === 'function') {
          unsubscribeCountBus = window.RoajiOfflineCountBus.subscribe((newCount) => {
            setUnsyncedCount(newCount);
          });
        }

        setUnsyncedCount(readUnsyncedCount());

        const pollIntervalId = setInterval(() => {
          setUnsyncedCount(readUnsyncedCount());
        }, 3000);

        return () => {
          unsubscribe();
          if (unsubscribeCountBus) unsubscribeCountBus();
          clearInterval(pollIntervalId);
        };
      }, []);

      /* ── Derived: accessible label string ───────────────────────────
         Computed inline so aria-label always reflects the exact state
         that is visually displayed without a separate memoised value.  */
      const ariaLabel = isOnline
        ? 'Connection status: live online, all transactions syncing'
        : `Connection status: offline mode, ${unsyncedCount} unsynced transaction${unsyncedCount !== 1 ? 's' : ''} queued`;

      /* ── Render ──────────────────────────────────────────────────────
         Root div: className composed from base + state modifier.
         Sub-elements in strict order: dot → label → chip (conditional).
         No inline styles on any child — all visual rules are owned by
         the Part-A CSS so updates to animations or colours never require
         touching this component.                                         */
      return (
        <div
          className={`roaji-conn-badge ${isOnline ? 'online' : 'offline'}`}
          role="status"
          aria-live="polite"
          aria-label={ariaLabel}
          title={isOnline
            ? 'Connected — all transactions syncing live'
            : `Offline Mode — ${unsyncedCount} transaction${unsyncedCount !== 1 ? 's' : ''} queued`}
        >
          <span className="roaji-conn-dot" aria-hidden="true" />

          {isOnline ? 'LIVE ONLINE' : 'OFFLINE MODE'}

          {!isOnline && unsyncedCount > 0 && (
            <span
              key={unsyncedCount}
              className="roaji-queue-chip"
              aria-hidden="true"
            >
              {unsyncedCount}
            </span>
          )}
        </div>
      );
    };

    /* ── Offline Queue Toast (fixed bottom-right notification) ───────── */
    const OfflineQueueToast = () => {
      const [online,     setOnline]     = useState(
        window.RoajiOnlineStatus ? window.RoajiOnlineStatus.isOnline() : true
      );
      const [queueCount, setQueueCount] = useState(0);
      const [flushing,   setFlushing]   = useState(false);
      const [dismissed,  setDismissed]  = useState(false);

      const refreshQueue = () => {
        if (window.RoajiOnlineStatus) {
          setQueueCount(window.RoajiOnlineStatus.getQueue().length);
        }
      };

      useEffect(() => {
        if (!window.RoajiOnlineStatus) return;
        refreshQueue();
        const unsub = window.RoajiOnlineStatus.subscribe(isOnline => {
          setOnline(isOnline);
          setDismissed(false); // reshow on status change
          refreshQueue();
        });
        const pollId = setInterval(refreshQueue, 4000);
        return () => { unsub(); clearInterval(pollId); };
      }, []);

      const handleFlush = async () => {
        if (!window.RoajiOnlineStatus || flushing) return;
        setFlushing(true);
        try {
          await window.RoajiOnlineStatus.flushNow();
          refreshQueue();
        } catch(_) {}
        setFlushing(false);
      };

      /* Show toast only when offline AND there are queued items AND not dismissed */
      if (online || queueCount === 0 || dismissed) return null;

      return (
        <div className="roaji-offline-toast" role="alert" aria-live="polite">
          {/* Icon */}
          <div style={{
            width:34, height:34, borderRadius:'0.55rem', flexShrink:0,
            background:'rgba(245,158,11,0.13)',
            border:'1px solid rgba(245,158,11,0.35)',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:'1rem', marginTop:'1px',
          }}>📶</div>

          {/* Text */}
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:'0.78rem', fontWeight:800, color:'#f59e0b', marginBottom:'0.22rem' }}>
              Offline Mode Active
            </div>
            <div style={{ fontSize:'0.68rem', color:'rgba(255,255,255,0.55)', lineHeight:1.55 }}>
              {queueCount} transaction{queueCount !== 1 ? 's' : ''} saved locally.
              {' '}They will sync automatically when you reconnect.
            </div>
            <div style={{ display:'flex', gap:'0.5rem', marginTop:'0.55rem', flexWrap:'wrap' }}>
              <button
                type="button"
                onClick={handleFlush}
                disabled={flushing}
                style={{
                  padding:'0.28rem 0.7rem', borderRadius:'0.45rem', cursor: flushing ? 'default' : 'pointer',
                  background: flushing ? 'rgba(245,158,11,0.08)' : 'rgba(245,158,11,0.15)',
                  border:'1px solid rgba(245,158,11,0.40)',
                  color:'#fbbf24', fontSize:'0.65rem', fontWeight:700,
                  fontFamily:'var(--ff-main)',
                  display:'flex', alignItems:'center', gap:'0.3rem',
                  transition:'all 0.15s',
                }}
              >
                {flushing
                  ? <><span style={{ display:'inline-block', width:10, height:10, border:'2px solid rgba(251,191,36,0.3)', borderTopColor:'#fbbf24', borderRadius:'50%', animation:'spin 0.8s linear infinite' }} />Retrying…</>
                  : '↺ Retry Now'
                }
              </button>
              <button
                type="button"
                onClick={() => setDismissed(true)}
                style={{
                  padding:'0.28rem 0.7rem', borderRadius:'0.45rem', cursor:'pointer',
                  background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.09)',
                  color:'rgba(255,255,255,0.35)', fontSize:'0.65rem', fontWeight:600,
                  fontFamily:'var(--ff-main)', transition:'all 0.15s',
                }}
              >Dismiss</button>
            </div>
          </div>

          {/* Close × */}
          <button
            type="button"
            onClick={() => setDismissed(true)}
            aria-label="Close"
            style={{
              background:'none', border:'none', cursor:'pointer',
              color:'rgba(255,255,255,0.28)', fontSize:'1rem', lineHeight:1,
              padding:'2px', alignSelf:'flex-start', flexShrink:0,
              transition:'color 0.15s',
            }}
            onMouseOver={e  => e.currentTarget.style.color='rgba(255,255,255,0.65)'}
            onMouseOut={e   => e.currentTarget.style.color='rgba(255,255,255,0.28)'}
          >✕</button>
        </div>
      );
    };

    /* ════════════════════════════════════════════════════════════════════
       PART 10A-1 — OFFLINE-AWARE addBill WRAPPER
       ─────────────────────────────────────────────────────────────────
       roajiSmartAddBill(billData, storeIdOverride)
         Drop-in replacement for RoajiV2Store.addBill().
         • Online  → calls RoajiV2Store.addBill() directly
         • Offline → saves payload to the offline queue via
                     RoajiOnlineStatus.saveTransaction()
         Returns  { mode: 'live'|'offline', id: string }
    ════════════════════════════════════════════════════════════════════ */
    async function roajiSmartAddBill(billData, storeIdOverride) {
      const isOnline = window.RoajiOnlineStatus && window.RoajiOnlineStatus.isOnline();
      /* Stamp UUID (Part 10A-2 deduplication) */
      const stamped = window.roajiStampSyncUUID
        ? window.roajiStampSyncUUID(billData)
        : billData;
      if (isOnline && window.RoajiV2Store && window.RoajiV2Store.ready()) {
        /* Use UUID-checked write for exactly-once guarantee */
        const result = window.roajiV2UUIDCheckAndWrite
          ? await window.roajiV2UUIDCheckAndWrite({ ...stamped, _storeIdOverride: storeIdOverride || null })
          : await window.RoajiV2Store.addBill(stamped, storeIdOverride);
        const id = result && result._deduplicated ? result.syncUUID : result;
        return { mode: 'live', id };
      } else {
        const offlineId = window.RoajiOnlineStatus
          ? window.RoajiOnlineStatus.saveTransaction({ ...stamped, _storeIdOverride: storeIdOverride || null })
          : null;
        return { mode: 'offline', id: offlineId };
      }
    }
    /* Expose so all panels can use it */
    window.roajiSmartAddBill = roajiSmartAddBill;

    const GiftLineRow = ({ row, idx, onChange, onRemove, animDelay }) => {

      const handleProductChange = (sku) => {
        const prod = GIFT_PRODUCTS.find(p => p.sku === sku);
        if (prod) {
          onChange(row.id, 'sku',       sku);
          onChange(row.id, 'name',      prod.name);
          onChange(row.id, 'type',      prod.type);
          onChange(row.id, 'unitPrice', prod.price);
        } else {
          onChange(row.id, 'sku', sku);
        }
      };

      const total = lineTotal(row);
      const fmt   = (v) => '₦' + Number(v).toLocaleString('en-NG', { minimumFractionDigits:0, maximumFractionDigits:0 });

      return (

          className="gifts-line-row"
          style={{ animationDelay:`${animDelay}ms`, borderBottom:'1px solid rgba(255,255,255,0.045)' }}

              style={{ width:'100%', padding:'0.4rem 1.7rem 0.4rem 0.55rem', fontSize:'0.76rem' }}
              value={row.sku}
              onChange={e => handleProductChange(e.target.value)}
            >
              <option value="">— select product —</option>
              {GIFT_PRODUCTS.map(p => (
                <option key={p.sku} value={p.sku}>{p.name}</option>
              ))}

          <td style={{ padding:'0.4rem 0.35rem', minWidth:130, verticalAlign:'middle' }}>

              className="gbi-cell-input"
              placeholder="Description…"
              value={row.sku === 'CUSTOM' || !row.sku ? row.name : row.name}
              readOnly={row.sku !== 'CUSTOM' && row.sku !== '' && row.sku !== 'GR-RELOAD'}
              onChange={e => onChange(row.id, 'name', e.target.value)}
              style={{ opacity: (row.sku !== 'CUSTOM' && row.sku !== '' && row.sku !== 'GR-RELOAD') ? 0.65 : 1 }}
            />
          </td>

          {/* Type badge */}
          <td style={{ padding:'0.4rem 0.35rem', width:72, verticalAlign:'middle', textAlign:'center' }}>
            <span style={{
              fontSize:'0.6rem', fontWeight:700, padding:'2px 7px',
              borderRadius:'99px', display:'inline-block', letterSpacing:'0.05em',
              background: row.type === 'Gift Card' ? 'rgba(0,245,212,0.12)' :
                          row.type === 'Gift Basket' ? 'rgba(245,158,11,0.12)' :
                          row.type === 'Wrap' ? 'rgba(236,72,153,0.12)' :
                          row.type === 'Reload' ? 'rgba(96,165,250,0.12)' :
                          'rgba(167,139,250,0.12)',
              color: row.type === 'Gift Card' ? '#00f5d4' :
                     row.type === 'Gift Basket' ? '#f59e0b' :
                     row.type === 'Wrap' ? '#ec4899' :
                     row.type === 'Reload' ? '#60a5fa' :
                     '#a78bfa',
              border: `1px solid ${
                row.type === 'Gift Card' ? 'rgba(0,245,212,0.25)' :
                row.type === 'Gift Basket' ? 'rgba(245,158,11,0.25)' :
                row.type === 'Wrap' ? 'rgba(236,72,153,0.25)' :
                row.type === 'Reload' ? 'rgba(96,165,250,0.25)' :
                'rgba(167,139,250,0.25)'
              }`,
            }}>{row.type || '—'}</span>
          </td>

          {/* Qty */}
          <td style={{ padding:'0.4rem 0.35rem', width:64, verticalAlign:'middle' }}>
            <input
              className="gbi-cell-input"
              type="number" min="1"
              value={row.qty}
              onChange={e => onChange(row.id, 'qty', Math.max(1, parseInt(e.target.value)||1))}
              style={{ textAlign:'center', padding:'0.4rem 0.3rem' }}
            />
          </td>

          {/* Unit price */}
          <td style={{ padding:'0.4rem 0.35rem', width:106, verticalAlign:'middle' }}>
            <div style={{ position:'relative' }}>
              <span style={{ position:'absolute', left:'0.45rem', top:'50%', transform:'translateY(-50%)', fontSize:'0.7rem', color:'var(--c-dim)', pointerEvents:'none' }}>₦</span>
              <input
                className="gbi-cell-input"
                type="number" min="0"
                value={row.unitPrice}
                onChange={e => onChange(row.id, 'unitPrice', parseFloat(e.target.value)||0)}
                style={{ paddingLeft:'1.3rem', textAlign:'right', fontFamily:'var(--ff-mono)' }}
              />
            </div>
          </td>

          {/* Discount % */}
          <td style={{ padding:'0.4rem 0.35rem', width:72, verticalAlign:'middle' }}>
            <div style={{ position:'relative' }}>
              <input
                className="gbi-cell-input"
                type="number" min="0" max="100"
                value={row.discount}
                onChange={e => onChange(row.id, 'discount', Math.min(100, parseFloat(e.target.value)||0))}
                style={{ paddingRight:'1.4rem', textAlign:'right', fontFamily:'var(--ff-mono)' }}
              />
              <span style={{ position:'absolute', right:'0.45rem', top:'50%', transform:'translateY(-50%)', fontSize:'0.7rem', color:'var(--c-dim)', pointerEvents:'none' }}>%</span>
            </div>
          </td>

          {/* Note */}
          <td style={{ padding:'0.4rem 0.35rem', minWidth:100, verticalAlign:'middle' }}>
            <input
              className="gbi-cell-input"
              placeholder="e.g. custom msg…"
              value={row.note}
              onChange={e => onChange(row.id, 'note', e.target.value)}
            />
          </td>

          {/* Line total */}
          <td style={{ padding:'0.4rem 0.75rem 0.4rem 0.35rem', width:110, verticalAlign:'middle', textAlign:'right' }}>
            <span style={{
              fontFamily:'var(--ff-mono)', fontSize:'0.82rem', fontWeight:700,
              color: total > 0 ? 'var(--c-teal)' : 'var(--c-dim)',
              textShadow: total > 0 ? '0 0 10px rgba(0,245,212,0.3)' : 'none',
            }}>{total > 0 ? fmt(total) : '—'}</span>
          </td>

          {/* Remove */}
          <td style={{ padding:'0.4rem 0.5rem', width:32, verticalAlign:'middle', textAlign:'center' }}>
            <button type="button" onClick={() => onRemove(row.id)}
              style={{
                width:22, height:22, borderRadius:'50%',
                background: hov ? 'rgba(248,113,113,0.18)' : 'rgba(255,255,255,0.05)',
                border: `1px solid ${hov ? 'rgba(248,113,113,0.4)' : 'rgba(255,255,255,0.08)'}`,
                color: hov ? '#f87171' : 'var(--c-dim)', cursor:'pointer',
                fontSize:'0.72rem', display:'flex', alignItems:'center', justifyContent:'center',
                transition:'all 0.16s', flexShrink:0,
              }}
              title="Remove line"
            >✕</button>
          </td>
        </tr>
      );
    };

    /* ── Gifts Invoice History seed data ──────────────────────────────── */
    /* ── Seed history data (module-level; GiftsPanel loads this into useState) ── */
    const GIFTS_INV_HISTORY_SEED = [
      { id:'GFT-INV-0051', customer:'Amina Bello',    date:'28 May 2026', items:3, subtotal:60000,  discount:5,   tax:7.5, total:59625,  payment:'Card',    status:'Paid',    ref:'GC-00142' },
      { id:'GFT-INV-0050', customer:'Chidi Okafor',   date:'27 May 2026', items:1, subtotal:25000,  discount:0,   tax:7.5, total:26875,  payment:'Transfer',status:'Paid',    ref:'GC-00141' },
      { id:'GFT-INV-0049', customer:'Fatima Usman',   date:'26 May 2026', items:2, subtotal:8300,   discount:10,  tax:7.5, total:8018,   payment:'Cash',    status:'Pending', ref:'GC-00140' },
      { id:'GFT-INV-0048', customer:'Emeka Nwosu',    date:'25 May 2026', items:4, subtotal:94500,  discount:8,   tax:7.5, total:93375,  payment:'Card',    status:'Paid',    ref:'GC-00139' },
      { id:'GFT-INV-0047', customer:'Ngozi Adeyemi',  date:'22 May 2026', items:1, subtotal:15000,  discount:0,   tax:7.5, total:16125,  payment:'Cash',    status:'Overdue', ref:'GC-00138' },
      { id:'GFT-INV-0046', customer:'Taiwo Adesanya', date:'20 May 2026', items:2, subtotal:47000,  discount:15,  tax:7.5, total:42699,  payment:'Transfer',status:'Paid',    ref:'GC-00137' },
      { id:'GFT-INV-0045', customer:'Grace Obi',      date:'18 May 2026', items:5, subtotal:112000, discount:12,  tax:7.5, total:106491, payment:'Card',    status:'Paid',    ref:'GC-00136' },
      { id:'GFT-INV-0044', customer:'Seun Bankole',   date:'15 May 2026', items:1, subtotal:5000,   discount:0,   tax:0,   total:5000,   payment:'Cash',    status:'Void',    ref:'GC-00135' },
    ];

    /* ── Main GiftsPanel — Core Billing Module ───────────────────────── */
    const GiftsPanel = () => {
      /* ── billing form state ── */
      const [customer,     setCustomer]     = useState({ name:'', phone:'', email:'', address:'', loyalty:'' });
      const [invoiceRef,   setInvoiceRef]   = useState('GFT-INV-0052');
      const [invoiceDate,  setInvoiceDate]  = useState('2026-05-28');
      const [dueDate,      setDueDate]      = useState('2026-06-04');
      const [paymentMethod,setPaymentMethod]= useState('Cash');
      const [globalDisc,   setGlobalDisc]   = useState(0);
      const [taxRate,      setTaxRate]      = useState(7.5);
      const [notes,        setNotes]        = useState('');
      const [billStatus,   setBillStatus]   = useState('Draft');

      /* ── line items ── */
      const [lines,        setLines]        = useState([
        { ...blankGiftLine(1), sku:'GC-STD', name:'Gift Card — Standard', type:'Gift Card', qty:2, unitPrice:10000, discount:0 },
        { ...blankGiftLine(2), sku:'GW-FOIL', name:'Gift Wrap — Foil Gold', type:'Wrap',    qty:2, unitPrice:2500,  discount:0 },
        blankGiftLine(3),
      ]);
      const [nextId, setNextId] = useState(4);

      /* ── invoice history tab ── */
      const [activeSection,   setActiveSection]   = useState('billing'); // 'billing' | 'history'
      const [histFilter,      setHistFilter]       = useState('All');
      const [histSearch,      setHistSearch]       = useState('');
      const [invoiceHistory,  setInvoiceHistory]   = useState(GIFTS_INV_HISTORY_SEED);
      const [saveToast,       setSaveToast]        = useState(null); // { msg, ok }
      const saveToastRef = React.useRef(null);

      /* ══════════════════════════════════════════════════════════════
         PART 11 — SAVE INVOICE HANDLER
         Validates the current billing form, assembles a history record
         from live state, prepends it to invoiceHistory, auto-increments
         the invoice reference counter, resets the form to a fresh draft,
         and shows an in-panel confirmation toast.
      ══════════════════════════════════════════════════════════════ */
      const showSaveToast = (msg, ok = true) => {
        setSaveToast({ msg, ok });
        clearTimeout(saveToastRef.current);
        saveToastRef.current = setTimeout(() => setSaveToast(null), 3000);
      };

      const handleSaveInvoice = () => {
        /* ── Validation ── */
        const filledSaveLines = lines.filter(l => l.name && l.qty > 0 && l.unitPrice > 0);
        if (filledSaveLines.length === 0) {
          showSaveToast('\u26a0\ufe0f  Add at least one item before saving.', false);
          return;
        }

        /* ── Duplicate guard: same ref already in history ── */
        if (invoiceHistory.some(h => h.id === invoiceRef)) {
          showSaveToast('\u26a0\ufe0f  Invoice ' + invoiceRef + ' is already saved.', false);
          return;
        }

        /* ── Format the display date from ISO value ── */
        const fmtDateDisplay = (iso) => {
          try {
            const d = new Date(iso);
            return d.toLocaleDateString('en-NG', { day:'2-digit', month:'short', year:'numeric' });
          } catch(_) { return iso; }
        };

        /* ── Build the history record ── */
        const newRecord = {
          id:       invoiceRef,
          customer: customer.name || 'Walk-in',
          date:     fmtDateDisplay(invoiceDate),
          items:    filledSaveLines.length,
          subtotal: Math.round(linesSubtotal * 100) / 100,
          discount: globalDisc,
          tax:      taxRate,
          total:    Math.round(grandTotal * 100) / 100,
          payment:  paymentMethod,
          status:   billStatus === 'Draft' ? 'Pending' : billStatus,
          ref:      customer.loyalty || '\u2014',
        };

        /* ── Prepend to history ── */
        setInvoiceHistory(prev => [newRecord, ...prev]);

        /* ── Auto-increment invoice reference (e.g. GFT-INV-0052 -> 0053) ── */
        const nextRef = invoiceRef.replace(/(\d+)$/, (match) => {
          const next = parseInt(match, 10) + 1;
          return String(next).padStart(match.length, '0');
        });

        /* ── Reset billing form to a clean draft ── */
        setInvoiceRef(nextRef);
        setBillStatus('Draft');
        setCustomer({ name:'', phone:'', email:'', address:'', loyalty:'' });
        setLines([
          { ...blankGiftLine(1) },
          blankGiftLine(2),
          blankGiftLine(3),
        ]);
        setNextId(4);
        setGlobalDisc(0);
        setTaxRate(7.5);
        setNotes('');
        setPaymentMethod('Cash');

        /* ── Confirm ── */
        showSaveToast('\u2705 Invoice ' + newRecord.id + ' saved! New draft: ' + nextRef);
      };

      /* ── line handlers ── */
      const handleLineChange = (id, field, value) => {
        setLines(ls => ls.map(l => l.id === id ? { ...l, [field]: value } : l));
      };
      const addLine = () => {
        setLines(ls => [...ls, blankGiftLine(nextId)]);
        setNextId(n => n + 1);
      };
      const removeLine = (id) => {
        setLines(ls => ls.length > 1 ? ls.filter(l => l.id !== id) : ls);
      };

      /* ── totals computation ── */
      const linesSubtotal  = lines.reduce((s, l) => s + lineTotal(l), 0);
      const globalDiscAmt  = linesSubtotal * (globalDisc / 100);
      const afterDiscount  = linesSubtotal - globalDiscAmt;
      const taxAmt         = afterDiscount * (taxRate / 100);
      const grandTotal     = afterDiscount + taxAmt;
      const fmt = (v) => '₦' + Number(v).toLocaleString('en-NG', { minimumFractionDigits:2, maximumFractionDigits:2 });

      /* ── filtered history ── */
      const filteredHistory = invoiceHistory.filter(inv => {
        const matchStatus = histFilter === 'All' || inv.status === histFilter;
        const q = histSearch.toLowerCase();
        const matchSearch = !q
          || inv.id.toLowerCase().includes(q)
          || inv.customer.toLowerCase().includes(q)
          || inv.ref.toLowerCase().includes(q);
        return matchStatus && matchSearch;
      });

      /* ── customer field helper ── */
      const CustField = ({ label, fk, placeholder, half, type='text' }) => (
        <div className="gbill-field" style={{ flex: half ? '1 1 45%' : '1 1 100%', minWidth:0 }}>
          <label className="gbill-label">{label}</label>
          <input
            className="gbill-input"
            type={type}
            placeholder={placeholder}
            value={customer[fk]}
            onChange={e => setCustomer(c => ({ ...c, [fk]: e.target.value }))}
          />
        </div>
      );

      /* ── status badge resolver ── */
      const statusBadge = (s) => {
        const map = {
          Paid:    { bg:'rgba(52,211,153,0.12)', border:'rgba(52,211,153,0.30)',  color:'#34d399' },
          Pending: { bg:'rgba(96,165,250,0.12)', border:'rgba(96,165,250,0.30)',  color:'#60a5fa' },
          Overdue: { bg:'rgba(248,113,113,0.12)',border:'rgba(248,113,113,0.30)', color:'#f87171' },
          Draft:   { bg:'rgba(113,128,150,0.12)',border:'rgba(113,128,150,0.25)', color:'#718096' },
          Void:    { bg:'rgba(74,85,104,0.12)',  border:'rgba(74,85,104,0.25)',   color:'#4a5568' },
        };
        const st = map[s] || map.Draft;
        return (
          <span style={{
            padding:'2px 9px', borderRadius:'99px', fontSize:'0.65rem',
            fontWeight:700, letterSpacing:'0.05em', fontFamily:'var(--ff-mono)',
            background:st.bg, border:`1px solid ${st.border}`, color:st.color,
          }}>{s}</span>
        );
      };

      return (
        <div className="panel-content-enter" style={{ padding:'1.25rem 1.5rem 2rem', display:'flex', flexDirection:'column', gap:'1.25rem' }}>

          {/* ── KPI strip ── */}
          <div style={{ display:'flex', gap:'0.75rem', flexWrap:'wrap' }}>
            <PanelStatCard label="Gift Cards Sold"   value="1,248"  sub="↑ 14% this month" color="#00f5d4" icon="🎁" delay={0}   />
            <PanelStatCard label="Redeemed Today"    value="87"     sub="₦218,500 value"   color="#a78bfa" icon="✅" delay={50}  />
            <PanelStatCard label="Active Campaigns"  value="6"      sub="2 ending soon"    color="#f59e0b" icon="📣" delay={100} />
            <PanelStatCard label="Revenue (Month)"   value="₦4.7M"  sub="Gift card sales"  color="#ec4899" icon="💰" delay={150} />
          </div>

          {/* ── Section toggle ── */}
          <div style={{ display:'flex', gap:0, background:'rgba(8,5,24,0.65)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:'0.7rem', padding:4, alignSelf:'flex-start' }}>
            {[
              { id:'billing', label:'🧾 New Invoice',   },
              { id:'history', label:'📋 Invoice History' },
            ].map(s => {
              const act = activeSection === s.id;
              return (
                <button key={s.id} type="button"
                  onClick={() => setActiveSection(s.id)}
                  style={{
                    padding:'0.42rem 1.1rem', borderRadius:'0.5rem', border:'none',
                    cursor:'pointer', fontFamily:'var(--ff-main)', fontSize:'0.8rem', fontWeight: act ? 700 : 500,
                    background: act ? 'linear-gradient(135deg,rgba(0,245,212,0.15),rgba(124,58,237,0.12))' : 'transparent',
                    color: act ? 'var(--c-teal)' : 'var(--c-muted)',
                    boxShadow: act ? '0 0 0 1px rgba(0,245,212,0.22)' : 'none',
                    transition:'all 0.18s',
                  }}
                >{s.label}</button>
              );
            })}
          </div>

          {/* ════════════════════════════════
              BILLING FORM — New Invoice
          ════════════════════════════════ */}
          {activeSection === 'billing' && (
            <div className="gifts-billing-in" style={{ display:'flex', flexDirection:'column', gap:'1.1rem' }}>

              {/* ── Row 1: Invoice meta + Customer panels side-by-side ── */}
              <div style={{ display:'flex', gap:'1rem', flexWrap:'wrap' }}>

                {/* Invoice Details panel */}
                <div className="gbill-panel" style={{ flex:'1 1 260px', minWidth:0 }}>
                  <div className="gbill-panel-head">
                    <span className="gbill-panel-head-accent"/>
                    Invoice Details
                  </div>

                  <div style={{ display:'flex', gap:'0.65rem', flexWrap:'wrap' }}>
                    <div className="gbill-field" style={{ flex:'1 1 120px' }}>
                      <label className="gbill-label">Invoice #</label>
                      <input className="gbill-input" value={invoiceRef}
                        onChange={e => setInvoiceRef(e.target.value)}
                        style={{ fontFamily:'var(--ff-mono)', fontWeight:700, color:'var(--c-teal)' }}
                      />
                    </div>
                    <div className="gbill-field" style={{ flex:'1 1 120px' }}>
                      <label className="gbill-label">Status</label>
                      <select className="gbill-select" value={billStatus} onChange={e => setBillStatus(e.target.value)}>
                        {['Draft','Pending','Paid','Overdue','Void'].map(s => <option key={s}>{s}</option>)}
                      </select>
                    </div>
                  </div>

                  <div style={{ display:'flex', gap:'0.65rem', flexWrap:'wrap' }}>
                    <div className="gbill-field" style={{ flex:'1 1 120px' }}>
                      <label className="gbill-label">Invoice Date</label>
                      <input className="gbill-input" type="date" value={invoiceDate} onChange={e => setInvoiceDate(e.target.value)} />
                    </div>
                    <div className="gbill-field" style={{ flex:'1 1 120px' }}>
                      <label className="gbill-label">Due Date</label>
                      <input className="gbill-input" type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} />
                    </div>
                  </div>

                  <div className="gbill-field">
                    <label className="gbill-label">Payment Method</label>
                    <select className="gbill-select" value={paymentMethod} onChange={e => setPaymentMethod(e.target.value)}>
                      {['Cash','Card (POS)','Bank Transfer','USSD','Wallet','Split Payment'].map(p => <option key={p}>{p}</option>)}
                    </select>
                  </div>

                  <div className="gbill-field" style={{ marginBottom:0 }}>
                    <label className="gbill-label">Internal Notes</label>
                    <textarea
                      className="gbill-input"
                      rows={2}
                      placeholder="Delivery instructions, special requests…"
                      value={notes}
                      onChange={e => setNotes(e.target.value)}
                      style={{ resize:'vertical', minHeight:52 }}
                    />
                  </div>
                </div>

                {/* Customer / Recipient panel */}
                <div className="gbill-panel" style={{ flex:'1 1 280px', minWidth:0 }}>
                  <div className="gbill-panel-head">
                    <span className="gbill-panel-head-accent" style={{ background:'linear-gradient(180deg,#a78bfa,#ec4899)' }}/>
                    Customer / Recipient
                  </div>

                  <div style={{ display:'flex', gap:'0.65rem', flexWrap:'wrap' }}>
                    <CustField label="Full Name"    fk="name"    placeholder="e.g. Amina Bello"         half />
                    <CustField label="Phone"        fk="phone"   placeholder="+234 800 000 0000"         half type="tel" />
                  </div>
                  <div style={{ display:'flex', gap:'0.65rem', flexWrap:'wrap' }}>
                    <CustField label="Email"        fk="email"   placeholder="customer@email.com"        half type="email" />
                    <CustField label="Loyalty Card" fk="loyalty" placeholder="LC-XXXXXX"                 half />
                  </div>
                  <CustField label="Delivery Address (optional)" fk="address" placeholder="Street, City, State…" />

                  {/* Loyalty lookup chip */}
                  {customer.loyalty && (
                    <div style={{
                      display:'flex', alignItems:'center', gap:'0.55rem',
                      padding:'0.5rem 0.85rem', borderRadius:'0.55rem',
                      background:'rgba(0,245,212,0.07)', border:'1px solid rgba(0,245,212,0.20)',
                      fontSize:'0.73rem', color:'var(--c-teal)',
                    }}>
                      <span style={{ fontSize:'0.85rem' }}>🏅</span>
                      <span style={{ fontWeight:700 }}>Loyalty member found</span>
                      <span style={{ color:'var(--c-muted)', marginLeft:'auto', fontFamily:'var(--ff-mono)' }}>{customer.loyalty}</span>
                    </div>
                  )}
                </div>
              </div>

              {/* ── Row 2: Line Items Table ── */}
              <div style={{ background:'rgba(8,5,24,0.68)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:'0.9rem', overflow:'hidden' }}>
                {/* Table header bar */}
                <div style={{
                  padding:'0.7rem 1rem',
                  borderBottom:'1px solid rgba(255,255,255,0.065)',
                  display:'flex', alignItems:'center', justifyContent:'space-between',
                  background:'rgba(0,245,212,0.03)',
                }}>
                  <div style={{ display:'flex', alignItems:'center', gap:'0.5rem' }}>
                    <span className="gbill-panel-head-accent"/>
                    <span style={{ fontSize:'0.8rem', fontWeight:800, color:'var(--c-text)' }}>Gift Line Items</span>
                    <span style={{
                      fontSize:'0.62rem', padding:'1px 7px', borderRadius:'99px',
                      background:'rgba(0,245,212,0.10)', border:'1px solid rgba(0,245,212,0.22)',
                      color:'var(--c-teal)', fontFamily:'var(--ff-mono)', fontWeight:700,
                    }}>{lines.length} {lines.length === 1 ? 'row' : 'rows'}</span>
                  </div>
                  <button type="button" onClick={addLine} style={{
                    padding:'0.3rem 0.85rem', borderRadius:'0.5rem', border:'1px solid rgba(0,245,212,0.25)',
                    background:'rgba(0,245,212,0.08)', color:'var(--c-teal)', cursor:'pointer',
                    fontSize:'0.73rem', fontWeight:700, fontFamily:'var(--ff-main)',
                    transition:'all 0.16s',
                  }}
                    onMouseOver={e => { e.currentTarget.style.background='rgba(0,245,212,0.16)'; }}
                    onMouseOut={e  => { e.currentTarget.style.background='rgba(0,245,212,0.08)'; }}
                  >+ Add Line</button>
                </div>

                {/* Scrollable table */}
                <div style={{ overflowX:'auto' }}>
                  <table style={{ width:'100%', borderCollapse:'collapse', minWidth:780 }}>
                    <thead>
                      <tr style={{ borderBottom:'1px solid rgba(255,255,255,0.07)' }}>
                        {['#','Product','Description','Type','Qty','Unit Price','Disc%','Note','Total',''].map((h, i) => (
                          <th key={i} style={{
                            padding: i === 0 ? '0.5rem 0.5rem 0.5rem 0.75rem' : i === 9 ? '0.5rem 0.5rem' : '0.5rem 0.35rem',
                            textAlign: [7,8].includes(i) ? 'right' : 'left',
                            fontSize:'0.6rem', fontWeight:700, color:'var(--c-dim)',
                            letterSpacing:'0.09em', textTransform:'uppercase',
                            fontFamily:'var(--ff-mono)', whiteSpace:'nowrap',
                          }}>{h}</th>
                        ))}
                      </tr>

                             – hosted-bill link note

                    ══════════════════════════════════════════════════════════ */
                    const [waModalOpen,  setWaModalOpen]  = useState(false);

                    /* ══════════════════════════════════════════════════════════
                       CORE STRING-BUILDER ALGORITHM
                       ─────────────────────────────────────────────────────────
                       Column layout (monospace, WhatsApp renders <space> chars):
                         LEFT  col: item name / label      — 22 chars padEnd
                         RIGHT col: monetary value         — 14 chars padStart
                       Total line width ≈ 38 chars → fits comfortably in all
                       WhatsApp viewports without horizontal scroll.
                    ══════════════════════════════════════════════════════════ */
                    const buildWaMessage = () => {
                      const STORE_NAME = 'Roaji Commerce';
                      const billUrl    = buildMockBillUrl();

                      /* ── 1. CURRENCY FORMATTER (₦ + 2 dp, Nigerian locale) ── */
                      const fmtC = (v) =>
                        '\u20a6' + Number(v).toLocaleString('en-NG', {
                          minimumFractionDigits: 2,
                          maximumFractionDigits: 2,
                        });

                      /* ── 2. PAD HELPER — fixed-width column alignment ──────
                         rPad(label, width)   → label padded right to `width`
                         lPad(value, width)   → value padded left  to `width`
                         row(label, value)    → full left+right aligned line  */
                      const NAME_W  = 22;   // left column width (chars)
                      const PRICE_W = 14;   // right column width (chars)

                      const rPad = (s, w) => String(s).padEnd(w, ' ');
                      const lPad = (s, w) => String(s).padStart(w, ' ');
                      const row  = (label, value) =>
                        rPad(label, NAME_W) + lPad(value, PRICE_W);

                      /* ── 3. SEPARATOR HELPERS ───────────────────────────── */
                      const HR_THICK = '━'.repeat(NAME_W + PRICE_W);   // 36 ━
                      const HR_THIN  = '─'.repeat(NAME_W + PRICE_W);   // 36 ─

                      /* ── 4. ITEM BLOCK BUILDER ──────────────────────────── */
                      const filledLines = lines.filter(
                        l => l.name && l.qty > 0 && l.unitPrice > 0
                      );

                      const itemBlock = filledLines.length === 0
                        ? '  (no items)'
                        : filledLines.map((l, i) => {
                            const lt         = lineTotal(l);
                            const base       = l.qty * l.unitPrice;
                            const discAmt    = base - lt;          // absolute discount on this line
                            const num        = String(i + 1).padStart(2, '0');

                            /* Truncate long names to keep columns clean */
                            const displayName = l.name.length > 19
                              ? l.name.slice(0, 18) + '…'
                              : l.name;

                            /* Main item row:  [01] Gift Card — Std    ₦10,000.00 */
                            const mainRow = `[${num}] ${rPad(displayName, NAME_W - 5)}${lPad(fmtC(l.unitPrice), PRICE_W)}`;

                            /* Sub-row:  qty × unit  (always shown) */

                              : '';

                            return [mainRow, qtyRow, ...(discRow ? [discRow] : [])].join('\n');
