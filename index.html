<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Auth Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <!-- Login Card -->
    <div id="auth-card" class="bg-white p-8 rounded-xl shadow-lg w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Business Login</h2>
        
        <!-- Step 1: Identifier Input -->
        <div id="step-1">
            <label class="block text-sm font-medium text-gray-700">WhatsApp Number or Email</label>
            <input type="text" id="identifier" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" placeholder="e.g. 9876543210">
            <button onclick="sendOTP()" class="w-full mt-4 bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">Send OTP</button>
        </div>

        <!-- Step 2: OTP Input (Initially Hidden) -->
        <div id="step-2" class="hidden">
            <p class="text-sm text-gray-500 mb-4">எண்முறை (OTP) அனுப்பப்பட்டுள்ளது. அதை கீழே உள்ளிடவும்.</p>
            <label class="block text-sm font-medium text-gray-700">Enter 6-digit OTP</label>
            <input type="number" id="otp-input" class="mt-1 block w-full p-2 border border-gray-300 rounded-md tracking-widest text-center text-xl font-bold">
            <button onclick="verifyOTP()" class="w-full mt-4 bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition">Verify & Login</button>
        </div>
        
        <p id="message" class="mt-4 text-center text-sm text-red-500"></p>
    </div>

    <!-- Dashboard (Initially Hidden) -->
    <div id="dashboard" class="hidden bg-white p-10 rounded-xl shadow-2xl w-3/4">
        <h1 class="text-3xl font-bold text-gray-800">Welcome to Business Dashboard! ✅</h1>
        <p class="mt-4 text-gray-600">You have securely logged in using Passwordless Auth.</p>
        <button onclick="location.reload()" class="mt-6 text-blue-600 underline">Logout</button>
    </div>

    <script>
        const API_URL = "http://localhost:3000/api";
        let userIdentifier = "";

        async function sendOTP() {
            userIdentifier = document.getElementById('identifier').value;
            if (!userIdentifier) return alert("Please enter phone/email");

            const response = await fetch(`${API_URL}/send-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier: userIdentifier })
            });

            const data = await response.json();
            document.getElementById('message').innerText = data.message;
            document.getElementById('message').classList.replace('text-red-500', 'text-green-500');
            
            // UI மாற்றங்கள்
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }

        async function verifyOTP() {
            const otp = document.getElementById('otp-input').value;
            
            const response = await fetch(`${API_URL}/verify-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier: userIdentifier, otp: otp })
            });

            const data = await response.json();

            if (data.success) {
                // லாகின் வெற்றி - Dashboard காட்டு
                document.getElementById('auth-card').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                // உண்மையில் இங்கே JWT-ஐ Cookie-யில் சேமிக்க வேண்டும்
            } else {
                document.getElementById('message').innerText = "Invalid OTP. Please try again.";
                document.getElementById('message').classList.replace('text-green-500', 'text-red-500');
            }
        }
    </script>
</body>
</html>
