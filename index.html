                      {row.val}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ── No-data empty state (Firebase not configured yet) ─────── */}
          {!loading && totalBills === 0 && (
            <div style={{
              marginTop:'1.1rem',
              padding:'1.4rem 1.2rem',
              background:'rgba(10,8,28,0.65)',
              border:'1px solid rgba(255,255,255,0.07)',
              borderRadius:'0.9rem',
              textAlign:'center',
            }}>
              <div style={{ fontSize:'1.6rem', marginBottom:'0.55rem' }}>📊</div>
              <div style={{ fontSize:'0.82rem', fontWeight:700, color:'var(--c-text)', marginBottom:'0.35rem' }}>
                No Bills Found
              </div>
              <div style={{ fontSize:'0.72rem', color:'var(--c-dim)', lineHeight:1.7, maxWidth:360, margin:'0 auto' }}>
                No transaction records exist for this tenant/store yet.
                Issue your first bill from the Gifts, Stationery, or Xerox
                panels and it will appear here instantly.
              </div>
            </div>
          )}

          {/* ════ PART 15A-1 — OWNER TOOLBAR: EXCEL CSV EXPORT BUTTON ════ */}
          <div style={{
            marginTop: '1.4rem',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'flex-end',
            gap: '0.75rem',
            flexWrap: 'wrap',
          }}>
            <span style={{
              fontSize: '0.62rem',
              fontWeight: 700,
              color: 'var(--c-dim)',
              textTransform: 'uppercase',
              letterSpacing: '0.08em',
              fontFamily: 'var(--ff-mono)',
              marginRight: 'auto',
            }}>
              Owner Toolbar
            </span>
            <button
              onClick={() => roajiV2ExportBillsToCSV(bills)}
              disabled={loading || totalBills === 0}
              title={
                loading
                  ? 'Loading bills — please wait\u2026'
                  : totalBills === 0
                    ? 'No bills to export yet'
                    : `Export ${totalBills} bill${totalBills !== 1 ? 's' : ''} to Excel CSV`
              }
              style={{
                display: 'inline-flex',
                alignItems: 'center',
                gap: '0.45rem',
                padding: '0.55rem 1.1rem',
                background: (loading || totalBills === 0)
                  ? 'rgba(30,28,55,0.55)'
                  : 'linear-gradient(135deg,rgba(0,245,160,0.14) 0%,rgba(0,200,130,0.22) 100%)',
                border: (loading || totalBills === 0)
                  ? '1px solid rgba(255,255,255,0.08)'
                  : '1px solid rgba(0,245,160,0.38)',
                borderRadius: '0.65rem',
                cursor: (loading || totalBills === 0) ? 'not-allowed' : 'pointer',
                opacity: (loading || totalBills === 0) ? 0.45 : 1,
                transition: 'all 0.18s ease',
                fontFamily: 'var(--ff-mono)',
                fontSize: '0.72rem',
                fontWeight: 700,
                color: (loading || totalBills === 0) ? 'var(--c-dim)' : '#00f5a0',
                letterSpacing: '0.03em',
                boxShadow: (loading || totalBills === 0)
                  ? 'none'
                  : '0 0 14px rgba(0,245,160,0.12),inset 0 1px 0 rgba(255,255,255,0.06)',
                WebkitTapHighlightColor: 'transparent',
                userSelect: 'none',
              }}
            >
              <span style={{ fontSize: '0.9rem', lineHeight: 1 }}>📥</span>
              <span>Export to Excel (.csv)</span>
              {!loading && totalBills > 0 && (
                <span style={{
                  display: 'inline-flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  background: 'rgba(0,245,160,0.18)',
                  border: '1px solid rgba(0,245,160,0.30)',
                  borderRadius: '0.4rem',
                  padding: '0.05rem 0.4rem',
                  fontSize: '0.64rem',
                  fontWeight: 800,
                  color: '#00f5a0',
                  minWidth: '1.6rem',
                  letterSpacing: '0.02em',
                }}>
                  {totalBills}
                </span>
              )}
            </button>
          </div>
          {/* /PART 15A-1 Owner Toolbar */}

        </div>
      );
    };

    /* ════════════════════════════════════════════════════════════════════
       MODULE TAB BAR — the 6-panel horizontal tab switcher
    ════════════════════════════════════════════════════════════════════ */
    const MODULE_TABS = [
      { id:'owner-dashboard', label:'Owner Dashboard', pip:'#00f5a0', icon:'📈' },
      { id:'gifts',           label:'Gifts',           pip:'#00f5d4', icon:'🎁' },
      { id:'frame',           label:'Frame',           pip:'#a78bfa', icon:'🖼️' },
      { id:'studio',          label:'Studio',          pip:'#ec4899', icon:'📷' },
      { id:'stationery',      label:'Stationery',      pip:'#34d399', icon:'📋' },
      { id:'xerox',           label:'Xerox',           pip:'#60a5fa', icon:'🖨️' },
      { id:'analytics',       label:'Profit Analytics',pip:'#34d399', icon:'📊' },
      { id:'control-center',  label:'Control Center',  pip:'#f59e0b', icon:'⚙️' },
    ];

    const ModuleTabBar = ({ activeTab, onTabChange }) => {
      const scrollRef = useRef(null);

      return (
        <div style={{
          position:'sticky', top:0, zIndex:50,
          background:'rgba(4,4,15,0.88)',
          borderBottom:'1px solid rgba(255,255,255,0.07)',
          backdropFilter:'blur(18px)',
          WebkitBackdropFilter:'blur(18px)',
          boxShadow:'0 2px 16px rgba(0,0,0,0.3)',
        }}>
          <div ref={scrollRef} style={{
            display:'flex', alignItems:'flex-end',
            overflowX:'auto', overflowY:'hidden',
            padding:'0 1rem',
            gap:2,
            scrollbarWidth:'none',
            msOverflowStyle:'none',
          }}>
            {MODULE_TABS.map(tab => {
              const active = activeTab === tab.id;
              return (
                <button
                  key={tab.id}
                  type="button"
                  className={`panel-tab-btn${active ? ' active' : ''}`}
                  onClick={() => onTabChange(tab.id)}
                >
                  <span className="tab-pip" style={{
                    background: tab.pip,
                    boxShadow: active ? `0 0 8px ${tab.pip}aa` : 'none',
                  }} />
                  <span style={{ fontSize:'0.9rem' }}>{tab.icon}</span>
                  {tab.label}
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    /* ════════════════════════════════════════════════════════════════════
       PANEL ROUTER — renders the correct panel for the active tab
    ════════════════════════════════════════════════════════════════════ */
    const PanelRouter = ({ activeTab, user }) => {
      const map = {
        'owner-dashboard': <OwnerDashboard user={user} />,
        'gifts':           <GiftsPanel />,
        'frame':           <FramePanel />,
        'studio':          <StudioPanel />,
        'stationery':      <StationeryPanel />,
        'xerox':           <XeroxPanel />,
        'analytics':       <ProfitAnalyticsPanelSafe />,
        'control-center':  <ControlCenterPanel user={user} />,
      };
      /* Key forces re-mount & re-run of entry animation on tab switch */
      return <div key={activeTab}>{map[activeTab] || null}</div>;
    };

    /* ════════════════════════════════════════════════════════════════════
       DASHBOARD PANEL — default view when no module tab is active
    ════════════════════════════════════════════════════════════════════ */
    const DashboardPanel = ({ activeNav }) => (
      <div style={{
        flex:1, display:'flex', alignItems:'center', justifyContent:'center',
        padding:'2rem',
      }}>
        <div className="animate-fadeSlideUp glass-card" style={{
          position:'relative', zIndex:1, textAlign:'center', maxWidth:460,
        }}>
          <div style={{ fontSize:'2.4rem', marginBottom:'0.7rem' }}>⚡</div>
          <h2 className="grad-teal-violet" style={{ fontSize:'1.35rem', fontWeight:800, marginBottom:'0.5rem' }}>
            Sidebar Navigation Active
          </h2>
          <p style={{ color:'var(--c-muted)', fontSize:'0.82rem', lineHeight:1.7, marginBottom:'1.1rem' }}>
            The glassmorphic sidebar is live. Active module:
          </p>
          <div style={{
            display:'inline-flex', alignItems:'center', gap:'0.5rem',
            padding:'0.5rem 1.1rem', borderRadius:'99px',
            background:'rgba(0,245,212,0.09)', border:'1px solid rgba(0,245,212,0.28)',
            fontSize:'0.82rem', fontWeight:700, color:'var(--c-teal)',
            fontFamily:'var(--ff-mono)', letterSpacing:'0.04em',
          }}>
            <span style={{ width:7, height:7, borderRadius:'50%', background:'var(--c-teal)', display:'inline-block', animation:'pulse-glow 2s ease-in-out infinite' }} />
            {activeNav.toUpperCase()}
          </div>
          <p style={{ color:'var(--c-dim)', fontSize:'0.74rem', marginTop:'1rem', lineHeight:1.6 }}>
            Select a module tab above to open Gifts, Frame, Studio, Stationery, Xerox, or Control Center.
          </p>
        </div>
      </div>
    );

    /* ════════════════════════════════════════════════════════════════════
       ESG-2 — SAAS MASTER CONTROL PANEL
       Premium hidden window — exclusively visible when logged in as master.
       Features:
         • Client Management Dashboard (local user registry)
         • Manual Authorization Switches (Approve / Map Store ID)
         • Update Master Password utility
    ════════════════════════════════════════════════════════════════════ */
    const MasterControlPanel = ({ user, onClose }) => {
      const { useState: uState, useEffect: uEffect } = React;
      const [tab,          setTab]         = uState('clients');
      const [localUsers,   setLocalUsers]  = uState([]);
      const [storeInputs,  setStoreInputs] = uState({});
      const [subMap,       setSubMap]      = uState({});
      const [toast,        setToast]       = uState('');
      const [newPw,        setNewPw]       = uState('');
      const [newPwConfirm, setNewPwConfirm]= uState('');
      const [pwMsg,        setPwMsg]       = uState('');

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

      /* Load users from local registry + Firestore */
      const loadUsers = async () => {
        try {
          const all = await window.RoajiV2Store.getAllUsers();
          setLocalUsers(all);
        } catch(e) {
          /* Fallback to pure local */
          setLocalUsers(RoajiLocalUserStore ? RoajiLocalUserStore.allStandard().map(u=>({id:u.uid,...u})) : []);
        }
      };
      uEffect(() => { loadUsers(); }, []);

      /* Approve user */
      const handleApprove = async (uid) => {
        try {
          await window.RoajiV2Store.approveUser(uid);
          showToast('✓ Access granted. User is now active.');
          loadUsers();
        } catch(e) { showToast('✗ ' + e.message); }
      };

      /* Save store mapping */
      const handleSaveStores = async (uid) => {
        const raw = storeInputs[uid] || '';
        const stores = raw.split(',').map(s=>s.trim()).filter(Boolean);
        if (!stores.length) { showToast('⚠ Enter at least one Store ID.'); return; }
        try {
          await window.RoajiV2Store.setUserAllowedStores(uid, stores);
          showToast('✓ Store mapping saved. allowedStores updated.');
          loadUsers();
        } catch(e) { showToast('✗ ' + e.message); }
      };

      /* Set subscription */
      const handleSetSub = async (uid) => {
        const plan = subMap[uid];
        if (!plan) { showToast('⚠ Select a plan first.'); return; }
        let expiresAt = null;
        const now = new Date();
        if (plan === '1month')   expiresAt = new Date(now.setMonth(now.getMonth()+1));
        if (plan === '1year')    expiresAt = new Date(now.setFullYear(now.getFullYear()+1));
        try {
          await window.RoajiV2Store.setSubscription(uid, plan, expiresAt);
          showToast('✓ Subscription tier updated.');
          loadUsers();
        } catch(e) { showToast('✗ ' + e.message); }
      };

      /* Update master password */
      const handleChangePw = () => {
        if (newPw.length < 6)        { setPwMsg('Minimum 6 characters required.'); return; }
        if (newPw !== newPwConfirm)  { setPwMsg('Passwords do not match.'); return; }
        window.RoajiV2Store.setMasterPw(newPw);
        /* Also try Firebase */
        try {
          const fbUser = window.roajiV2Auth && window.roajiV2Auth.currentUser;
          if (fbUser) fbUser.updatePassword(newPw).catch(()=>{});
        } catch(_) {}
        setPwMsg('✓ Master password updated successfully.');
        setNewPw(''); setNewPwConfirm('');
        setTimeout(() => setPwMsg(''), 3000);
      };

      const S = {
        overlay: { position:'fixed', inset:0, zIndex:99995, background:'rgba(4,2,16,0.82)', backdropFilter:'blur(8px)', WebkitBackdropFilter:'blur(8px)', display:'flex', alignItems:'center', justifyContent:'center', padding:'1rem' },
        modal:   { width:'100%', maxWidth:760, maxHeight:'90vh', overflowY:'auto', background:'rgba(8,4,26,0.97)', border:'1.5px solid rgba(0,245,212,0.28)', borderRadius:'1.25rem', boxShadow:'0 0 0 1px rgba(0,245,212,0.08), 0 40px 100px rgba(0,0,0,0.80), 0 0 80px rgba(0,245,212,0.06)', padding:'0' },
        header:  { padding:'1.2rem 1.5rem', borderBottom:'1px solid rgba(0,245,212,0.12)', display:'flex', alignItems:'center', justifyContent:'space-between', background:'linear-gradient(90deg,rgba(0,245,212,0.06) 0%,rgba(124,58,237,0.06) 100%)' },
        tabBar:  { display:'flex', gap:'0.3rem', padding:'0.75rem 1.5rem', borderBottom:'1px solid rgba(255,255,255,0.06)', background:'rgba(0,0,0,0.2)' },
        body:    { padding:'1.5rem' },
        card:    { background:'rgba(255,255,255,0.030)', border:'1px solid rgba(255,255,255,0.08)', borderRadius:'0.75rem', padding:'1.1rem 1.25rem', marginBottom:'0.85rem' },
        input:   { width:'100%', padding:'0.48rem 0.8rem', background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.12)', borderRadius:'0.5rem', color:'#f1f5f9', fontSize:'0.8rem', fontFamily:'var(--ff-main)', outline:'none', boxSizing:'border-box' },
        btn:     (rgb) => ({ padding:'0.42rem 1rem', borderRadius:'0.5rem', border:`1px solid rgba(${rgb},0.45)`, background:`rgba(${rgb},0.18)`, color:`rgb(${rgb})`, fontSize:'0.75rem', fontWeight:700, fontFamily:'var(--ff-main)', cursor:'pointer', whiteSpace:'nowrap' }),
        badge:   (rgb,txt) => ({ padding:'2px 9px', borderRadius:'99px', fontSize:'0.67rem', fontWeight:700, background:`rgba(${rgb},0.14)`, border:`1px solid rgba(${rgb},0.30)`, color:`rgb(${rgb})` }),
      };

      const TABS = [
        { id:'clients', label:'👥 Client Management' },
        { id:'stores',  label:'🏪 Store Mapping' },
        { id:'subs',    label:'💎 Subscriptions' },
        { id:'pw',      label:'🔐 Master Password' },
      ];

      return (
        <div style={S.overlay} onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div style={S.modal}>

            {/* Header */}
            <div style={S.header}>
              <div style={{ display:'flex', alignItems:'center', gap:'0.7rem' }}>
                <span style={{ fontSize:'1.3rem' }}>⭐</span>
                <div>
                  <div style={{ fontSize:'0.72rem', fontWeight:700, letterSpacing:'0.12em', color:'var(--c-teal)', textTransform:'uppercase', marginBottom:'0.1rem' }}>Exclusive Access</div>
                  <div style={{ fontSize:'1.1rem', fontWeight:800, background:'linear-gradient(110deg,#00f5d4 0%,#7c3aed 100%)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text' }}>SaaS Master Control Panel</div>
                </div>
              </div>
              <button onClick={onClose} style={{ background:'none', border:'none', color:'rgba(255,255,255,0.45)', fontSize:'1.3rem', cursor:'pointer', lineHeight:1, padding:'0.2rem 0.5rem' }}>✕</button>
            </div>

            {/* Tab bar */}
            <div style={S.tabBar}>
              {TABS.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{
                  padding:'0.38rem 0.9rem', borderRadius:'0.45rem', border:'none', cursor:'pointer',
                  fontSize:'0.74rem', fontWeight:700, fontFamily:'var(--ff-main)',
                  background: tab === t.id ? 'rgba(0,245,212,0.18)' : 'rgba(255,255,255,0.04)',
                  color: tab === t.id ? 'var(--c-teal)' : 'rgba(148,163,184,0.65)',
                  border: tab === t.id ? '1px solid rgba(0,245,212,0.38)' : '1px solid transparent',
                  transition:'all 0.15s',
                }}>
                  {t.label}
                </button>
              ))}
            </div>

            {/* Toast */}
            {toast && (
              <div style={{ margin:'0.75rem 1.5rem 0', padding:'0.5rem 0.9rem', borderRadius:'0.5rem', fontSize:'0.79rem', fontWeight:600,
                background: toast.startsWith('✓') ? 'rgba(52,211,153,0.12)' : 'rgba(239,68,68,0.12)',
                border: toast.startsWith('✓') ? '1px solid rgba(52,211,153,0.32)' : '1px solid rgba(239,68,68,0.32)',
                color: toast.startsWith('✓') ? '#34d399' : '#f87171',
              }}>{toast}</div>
            )}

            <div style={S.body}>

              {/* ══ TAB 1: CLIENT MANAGEMENT DASHBOARD ══ */}
              {tab === 'clients' && (
                <div>
                  <div style={{ marginBottom:'1.1rem', display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:'0.5rem' }}>
                    <div>
                      <h2 style={{ fontSize:'1rem', fontWeight:800, marginBottom:'0.15rem' }}>Client Management Dashboard</h2>
                      <p style={{ fontSize:'0.75rem', color:'rgba(148,163,184,0.55)' }}>{localUsers.length} registered client{localUsers.length !== 1 ? 's' : ''} — Local registry + cloud sync</p>
                    </div>
                    <button onClick={loadUsers} style={S.btn('0,245,212')}
                      onMouseOver={e=>e.currentTarget.style.background='rgba(0,245,212,0.30)'}
                      onMouseOut={e=>e.currentTarget.style.background='rgba(0,245,212,0.18)'}>↻ Refresh</button>
                  </div>

                  {localUsers.length === 0 ? (
                    <div style={{ ...S.card, textAlign:'center', padding:'2.5rem', color:'rgba(148,163,184,0.45)', fontSize:'0.82rem' }}>
                      No client accounts registered yet. Share your app with clients to begin.
                    </div>
                  ) : localUsers.map(u => (
                    <div key={u.id || u.uid} style={S.card}>
                      <div style={{ display:'flex', alignItems:'center', gap:'0.55rem', flexWrap:'wrap', marginBottom:'0.65rem' }}>
                        <span style={{ fontSize:'0.88rem', fontWeight:700 }}>{u.fullName || '(No name)'}</span>
                        <span style={{ fontSize:'0.72rem', color:'rgba(148,163,184,0.5)', fontFamily:'var(--ff-mono)' }}>{u.email}</span>
                        {u.businessName && <span style={{ fontSize:'0.70rem', color:'var(--c-dim)' }}>• {u.businessName}</span>}
                        <span style={S.badge(
                          u.status === 'active' ? '52,211,153' :
                          u.status === 'pending_approval' || u.status === 'pending' ? '245,158,11' : '148,163,184',
                          u.status
                        )}>{u.status || 'unknown'}</span>
                        <span style={S.badge(
                          u.subscriptionPlan === 'lifetime' ? '52,211,153' :
                          u.subscriptionPlan === '1year'    ? '96,165,250' :
                          u.subscriptionPlan === '1month'   ? '167,139,250' : '100,116,139'
                        )}>{u.subscriptionPlan || 'free'}</span>
                      </div>
                      <div style={{ fontSize:'0.68rem', color:'rgba(148,163,184,0.45)', fontFamily:'var(--ff-mono)', marginBottom:'0.8rem' }}>
                        UID: {u.id || u.uid} &nbsp;|&nbsp; Shop: {u.businessName || '—'} &nbsp;|&nbsp; Store: {(u.allowedStores||[]).join(', ')||'none'}
                      </div>
                      {(u.status === 'pending_approval' || u.status === 'pending') && (
                        <button
                          onClick={() => handleApprove(u.id || u.uid)}
                          style={{ ...S.btn('52,211,153'), marginRight:'0.5rem' }}
                          onMouseOver={e=>e.currentTarget.style.background='rgba(52,211,153,0.30)'}
                          onMouseOut={e=>e.currentTarget.style.background='rgba(52,211,153,0.18)'}
                        >✓ Approve &amp; Grant Access</button>
                      )}
                    </div>
                  ))}
                </div>
              )}

              {/* ══ TAB 2: STORE MAPPING ══ */}
              {tab === 'stores' && (
                <div>
                  <div style={{ marginBottom:'1.1rem' }}>
                    <h2 style={{ fontSize:'1rem', fontWeight:800, marginBottom:'0.2rem' }}>Manual Store ID Mapping</h2>
                    <p style={{ fontSize:'0.75rem', color:'rgba(148,163,184,0.55)' }}>
                      Bind explicit Store IDs to each user's session. Comma-separate multiple IDs (e.g. ROAJI_MAIN, STORE_002).
                      This eliminates undefined object reference crashes in allowedStores.
                    </p>
                  </div>
                  {localUsers.length === 0 ? (
                    <div style={{ ...S.card, textAlign:'center', padding:'2rem', color:'rgba(148,163,184,0.45)', fontSize:'0.8rem' }}>No clients found.</div>
                  ) : localUsers.map(u => (
                    <div key={u.id || u.uid} style={S.card}>
                      <div style={{ display:'flex', alignItems:'center', gap:'0.5rem', marginBottom:'0.65rem', flexWrap:'wrap' }}>
                        <span style={{ fontSize:'0.85rem', fontWeight:700 }}>{u.fullName || u.email}</span>
                        <span style={S.badge(u.status==='active'?'52,211,153':'245,158,11')}>{u.status}</span>
                      </div>
                      <div style={{ display:'flex', flexWrap:'wrap', gap:'0.3rem', marginBottom:'0.7rem' }}>
                        {(u.allowedStores||[]).map(s => (
                          <span key={s} style={{ padding:'2px 9px', borderRadius:'99px', fontSize:'0.68rem', fontWeight:700, background:'rgba(0,245,212,0.10)', border:'1px solid rgba(0,245,212,0.25)', color:'var(--c-teal)', fontFamily:'var(--ff-mono)' }}>{s}</span>
                        ))}
                        {(!u.allowedStores||!u.allowedStores.length)&&<span style={{fontSize:'0.7rem',color:'rgba(239,68,68,0.65)'}}>⚠ No stores assigned</span>}
                      </div>
                      <div style={{ display:'flex', gap:'0.5rem', alignItems:'center', flexWrap:'wrap' }}>

      const [isOnline,      setIsOnline]      = useState(

          setIsOnline(nowOnline);
          if (typeof window.RoajiOnlineStatus.getQueue === 'function') {
            setUnsyncedCount(window.RoajiOnlineStatus.getQueue().length);
          }
        });

            const exp = u.subscriptionExpiresAt.toDate ? u.subscriptionExpiresAt.toDate().getTime()

    /* ════════════════════════════════════════════════════════════════════
       AUTH ROOT — ESG-1 top-level screen router
       Routes: master → MasterAdminDashboard
               pending → PendingLockScreen
               active  → AppShell
               unauth  → LoginScreen / SignUpScreen
    ════════════════════════════════════════════════════════════════════ */
    const AuthRoot = () => {
      const [screen,   setScreen]   = useState('login');   // 'login' | 'signup'
      const [authUser, setAuthUser] = useState(null);

      if (authUser) {
        const handleSignOut = async () => {
          if (window.RoajiV2Store && window.RoajiV2Store.ready()) {
            try { await window.RoajiV2Store.signOut(); } catch(_) {}
          }
          setAuthUser(null);
        };

        const status = authUser.status || 'pending';

        /* Master email → full admin dashboard */
        if (status === 'master' ||
            (authUser.email || '').toLowerCase().trim() === 'iamajithkumar98@gmail.com') {
          return <MasterAdminDashboard user={authUser} onSignOut={handleSignOut} />;
        }

        /* Pending / pending_approval → lock screen (non-bypassable) */
        if (status === 'pending' || status === 'pending_approval') {
          return <PendingLockScreen user={authUser} onSignOut={handleSignOut} />;
        }

        /* Active → normal app */
        return <AppShell user={authUser} onSignOut={handleSignOut} />;
      }

      return screen === 'login'
        ? <LoginScreen  onSwitch={() => setScreen('signup')} onSuccess={u => setAuthUser(u)} />
        : <SignUpScreen onSwitch={() => setScreen('login')}  onSuccess={u => setAuthUser(u)} />;
    };

    /* ════════════════════════════════════════════════════════════════════
       PART 15A-2 — GLOBAL APP ERROR BOUNDARY
       ─────────────────────────────────────────────────────────────────
       PURPOSE:
         Wraps the entire <AuthRoot /> tree. Any unhandled rendering
         exception anywhere in the component tree is intercepted here
         instead of producing a blank white screen.

         • getDerivedStateFromError  — flips hasError flag + captures
                                       the thrown Error object.
         • componentDidCatch         — logs the error + React component
                                       stack to the browser console for
                                       developer diagnostics.
         • Crash dialog              — renders a branded, user-friendly
                                       overlay with the error message and
                                       a "Hot-Reload / Restart App" button
                                       that calls window.location.reload()
                                       to do a full page refresh recovery.
    ════════════════════════════════════════════════════════════════════ */
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null, errorInfo: null };
        this.handleRestart = this.handleRestart.bind(this);
      }

      /* — Lifecycle: derive state from thrown error — */
      static getDerivedStateFromError(error) {
        return { hasError: true, error: error };
      }

      /* — Lifecycle: side-effect logging — */
      componentDidCatch(error, errorInfo) {
        console.error(
          '[Roaji ErrorBoundary] Uncaught rendering exception:\n',
          error,
          '\nComponent Stack:\n',
          errorInfo && errorInfo.componentStack
            ? errorInfo.componentStack
            : '(unavailable)'
        );
        this.setState({ errorInfo: errorInfo });
      }

      /* — Recovery: full page reload — */
      handleRestart() {
        try {
          /* Clear any stale cached state that might re-trigger the crash */
          if (window.sessionStorage) { window.sessionStorage.clear(); }
        } catch (_) {}
        window.location.reload();
      }

      /* — Crash dialog render — */
      render() {
        if (!this.state.hasError) {
          return this.props.children;
        }

        const errMsg = this.state.error
          ? (this.state.error.message || String(this.state.error))
          : 'An unexpected error occurred.';

        const stackPreview = this.state.errorInfo && this.state.errorInfo.componentStack
          ? this.state.errorInfo.componentStack.trim().split('\n').slice(0, 6).join('\n')
          : null;

        return (
          <div style={{
            position: 'fixed', inset: 0,
            background: 'linear-gradient(135deg, #0a0a0f 0%, #0d1117 60%, #0a0e1a 100%)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: "'Segoe UI', system-ui, sans-serif",
            zIndex: 99999, padding: '1.5rem',
          }}>
            {/* Ambient glow blobs */}
            <div style={{
              position:'absolute', width:420, height:420, borderRadius:'50%',
              background:'radial-gradient(circle, rgba(220,38,38,0.12) 0%, transparent 70%)',
              top:'10%', left:'20%', filter:'blur(60px)', pointerEvents:'none',
            }} />
            <div style={{
              position:'absolute', width:300, height:300, borderRadius:'50%',
              background:'radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%)',
              bottom:'15%', right:'18%', filter:'blur(50px)', pointerEvents:'none',
            }} />

            {/* Crash dialog card */}
            <div style={{
              position: 'relative', zIndex: 1,
              width: '100%', maxWidth: 520,
              background: 'rgba(15,17,24,0.92)',
              border: '1px solid rgba(220,38,38,0.35)',
              borderRadius: '1.25rem',
              padding: '2.5rem 2.25rem 2rem',
              boxShadow: '0 0 0 1px rgba(220,38,38,0.1), 0 32px 80px rgba(0,0,0,0.7), 0 0 60px rgba(220,38,38,0.08)',
              backdropFilter: 'blur(24px)',
              WebkitBackdropFilter: 'blur(24px)',
            }}>

              {/* Icon + header */}
              <div style={{ display:'flex', alignItems:'center', gap:'0.85rem', marginBottom:'1.4rem' }}>
                <div style={{
                  width: 48, height: 48, borderRadius: '0.75rem', flexShrink: 0,
                  background: 'linear-gradient(135deg, rgba(220,38,38,0.22) 0%, rgba(239,68,68,0.12) 100%)',
                  border: '1px solid rgba(220,38,38,0.4)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: '1.5rem',
                }}>
                  ⚠
                </div>
                <div>
                  <div style={{
                    fontSize: '0.72rem', fontWeight: 700, letterSpacing: '0.1em',
                    color: 'rgba(239,68,68,0.85)', textTransform: 'uppercase',
                    marginBottom: '0.2rem',
                  }}>
                    Application Error
                  </div>
                  <div style={{
                    fontSize: '1.18rem', fontWeight: 800, color: '#f1f5f9',
                    lineHeight: 1.3,
                  }}>
                    Roaji encountered a crash
                  </div>
                </div>
              </div>

              {/* Divider */}
              <div style={{
                height: 1,
                background: 'linear-gradient(90deg, rgba(220,38,38,0.4) 0%, rgba(220,38,38,0.05) 100%)',
                marginBottom: '1.4rem',
              }} />

              {/* Error message */}
              <p style={{
                fontSize: '0.82rem', color: 'rgba(248,113,113,0.9)',
                lineHeight: 1.65, marginBottom: '1rem',
                background: 'rgba(220,38,38,0.07)',
                border: '1px solid rgba(220,38,38,0.18)',
                borderRadius: '0.6rem',
                padding: '0.85rem 1rem',
                fontFamily: 'ui-monospace, "Cascadia Code", "Fira Code", monospace',
                wordBreak: 'break-word',
              }}>
                {errMsg}
              </p>

              {/* Component stack preview (dev aid) */}
              {stackPreview && (
                <details style={{ marginBottom: '1.4rem' }}>
                  <summary style={{
                    fontSize: '0.74rem', color: 'rgba(148,163,184,0.65)',
                    cursor: 'pointer', userSelect: 'none', marginBottom: '0.5rem',
                    letterSpacing: '0.03em',
                  }}>
                    ▸ Component trace (developer details)
                  </summary>
                  <pre style={{
                    fontSize: '0.68rem',
                    color: 'rgba(148,163,184,0.55)',
                    background: 'rgba(0,0,0,0.3)',
                    borderRadius: '0.5rem',
                    padding: '0.75rem',
                    overflowX: 'auto',
                    whiteSpace: 'pre-wrap',
                    wordBreak: 'break-word',
                    margin: 0,
                    lineHeight: 1.6,
                    fontFamily: 'ui-monospace, "Cascadia Code", monospace',
                  }}>
                    {stackPreview}
                  </pre>
                </details>
              )}

              {/* Body message */}
              <p style={{
                fontSize: '0.8rem', color: 'rgba(148,163,184,0.75)',
                lineHeight: 1.7, marginBottom: '1.8rem',
              }}>
                A rendering exception was caught before it could blank your screen.
                Your unsaved data in this session may still be intact.
                Press <strong style={{ color: '#94a3b8' }}>Hot-Reload / Restart App</strong> to
                safely reload Roaji and resume working.
              </p>

              {/* Recovery button */}
              <button
                onClick={this.handleRestart}
                style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  gap: '0.6rem', width: '100%',
                  padding: '0.85rem 1.5rem',
                  borderRadius: '0.75rem', border: 'none', cursor: 'pointer',
                  background: 'linear-gradient(135deg, #dc2626 0%, #b91c1c 100%)',
                  color: '#fff', fontSize: '0.88rem', fontWeight: 700,
                  letterSpacing: '0.04em',
                  boxShadow: '0 4px 24px rgba(220,38,38,0.4), 0 1px 4px rgba(0,0,0,0.4)',
                  transition: 'filter 0.15s ease, transform 0.12s ease',
                }}
                onMouseEnter={e => {
                  e.currentTarget.style.filter = 'brightness(1.12)';
                  e.currentTarget.style.transform = 'translateY(-1px)';
                }}
                onMouseLeave={e => {
                  e.currentTarget.style.filter = 'brightness(1)';
                  e.currentTarget.style.transform = 'translateY(0)';
                }}
              >
                <span style={{ fontSize: '1rem' }}>🔄</span>
                Hot-Reload / Restart App
              </button>

              {/* Footer note */}
              <p style={{
                textAlign: 'center', fontSize: '0.69rem',
                color: 'rgba(100,116,139,0.6)', marginTop: '1.1rem',
              }}>
                Roaji Billing Software — Error boundary active · Part 15A-2
              </p>
            </div>
          </div>
        );
      }
    }

    /* ════════════════════════════════════════════════════════════════════
       MOUNT — <AuthRoot /> wrapped inside <ErrorBoundary>
    ════════════════════════════════════════════════════════════════════ */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ErrorBoundary>
        <AuthRoot />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
