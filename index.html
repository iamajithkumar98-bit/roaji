    /* ── ESG-2: LOCAL AUTH: Sign-In ───────────────────────────────── */
    async function roajiV2SignIn({ email, password }) {
      const normalEmail = (email || '').toLowerCase().trim();
      const isMaster    = normalEmail === ROAJI_MASTER_EMAIL.toLowerCase();

      /* ── MASTER FAST-PATH: bypass ALL user registry checks ─────── */
      if (isMaster) {
        const effectivePw = roajiGetMasterPw();
        if (password !== effectivePw) {
          throw Object.assign(new Error('Incorrect master password.'), { code: 'auth/wrong-password' });
        }
        let masterProfile = RoajiLocalUserStore.findByEmail(ROAJI_MASTER_EMAIL);
        if (!masterProfile) {
          masterProfile = roajiBuildProfile({ uid: 'MASTER_UID_ROAJI', email: normalEmail, fullName: 'Ajith Kumar', businessName: 'Roaji HQ' });
          RoajiLocalUserStore.upsert(masterProfile);
        }
        /* Always force master status */
        masterProfile = { ...masterProfile, status: 'master', role: 'Master Admin', plan: 'lifetime', allowedStores: ['ROAJI_MAIN'] };
        RoajiLocalUserStore.upsert(masterProfile);
        if (typeof roajiV2SetActiveTenant === 'function') roajiV2SetActiveTenant(masterProfile.uid, 'ROAJI_MAIN');
        return { firebaseUser: { uid: masterProfile.uid, email: normalEmail, displayName: masterProfile.fullName }, profile: masterProfile };
      }

      /* ── STANDARD USER PATH ─────────────────────────────────────── */
      let profile = RoajiLocalUserStore.findByEmail(normalEmail);
      if (!profile) {
        /* Try Firestore if available */
        if (roajiV2Ready && roajiV2Auth) {
          try {
            const cred = await roajiV2Auth.signInWithEmailAndPassword(email, password);
            const uid  = cred.user.uid;
            const snap = await roajiV2Firestore.collection(ROAJI_V2_COLLECTION_USERS).doc(uid).get();
            let fbProfile = snap.exists ? snap.data() : null;
            if (!fbProfile) {
              fbProfile = roajiBuildProfile({ uid, email: normalEmail, fullName: cred.user.displayName || '' });
            }
            /* ESG-FIX: guarantee allowedStores is always an array */
            if (!Array.isArray(fbProfile.allowedStores) || !fbProfile.allowedStores.length) {
              fbProfile = { ...fbProfile, allowedStores: ['ROAJI_MAIN', uid] };
            }
            RoajiLocalUserStore.upsert(fbProfile);
            if (typeof roajiV2SetActiveTenant === 'function') roajiV2SetActiveTenant(uid, fbProfile.primaryStoreId || uid);
            return { firebaseUser: cred.user, profile: fbProfile };
          } catch(fbErr) {
            const code = fbErr.code || '';
            if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential') {
              throw Object.assign(new Error('Invalid email or password.'), { code });
            }
            throw fbErr;
          }
        }
        throw Object.assign(new Error('No account found for this email.'), { code: 'auth/user-not-found' });
      }

      /* Verify password from local store */
      try {
        const pwStore = JSON.parse(localStorage.getItem('roaji_local_pw') || '{}');
        const storedPw = pwStore[profile.uid];
        if (storedPw && atob(storedPw) !== password) {
          throw Object.assign(new Error('Incorrect password. Try again.'), { code: 'auth/wrong-password' });
        }
      } catch(e) { if (e.code === 'auth/wrong-password') throw e; /* ignore parse errors */ }

      /* ESG-FIX: guarantee allowedStores is always an array */
      if (!Array.isArray(profile.allowedStores) || !profile.allowedStores.length) {
        profile = { ...profile, allowedStores: ['ROAJI_MAIN', profile.uid] };
        RoajiLocalUserStore.upsert(profile);
      }

      if (typeof roajiV2SetActiveTenant === 'function') roajiV2SetActiveTenant(profile.uid, profile.primaryStoreId || profile.uid);
      return { firebaseUser: { uid: profile.uid, email: normalEmail, displayName: profile.fullName }, profile };
    }

    /* ── Auth: Sign-out (ESG-2: Local-First, never crashes without Firebase) ── */
    async function roajiV2SignOut() {
      _roajiActiveTenantUid     = null;
      _roajiActiveTenantStoreId = null;
      console.info('[Roaji ESG-2] Tenant context cleared on sign-out.');
      /* Only attempt Firebase sign-out if Firebase Auth is available */
      if (roajiV2Ready && roajiV2Auth && typeof roajiV2Auth.signOut === 'function') {
        try { await roajiV2Auth.signOut(); } catch(e) { console.warn('[Roaji ESG-2] Firebase signOut skipped:', e.message); }
      }
    }

    /* ── Auth: Observe session (call once at boot) ────────────────── */
    function roajiV2OnAuthStateChanged(callback) {
      /* ESG-2: Firebase may not be configured — return a no-op unsubscriber */
      if (!roajiV2Ready || !roajiV2Auth || typeof roajiV2Auth.onAuthStateChanged !== 'function') {
        return () => {};
      }
      return roajiV2Auth.onAuthStateChanged(callback);
    }

    /* ── Bills: Add a new bill document to roaji_v2_bills ────────── */
    /* ══════════════════════════════════════════════════════════════════
       PART 13A-4 — TENANT WRITE DATA PRIVACY INTEGRATION
       ──────────────────────────────────────────────────────────────────
       roajiV2AddBill upgrade — dynamic tenant session sync

       TENANT IDENTITY RESOLUTION (authoritative, in priority order):
         1. Live Firebase Auth currentUser.uid   → always the ground truth uid
         2. storeIdOverride argument             → explicit caller branch hint
         3. _roajiActiveTenantStoreId            → session-registered storeId
         4. uid fallback                         → uid-as-storeId for single-
                                                   branch owner accounts

       DYNAMIC SESSION SYNC:
         Before resolving storeId, the function re-reads the active tenant
         session module (_roajiActiveTenantUid / _roajiActiveTenantStoreId)
         and validates that the live Auth uid is still consistent with the
         registered session.  If a session drift is detected (the Firebase
         Auth uid no longer matches _roajiActiveTenantUid, indicating a
         mid-session token refresh, account switch, or race condition), the
         module re-synchronises the active tenant state from the Auth token
         before proceeding.  This prevents a stale session from silently
         tagging bills with a mismatched ownerUid.

       FULL GUARD PIPELINE (all four 13A-3 guards invoked in sequence):
         Guard 1  roajiV2AssertTenant          — validates uid & storeId
         Guard 4  roajiV2SafeWritePayload       — stamps authoritative fields

       CALLER-SUPPLIED ownerUid / storeId IN billData:
         Any ownerUid or storeId the caller places inside billData is
         unconditionally overwritten by roajiV2SafeWritePayload with the
         verified session values.  This is enforced regardless of whether
         storeIdOverride was supplied.  The storeIdOverride parameter only
         influences which storeId is used as the AUTHORITATIVE value — it
         does not bypass the guard stamping pipeline.

       STAMPED FIELDS GUARANTEED ON EVERY WRITE:
         ownerUid          ← live Firebase Auth uid (re-read at call time)
         storeId           ← resolved + validated active tenant storeId
         _tenantVersion    ← ROAJI_V2_TENANT_VERSION_TAG ('v2-mt')
         _guardVersion     ← '13A-4'  (this module's traceability tag)
         _payloadStampedAt ← ISO 8601 client timestamp of payload build
         createdAt         ← Firestore ServerTimestamp
         updatedAt         ← Firestore ServerTimestamp
         _schemaVersion    ← 'v2'
    ══════════════════════════════════════════════════════════════════ */
    async function roajiV2AddBill(billData, storeIdOverride) {
      /* ESG-2: If Firebase is not configured, queue offline and return a local ID */
      if (!roajiV2Ready || !roajiV2Firestore) {
        const localId = 'local_bill_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
        const payload = { ...billData, _localId: localId, _localOnly: true, createdAt: new Date().toISOString() };
        try {
          const q = JSON.parse(localStorage.getItem('roaji_local_bills') || '[]');
          q.push(payload);
          localStorage.setItem('roaji_local_bills', JSON.stringify(q));
        } catch(_) {}
        console.info('[Roaji ESG-2] Bill saved locally (Firebase not configured):', localId);
        return localId;
      }

      /* ── Step 1: Resolve live uid from Firebase Auth (ground truth) ── */
      /* Always re-read currentUser at call time — never rely solely on a
         module-scope cache.  A token refresh or account switch between the
         last roajiV2SetActiveTenant() call and this write would otherwise
         produce a uid mismatch that goes undetected.                      */
      const uid = roajiV2Auth.currentUser?.uid;
      if (!uid) {
        const msg =
          '[Roaji 13A-4] ADD BILL BLOCKED: Firebase Auth has no currentUser at ' +
          'the time of write.  The user may have signed out between the UI ' +
          'action and the Firestore commit.  Re-authenticate before retrying.';
        console.error(msg);
        throw new Error(msg);
      }

      /* ── Step 2: Dynamic session sync — detect & heal tenant drift ─── */
      /* If the registered session uid (_roajiActiveTenantUid) diverges from
         the live Auth uid, the session context is stale.  Re-sync it from
         the Auth token + stored primaryStoreId before building the payload,
         so the write is always tagged with the currently authenticated
         tenant identity.                                                   */
      if (_roajiActiveTenantUid !== null && _roajiActiveTenantUid !== uid) {
        console.warn(
          `[Roaji 13A-4] SESSION DRIFT DETECTED in "roajiV2AddBill": ` +
          `registered session uid "${_roajiActiveTenantUid}" ≠ live Auth uid "${uid}". ` +
          `Re-synchronising active tenant context from current Auth identity before write.`,
          { registeredUid: _roajiActiveTenantUid, liveUid: uid }
        );
        /* Re-anchor the session to the live Auth uid.  Attempt to read the
           user's stored primaryStoreId from Firestore for a precise sync;
           fall back to uid-as-storeId if the profile is unavailable.      */
        try {
          const profileSnap = await roajiV2Firestore
            .collection(ROAJI_V2_COLLECTION_USERS).doc(uid).get();
          const syncedStoreId = (profileSnap.exists && profileSnap.data().primaryStoreId)
            ? profileSnap.data().primaryStoreId
            : uid;
          roajiV2SetActiveTenant(uid, syncedStoreId);
          console.info(
            `[Roaji 13A-4] Tenant re-sync complete ✓  uid=${uid}  storeId=${syncedStoreId}`
          );
        } catch (syncErr) {
          /* Non-fatal: fall back to uid-as-storeId and let AssertTenant
             validate the resulting pair.  Log the sync failure for ops.  */
          console.warn(
            `[Roaji 13A-4] Tenant re-sync profile fetch failed — ` +
            `falling back to uid-as-storeId.  Sync error: ${syncErr.message}`
          );
          roajiV2SetActiveTenant(uid, uid);
        }
      }

      /* ── Step 3: Resolve authoritative storeId ──────────────────────── */
      /* Priority: explicit override → re-synced session storeId → uid     */
      const storeId = (storeIdOverride && typeof storeIdOverride === 'string' && storeIdOverride.trim())
        ? storeIdOverride.trim()
        : (_roajiActiveTenantStoreId || uid);

      /* ── Step 4: Guard 1 — assert tenant (throws on any invalid pair) ─ */
      roajiV2AssertTenant(uid, storeId, 'roajiV2AddBill:13A-4');

      /* ── Step 5: Guard 4 — build safe, fully-stamped write payload ──── */
      /* roajiV2SafeWritePayload unconditionally overwrites any ownerUid /
         storeId the caller may have embedded in billData, then stamps the
         full tenant identity + audit fields onto the shallow clone.       */
      const safePayload = roajiV2SafeWritePayload(uid, storeId, billData, 'roajiV2AddBill:13A-4');

      /* Override _guardVersion to this module's tag for traceability */
      safePayload._guardVersion = '13A-4';

      /* ── Step 6: Commit to Firestore ────────────────────────────────── */
      const ref = await roajiV2Firestore
        .collection(ROAJI_V2_COLLECTION_BILLS)
        .add({
          ...safePayload,
          createdAt:      firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt:      firebase.firestore.FieldValue.serverTimestamp(),
          _schemaVersion: 'v2',
        });

      console.info(
        `[Roaji 13A-4] Bill added ✓  id=${ref.id}  ownerUid=${uid}  storeId=${storeId}`
      );
      return ref.id;
    }

    /* ── Bills: Update an existing bill ──────────────────────────── */
    /* ══════════════════════════════════════════════════════════════════
       PART 13A-4 — TENANT WRITE DATA PRIVACY INTEGRATION
       ──────────────────────────────────────────────────────────────────
       roajiV2UpdateBill upgrade — dynamic tenant session sync

       TENANT IDENTITY RESOLUTION (authoritative, in priority order):
         1. Live Firebase Auth currentUser.uid   → always the ground truth uid
         2. storeIdOverride argument             → explicit caller branch hint
         3. _roajiActiveTenantStoreId            → session-registered storeId
         4. uid fallback                         → uid-as-storeId default

       DYNAMIC SESSION SYNC:
         Identical re-sync logic as roajiV2AddBill: if the registered
         _roajiActiveTenantUid diverges from the live Auth uid at call time,
         the module fetches the user profile from Firestore and re-anchors
         the active tenant session before building the update payload.

       FULL GUARD PIPELINE (all four 13A-3 guards invoked):
         Guard 1  roajiV2AssertTenant          — validates uid & storeId
         Guard 3  roajiV2SafeDocGuard           — pre-update ownership verify
         Guard 4  roajiV2SafeWritePayload       — stamps authoritative fields

       DOCUMENT NOT FOUND:
         If the target document does not exist in Firestore, the update is
         aborted with a structured error before any guard or write is
         attempted.  This prevents a silent Firestore .update() no-op from
         masking a stale billId reference.

       CALLER-SUPPLIED ownerUid / storeId IN updates:
         Any ownerUid or storeId the caller places inside updates is
         unconditionally overwritten by roajiV2SafeWritePayload with the
         verified session values — identical to AddBill behaviour.

       STAMPED FIELDS GUARANTEED ON EVERY UPDATE WRITE:
         ownerUid          ← live Firebase Auth uid (re-read at call time)
         storeId           ← resolved + validated active tenant storeId
         _tenantVersion    ← ROAJI_V2_TENANT_VERSION_TAG ('v2-mt')
         _guardVersion     ← '13A-4'  (this module's traceability tag)
         _payloadStampedAt ← ISO 8601 client timestamp of payload build
         updatedAt         ← Firestore ServerTimestamp
    ══════════════════════════════════════════════════════════════════ */
    async function roajiV2UpdateBill(billId, updates, storeIdOverride) {
      if (!roajiV2Ready) throw new Error('[Roaji 13A-4] Firebase V2 not initialized.');

      /* ── Step 1: Resolve live uid from Firebase Auth (ground truth) ── */
      const uid = roajiV2Auth.currentUser?.uid;
      if (!uid) {
        const msg =
          '[Roaji 13A-4] UPDATE BILL BLOCKED: Firebase Auth has no currentUser at ' +
          'the time of write.  The user may have signed out between the UI ' +
          'action and the Firestore commit.  Re-authenticate before retrying.';
        console.error(msg);
        throw new Error(msg);
      }

      /* ── Step 2: Dynamic session sync — detect & heal tenant drift ─── */
      if (_roajiActiveTenantUid !== null && _roajiActiveTenantUid !== uid) {
        console.warn(
          `[Roaji 13A-4] SESSION DRIFT DETECTED in "roajiV2UpdateBill": ` +
          `registered session uid "${_roajiActiveTenantUid}" ≠ live Auth uid "${uid}". ` +
          `Re-synchronising active tenant context from current Auth identity before write.`,
          { registeredUid: _roajiActiveTenantUid, liveUid: uid }
        );
        try {
          const profileSnap = await roajiV2Firestore
            .collection(ROAJI_V2_COLLECTION_USERS).doc(uid).get();
          const syncedStoreId = (profileSnap.exists && profileSnap.data().primaryStoreId)
            ? profileSnap.data().primaryStoreId
            : uid;
          roajiV2SetActiveTenant(uid, syncedStoreId);
          console.info(
            `[Roaji 13A-4] Tenant re-sync complete ✓  uid=${uid}  storeId=${syncedStoreId}`
          );
        } catch (syncErr) {
          console.warn(
            `[Roaji 13A-4] Tenant re-sync profile fetch failed — ` +
            `falling back to uid-as-storeId.  Sync error: ${syncErr.message}`
          );
          roajiV2SetActiveTenant(uid, uid);
        }
      }

      /* ── Step 3: Resolve authoritative storeId ──────────────────────── */
      const storeId = (storeIdOverride && typeof storeIdOverride === 'string' && storeIdOverride.trim())
        ? storeIdOverride.trim()
        : (_roajiActiveTenantStoreId || uid);

      /* ── Step 4: Guard 1 — assert tenant (throws on any invalid pair) ─ */
      roajiV2AssertTenant(uid, storeId, 'roajiV2UpdateBill:13A-4');

      /* ── Step 5: Fetch existing document ────────────────────────────── */
      const docRef = roajiV2Firestore.collection(ROAJI_V2_COLLECTION_BILLS).doc(billId);
      const snap   = await docRef.get();

      if (!snap.exists) {
        const msg =
          `[Roaji 13A-4] UPDATE BILL BLOCKED: document "${billId}" does not exist ` +
          `in ${ROAJI_V2_COLLECTION_BILLS}.  The billId may be stale, or the document ` +
          `may have been deleted by another session.  Reload the bill list and retry.`;
        console.error(msg, { billId, uid, storeId });
        throw new Error(msg);
      }

      /* ── Step 6: Guard 3 — pre-update ownership + branch verification ─ */
      /* Throws if doc.ownerUid ≠ uid or doc.storeId ≠ storeId.  Blocks
         any cross-tenant or cross-branch update regardless of how the
         billId was obtained.                                              */
      roajiV2SafeDocGuard(snap, uid, storeId, 'roajiV2UpdateBill:13A-4:pre-check');

      /* ── Step 7: Guard 4 — build safe, fully-stamped update payload ─── */
      /* Unconditionally overwrites any ownerUid / storeId embedded in
         updates with the verified session values, then stamps audit fields.*/
      const safeUpdates = roajiV2SafeWritePayload(uid, storeId, updates, 'roajiV2UpdateBill:13A-4');

      /* Override _guardVersion to this module's tag for traceability */
      safeUpdates._guardVersion = '13A-4';

      /* ── Step 8: Commit to Firestore ────────────────────────────────── */
      await docRef.update({
        ...safeUpdates,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });

      console.info(
        `[Roaji 13A-4] Bill updated ✓  id=${billId}  ownerUid=${uid}  storeId=${storeId}`
      );
    }

    /* ── Bills: Real-time listener for the current user's bills ───── */
    /* PART 9B-2: Query is routed through roajiV2SafeBillsQuery which
       mandates BOTH ownerUid AND storeId where-clauses.  Snapshots
       are also post-filtered through the doc guard before delivery to
       the callback, so no cross-outlet document can ever surface even
       if Firestore security rules are misconfigured.                  */
    function roajiV2OnBills(uid, callback, storeIdOverride) {
      /* ESG-2: If Firebase is absent, serve from local bills store */
      if (!roajiV2Ready || !roajiV2Firestore) {
        try {
          const localBills = JSON.parse(localStorage.getItem('roaji_local_bills') || '[]');
          callback(localBills.filter(b => !b.ownerUid || b.ownerUid === uid));
        } catch(_) { callback([]); }
        return () => {};
      }
      const storeId = storeIdOverride || _roajiActiveTenantStoreId || uid;

      /* 9B-2 Guard 1 */
      try { roajiV2AssertTenant(uid, storeId, 'roajiV2OnBills'); }
      catch(e) { console.error(e.message); return () => {}; }

      /* 9B-2 Guard 2 — tenant-scoped query (both ownerUid + storeId) */
      return roajiV2SafeBillsQuery(uid, storeId)
        .orderBy('createdAt', 'desc')
        .onSnapshot(snap => {
          const docs = snap.docs
            /* 9B-2 Guard 3 — post-snapshot ownership filter (defence-in-depth) */
            .filter(d => {
              const data = d.data();
              if (data.ownerUid !== uid || (data.storeId && data.storeId !== storeId)) {
                console.warn(
                  `[Roaji 9B-2] Snapshot contamination blocked: doc ${d.id}`,
                  `ownerUid=${data.ownerUid} storeId=${data.storeId}`
                );
                return false;
              }
              return true;
            })
            .map(d => ({ id: d.id, ...d.data() }));
          callback(docs);
        });
    }

    /* ── Users: Fetch a user profile by UID ──────────────────────── */
    /* PART 9B-2: After the fetch, verifies the returned document belongs
       to the requesting uid before returning data to the caller.      */
    async function roajiV2GetUserProfile(uid) {
      /* ESG-2: Try local registry first */
      const localProfile = RoajiLocalUserStore.findByUid(uid);
      if (localProfile) return localProfile;
      if (!roajiV2Ready || !roajiV2Firestore) return null;
      /* 9B-2: Users doc is keyed by uid; storeId guard uses uid as storeId
         here because the users collection is per-user, not per-store.  */
      if (!uid) throw new Error('[Roaji 9B-2] roajiV2GetUserProfile: uid is required.');
      const snap = await roajiV2Firestore
        .collection(ROAJI_V2_COLLECTION_USERS)
        .doc(uid)
        .get();
      if (!snap.exists) return null;
      /* Lightweight ownership check: the doc path IS the uid key */
      const data = snap.data();
      if (data.uid && data.uid !== uid) {
        const msg = `[Roaji 9B-2] USER PROFILE MISMATCH: doc.uid "${data.uid}" ≠ requested uid "${uid}". Read blocked.`;
        console.error(msg);
        throw new Error(msg);
      }
      return data;
    }

    /* ── Users: Update a user profile ────────────────────────────── */
    /* PART 9B-2: Verifies uid matches the active session before update.
       Strips any attempt to override uid or tenant fields in updates.  */
    async function roajiV2UpdateUserProfile(uid, updates) {
      /* ESG-2: Always update local registry first */
      RoajiLocalUserStore.update(uid, updates);
      if (!roajiV2Ready || !roajiV2Firestore) return;
      if (!uid) throw new Error('[Roaji 9B-2] roajiV2UpdateUserProfile: uid is required.');
      /* 9B-2: Cross-check caller uid against active session */
      if (_roajiActiveTenantUid && _roajiActiveTenantUid !== uid) {
        const msg = `[Roaji 9B-2] PROFILE UPDATE BLOCKED: caller uid "${uid}" ≠ session uid "${_roajiActiveTenantUid}".`;
        console.error(msg);
        throw new Error(msg);
      }
      /* Strip any attempt to override protected fields */
      const safeUpdates = { ...updates };
      delete safeUpdates.uid;
      delete safeUpdates.ownerUid;
      delete safeUpdates.storeId;
      delete safeUpdates._tenantVersion;
      delete safeUpdates._schemaVersion;
      await roajiV2Firestore
        .collection(ROAJI_V2_COLLECTION_USERS)
        .doc(uid)
        .update({ ...safeUpdates, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    }

    /* ── ESG-1: Firestore helpers for Master Admin panel ───────────── */

    /* ── ESG-2: LOCAL-FIRST Master Admin Helpers ────────────────── */

    /* Fetch ALL user profiles (local-first, then Firestore fallback) */
    async function roajiV2GetAllUsers() {
      /* Always return from local registry first — instant, no crash risk */
      const localUsers = RoajiLocalUserStore.allStandard().map(u => ({ id: u.uid, ...u }));
      if (localUsers.length > 0) return localUsers;
      /* Fallback to Firestore only if local is empty and Firebase is ready */
      if (roajiV2Ready && roajiV2Firestore) {
        try {
          const snap = await roajiV2Firestore.collection(ROAJI_V2_COLLECTION_USERS).get();
          return snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(u => u.status !== 'master');
        } catch(e) { console.warn('[Roaji ESG-2] Firestore getAllUsers failed:', e.message); }
      }
      return [];
    }

    /* Approve a pending user — sets status 'active' locally + Firestore */
    async function roajiV2ApproveUser(uid, extraFields = {}) {

            status: 'active', ...extraFields,

      RoajiLocalUserStore.update(uid, { allowedStores });

    /* Set subscription plan — local-first, then Firestore */
    async function roajiV2SetSubscription(uid, plan, expiresAt) {
      RoajiLocalUserStore.update(uid, {
        subscriptionPlan: plan, subscriptionExpiresAt: expiresAt ? expiresAt.toISOString() : null, subscriptionAlertSent: false,
      });
      if (roajiV2Ready && roajiV2Firestore) {
        try {
          await roajiV2Firestore.collection(ROAJI_V2_COLLECTION_USERS).doc(uid).update({
            subscriptionPlan: plan, subscriptionExpiresAt: expiresAt,
            subscriptionAlertSent: false, updatedAt: firebase.firestore.FieldValue.serverTimestamp(),

        } catch(e) { console.warn('[Roaji ESG-2] Firestore setSubscription sync failed:', e.message); }
      }
    }

    /* ── Expose on window for React (Babel script can't import modules) */
    window.RoajiV2Store = {
      ready:               () => true,  /* ESG-2: always ready — local-first */
      signUp:              roajiV2SignUp,
      signIn:              roajiV2SignIn,
      signOut:             roajiV2SignOut,
      onAuthStateChanged:  roajiV2OnAuthStateChanged,
      addBill:             roajiV2AddBill,
      updateBill:          roajiV2UpdateBill,
      onBills:             roajiV2OnBills,
      getUserProfile:      roajiV2GetUserProfile,
      updateUserProfile:   roajiV2UpdateUserProfile,
      /* ESG-2: Local-first user management */
      LocalUserStore:      RoajiLocalUserStore,
      getMasterPw:         roajiGetMasterPw,
      setMasterPw:         roajiSetMasterPw,
      COLLECTIONS: {
        USERS: ROAJI_V2_COLLECTION_USERS,
        BILLS: ROAJI_V2_COLLECTION_BILLS,
      },

         setActiveTenant(uid, storeId)

           All subsequent Firestore reads and writes will be scoped to the

         assertTenant(uid, storeId, context)

         safeBillsQuery(uid, storeId) → FirestoreQuery

         safeWritePayload(uid, storeId, payload, context) → Object

           strips userland overrides of those protected fields.

         safeDocGuard(snap, uid, storeId, context)
           Verifies a fetched document belongs to the given tenant.
           Throws if ownership fields diverge — call after every .get().
      ═══════════════════════════════════════════════════════════════ */
      setActiveTenant:  roajiV2SetActiveTenant,
      getActiveTenant:  roajiV2GetActiveTenant,
      assertTenant:     roajiV2AssertTenant,
      safeBillsQuery:   roajiV2SafeBillsQuery,
      safeWritePayload: roajiV2SafeWritePayload,
      safeDocGuard:     roajiV2SafeDocGuard,
      /* ── ESG-1: Master Admin helpers ─────────────────────────────── */
      MASTER_EMAIL:           ROAJI_MASTER_EMAIL,
      getAllUsers:             roajiV2GetAllUsers,
      approveUser:            roajiV2ApproveUser,
      setUserAllowedStores:   roajiV2SetUserAllowedStores,
      setSubscription:        roajiV2SetSubscription,
