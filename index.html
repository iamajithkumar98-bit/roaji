    /* ════════════════════════════════════════════════════════════════════
       PART 9A-2 — QUICK RETAIL MODULE: STATIONERY
       Live stock decrement · Quick-sell cart · Instant receipt preview
    ════════════════════════════════════════════════════════════════════ */
    const StationeryPanel = () => {
      const { useState: useS, useRef: useR, useEffect: useE } = React;

      /* ── Catalogue (live qty is mutable state) ── */
      const INIT_STOCK = [
        { sku:'ST-001', name:'A4 Paper (500s)',        cat:'Paper',     qty:320, price:3200,  reorder:50,  unit:'ream' },
        { sku:'ST-002', name:'Biro Pens Blue (50pk)',  cat:'Pens',      qty:88,  price:1800,  reorder:20,  unit:'pack' },
        { sku:'ST-003', name:'Cardstock A4 250gsm',    cat:'Paper',     qty:12,  price:7500,  reorder:10,  unit:'ream' },
        { sku:'ST-004', name:'Stapler Heavy Duty',     cat:'Hardware',  qty:6,   price:4200,  reorder:5,   unit:'unit' },
        { sku:'ST-005', name:'Manila Envelopes 100pk', cat:'Packaging', qty:44,  price:2600,  reorder:15,  unit:'pack' },
        { sku:'ST-006', name:'Correction Fluid',       cat:'Supplies',  qty:30,  price:600,   reorder:10,  unit:'unit' },
        { sku:'ST-007', name:'HB Pencils (12pk)',       cat:'Pens',      qty:55,  price:900,   reorder:20,  unit:'pack' },
        { sku:'ST-008', name:'Sticky Notes 3×3"',      cat:'Supplies',  qty:70,  price:1200,  reorder:25,  unit:'pad'  },
        { sku:'ST-009', name:'Lever Arch File A4',     cat:'Filing',    qty:18,  price:2800,  reorder:8,   unit:'unit' },
        { sku:'ST-010', name:'Scissors (Large)',       cat:'Hardware',  qty:9,   price:1500,  reorder:5,   unit:'unit' },
      ];

      const [stock,   setStock]   = useS(INIT_STOCK);
      const [cart,    setCart]    = useS([]);       // {sku, name, qty, price}
      const [toast,   setToast]   = useS(null);     // {msg, ok}
      const [receipt, setReceipt] = useS(false);
      const [custName,setCustName]= useS('');
      const [search,  setSearch]  = useS('');
      const timerRef = useR(null);

      const showToast = (msg, ok=true) => {
        setToast({msg, ok});
        clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => setToast(null), 2200);
      };

      const stockStatus = (item) => {
        if (item.qty === 0)           return { label:'Out',       color:'#f87171' };
        if (item.qty <= item.reorder) return { label:'Low Stock', color:'#f59e0b' };
        return                               { label:'In Stock',  color:'#34d399' };
      };

      /* Add one unit to cart, deduct from stock */
      const addToCart = (sku, qty) => {
        const item = stock.find(s => s.sku === sku);
        if (!item || item.qty < qty) { showToast(`⚠️ Not enough stock for ${item?.name}`, false); return; }
        setStock(prev => prev.map(s => s.sku===sku ? {...s, qty: s.qty - qty} : s));
        setCart(prev => {
          const ex = prev.find(c => c.sku===sku);
          if (ex) return prev.map(c => c.sku===sku ? {...c, qty: c.qty+qty} : c);
          return [...prev, { sku, name:item.name, qty, price:item.price, unit:item.unit }];
        });
        showToast(`✅ ${qty} × ${item.name} added`);
      };

      const removeFromCart = (sku) => {
        const c = cart.find(x=>x.sku===sku);
        if (!c) return;
        setStock(prev => prev.map(s => s.sku===sku ? {...s, qty: s.qty + c.qty} : s));
        setCart(prev => prev.filter(x=>x.sku!==sku));
      };

      const cartTotal = cart.reduce((s,c)=>s+(c.qty*c.price),0);
      const fmtN = n => '₦' + n.toLocaleString('en-NG');

      const filteredStock = stock.filter(s =>
        s.name.toLowerCase().includes(search.toLowerCase()) ||
        s.cat.toLowerCase().includes(search.toLowerCase()) ||
        s.sku.toLowerCase().includes(search.toLowerCase())
      );

      /* ── PART 12B-2: Stationery Checkout Hook ───────────────────────
         Fires instantly the moment the cashier clicks "Checkout".
         1. Validates the cart is not empty.
         2. Builds the line-item array for the event (quantities already
            decremented from `stock` state by addToCart; we capture them
            here for the event payload before the receipt modal appears).
         3. Calls roajiDispatchCheckoutEvent which simultaneously mirrors
            each SKU decrement into window.RoajiMasterInventory AND fires
            the 'roaji:stock-checkout' CustomEvent on window so analytics,
            audit, and sync layers react synchronously.
         4. Opens the receipt modal as before (no visible delay). */
      const handleCheckout = () => {
        if (!cart.length) { showToast('Cart is empty', false); return; }

        /* ── 12B-2: Build event line items from cart ── */
        const checkoutItems = cart.map(function(c) {
          return {
            sku:            c.sku,
            name:           c.name,
            qtyDecremented: c.qty,
            priceEach:      c.price,
            lineTotal:      c.qty * c.price,
          };
        });
        const saleTotal = checkoutItems.reduce(function(s, i){ return s + i.lineTotal; }, 0);

        /* ── 12B-2: Dispatch — fires BEFORE receipt modal opens ── */
        if (window.roajiDispatchCheckoutEvent) {
          window.roajiDispatchCheckoutEvent('stationery', checkoutItems, saleTotal);
        }

        setReceipt(true);
      };

      const confirmSale = () => {
        setCart([]);
        setCustName('');
        setReceipt(false);
        showToast('🧾 Sale recorded! Stock updated.');
      };

      /* ── QTY quick-selector widget ── */
      const QtySelector = ({ sku, maxQty }) => {
        const [sel, setSel] = useS(1);
        const opts = [1,2,5,10,20,50].filter(n=>n<=maxQty);
        if (!opts.length) opts.push(0);
        return (
          <div style={{ display:'flex', alignItems:'center', gap:'0.35rem' }}>
            <select
              value={sel}
              onChange={e => setSel(Number(e.target.value))}
              style={{
                background:'rgba(52,211,153,0.08)', border:'1px solid rgba(52,211,153,0.22)',
                borderRadius:'0.4rem', padding:'0.22rem 0.4rem',
                color:'#34d399', fontSize:'0.7rem', fontFamily:'var(--ff-mono)',
                cursor:'pointer', outline:'none', fontWeight:700,
              }}
            >
              {opts.map(n=><option key={n} value={n} style={{background:'#0a0520'}}>{n}</option>)}
            </select>
            <button
              type="button"
              disabled={maxQty===0}
              onClick={() => addToCart(sku, sel)}
              style={{
                padding:'0.22rem 0.55rem', borderRadius:'0.4rem', cursor: maxQty?'pointer':'not-allowed',
                background: maxQty ? 'rgba(52,211,153,0.15)' : 'rgba(255,255,255,0.04)',
                border: maxQty ? '1px solid rgba(52,211,153,0.40)' : '1px solid rgba(255,255,255,0.08)',
                color: maxQty ? '#34d399' : 'var(--c-dim)',
                fontSize:'0.68rem', fontWeight:800, fontFamily:'var(--ff-main)',
                transition:'all 0.13s',
              }}
            >+ Add</button>
          </div>
        );
      };

      return (
        <div className="panel-content-enter" style={{ padding:'1.5rem', display:'flex', flexDirection:'column', gap:'1.25rem', position:'relative' }}>

          {/* ── Toast ── */}
          {toast && (
            <div style={{
              position:'fixed', bottom:'1.5rem', right:'1.5rem', zIndex:9999,
              padding:'0.55rem 1.1rem', borderRadius:'0.65rem',
              background: toast.ok ? 'rgba(52,211,153,0.18)' : 'rgba(248,113,113,0.18)',
              border: `1px solid ${toast.ok ? 'rgba(52,211,153,0.45)' : 'rgba(248,113,113,0.45)'}`,
              color: toast.ok ? '#34d399' : '#f87171',
              fontSize:'0.78rem', fontWeight:700, fontFamily:'var(--ff-main)',
              boxShadow:'0 4px 24px rgba(0,0,0,0.5)',
              animation:'fadeSlideUp 0.22s cubic-bezier(0.16,1,0.3,1) both',
            }}>{toast.msg}</div>
          )}

          {/* ── Stat Row ── */}
          <div style={{ display:'flex', gap:'0.85rem', flexWrap:'wrap' }}>
            <PanelStatCard label="Items in Stock"  value={stock.reduce((s,i)=>s+i.qty,0).toLocaleString()} sub={`${stock.length} SKUs tracked`}    color="#34d399" icon="📋" delay={0}  />
            <PanelStatCard label="Cart Items"      value={cart.length}                                     sub={`${cart.reduce((s,c)=>s+c.qty,0)} units`} color="#00f5d4" icon="🛒" delay={60} />
            <PanelStatCard label="Low / Out"       value={stock.filter(s=>s.qty<=s.reorder).length}        sub="Reorder recommended"               color="#f59e0b" icon="⚠️" delay={120}/>
            <PanelStatCard label="Cart Total"      value={fmtN(cartTotal)}                                 sub="Before tax/discount"               color="#a78bfa" icon="💰" delay={180}/>
          </div>

          {/* ── Main 2-col layout ── */}
          <div style={{ display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'flex-start' }}>

            {/* ── LEFT: Stock catalogue ── */}
            <div style={{ flex:'1 1 380px', minWidth:0 }}>
              <div style={{
                background:'rgba(8,5,24,0.65)', border:'1px solid rgba(52,211,153,0.15)',
                borderRadius:'0.85rem', overflow:'hidden',
              }}>
                {/* Header + search */}
                <div style={{ padding:'0.85rem', borderBottom:'1px solid rgba(255,255,255,0.06)', display:'flex', alignItems:'center', gap:'0.65rem', flexWrap:'wrap' }}>
                  <span style={{ fontSize:'0.78rem', fontWeight:800, color:'#34d399', flex:1 }}>📋 Stationery Catalogue</span>
                  <input
                    type="text" placeholder="Search items…"
                    value={search} onChange={e=>setSearch(e.target.value)}
                    style={{
                      padding:'0.3rem 0.65rem', borderRadius:'0.45rem',
                      background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.10)',

                  <button type="button" onClick={confirmSale} style={{ flex:2, padding:'0.5rem', borderRadius:'0.5rem', background:'linear-gradient(135deg,rgba(0,245,212,0.22),rgba(124,58,237,0.18))', border:'1px solid rgba(0,245,212,0.45)', color:'var(--c-teal)', cursor:'pointer', fontSize:'0.82rem', fontWeight:800, fontFamily:'var(--ff-main)' }}>✅ Confirm Sale</button>

    /* ════════════════════════════════════════════════════════════════════
       PART 9A-2 — QUICK RETAIL MODULE: XEROX / DIGITAL SERVICES
       Page-count input · B&W vs Color tariff multipliers · Live job queue
       Machine status board · Instant cost preview · Stock decrement hooks
    ════════════════════════════════════════════════════════════════════ */
    const XeroxPanel = () => {
      const { useState: useS, useRef: useR, useEffect: useE } = React;

      /* ── Tariff table (₦ per page) ── */
      const TARIFFS = {
        bw: [
          { id:'bw-a4',   label:'A4  B&W  Laser',    ppg:10,  size:'A4',  color:'bw'    },
          { id:'bw-a3',   label:'A3  B&W  Laser',    ppg:18,  size:'A3',  color:'bw'    },
          { id:'bw-a5',   label:'A5  B&W  Laser',    ppg:7,   size:'A5',  color:'bw'    },
          { id:'bw-leg',  label:'Legal B&W',          ppg:12,  size:'Leg', color:'bw'    },
        ],
        color: [
          { id:'cl-a4',   label:'A4  Color Inkjet',  ppg:25,  size:'A4',  color:'color' },
          { id:'cl-a3',   label:'A3  Color Inkjet',  ppg:45,  size:'A3',  color:'color' },
          { id:'cl-photo',label:'4×6 Photo Print',   ppg:80,  size:'4×6', color:'color' },
          { id:'cl-gloss',label:'A4 Gloss Premium',  ppg:60,  size:'A4',  color:'color' },
        ],
      };

      /* ── Paper stock (for decrement hooks) ── */
      const INIT_PAPER = [
        { id:'a4bw',    label:'A4 80gsm (B&W)',   sheets:12000, reorder:500,  color:'bw'    },
        { id:'a3bw',    label:'A3 80gsm (B&W)',   sheets:3000,  reorder:200,  color:'bw'    },
        { id:'a4color', label:'A4 100gsm (Color)', sheets:2500,  reorder:200,  color:'color' },
        { id:'a4gloss', label:'A4 Gloss 180gsm',   sheets:800,   reorder:100,  color:'color' },
        { id:'photo',   label:'4×6 Photo Paper',   sheets:600,   reorder:50,   color:'color' },
      ];

      /* ── Machines ── */
      const MACHINES = [
        { id:'mA', name:'Xerox WorkCentre A', status:'Ready',       color:'#34d399', cap:'A4/A3',  tariffTypes:['bw','color'] },
        { id:'mB', name:'Canon MegaTank B',   status:'Busy',        color:'#f59e0b', cap:'A4',     tariffTypes:['color']      },
        { id:'mC', name:'HP LaserJet C',      status:'Ready',       color:'#34d399', cap:'A4/A3',  tariffTypes:['bw']         },
        { id:'mD', name:'Epson EcoTank D',    status:'Maintenance', color:'#f87171', cap:'A4',     tariffTypes:['color']      },
        { id:'mE', name:'Ricoh IM C2500 E',   status:'Ready',       color:'#34d399', cap:'A4/A3',  tariffTypes:['bw','color'] },
      ];

      /* ── State ── */
      const [mode,     setMode]     = useS('bw');    // 'bw' | 'color'
      const [tariffId, setTariffId] = useS('bw-a4');
      const [pages,    setPages]    = useS(10);
      const [copies,   setCopies]   = useS(1);
      const [sided,    setSided]    = useS('single'); // 'single' | 'double'
      const [machine,  setMachine]  = useS('mA');
      const [custName, setCustName] = useS('');
      const [jobs,     setJobs]     = useS([
        { id:'PJ-0512', cust:'Grace Obi',       pages:200,  type:'B&W Laser',    sided:'single', cost:2000,  status:'Done',     mach:'mA', ts:'09:41' },
        { id:'PJ-0511', cust:'Lagos State Edu', pages:850,  type:'Color Inkjet', sided:'double', cost:15300, status:'Printing', mach:'mB', ts:'09:38' },
        { id:'PJ-0510', cust:'Seun Bankole',    pages:40,   type:'A3 Color',     sided:'single', cost:1800,  status:'Queued',   mach:'mE', ts:'09:30' },
        { id:'PJ-0509', cust:'Amara Designs',   pages:1200, type:'Brochures',    sided:'double', cost:43200, status:'Done',     mach:'mA', ts:'09:22' },
      ]);
      const [paperStock, setPaperStock] = useS(INIT_PAPER);
      const [toast,      setToast]      = useS(null);
      const [receipt,    setReceipt]    = useS(null);
      const toastRef = useR(null);

      const showToast = (msg, ok=true) => {
        setToast({msg,ok});
        clearTimeout(toastRef.current);
        toastRef.current = setTimeout(()=>setToast(null), 2400);
      };

      /* ════════════════════════════════════════════════════════════════
         XEROX PRICING CALCULATION ENGINE
         ─────────────────────────────────────────────────────────────
         FORMULA (single-sided):
           jobCost = pages × copies × tariff.ppg

         FORMULA (double-sided):
           physicalSheets = ceil(pages / 2)          ← only half the sheets
           sidesSurcharge = pages × tariff.ppg × 0.10 ← 10% ink/toner surcharge
                                                         for printing both faces
           jobCost = physicalSheets × copies × tariff.ppg + sidesSurcharge × copies

         Simplified to a single DUPLEX_MULTIPLIER of 0.60 applied to the
         full single-sided price (saves 40% paper cost, adds 10% surcharge):
           duplex effective rate = 0.5 (half sheets) + 0.10 (surcharge) = 0.60

         B&W tariff adds NO extra fee beyond the per-page rate.
         Color tariff adds NO extra fee beyond the per-page rate.
         Switching mode updates the tariff selection automatically.
         All values recompute instantly on every state change.
      ════════════════════════════════════════════════════════════════ */

      /* Multipliers */
      const DUPLEX_MULTIPLIER = 0.60; // double-sided: 50% paper saving − 10% surcharge = 0.60× base cost

      const activeTariff = [...TARIFFS.bw, ...TARIFFS.color].find(t=>t.id===tariffId) || TARIFFS.bw[0];

      /* Core page count: pages × copies (total impressions/sides) */
      const totalImpressions = pages * copies;

      /* Physical sheets consumed (double-sided uses ceil(pages/2) sheets × copies) */
      const physicalSheets = sided === 'double'
        ? Math.ceil(pages / 2) * copies
        : totalImpressions;

      /* Base cost before sided adjustment: impressions × rate per page */
      const baseCost = totalImpressions * activeTariff.ppg;

      /* Sided fee delta:
           single → +₦0 (full base cost)
           double → apply DUPLEX_MULTIPLIER (60% of base = half sheets + 10% surcharge) */
      const sidedMultiplier = sided === 'double' ? DUPLEX_MULTIPLIER : 1.0;
      const sidedSaving     = sided === 'double' ? Math.round(baseCost * 0.40) : 0; // ₦ saved vs single
      const sidedSurcharge  = sided === 'double' ? Math.round(baseCost * 0.10) : 0; // 10% ink surcharge

      /* ── Color mode has no additional fixed fee beyond its tariff rate ── */
      const colorModeFee = 0; // already priced into tariff.ppg for color tariffs

      /* ── FINAL JOB COST ── */
      const jobCost = Math.round(baseCost * sidedMultiplier);

      /* Helpers */
      function fmtNInline(n) { return '₦' + Number(n).toLocaleString('en-NG'); }
      const fmtN = n => '₦' + Number(n).toLocaleString('en-NG');

      /* Bill breakdown lines for the live preview */
      const billBreakdown = [
        { label: `${totalImpressions} impressions × ${fmtNInline(activeTariff.ppg)}`,  value: baseCost },
        ...(sided === 'double' ? [
          { label: `Double-sided paper saving (−40%)`,                                   value: -Math.round(baseCost * 0.40), neg: true },
          { label: `Duplex ink/toner surcharge (+10%)`,                                  value: Math.round(baseCost * 0.10),  pos: true },
        ] : []),
      ];

      /* Helper: format ₦ without the outer function needing to be defined first */

      /* Total pages field shown in queue / receipt = physical sheets × copies would be confusing;
         we show total impressions (the pages the customer hands us) */
      const totalPages = totalImpressions;

      const statusStyle = (s) => ({
        Done:        { color:'#34d399', bg:'rgba(52,211,153,0.12)',  border:'rgba(52,211,153,0.30)' },
        Printing:    { color:'#f59e0b', bg:'rgba(245,158,11,0.12)',  border:'rgba(245,158,11,0.30)' },
        Queued:      { color:'#60a5fa', bg:'rgba(96,165,250,0.12)',  border:'rgba(96,165,250,0.30)' },
        Maintenance: { color:'#f87171', bg:'rgba(248,113,113,0.12)', border:'rgba(248,113,113,0.30)' },
        Ready:       { color:'#34d399', bg:'rgba(52,211,153,0.10)',  border:'rgba(52,211,153,0.25)' },
        Busy:        { color:'#f59e0b', bg:'rgba(245,158,11,0.10)',  border:'rgba(245,158,11,0.25)' },
      }[s] || { color:'var(--c-muted)', bg:'rgba(255,255,255,0.05)', border:'rgba(255,255,255,0.10)' });

      /* QUICK PAGE PRESETS */
      const PAGE_PRESETS = [1,5,10,20,50,100,200,500];

      /* ── Submit job ── */
      /* ── Submit job ── */
      const submitJob = () => {
        const sel = MACHINES.find(m=>m.id===machine);
        if (!sel) { showToast('Select a machine', false); return; }
        if (sel.status === 'Maintenance') { showToast(`⚠️ ${sel.name} is under maintenance`, false); return; }
        if (!sel.tariffTypes.includes(mode)) { showToast(`⚠️ ${sel.name} does not support ${mode==='bw'?'B&W':'Color'} jobs`, false); return; }
        if (pages < 1 || copies < 1) { showToast('Enter valid pages & copies', false); return; }

        /* ── PART 12B-2: resolve paper stock key ── */
        const stockKey = mode==='bw'
          ? (activeTariff.size==='A3' ? 'a3bw' : 'a4bw')
          : (activeTariff.id==='cl-photo' ? 'photo' : activeTariff.id==='cl-gloss' ? 'a4gloss' : 'a4color');

        /* Decrement paper stock — use physicalSheets (duplex halves consumption) */
        setPaperStock(prev => prev.map(p => p.id===stockKey
          ? {...p, sheets: Math.max(0, p.sheets - physicalSheets)} : p));

        /* ── PART 12B-2: Xerox Checkout Event Hook ───────────────────
           Fires 'roaji:stock-checkout' synchronously the instant the
           cashier clicks "Queue Job" / "Checkout".
           - stockKey maps to the master SKU via roajiXeroxStockKeyToSku.
           - qtyDecremented = physicalSheets (actual paper consumed after
             duplex halving — same value used to decrement paperStock above).
           - priceEach = activeTariff.ppg (per-impression ₦ rate).
           - lineTotal = jobCost (final settled price after duplex maths).
           The dispatcher also mirrors the decrement into the master array
           so the analytics panel sees the correct live sheet counts. */
        if (window.roajiDispatchCheckoutEvent && window.roajiXeroxStockKeyToSku) {
          const masterSku = window.roajiXeroxStockKeyToSku(stockKey);
          window.roajiDispatchCheckoutEvent('xerox', [{
            sku:            masterSku,
            name:           activeTariff.label + ' — ' + (custName || 'Walk-in Customer'),
            qtyDecremented: physicalSheets,
            priceEach:      activeTariff.ppg,
            lineTotal:      jobCost,
          }], jobCost);
        }

        const jobId = 'PJ-' + String(Date.now()).slice(-4);
        const now = new Date();
        const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

        const newJob = {
          id:            jobId,
          cust:          custName || 'Walk-in Customer',
          pages:         totalPages,        // total impressions
          physicalSheets,                   // actual sheets consumed
          sided,
          type:          activeTariff.label,
          mode,
          baseCost,
          sidedSaving,
          sidedSurcharge,
          cost:          jobCost,           // final settled amount
          status:        'Queued',
          mach:          machine,
          ts,
        };

        setJobs(prev => [newJob, ...prev]);
        setReceipt(newJob);
        showToast(`✅ Job ${jobId} queued — ${fmtN(jobCost)}`);
        setCustName('');
        setPages(10);
        setCopies(1);
        setSided('single');
      };

      /* ── Mark job as Printing / Done ── */
      const advanceJob = (id) => {
        setJobs(prev => prev.map(j => {
          if (j.id !== id) return j;
          if (j.status==='Queued')   return {...j, status:'Printing'};
          if (j.status==='Printing') return {...j, status:'Done'};
          return j;
        }));
      };

      /* ── Totals ── */
      const todayRevenue = jobs.reduce((s,j)=>s+j.cost, 0);
      const activeMachines = MACHINES.filter(m=>m.status!=='Maintenance').length;
      const activeJobs = jobs.filter(j=>j.status==='Printing' || j.status==='Queued').length;

      return (
        <div className="panel-content-enter" style={{ padding:'1.5rem', display:'flex', flexDirection:'column', gap:'1.25rem', position:'relative' }}>

          {/* ── Toast ── */}
          {toast && (
            <div style={{
              position:'fixed', bottom:'1.5rem', right:'1.5rem', zIndex:9999,
              padding:'0.55rem 1.1rem', borderRadius:'0.65rem',
              background: toast.ok ? 'rgba(96,165,250,0.18)' : 'rgba(248,113,113,0.18)',
              border: `1px solid ${toast.ok ? 'rgba(96,165,250,0.45)' : 'rgba(248,113,113,0.45)'}`,
              color: toast.ok ? '#60a5fa' : '#f87171',
              fontSize:'0.78rem', fontWeight:700, fontFamily:'var(--ff-main)',
              boxShadow:'0 4px 24px rgba(0,0,0,0.5)',
              animation:'fadeSlideUp 0.22s cubic-bezier(0.16,1,0.3,1) both',

          )}

          {/* ── Stat Row ── */}
          <div style={{ display:'flex', gap:'0.85rem', flexWrap:'wrap' }}>
            <PanelStatCard label="Jobs Today"       value={jobs.length}          sub={`${activeJobs} in queue`}      color="#60a5fa" icon="🖨️" delay={0}  />
            <PanelStatCard label="Active Machines"  value={`${activeMachines}/5`} sub="1 in maintenance"             color="#f59e0b" icon="⚙️" delay={60} />
            <PanelStatCard label="Low Paper Stock"  value={paperStock.filter(p=>p.sheets<=p.reorder).length} sub="Restock needed" color="#f87171" icon="📄" delay={120}/>
            <PanelStatCard label="Revenue Today"    value={fmtN(todayRevenue)}   sub="All print jobs"                color="#34d399" icon="💵" delay={180}/>
          </div>

          {/* ── Main 2-col ── */}
          <div style={{ display:'flex', gap:'1rem', flexWrap:'wrap', alignItems:'flex-start' }}>

            {/* ── LEFT: New Job Builder ── */}
            <div style={{ flex:'0 0 310px', minWidth:260 }}>
              <div style={{
                background:'rgba(8,5,24,0.72)', border:'1px solid rgba(96,165,250,0.20)',
                borderRadius:'0.9rem', overflow:'hidden',
                boxShadow:'0 0 32px rgba(96,165,250,0.07)',
              }}>
                {/* Header */}
                <div style={{ padding:'0.85rem', borderBottom:'1px solid rgba(255,255,255,0.07)', display:'flex', alignItems:'center', gap:'0.5rem' }}>
                  <span style={{ fontSize:'1rem' }}>🖨️</span>
                  <span style={{ fontSize:'0.78rem', fontWeight:800, color:'#60a5fa' }}>New Print Job</span>
                  <span style={{ fontSize:'0.6rem', color:'var(--c-dim)', fontFamily:'var(--ff-mono)', marginLeft:'auto' }}>PART 9A-2</span>
                </div>

                <div style={{ padding:'0.85rem', display:'flex', flexDirection:'column', gap:'0.7rem' }}>

                  {/* Customer */}
                  <div>
                    <label style={{ fontSize:'0.62rem', fontWeight:700, color:'var(--c-dim)', letterSpacing:'0.08em', textTransform:'uppercase', fontFamily:'var(--ff-mono)', display:'block', marginBottom:'0.3rem' }}>Customer</label>
                    <input
                      type="text" placeholder="Name or walk-in"
                      value={custName} onChange={e=>setCustName(e.target.value)}
                      style={{
                        width:'100%', padding:'0.38rem 0.65rem', borderRadius:'0.45rem',
                        background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.09)',
                        color:'var(--c-text)', fontSize:'0.75rem', outline:'none', fontFamily:'var(--ff-main)',
                      }}
                    />
                  </div>

                  {/* B&W / Color toggle */}
                  <div>
                    <label style={{ fontSize:'0.62rem', fontWeight:700, color:'var(--c-dim)', letterSpacing:'0.08em', textTransform:'uppercase', fontFamily:'var(--ff-mono)', display:'block', marginBottom:'0.35rem' }}>Print Mode</label>
                    <div style={{ display:'flex', borderRadius:'0.5rem', overflow:'hidden', border:'1px solid rgba(255,255,255,0.09)' }}>
                      {[
                        { key:'bw',    label:'⬛ Black & White', activeColor:'rgba(226,232,240,0.15)', textColor:'#e2e8f0' },
                        { key:'color', label:'🎨 Color',         activeColor:'rgba(96,165,250,0.18)',  textColor:'#60a5fa' },
                      ].map(opt => (
                        <button
                          key={opt.key} type="button"
                          onClick={() => { setMode(opt.key); setTariffId(opt.key==='bw' ? 'bw-a4' : 'cl-a4'); }}
                          style={{
                            flex:1, padding:'0.42rem 0.5rem',
                            background: mode===opt.key ? opt.activeColor : 'rgba(255,255,255,0.02)',
                            border:'none', cursor:'pointer',
                            color: mode===opt.key ? opt.textColor : 'var(--c-dim)',
                            fontSize:'0.72rem', fontWeight: mode===opt.key ? 800 : 500,
                            fontFamily:'var(--ff-main)', transition:'all 0.14s',
                            borderRight: opt.key==='bw' ? '1px solid rgba(255,255,255,0.09)' : 'none',
                          }}
                        >{opt.label}</button>
                      ))}
                    </div>
                  </div>

                  {/* Tariff selector */}
                  <div>
                    <label style={{ fontSize:'0.62rem', fontWeight:700, color:'var(--c-dim)', letterSpacing:'0.08em', textTransform:'uppercase', fontFamily:'var(--ff-mono)', display:'block', marginBottom:'0.3rem' }}>
                      Tariff · {mode==='bw' ? 'B&W' : 'Color'}

                    <div style={{ display:'flex', flexDirection:'column', gap:'0.3rem' }}>
                      {TARIFFS[mode].map(t => (
                        <button key={t.id} type="button" onClick={()=>setTariffId(t.id)}
                          style={{
                            display:'flex', alignItems:'center', justifyContent:'space-between',
                            padding:'0.38rem 0.65rem', borderRadius:'0.45rem',
                            background: tariffId===t.id ? (mode==='bw' ? 'rgba(226,232,240,0.12)' : 'rgba(96,165,250,0.14)') : 'rgba(255,255,255,0.03)',

                        { key:'single', label:'◻ Single-Sided', desc:'Full rate per page' },
                        { key:'double', label:'◫ Double-Sided', desc:'Save 40% paper' },
                      ].map(opt => (
                        <button
                          key={opt.key} type="button"
                          onClick={() => setSided(opt.key)}
                          style={{
                            flex:1, padding:'0.42rem 0.5rem',
                            background: sided===opt.key ? 'rgba(0,245,212,0.13)' : 'rgba(255,255,255,0.02)',
                            border:'none', cursor:'pointer',
                            color: sided===opt.key ? '#00f5d4' : 'var(--c-dim)',
                            fontSize:'0.70rem', fontWeight: sided===opt.key ? 800 : 500,
                            fontFamily:'var(--ff-main)', transition:'all 0.14s',
                            borderRight: opt.key==='single' ? '1px solid rgba(255,255,255,0.09)' : 'none',
                          }}
                          title={opt.desc}

                      ))}
                    </div>
                    {sided === 'double' && (
                      <div style={{ fontSize:'0.60rem', color:'rgba(0,245,212,0.65)', marginTop:'0.25rem', fontFamily:'var(--ff-mono)', textAlign:'center' }}>
                        ⤷ Uses ½ sheets · +10% ink surcharge · net −40% vs single
                      </div>
                    )}
                  </div>

                  {/* Pages + Copies */}
                  <div style={{ display:'flex', gap:'0.6rem' }}>
                    <div style={{ flex:1 }}>
                      <label style={{ fontSize:'0.62rem', fontWeight:700, color:'var(--c-dim)', letterSpacing:'0.08em', textTransform:'uppercase', fontFamily:'var(--ff-mono)', display:'block', marginBottom:'0.3rem' }}>Pages</label>
                      {/* Quick presets */}
                      <div style={{ display:'flex', flexWrap:'wrap', gap:'0.25rem', marginBottom:'0.35rem' }}>
                        {PAGE_PRESETS.map(n=>(
                          <button key={n} type="button" onClick={()=>setPages(n)}
                            style={{
                              padding:'0.2rem 0.42rem', borderRadius:'0.35rem',
                              background: pages===n ? 'rgba(96,165,250,0.20)' : 'rgba(255,255,255,0.04)',
                              border: pages===n ? '1px solid rgba(96,165,250,0.45)' : '1px solid rgba(255,255,255,0.08)',
                              color: pages===n ? '#60a5fa' : 'var(--c-dim)',
                              fontSize:'0.63rem', fontWeight:700, fontFamily:'var(--ff-mono)',
                              cursor:'pointer', transition:'all 0.11s',
                            }}>{n}</button>
                        ))}
                      </div>
                      <input type="number" min={1} max={9999}
                        value={pages} onChange={e=>setPages(Math.max(1,parseInt(e.target.value)||1))}
                        style={{ width:'100%', padding:'0.35rem 0.55rem', borderRadius:'0.45rem', background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.09)', color:'var(--c-text)', fontSize:'0.78rem', fontFamily:'var(--ff-mono)', fontWeight:800, outline:'none', textAlign:'center' }}
                      />
                    </div>
                    <div style={{ flex:1 }}>
                      <label style={{ fontSize:'0.62rem', fontWeight:700, color:'var(--c-dim)', letterSpacing:'0.08em', textTransform:'uppercase', fontFamily:'var(--ff-mono)', display:'block', marginBottom:'0.3rem' }}>Copies</label>
                      <div style={{ display:'flex', flexWrap:'wrap', gap:'0.25rem', marginBottom:'0.35rem' }}>
                        {[1,2,3,5,10].map(n=>(
                          <button key={n} type="button" onClick={()=>setCopies(n)}
                            style={{
                              padding:'0.2rem 0.42rem', borderRadius:'0.35rem',
                              background: copies===n ? 'rgba(52,211,153,0.18)' : 'rgba(255,255,255,0.04)',
                              border: copies===n ? '1px solid rgba(52,211,153,0.40)' : '1px solid rgba(255,255,255,0.08)',
                              color: copies===n ? '#34d399' : 'var(--c-dim)',
                              fontSize:'0.63rem', fontWeight:700, fontFamily:'var(--ff-mono)',
                              cursor:'pointer', transition:'all 0.11s',
                            }}>{n}</button>
                        ))}
                      </div>
                      <input type="number" min={1} max={999}
                        value={copies} onChange={e=>setCopies(Math.max(1,parseInt(e.target.value)||1))}
                        style={{ width:'100%', padding:'0.35rem 0.55rem', borderRadius:'0.45rem', background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.09)', color:'var(--c-text)', fontSize:'0.78rem', fontFamily:'var(--ff-mono)', fontWeight:800, outline:'none', textAlign:'center' }}
                      />
                    </div>
                  </div>

                  {/* Machine selector */}
                  <div>
                    <label style={{ fontSize:'0.62rem', fontWeight:700, color:'var(--c-dim)', letterSpacing:'0.08em', textTransform:'uppercase', fontFamily:'var(--ff-mono)', display:'block', marginBottom:'0.3rem' }}>Machine</label>
                    <select value={machine} onChange={e=>setMachine(e.target.value)}
                      style={{ width:'100%', padding:'0.38rem 0.6rem', borderRadius:'0.45rem', background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.09)', color:'var(--c-text)', fontSize:'0.74rem', fontFamily:'var(--ff-main)', outline:'none', cursor:'pointer' }}>
                      {MACHINES.map(m=>(
                        <option key={m.id} value={m.id} style={{background:'#0a0520'}}>
                          {m.name} — {m.status}
                        </option>
                      ))}
                    </select>
                  </div>

                  {/* Live cost preview — full bill breakdown */}
                  <div style={{
                    background: mode==='bw' ? 'rgba(226,232,240,0.06)' : 'rgba(96,165,250,0.08)',
                    border: mode==='bw' ? '1px solid rgba(226,232,240,0.15)' : '1px solid rgba(96,165,250,0.22)',
                    borderRadius:'0.55rem', padding:'0.65rem 0.75rem',
                  }}>
                    {/* Header row */}
                    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'0.45rem', paddingBottom:'0.35rem', borderBottom:'1px solid rgba(255,255,255,0.06)' }}>
                      <span style={{ fontSize:'0.60rem', color:'var(--c-dim)', fontFamily:'var(--ff-mono)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.07em' }}>Bill Breakdown</span>
                      <span style={{ fontSize:'0.60rem', color:'var(--c-dim)', fontFamily:'var(--ff-mono)' }}>{sided==='double'?'Double':'Single'}-Sided · {mode==='bw'?'B&W':'Color'}</span>
                    </div>
                    {/* Base rate line */}
                    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'0.2rem' }}>
                      <span style={{ fontSize:'0.64rem', color:'var(--c-muted)', fontFamily:'var(--ff-mono)' }}>
                        {totalImpressions.toLocaleString()} imp × {fmtN(activeTariff.ppg)}
                      </span>
                      <span style={{ fontSize:'0.64rem', color:'var(--c-muted)', fontFamily:'var(--ff-mono)', fontWeight:700 }}>{fmtN(baseCost)}</span>
                    </div>
                    {/* Sided adjustment lines (double only) */}
                    {sided === 'double' && (
                      <>
                        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'0.2rem' }}>
                          <span style={{ fontSize:'0.63rem', color:'#34d399', fontFamily:'var(--ff-mono)' }}>− Duplex paper saving (40%)</span>
                          <span style={{ fontSize:'0.63rem', color:'#34d399', fontFamily:'var(--ff-mono)', fontWeight:700 }}>−{fmtN(Math.round(baseCost*0.40))}</span>
                        </div>
                        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'0.2rem' }}>
                          <span style={{ fontSize:'0.63rem', color:'#f59e0b', fontFamily:'var(--ff-mono)' }}>+ Ink/toner surcharge (10%)</span>
                          <span style={{ fontSize:'0.63rem', color:'#f59e0b', fontFamily:'var(--ff-mono)', fontWeight:700 }}>+{fmtN(Math.round(baseCost*0.10))}</span>
                        </div>
                        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'0.2rem', paddingTop:'0.15rem', borderTop:'1px dashed rgba(255,255,255,0.07)' }}>
                          <span style={{ fontSize:'0.60rem', color:'var(--c-dim)', fontFamily:'var(--ff-mono)' }}>Sheets consumed</span>
                          <span style={{ fontSize:'0.60rem', color:'var(--c-dim)', fontFamily:'var(--ff-mono)' }}>{physicalSheets.toLocaleString()} sheets</span>
                        </div>
                      </>
                    )}
                    {/* Total line */}
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginTop:'0.4rem', paddingTop:'0.4rem', borderTop:'1px solid rgba(255,255,255,0.09)' }}>
                      <span style={{ fontSize:'0.68rem', color:'var(--c-muted)', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em' }}>
                        Total {sided==='double' ? <span style={{color:'#34d399',fontSize:'0.58rem',fontWeight:600}}> (saves {fmtN(sidedSaving)} vs single)</span> : null}
                      </span>
                      <span style={{
                        fontSize:'1.35rem', fontWeight:900, fontFamily:'var(--ff-mono)',
                        color: mode==='bw' ? '#e2e8f0' : '#60a5fa',
                        textShadow: mode==='color' ? '0 0 14px rgba(96,165,250,0.45)' : 'none',
                      }}>{fmtN(jobCost)}</span>
                    </div>
                  </div>

                  {/* Submit */}
                  <button type="button" onClick={submitJob} style={{
                    width:'100%', padding:'0.6rem', borderRadius:'0.55rem',
                    background: mode==='bw'
                      ? 'linear-gradient(135deg,rgba(226,232,240,0.15),rgba(148,163,184,0.10))'
                      : 'linear-gradient(135deg,rgba(96,165,250,0.22),rgba(124,58,237,0.14))',
                    border: mode==='bw' ? '1px solid rgba(226,232,240,0.30)' : '1px solid rgba(96,165,250,0.45)',
                    color: mode==='bw' ? '#e2e8f0' : '#60a5fa',
                    fontSize:'0.85rem', fontWeight:900, cursor:'pointer',
                    fontFamily:'var(--ff-main)', letterSpacing:'0.01em',
                    animation:'pulse-glow 2.5s ease-in-out infinite',
                    transition:'all 0.15s',
                  }}>
                    🖨️ Queue Print Job
                  </button>
                </div>
              </div>
            </div>

            {/* ── RIGHT col ── */}
            <div style={{ flex:'1 1 380px', minWidth:0, display:'flex', flexDirection:'column', gap:'0.9rem' }}>

              {/* Machine status board */}
              <div style={{ background:'rgba(8,5,24,0.65)', border:'1px solid rgba(255,255,255,0.07)', borderRadius:'0.85rem', padding:'0.85rem' }}>

                  {MACHINES.map(m => {
                    const st = statusStyle(m.status);
                    return (
                      <div key={m.id} onClick={() => setMachine(m.id)} style={{
                        flex:'1 1 130px', cursor:'pointer',
                        background: machine===m.id ? `${st.bg}` : 'rgba(8,5,24,0.55)',
                        border: machine===m.id ? `1px solid ${st.border}` : '1px solid rgba(255,255,255,0.07)',

                          <span style={{ fontSize:'0.68rem', fontWeight:700, color:'var(--c-text)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:'75%' }}>{m.name.replace('Xerox ','').replace('Canon ','').replace('HP ','').replace('Epson ','').replace('Ricoh ','')}</span>

                        </div>
                        <div style={{ fontSize:'0.62rem', color:st.color, fontWeight:700 }}>{m.status}</div>
                        <div style={{ fontSize:'0.58rem', color:'var(--c-dim)', marginTop:'0.15rem' }}>{m.cap} · {m.tariffTypes.join(' & ').toUpperCase()}</div>
                      </div>
                    );

                </div>
              </div>

              {/* Paper stock panel */}

                <div style={{ display:'flex', flexDirection:'column', gap:'0.35rem', marginTop:'0.55rem' }}>

                    const pct = Math.min(100, Math.round(p.sheets / (p.reorder*8) * 100));

                    const barColor = low ? '#f87171' : p.color==='color' ? '#60a5fa' : '#94a3b8';
                    return (
                      <div key={p.id} style={{ display:'flex', alignItems:'center', gap:'0.6rem' }}>

                    <thead>
                      <tr style={{ borderBottom:'1px solid rgba(255,255,255,0.07)' }}>

                        const st = statusStyle(j.status);
                        return (
                          <tr key={j.id} style={{ background: i%2===0?'transparent':'rgba(255,255,255,0.015)', borderBottom:'1px solid rgba(255,255,255,0.04)' }}>

                            <td style={{ padding:'0.45rem 0.6rem', fontFamily:'var(--ff-mono)', fontSize:'0.7rem', color:'var(--c-muted)', textAlign:'center' }}>{j.pages.toLocaleString()}</td>

                            <td style={{ padding:'0.45rem 0.6rem', fontSize:'0.68rem', color:'var(--c-muted)', whiteSpace:'nowrap' }}>{j.type}</td>
                            <td style={{ padding:'0.45rem 0.6rem', fontFamily:'var(--ff-mono)', fontSize:'0.7rem', fontWeight:800, color:'var(--c-teal)', whiteSpace:'nowrap' }}>{fmtN(j.cost)}</td>
                            <td style={{ padding:'0.45rem 0.6rem' }}>
                              <span style={{ fontSize:'0.63rem', fontWeight:700, color:st.color, padding:'0.13rem 0.4rem', borderRadius:'99px', background:st.bg, border:`1px solid ${st.border}`, whiteSpace:'nowrap' }}>{j.status}</span>

                            <td style={{ padding:'0.4rem 0.5rem' }}>
                              {j.status !== 'Done' && (
                                <button type="button" onClick={()=>advanceJob(j.id)} style={{ padding:'0.18rem 0.5rem', borderRadius:'0.38rem', border:'1px solid rgba(96,165,250,0.30)', background:'rgba(96,165,250,0.10)', color:'#60a5fa', cursor:'pointer', fontSize:'0.62rem', fontWeight:700, fontFamily:'var(--ff-main)', whiteSpace:'nowrap' }}>
                                  {j.status==='Queued' ? '▶ Print' : '✓ Done'}
                                </button>
                              )}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>

          {/* ── Receipt modal ── */}
          {receipt && (
            <div style={{
              position:'fixed', inset:0, zIndex:9990, background:'rgba(0,0,0,0.72)',

                  {[
                    ['Job ID',          receipt.id],
                    ['Customer',        receipt.cust],
                    ['Type',            receipt.type],
                    ['Sided',           receipt.sided === 'double' ? '◫ Double-Sided' : '◻ Single-Sided'],
                    ['Total Impressions', receipt.pages.toLocaleString() + ' pages'],
                    ['Sheets Used',     (receipt.physicalSheets || receipt.pages).toLocaleString() + ' sheets'],
                    ...(receipt.sided === 'double' ? [
                      ['Paper Saving',  '−' + fmtN(receipt.sidedSaving || 0)],
                      ['Ink Surcharge', '+' + fmtN(receipt.sidedSurcharge || 0)],
                    ] : []),
                    ['Job Cost',        fmtN(receipt.cost)],
                    ['Status',          receipt.status],
                    ['Time',            receipt.ts],
                  ].map(([k,v])=>(
                    <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'0.25rem 0', borderBottom:'1px solid rgba(255,255,255,0.04)', fontSize:'0.72rem' }}>
                      <span style={{ color:'var(--c-dim)', fontFamily:'var(--ff-mono)' }}>{k}</span>
                      <span style={{
                        color: k==='Paper Saving' ? '#34d399' : k==='Ink Surcharge' ? '#f59e0b' : k==='Job Cost' ? '#60a5fa' : 'var(--c-text)',
                        fontWeight: k==='Job Cost' ? 900 : 700,
                        fontFamily: k==='Job Cost' || k==='Paper Saving' || k==='Ink Surcharge' ? 'var(--ff-mono)' : 'inherit',
                      }}>{v}</span>
                    </div>
                  ))}
                </div>
                <button type="button" onClick={()=>setReceipt(null)} style={{ width:'100%', padding:'0.55rem', borderRadius:'0.55rem', background:'linear-gradient(135deg,rgba(96,165,250,0.20),rgba(124,58,237,0.14))', border:'1px solid rgba(96,165,250,0.40)', color:'#60a5fa', cursor:'pointer', fontSize:'0.82rem', fontWeight:800, fontFamily:'var(--ff-main)' }}>
                  ✅ Close
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    /* ════════════════════════════════════════════════════════════════════
       GRANULAR EMPLOYEE ACCESS MANAGER — sub-component of ControlCenter
       Full permission matrix with role-based toggles, module access grid,
       employee roster, and audit trail per user.
    ════════════════════════════════════════════════════════════════════ */

    /* ── Inject access-manager keyframes once ─────────────────────────── */
    (() => {
      const id = 'roaji-access-mgr-styles';
      if (document.getElementById(id)) return;
      const el = document.createElement('style');
      el.id = id;
      el.textContent = `
        @keyframes accessCardIn {
          from { opacity:0; transform:translateY(14px) scale(0.98); }
          to   { opacity:1; transform:translateY(0)    scale(1);    }
        }
        @keyframes toggleOn {
          0%   { transform:scale(1); }
          40%  { transform:scale(1.18); }
          100% { transform:scale(1); }
        }
        @keyframes badgePop {
          0%   { transform:scale(0.7); opacity:0; }
          65%  { transform:scale(1.12); opacity:1; }
          100% { transform:scale(1); }
        }
        @keyframes accessPulse {
          0%,100% { box-shadow:0 0 0 0 rgba(0,245,212,0.20); }

        }

        .toggle-pop       { animation: toggleOn     0.30s cubic-bezier(0.16,1,0.3,1); }
        .badge-pop        { animation: badgePop     0.28s cubic-bezier(0.16,1,0.3,1) both; }

          position:relative; display:inline-flex; align-items:center;

          flex-shrink:0;

          position:absolute; top:2px; width:14px; height:14px;
