<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROAJI - Resolving Connection...</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandDark: '#050505',
                        amberAccent: '#f59e0b',
                    }
                }
            }
        }
    </script>
    <style>
        .bloom-text {
            text-shadow: 0 0 12px rgba(245, 158, 11, 0.4);
        }
        .glass-panel {
            background: rgba(12, 12, 12, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Loading Animation */
        .loader-ring {
            border: 2px solid rgba(245, 158, 11, 0.1);
            border-top: 2px solid #f59e0b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-brandDark text-neutral-100 h-full flex flex-col items-center justify-center p-6 antialiased overflow-hidden select-none">

    <!-- Ambient Background Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-amber-500/5 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <!-- Active Resolving UI -->
    <div id="resolver-content" class="relative z-10 flex flex-col items-center text-center space-y-6">
        <div class="loader-ring"></div>
        <div class="space-y-2">
            <h1 class="text-2xl font-black tracking-[0.3em] text-white bloom-text uppercase">ROAJI</h1>
            <p id="resolver-status" class="text-[11px] font-mono text-amberAccent uppercase tracking-widest animate-pulse">Resolving secure connection...</p>
        </div>
        <p class="text-[10px] text-neutral-600 font-mono uppercase">Validating Handshake Protocol</p>
    </div>

    <!-- Maintenance Blocked UI (Hidden by default) -->
    <div id="maintenance-ui" class="hidden relative z-10 w-full max-w-md">
        <div class="glass-panel p-8 rounded-3xl text-center border-red-500/20">
            <div class="w-16 h-16 bg-red-500/10 border border-red-500/30 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-white mb-3 uppercase tracking-tight">System Under Maintenance</h2>
            <p class="text-neutral-400 text-sm mb-6 leading-relaxed">The workspace routing engine is temporarily frozen for upgrades. Please contact the administrator for more details.</p>
            <div class="py-2 px-4 bg-neutral-900 rounded-lg border border-neutral-800 text-[10px] font-mono text-neutral-500 uppercase">
                Status: ROAJI_ENGINE_LOCKED
            </div>
        </div>
    </div>

    <!-- Execution Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resolverStatus = document.getElementById('resolver-status');
            const resolverContent = document.getElementById('resolver-content');
            const maintenanceUI = document.getElementById('maintenance-ui');

            // 1. Initial Delay to simulate handshake aesthetics
            setTimeout(() => {
                executeHandoverProtocol();
            }, 1800);

            function executeHandoverProtocol() {
                // --- LOGIC 1: Maintenance Check ---
                const isMaintenance = localStorage.getItem("roaji_maintenance_mode");
                if (isMaintenance === "ON") {
                    resolverContent.classList.add('hidden');
                    maintenanceUI.classList.remove('hidden');
                    console.error("Connection Intercepted: System is under maintenance.");
                    return; // Halt execution
                }

                // --- LOGIC 2: Session Validation ---
                const activeSession = localStorage.getItem('roaji_active_shop_session');
                if (!activeSession) {
                    console.warn("Unauthorized Access: No active session found. Redirecting to login...");
                    window.location.replace("index.html");
                    return;
                }

                // --- LOGIC 3: Successful Handover ---
                try {
                    // Update UI status
                    resolverStatus.textContent = "Handshake sequence complete";
                    resolverStatus.classList.remove('text-amberAccent');
                    resolverStatus.classList.add('text-emerald-500');

                    // Set high-level ready flag
                    localStorage.setItem('session_ready', 'true');

                    // Navigate to Master Dashboard
                    setTimeout(() => {
                        window.location.replace("main_dashboard.html");
                    }, 800);

                } catch (error) {
                    console.error("Resolution Failed:", error);
                    window.location.replace("index.html");
                }
            }
        });
    </script>
</body>
</html>
